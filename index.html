y when corneal edema precludes gonioscopy.\nTreatment\n\nNo treatment is needed unless glaucoma or corneal edema is present, at which point one or more of the following treatments"}, {"id": "9.15", "chapter_num": "9", "chapter": "Glaucoma", "name": "Postoperative Glaucoma", "raw": "9.15 Postoperative Glaucoma\n\n9.15.1 EARLY POSTOPERATIVE GLAUCOMA\n\nIOP tends to increase approximately 1 hour after cataract extraction and usually returns to normal within 1 week. Etiologies include retained viscoelastic material or lens particle(s), pupillary block, hyphema, pigment dispersion, and generalized inflammation. Patients at greatest risk include those with ocular hypertension, glaucoma, preoperative IOP >22 mm Hg, and intraoperative complications. Most healthy eyes can tolerate an IOP up to 30 mm Hg for many months. However, eyes with preexisting optic nerve damage require IOP-lowering medications for any significant pressure increase. Prostaglandin analogs are generally avoided postoperatively because of their proinflammatory characteristics and delayed onset of action. Most eyes with an IOP >30 mm Hg should be treated. If inflammation is excessive, increase the topical steroid dose to every 2 hours while awake and consider a topical NSAID (e.g., ketorolac, flurbiprofen or diclofenac q.i.d., bromfenac b.i.d., or nepafenac daily). See [9.7](c09.xhtml#s9-7), Uveitic Glaucoma.\n\n9.15.2 POSTOPERATIVE PUPILLARY BLOCK\n\nDifferential Diagnosis\n\nEarly Postoperative Period (Within 2 Weeks)\n\n- Aqueous misdirection syndrome (malignant glaucoma). See [9.16](c09.xhtml#s9-16), Aqueous Misdirection Syndrome/Malignant Glaucoma.\n- Suprachoroidal hemorrhage.\n- Anterior chamber lens with vitreous loss: Vitreous plugs the pupil if iridectomy is not performed. Can also occur if patient is aphakic.\n- Silicone oil or expansile intraocular gas (e.g., sulfur hexafluoride [SF6] and perfluoropropane [C3F8]) after retinal detachment repair. Gas expansion typically occurs within 4 days of intraocular insertion. Can occur via open-angle or closed-angle mechanisms.\n- After endothelial keratoplasty, air or gas can migrate behind iris and cause pupillary block.\n- Angle closure after scleral buckling procedure.\nLate Postoperative Period (After 2 Weeks)\n\n- Pupillary block glaucoma. See [9.4](c09.xhtml#s9-4), Acute Angle Closure Attack.\n- Suprachoroidal hemorrhage.\n- UGH syndrome. See [9.15.3](c09.xhtml#s9-15-3), Uveitis, Glaucoma, Hyphema Syndrome.\n- Aqueous misdirection syndrome (malignant glaucoma): When cycloplegics are stopped. See [9.16](c09.xhtml#s9-16), Aqueous Misdirection Syndrome/Malignant Glaucoma.\n- Steroid-induced glaucoma. See [9.8](c09.xhtml#s9-8), Steroid-Response Glaucoma.\nSigns\n\nIncreased IOP, shallow or partially flat anterior chamber with anterior iris bowing (iris bombé), absence of a patent PI. Posterior iris adhesions to lens, anterior capsule, or intraocular lens usually present.\n\nTreatment\n\n- If the cornea is clear and the eye is not significantly inflamed, a PI is performed, usually by YAG laser. Because the PI tends to close, it is often necessary to perform two or more iridotomies. See [Appendix 15](app1.xhtml#app15), YAG Laser Peripheral Iridotomy.\n- If the cornea is hazy, the eye is inflamed, or a PI cannot be performed immediately, then:\n- Mydriatic agent (e.g., cyclopentolate 2% and phenylephrine 2.5%, every 15 minutes for four doses).\n- Topical therapy with β-blocker (e.g., timolol 0.5%), α2 agonist (e.g., brimonidine 0.1% to 0.2%), and CAI (dorzolamide 2%) should be initiated immediately if no contraindication. In urgent cases, three rounds of these medications may be given, with each round being separated by 15 minutes.\n- Systemic CAI (e.g., acetazolamide 250 to 500 mg i.v. or two 250-mg tablets p.o. in one dose if unable to"}, {"id": "9.16", "chapter_num": "9", "chapter": "Glaucoma", "name": "Aqueous Misdirection Syndrome/Malignant", "raw": "9.16 Aqueous Misdirection Syndrome/Malignant Glaucoma\n\nSymptoms\n\nMay be very mild early in course. Moderate pain, red eye, and photophobia may develop. Classically follows incisional (e.g., cataract, glaucoma, retinal) or laser surgery in eyes with small anterior segments (e.g., hyperopia, nanophthalmos) or with primary angle-closure glaucoma. May occur spontaneously or be induced by miotics.\n\nSigns\n\nCritical. Diffusely shallow or flat anterior chamber and increased IOP in the presence of a patent PI and in the absence of both a choroidal detachment and iris bombé. IOP may not be significantly elevated, especially early in the presentation.\n\nDifferential Diagnosis\n\n- Pupillary block glaucoma: Iris bombé, adhesions of iris to other anterior chamber structures. See [9.15.2](c09.xhtml#s9-15-2), Postoperative Pupillary Block.\n- Acute angle-closure glaucoma: See [9.4](c09.xhtml#s9-4), Acute Angle Closure Attack.\n- Overfiltration after surgery:\n- Choroidal detachment: Shallow or flat anterior chamber, but the IOP is typically low. See [11.27](c11.xhtml#s11-27), Choroidal Effusion/Detachment.\n- Postoperative wound leak: Shallow or flat anterior chamber often with positive Seidel test. IOP is typically low. See [9.19](c09.xhtml#s9-19), Hypotony Syndrome. See [Appendix 5](app1.xhtml#app5), Seidel Test to Detect a Wound Leak.\n- Suprachoroidal hemorrhage: Shallow or flat anterior chamber. IOP typically high. See [11.27](c11.xhtml#s11-27), Choroidal Effusion/Detachment.\nEtiology\n\nBelieved to result from anterior rotation of the ciliary body with posterior misdirection of the aqueous; aqueous then accumulates in the vitreous resulting in forward displacement of the ciliary processes, crystalline lens, intraocular implant, or the anterior vitreous face, causing secondary angle closure. Newer theories point toward choroidal expansion, reduced conductivity of fluid through vitreous, and reduced trans-scleral fluid movement as factors in development.\n\nWorkup\n\n- History: Previous eye surgery?\n- Slit-lamp examination: Determine if a patent PI or iris bombé is present. Pupillary block is unlikely in the presence of a patent PI unless it is plugged, bound down, or plateau iris syndrome is present.\n- Gonioscopy and IOP measurement.\n- Dilated retinal examination unless phakic angle closure is likely.\n- Perform B-scan US to rule out choroidal detachment and suprachoroidal hemorrhage.\n- Seidel test to detect postoperative wound leak if clinically indicated.\nTreatment\n\n- If an iridectomy is not present or an existing PI is not clearly patent, pupillary block cannot be ruled out, and a PI should be performed. See [9.4](c09.xhtml#s9-4), Acute Angle Closure Attack. If signs of aqueous misdirection are still present with a patent PI, attempt medical therapy to control IOP and return aqueous flow to the normal pathway.\n- Atropine 1% and phenylephrine 2.5% q.i.d. topically. Miotics can worsen condition and are contraindicated.\n- Systemic CAI (e.g., acetazolamide 500 mg i.v. or two 250-mg tablets p.o.).\n- Topical β-blocker (e.g., timolol 0.5% daily or b.i.d.).\n- Topical α2 agonist (e.g., apraclonidine 1.0% or brimonidine 0.1% to 0.2% b.i.d.).\n- If needed, hyperosmotic agent (e.g., mannitol 20% 1 to 2 g/kg i.v. over 45 minutes).\nIf the attack is broken (anterior chamber deepens and IOP normalizes), continue atropine 1% daily, indefinitely. At a later date, perform PI in the contralateral eye if the angle is occludable.\n\nIf steps 1 through 6 are unsuccessful, consider on"}, {"id": "9.17", "chapter_num": "9", "chapter": "Glaucoma", "name": "Postoperative Complications of Glaucoma", "raw": "9.17 Postoperative Complications of Glaucoma Surgery\n\nBLEB INFECTION (BLEBITIS)\n\nSee [9.18](c09.xhtml#s9-18), Blebitis.\n\nINCREASED POSTOPERATIVE IOP AFTER FILTERING PROCEDURE\n\nGrade of Shallowing of Anterior Chamber\n\n- Peripheral iris–cornea contact.\n- Entire iris in contact with cornea.\n- Lens (or lens implant or vitreous face)–corneal contact.\nNOTE: Please be sure to differentiate anterior chamber shallowing grading from both the Shaffer grading classification of angle depth and the Van Herick method for angle chamber estimation, all of which use numerical systems for grading. See [Appendix 14](app1.xhtml#app14), Angle Classification.\n\nDifferential Diagnosis\n\n(See Table 9.17.1.)\n\nTABLE 9.17.1 Postoperative Complications of Glaucoma Surgery\n\nIf the anterior chamber is flat or shallow and IOP is increased, consider the following:\n\n- Suprachoroidal hemorrhage: Sudden onset of excruciating pain (commonly 1 to 5 days after surgery), variable IOP (typically high), hazy cornea, and shallow chamber. See [11.27](c11.xhtml#s11-27), Choroidal Effusion/Detachment.\n- Aqueous misdirection/malignant glaucoma: See [9.16](c09.xhtml#s9-16), Aqueous Misdirection Syndrome/Malignant Glaucoma.\n- Postoperative pupillary block: See [9.15.2](c09.xhtml#s9-15-2), Postoperative Pupillary Block.\nIf the anterior chamber is deep, consider the following:\n\n- Internal filtration occlusion by an iris plug, hemorrhage, fibrin, vitreous, or viscoelastic material.\n- External filtration occlusion by a tight trabeculectomy flap (sutured tightly, scarred, adherent due to subconjunctival hemorrhage).\n- Occluded tube shunt (e.g., by iris plug, vitreous, hemorrhage, viscoelastic, capsular material) or increased IOP prior to tube ligature release.\n- Obstruction of Schlemm canal and collector channels by blood after goniotomy procedure or MIGS implant.\nTreatment\n\nInitial gonioscopy to assist in diagnosis is essential before starting any treatment.\n\n- If the bleb is not formed and the anterior chamber is deep, light ocular pressure should be applied to determine if the sclerostomy will drain (Carlo Traverso Maneuver). In fornix-based procedures, take great care to not disrupt the limbal wound.\nNOTE: If the sclerostomy is blocked with iris, any pressure on the globe is contraindicated due to potential for further iris incarceration.\n\n- Laser suture lysis or removal of releasable sutures may be indicated to increase filtration around the scleral flap.\n- Topical pilocarpine or slow intracameral injection of acetylcholine can pull the iris out of the sclerostomy if iris incarceration developed within the past 2 to 3 days. If this fails, and the sclerostomy is completely blocked by iris, transcorneal mechanical retraction of the iris may work. In rare cases, argon laser iridoplasty may be useful to pull the iris enough to restore filtration. If the sclerostomy is blocked with vitreous, photodisruption of the sclerostomy with a YAG laser may be attempted.\n- Blood or fibrin at the sclerostomy may clear with time or tissue plasminogen activator (10 μg) injected intracamerally may reestablish aqueous flow through the sclerostomy. Aqueous suppression can be utilized until blood has dissipated.\n- Iris-tube obstruction may be treated in a similar fashion as above.\n- A stent suture may be removed or ligature suture may be lysed to open a valveless tube, but care must be taken as the IOP may drop dramatically if the tube is opened prior to postoperative month one.\n- Additional medical therapy m"}, {"id": "9.18", "chapter_num": "9", "chapter": "Glaucoma", "name": "Blebitis", "raw": "9.18 Blebitis\n\nDefinition\n\nInfection of a filtering bleb. May occur any time after glaucoma filtering procedures (days to years). Greater incidence with use of antimetabolites during initial surgery, multiple surgeries, and postoperative complications including flat anterior chamber and wound leak.\n\n- Grade 1 (mild): Bleb infection, hyperemia or purulence, but no anterior chamber or vitreous involvement.\n- Grade 2 (moderate): Bleb infection with anterior chamber inflammation but no vitreous involvement.\n- Grade 3 (severe): Bleb infection with anterior chamber and vitreous involvement. See [12.14](c12.xhtml#s12-14), Acute Postoperative Endophthalmitis and [12.15](c12.xhtml#s12-15), Subacute and Chronic Postoperative Endophthalmitis.\nSymptoms\n\nRed eye and discharge early. Later, aching pain, photophobia, decreased vision, and mucous discharge.\n\nSigns\n\n(See Figure 9.18.1.)\n\nFigure 9.18.1 Blebitis. \n\n- Grade 1: Bleb appears milky with loss of translucency, microhypopyon in loculations of the bleb, may have frank purulent material in or leaking from the bleb, intense conjunctival injection. IOP is usually unaffected.\n- Grade 2: Grade 1 plus anterior chamber cell and flare, possibly an anterior chamber hypopyon, with no vitreous inflammation.\n- Grade 3: Grade 2 plus vitreous involvement. Same appearance as endophthalmitis except with bleb involvement.\nDifferential Diagnosis\n\n- Episcleritis: Sectoral inflammation, rarely superior. No bleb involvement. Minimal/mild pain. See [5.6](c05.xhtml#s5-6), Episcleritis.\n- Conjunctivitis: Minimal decrease in vision, no pain or photophobia. Bacterial conjunctivitis can progress to blebitis if not promptly treated. See [5.1](c05.xhtml#s5-1), Acute Conjunctivitis.\n- Anterior uveitis: Anterior chamber inflammation without bleb involvement. Photophobia. See [12.1](c12.xhtml#s12-1), Anterior Uveitis (Iritis/Iridocyclitis).\n- Endophthalmitis: Similar findings as severe blebitis without bleb involvement. May have more intense pain, eyelid edema, chemosis, greater decrease in vision, and hypopyon. See [12.14](c12.xhtml#s12-14), Acute Postoperative Endophthalmitis and [12.15](c12.xhtml#s12-15), Subacute and Chronic Postoperative Endophthalmitis.\n- Ischemic bleb: Seen after the use of antimetabolites in immediate postoperative period. Conjunctiva is opaque with sectoral conjunctival injection.\nWorkup\n\n- Slit-lamp examination with careful evaluation of the bleb, anterior chamber, and vitreous. Search for bleb leak by performing a Seidel test (see [Appendix 5](app1.xhtml#app5), Seidel Test to Detect a Wound Leak). Look for microhypopyon with gonioscopy.\n- Culture bleb or perform anterior chamber tap for moderate blebitis. If severe, see [12.14](c12.xhtml#s12-14), Acute Postoperative Endophthalmitis and [12.15](c12.xhtml#s12-15), Subacute and Chronic Postoperative Endophthalmitis.\n- B-scan US will help identify vitritis if visualization is difficult.\nNOTE: The most frequent organisms in the early postoperative period include Staphylococcus epidermidis, Staphylococcus aureus, and other Gram-positive organisms. If blebitis occurs months to years later, Streptococcus, Haemophilus influenzae, S. aureus, Moraxella, Pseudomonas, and Serratia are more common.\n\nTreatment\n\n- Grade 1: Intensive topical antibiotics with:\n- Fortified cefazolin or vancomycin and fortified tobramycin or gentamicin every bour each alternating every half-hour for the first 24 hours. May begin with a loading dose of one drop of each, every 5 minutes a"}, {"id": "9.19", "chapter_num": "9", "chapter": "Glaucoma", "name": "Hypotony Syndrome", "raw": "9.19 Hypotony Syndrome\n\nDefinition\n\nDecreased visual function and other ocular symptoms related to low IOP.\n\nSymptoms\n\nMild-to-severe pain, reduced vision, or may be asymptomatic. Patient with recent glaucoma filtering surgery may complain of “excessive tearing.”\n\nSigns\n\nCritical. Low IOP, usually ≤5 mm Hg, but may occur with an IOP as high as 10 mm Hg. Nonetheless, some patients may tolerate lower IOP and may not develop sequelae of hypotony despite IOP ≤5 mm Hg.\n\nOther. Corneal edema and folds, corneal decompensation, aqueous cell and flare, shallow or flat anterior chamber, retinal edema, hypotony maculopathy, chorioretinal folds, serous choroidal detachment, suprachoroidal hemorrhage, optic disc swelling, and retinal vascular tortuosity.\n\nEtiology\n\n- Postsurgical: Wound or bleb leak, overfiltering bleb or glaucoma drainage device (more common with use of antimetabolites during surgery), cyclodialysis cleft (disinsertion of the ciliary body from the sclera at the scleral spur), scleral perforation (e.g., from a superior rectus bridle suture or retrobulbar injection), iridocyclitis, retinal, or choroidal detachment, etc.\n- Posttraumatic: Same causes as postsurgical.\n- Rhegmatogenous retinal detachment.\n- Pharmacologic: Usually from an oral carbonic anhydrase inhibitor in combination with a topical β-blocker. Also associated with cidofovir.\n- Systemic (bilateral hypotony): Conditions that cause blood hypertonicity (e.g., dehydration, uremia, hyperglycemia), myotonic dystrophy, pregnancy, etc. Rare.\n- Vascular occlusive disease (e.g., ocular ischemic syndrome, giant cell arteritis, central retinal vein or artery occlusion): Usually mild hypotony due to decreased aqueous humor production from ciliary body hypoperfusion. Rare.\n- Uveitis: Secondary to ciliary body shutdown.\nWorkup\n\n- History: Recent ocular surgery or trauma? Systemic symptoms (nausea, vomiting, drowsiness, polyuria)? History of renal disease, diabetes, or myotonic dystrophy? Medications?\n- Complete ocular examination, including slit-lamp evaluation of surgical or traumatic ocular wounds, IOP check, grading of anterior chamber depth, gonioscopy to rule out a cyclodialysis cleft, evaluation of the macula for folds, and indirect ophthalmoscopy to rule out retinal or choroidal detachment.\n- Seidel test (with or without gentle pressure) to rule out a wound leak. See [Appendix 5](app1.xhtml#app5), Seidel Test to Detect a Wound Leak.\n- OCT of the macula to evaluate for macular folds (evidenced by rippled appearance of the retinal pigment epithelium [RPE]).\nNOTE: A wound leak may drain under the conjunctiva, producing an inadvertent filtering bleb. May be seen in old extracapsular cataract extraction wounds, which are large and may not completely close. Seidel test will then be negative.\n\n- B-scan US when the fundus cannot be seen clinically. Consider UBM or anterior segment OCT to aid in anterior chamber assessment, especially evaluation for cyclodialysis cleft. Macular OCT may be used for diagnosis confirmation and therapeutic monitoring.\n- Systemic workup in bilateral cases, including basic metabolic panel.\nTreatment\n\nRepair of the underlying disorder may be needed if symptoms are significant or progressive. Low IOP, even as low as 2 mm Hg, may not cause problems or symptoms and may be observed.\n\nWound Leak\n\n- Large wound leaks: Suture the wound closed.\n- Small wound leaks: Can be sutured closed or patched with an antibiotic ointment (e.g., erythromycin) and a pressure dressing"}, {"id": "10.1", "chapter_num": "10", "chapter": "Neuro-Ophthalmology", "name": "Anisocoria", "raw": "10.1 Anisocoria \n\nEyelid position, globe position (e.g., to rule out proptosis), and extraocular motility MUST be evaluated when anisocoria is present (see Figure 10.1.1).\n\nFigure 10.1.1 Flow diagram for the workup of anisocoria. Hydroxyamphetamine should not be used within 24 to 48 hours of cocaine or apraclonidine to avoid possible interference with each other. (Modified from Thompson HS, Pilley SF. Unequal pupils. A flow chart for sorting out the anisocorias. Surv Ophthalmol. 1976;21:45–48, with permission.) \n\nClassification\n\n- The abnormal pupil is constricted.\n- Unilateral exposure to a miotic agent (e.g., pilocarpine).\n- Iritis: Eye pain, redness, and anterior chamber cell and flare.\nNOTE: In cases of inflammation resulting in posterior synechiae formation, the abnormal pupil may appear irregular, nonreactive, and/or larger.\n\n- Horner syndrome: Mild ptosis on the side of the small pupil. See [10.2](c10.xhtml#s10-2), Horner Syndrome.\n- Argyll Robertson (i.e., syphilitic) pupil: Always bilateral, irregularly round miotic pupils, but a mild degree of anisocoria is often present. See [10.3](c10.xhtml#s10-3), Argyll Robertson Pupils.\n- Long-standing Adie pupil: The pupil is initially dilated, but over time may constrict. Hypersensitive to pilocarpine 0.125%. See [10.4](c10.xhtml#s10-4), Adie (Tonic) Pupil.\n- The abnormal pupil is dilated.\n- Iris sphincter muscle damage from trauma or surgery: Torn pupillary margin or iris transillumination defects seen on slit-lamp examination.\n- Adie (tonic) pupil: The pupil may be irregular, reacts minimally to light, and slowly and tonically to accommodation. Hypersensitive to pilocarpine 0.125%. See [10.4](c10.xhtml#s10-4), Adie (Tonic) Pupil.\n- Third cranial nerve palsy: Always has associated ptosis and/or extraocular muscle palsies. See [10.5](c10.xhtml#s10-5), Isolated Third Cranial Nerve Palsy.\n- Unilateral exposure to a mydriatic agent: Cycloplegic drops (e.g., atropine), scopolamine patch for motion sickness, ill-fitting mask in patients on nebulizers (using ipratropium bromide), and possible use of sympathetic medications (e.g., pseudoephedrine). If the mydriatic exposure is recent, pupil will not react to pilocarpine 1%.\n- Physiologic anisocoria: Pupil size disparity is the same in light as in dark, and the pupils react normally to light. The size difference is usually, but not always, <1 mm in diameter.\nWorkup\n\n- History: When was the anisocoria first noted? Associated symptoms or signs? Ocular trauma? Eye drops or ointments? Syphilis history (or risk factors)? Old photographs?\n- Ocular examination: Try to determine which pupil is abnormal by comparing pupil sizes in light and in dark. See Video: Smartphone Anisocoria Measurement Tutorial. Anisocoria greater in light suggests the larger pupil is abnormal; anisocoria greater in dark suggests the smaller pupil is abnormal. Test the pupillary reaction to both light and near. Evaluate for the presence of an afferent pupillary defect. Look for ptosis, evaluate ocular motility, and examine the pupillary margin with a slit lamp.\n- If the abnormal pupil is small, a diagnosis of Horner syndrome may be confirmed by a cocaine or apraclonidine test (see [10.2](c10.xhtml#s10-2), Horner Syndrome).\n- If the abnormal pupil is large and there is no sphincter muscle damage or signs of third cranial nerve palsy (e.g., extraocular motility deficit, ptosis), the pupils are tested with one drop of pilocarpine 0.125%. Within 10 to 15 minutes, an Adie pupil will "}, {"id": "10.2", "chapter_num": "10", "chapter": "Neuro-Ophthalmology", "name": "Horner Syndrome", "raw": "10.2 Horner Syndrome\n\nSymptoms\n\nPtosis and anisocoria. May have anhidrosis. Often asymptomatic.\n\nSigns\n\n(See Figure 10.2.1.)\n\nFigure 10.2.1 Right Horner syndrome with ptosis and miosis. \n\nCritical. Anisocoria that is greater in dim illumination (especially during the first few seconds after the light is dimmed). The abnormal small pupil dilates less than the normal, larger pupil. Mild ptosis (2 mm) and lower eyelid elevation (“reverse ptosis”) occur on the side of the small pupil.\n\nOther. Lower intraocular pressure, lighter iris color in congenital cases (iris heterochromia), loss of sweating (anhidrosis, distribution depends on the site of lesion), and transient increase in accommodation (older patients hold their reading card closer in the Horner eye). Involved eye may have conjunctival hyperemia due to decreased episcleral vascular tone. Light and near reactions are intact.\n\nDifferential Diagnosis\n\nSee [10.1](c10.xhtml#s10-1), Anisocoria.\n\nEtiology\n\n- First-order neuron disorder: Stroke (e.g., vertebrobasilar artery insufficiency or infarct), tumor, multiple sclerosis (MS). Rarely, severe osteoarthritis of the neck with bony spurs.\n- Second-order neuron disorder: Tumor (e.g., lung carcinoma, metastasis, thyroid adenoma, neurofibroma), aortic aneurysm (e.g., tertiary syphilis). Patients with pain in the arm or scapular region should be suspected of having a Pancoast tumor. In children, consider neuroblastoma, lymphoma, or metastasis.\n- Third-order neuron disorder: Headache syndrome (e.g., cluster, migraine, Raeder paratrigeminal syndrome), internal carotid dissection, varicella zoster virus, otitis media, Tolosa–Hunt syndrome, neck trauma/tumor/inflammation, cavernous sinus pathology.\n- Congenital Horner syndrome: May also be caused by birth trauma.\n- Other rare causes: Cervical paraganglioma, ectopic cervical thymus.\nWorkup\n\n- Diagnosis confirmed by a relative reversal in anisocoria with apraclonidine (0.5% or 1%). The miotic pupil with Horner syndrome will appear larger than the normal pupil 40 to 60 minutes after apraclonidine instillation. Alternatively, 10% cocaine may be used. Place one drop of 10% cocaine in both eyes. Check in 15 minutes. If no change in pupillary size is noted, repeat drops and recheck the pupils in 15 minutes (repeat until normal pupil dilates). A Horner pupil dilates less than the normal pupil. The test is considered positive if there is >1 mm of anisocoria 40 to 60 minutes after cocaine eye drop instillation.\nNOTE: There may be a high false-negative rate to pharmacologic testing in an acute Horner syndrome.\n\n- A third-order neuron disorder may be distinguished from a first-order and second-order neuron disorder with hydroxyamphetamine. Place one drop of 1% hydroxyamphetamine in both eyes. Check in 15 minutes and repeat if no change in pupillary size is noted. Failure of the Horner pupil to dilate to an equivalent degree as the fellow eye indicates a third-order neuron lesion, which may help guide the workup. However, most experts feel the entire sympathetic pathway should be imaged in Horner syndrome regardless of the results of pharmacologic testing. Additionally, hydroxyamphetamine is often unavailable even from compounding pharmacies.\nNOTE: The hydroxyamphetamine test has a sensitivity of up to 93% and a specificity of 83% for identifying a third-order neuron lesion. Hydroxyamphetamine should not be used within 24 to 48 hours of cocaine or apraclonidine to avoid possible interference with each other. Bo"}, {"id": "10.3", "chapter_num": "10", "chapter": "Neuro-Ophthalmology", "name": "Argyll Robertson Pupils", "raw": "10.3 Argyll Robertson Pupils\n\nSymptoms\n\nUsually asymptomatic.\n\nSigns\n\nCritical. Small, irregular pupils that exhibit “light-near” dissociation (react poorly or not at all to light but constrict normally during accommodation/convergence). By definition, vision must be intact.\n\nOther. The pupils dilate poorly in darkness. Always bilateral, although may be asymmetric.\n\nDifferential Diagnosis of “Light-Near” Dissociation\n\n- Bilateral optic neuropathy or severe retinopathy: Reduced visual acuity with normal pupil size.\n- Adie (tonic) pupil: Unilateral or bilateral irregularly dilated pupil that constricts slowly and unevenly to light. Normal vision. See [10.4](c10.xhtml#s10-4), Adie (Tonic) Pupil.\n- Dorsal midbrain (Parinaud) syndrome: Associated with eyelid retraction (Collier sign), supranuclear upgaze palsy, and convergence retraction nystagmus. See [10.4](c10.xhtml#s10-4), Adie (Tonic) Pupil and “Acquired Forms of Nystagmus” in [10.21](c10.xhtml#s10-21), Nystagmus.\n- Rarely caused by third cranial nerve palsy with aberrant regeneration. See [10.6](c10.xhtml#s10-6), Aberrant Regeneration of the Third Cranial Nerve.\n- Others: Diabetes, alcoholism, etc.\nEtiology\n\n- Tertiary syphilis.\nWorkup\n\n- Test the pupillary reaction to light and convergence: To test the reaction to convergence, patients are asked to look first at a distant target and then at their own finger, which the examiner holds in front of them and slowly brings in toward their face.\n- Slit-lamp examination: Look for interstitial keratitis (see [4.18](c04.xhtml#s4-18), Interstitial Keratitis).\n- Dilated fundus examination: Search for chorioretinitis, papillitis, and uveitis.\n- Fluorescent treponemal antibody absorption (FTA-ABS) or treponemal-specific assay (e.g., microhemagglutination assay–Treponema pallidum [MHA-TP]) and rapid plasma reagin (RPR) or Venereal Disease Research Laboratory (VDRL) test.\n- If the diagnosis of syphilis is established, lumbar puncture (LP) may be indicated. See [12.10](c12.xhtml#s12-10), Syphilis, for specific indications.\nTreatment\n\n- Treatment is based on the presence of active disease and previous appropriate treatment.\n- See [12.10](c12.xhtml#s12-10), Syphilis, for treatment indications and specific antibiotic therapy.\nFollow-Up\n\nPupillary findings alone are not an emergency. Diagnostic workup and determination of syphilitic activity should be undertaken within a few days.\n\n"}, {"id": "10.4", "chapter_num": "10", "chapter": "Neuro-Ophthalmology", "name": "Adie (Tonic) Pupil", "raw": "10.4 Adie (Tonic) Pupil\n\nSymptoms\n\nDifference in size of pupils, blurred near vision, and photophobia. May be asymptomatic.\n\nSigns\n\nCritical. An irregularly dilated pupil that has minimal or no reactivity to light. Slow, tonic constriction with convergence, and slow redilation. May have vermiform iris movement and/or sectoral iris sphincter paresis.\n\nNOTE: Typically presents unilaterally and more commonly in young women.\n\nOther. May have an acute onset and become bilateral. The involved pupil may become smaller than the normal pupil over time.\n\nDifferential Diagnosis\n\nSee [10.1](c10.xhtml#s10-1), Anisocoria.\n\n- Parinaud syndrome/dorsal midbrain lesion: Bilateral mid-dilated pupils that react poorly to light but constrict normally with convergence (not tonic). Associated with eyelid retraction (Collier sign), supranuclear upgaze paralysis, and convergence retraction nystagmus. An MRI should be performed to rule out pinealoma and other midbrain pathology.\n- Holmes–Adie syndrome: Tonic pupil and tendon areflexia. May be associated with autonomic and peripheral neuropathy.\n- Argyll Robertson pupils: See [10.3](c10.xhtml#s10-3), Argyll Robertson Pupils.\nEtiology\n\nIdiopathic most commonly. Orbital trauma, surgery, and varicella zoster virus infection are seen frequently. Early syphilis, parvovirus B19, herpes simplex virus, botulism, paraneoplastic syndrome, giant cell arteritis (GCA), panretinal photocoagulation, and neurologic Lyme disease less commonly. Rare associations reported with endometriosis, seminomas, and Sjögren syndrome.\n\nWorkup\n\nSee [10.1](c10.xhtml#s10-1), Anisocoria, for a general workup when the diagnosis is uncertain.\n\n- Evaluate pupils and iris at slit lamp or with a muscle light for irregular slow constriction or abnormal movement.\n- Test for cholinergic hypersensitivity. Instill 0.125% pilocarpine in both eyes and recheck pupils in 10 to 15 minutes. An Adie pupil constricts while the normal pupil does not. More dilute concentrations of pilocarpine, such as 0.0625%, can decrease the likelihood of a false-positive test.\n- If bilateral simultaneous Adie pupils, consider further laboratory investigations including testing for the aforementioned etiologies. For unilateral involvement, no further laboratory investigations are necessary.\nNOTE: The dilute pilocarpine test may occasionally be positive in familial dysautonomia. Hypersensitivity may not be present with an acute Adie pupil and may need to be retested a few weeks later.\n\n- If Adie pupil is present in a patient younger than 1 year, consult a pediatric neurologist to rule out familial dysautonomia (Riley–Day syndrome).\nTreatment\n\nPilocarpine 0.125% b.i.d. to q.i.d. may be considered for cosmesis and to aid in accommodation.\n\nFollow-Up\n\nIf the diagnosis is certain, follow-up is routine.\n\n"}, {"id": "10.5", "chapter_num": "10", "chapter": "Neuro-Ophthalmology", "name": "Isolated Third Cranial Nerve Palsy", "raw": "10.5 Isolated Third Cranial Nerve Palsy \n\nSymptoms\n\nBinocular diplopia and ptosis; with or without pain.\n\nNOTE: Pain does not distinguish between microvascular infarction and compression.\n\nSigns\n\n(See Figures 10.5.1 and 10.5.2. See Video: Third Cranial Nerve Palsy.)\n\nFigure 10.5.1 Isolated right third cranial nerve palsy with complete ptosis. \n\nFigure 10.5.2 Isolated right third cranial nerve palsy: Primary gaze showing right exotropia and dilated pupil. \n\nCritical\n\n- External ophthalmoplegia.\n- Complete palsy: Limitation of ocular movement in all fields of gaze except abduction.\n- Incomplete palsy: Partial limitation of ocular movement.\n- Superior division palsy: Ptosis and poor eye elevation.\n- Inferior division palsy: Inability to adduct or depress the eye.\n- Internal ophthalmoplegia.\n- Pupil-involving: A fixed, dilated, poorly reactive pupil.\n- Pupil-sparing: Pupil not dilated and normally reactive to light.\n- Relative pupil-sparing: Pupil partially dilated and sluggishly reactive to light.\nOther. An exotropia or hypotropia. Aberrant regeneration. See [10.6](c10.xhtml#s10-6), Aberrant Regeneration of the Third Cranial Nerve.\n\nDifferential Diagnosis\n\n- Myasthenia gravis: Diurnal variation of symptoms and signs, pupil never involved, increased eyelid droop after sustained upgaze.\n- Thyroid eye disease: Eyelid lag, eyelid retraction, injection over the rectus muscles, proptosis, positive forced duction testing. See [7.2.1](c07.xhtml#s7-2-1), Thyroid Eye Disease.\n- Chronic progressive external ophthalmoplegia (CPEO): Bilateral, slowly progressive ptosis and motility limitation. Pupil spared, often no diplopia. See [10.12](c10.xhtml#s10-12), Chronic Progressive External Ophthalmoplegia.\n- Idiopathic orbital inflammatory syndrome: Pain and proptosis common. See [7.2.2](c07.xhtml#s7-2-2), Idiopathic Orbital Inflammatory Syndrome.\n- Internuclear ophthalmoplegia (INO): Unilateral or bilateral adduction deficit with horizontal nystagmus of opposite abducting eye. No ptosis. See [10.13](c10.xhtml#s10-13), Internuclear Ophthalmoplegia.\n- Skew deviation: Supranuclear brainstem lesion producing asymmetric, mainly vertical ocular deviation not consistent with single cranial nerve defect. See Differential Diagnosis in [10.7](c10.xhtml#s10-7), Isolated Fourth Cranial Nerve Palsy.\n- Parinaud syndrome/dorsal midbrain lesion: Bilateral mid-dilated pupils that react poorly to light but constrict normally with convergence (not tonic). Associated with eyelid retraction (Collier sign), supranuclear upgaze paralysis, and convergence retraction nystagmus. No ptosis.\n- GCA: Extraocular muscle ischemia due to involvement of the long posterior ciliary arteries. Any extraocular muscle may be affected, resulting in potentially complex horizontal and vertical motility deficits. Pupil typically not involved. Age ≥55 years. See [10.17](c10.xhtml#s10-17), Arteritic Ischemic Optic Neuropathy (Giant Cell Arteritis).\nEtiology\n\n- Pupil-involving:\n- More common: Aneurysm, particularly posterior communicating artery aneurysm.\n- Less common: Tumor, trauma, congenital, uncal herniation, cavernous sinus mass lesion, pituitary apoplexy, orbital disease, varicella zoster virus, ischemia (e.g., diabetic), GCA, and leukemia. In children, ophthalmoplegic migraine.\n- Pupil-sparing: Ischemic microvascular disease; rarely cavernous sinus syndrome or GCA.\n- Relative pupil-sparing: Ischemic microvascular disease; less likely compressive.\n- Aberrant regeneration present: Trauma, aneurys"}, {"id": "10.6", "chapter_num": "10", "chapter": "Neuro-Ophthalmology", "name": "Aberrant Regeneration of the Third Cranial", "raw": "10.6 Aberrant Regeneration of the Third Cranial Nerve\n\nSymptoms\n\nSee [10.5](c10.xhtml#s10-5), Isolated Third Cranial Nerve Palsy.\n\nSigns\n\n(See Figures 10.6.1 and 10.6.2.)\n\nFigure 10.6.1 Aberrant regeneration of right third cranial nerve showing right-sided ptosis in primary gaze. \n\nFigure 10.6.2 Aberrant regeneration of right third cranial nerve showing right upper eyelid retraction on attempted left gaze. \n\nThe most common signs of aberrant third cranial nerve regeneration include the following:\n\n- Eyelid-gaze dyskinesis: Elevation of involved eyelid on downgaze (Pseudo-von Graefe sign) or adduction.\n- Pupil-gaze dyskinesis: Pupil constricts on downgaze or adduction.\n- Other signs may include limitation of elevation and depression of eye, adduction of involved eye on attempted elevation or depression, absent optokinetic response, or pupillary light-near dissociation.\nEtiology\n\nThought to result from misdirection of the third cranial nerve fibers from their original destination to alternate third cranial nerve controlled muscles (e.g., inferior rectus to the pupil).\n\n- Aberrancy from congenital third cranial nerve palsies: Can be seen in up to two-thirds of these patients.\n- Aberrancy from prior acquired third cranial nerve palsies: Seen most often in patients recovering from third cranial nerve damage by trauma or compression by a posterior communicating artery aneurysm.\n- Primary aberrant regeneration: A term used to describe the presence of aberrant regeneration in a patient who has no history of a third cranial nerve palsy. Usually indicates the presence of a progressively enlarging parasellar lesion such as a carotid aneurysm or meningioma within the cavernous sinus.\nWorkup\n\n- Aberrancy from congenital: None. Document workup of prior congenital third cranial nerve palsy.\n- Aberrancy from acquired: See [10.5](c10.xhtml#s10-5), Isolated Third Cranial Nerve Palsy. Document workup of prior acquired third cranial nerve palsy if previously obtained.\n- Primary aberrancy: All patients must undergo neuroimaging to rule out slowly compressive lesion or aneurysm.\nNOTE: Ischemic third cranial nerve palsies DO NOT produce aberrancy. If aberrant regeneration develops in a presumed ischemic palsy, neuroimaging should be performed.\n\nTreatment\n\n- Treat the underlying disorder.\n- Consider strabismus surgery if significant symptoms are present.\nFollow-Up\n\n- Aberrancy from congenital: Routine.\n- Aberrancy from acquired: As per the underlying disorder identified in the workup.\n- Primary aberrancy: As per neuroimaging and clinical examination findings. Patients are instructed to return immediately for any changes (e.g., ptosis, diplopia, sensory abnormality).\n"}, {"id": "10.7", "chapter_num": "10", "chapter": "Neuro-Ophthalmology", "name": "Isolated Fourth Cranial Nerve Palsy", "raw": "10.7 Isolated Fourth Cranial Nerve Palsy \n\nSymptoms\n\nBinocular vertical (or oblique) diplopia, difficulty reading, sensation that objects appear tilted; may be asymptomatic.\n\nSigns\n\n(See Figures 10.7.1 and 10.7.2. See Video: Fourth Cranial Nerve Palsy.)\n\nFigure 10.7.1 Isolated left fourth cranial nerve palsy: Primary gaze showing left hypertropia. \n\nFigure 10.7.2 Isolated left fourth cranial nerve palsy: Right gaze with left inferior oblique overaction. \n\nCritical. Deficient inferior movement of an eye when attempting to look down and in. The three-step test isolates a palsy of the superior oblique muscle (see #3 under Workup, Perform the three-step test).\n\nOther. The involved eye is higher (hypertropic) in primary gaze. The hypertropia increases when looking in the direction of the uninvolved eye or tilting the head toward the ipsilateral shoulder. The patient often maintains a head tilt toward the contralateral shoulder to eliminate diplopia.\n\nDifferential Diagnosis\n\nAll of the following may produce binocular vertical diplopia, hypertropia, or both:\n\n- Myasthenia gravis: Variable symptoms with fatigability. Ptosis common. Orbicularis oculi weakness often present. See [10.11](c10.xhtml#s10-11), Myasthenia Gravis.\n- Thyroid eye disease: May have proptosis, eyelid lag, eyelid retraction, or injection over the involved rectus muscles. Positive forced duction test. See [7.2.1](c07.xhtml#s7-2-1), Thyroid Eye Disease and [Appendix 6](app1.xhtml#app6), Forced Duction Test and Active Force Generation Test.\n- Idiopathic orbital inflammatory syndrome: Pain and proptosis are common. See [7.2.2](c07.xhtml#s7-2-2), Idiopathic Orbital Inflammatory Syndrome.\n- Orbital fracture: History of trauma. Positive forced duction test. See [3.19](c03.xhtml#s3-19), Orbital Blowout Fracture.\n- Skew deviation: The three-step test does not isolate a particular muscle. Rule out a posterior fossa or brainstem lesion with neuroimaging. See [10.13](c10.xhtml#s10-13), Internuclear Ophthalmoplegia.\n- Incomplete third cranial nerve palsy: Inability to look down and in, usually with adduction weakness. Intorsion on attempted downgaze. Three-step test does not isolate the superior oblique. See [10.5](c10.xhtml#s10-5), Isolated Third Cranial Nerve Palsy.\n- Brown syndrome: Limitation of elevation in adduction due to restriction of superior oblique tendon. May be congenital or acquired (e.g., trauma, inflammation). Positive forced duction test. See [8.8](c08.xhtml#s8-8), Strabismus Syndromes.\n- GCA: Extraocular muscle ischemia causing nonspecific motility deficits or neural ischemia mimicking a cranial nerve palsy. Age ≥55 years, usually associated with systemic symptoms. See [10.17](c10.xhtml#s10-17), Arteritic Ischemic Optic Neuropathy (Giant Cell Arteritis).\nEtiology\n\nMore Common. Trauma, vascular infarct (often the result of underlying diabetes or hypertension), congenital, or demyelinating disease.\n\nRare. Tumor, hydrocephalus, aneurysm, GCA.\n\nWorkup\n\n- History: Onset and duration of the diplopia? Misaligned eyes or head tilt since early childhood? Trauma? Stroke?\n- Examine old photographs to determine whether the head tilt is long standing, indicating a chronic or congenital fourth cranial nerve palsy.\n- Perform the three-step test:\nStep 1: Determine which eye is deviated upward in primary gaze. This is best seen with the cover–uncover test (see [Appendix 3](app1.xhtml#app3), Cover/Uncover and Alternate Cover Tests). The higher eye comes down after being uncovered.\n\nStep"}, {"id": "10.8", "chapter_num": "10", "chapter": "Neuro-Ophthalmology", "name": "Isolated Sixth Cranial Nerve Palsy", "raw": "10.8 Isolated Sixth Cranial Nerve Palsy \n\nSymptoms\n\nBinocular horizontal diplopia, worse for distance than near, most pronounced in the direction of the paretic lateral rectus muscle.\n\nSigns\n\n(See Figures 10.8.1 and 10.8.2. See Video: Sixth Cranial Nerve Palsy.)\n\nFigure 10.8.1 Isolated right sixth cranial nerve palsy: Left gaze showing full adduction. \n\nFigure 10.8.2 Isolated right sixth cranial nerve palsy: Right gaze showing limited abduction. \n\nCritical. Deficient lateral movement of an eye with negative forced duction testing (see [Appendix 6](app1.xhtml#app6), Forced Duction Test and Active Force Generation Test).\n\nOther. No proptosis.\n\nDifferential Diagnosis of Limited Abduction\n\n- Thyroid eye disease: May have proptosis, eyelid lag, eyelid retraction, injection over the involved rectus muscles, and positive forced duction testing. See [7.2.1](c07.xhtml#s7-2-1), Thyroid Eye Disease.\n- Myasthenia gravis: Variable symptoms with fatigability. Ptosis common. Positive ice test, rest test, or less commonly edrophonium chloride test. See [10.11](c10.xhtml#s10-11), Myasthenia Gravis.\n- Idiopathic orbital inflammatory syndrome: Pain and proptosis are common. See [7.2.2](c07.xhtml#s7-2-2), Idiopathic Orbital Inflammatory Syndrome.\n- Orbital trauma: Fracture causing medial rectus entrapment, positive forced duction testing. See [3.19](c03.xhtml#s3-19), Orbital Blowout Fracture.\n- Duane syndrome, type 1: Congenital; narrowing of the palpebral fissure and retraction of the globe on adduction (usually no diplopia). See [8.8](c08.xhtml#s8-8), Strabismus Syndromes.\n- Möbius syndrome: Congenital; bilateral facial paralysis present. See [8.8](c08.xhtml#s8-8), Strabismus Syndromes.\n- Convergence spasm: Intermittent, variable episodes of convergence and miosis. May appear to have abduction deficit when assessing versions; however, ductions are full. Miotic pupils help to differentiate since pupils are not affected in an isolated sixth cranial nerve palsy.\n- Primary divergence insufficiency: Usually acquired and benign; esotropia and diplopia only at distance and single binocular vision at near. Symptoms may improve spontaneously without treatment or may be corrected with base-out prisms or surgery. If the history reveals sudden onset, trauma, infection (e.g., meningitis, encephalitis), MS, or malignancy, divergence paralysis should be considered and a neurologic workup with MRI of the brain and brainstem obtained. MRI rarely reveals pathology in true divergence insufficiency.\n- GCA: Less common; however, may occur with extraocular muscle ischemia in patients age ≥55 years. May be associated with systemic symptoms. See [10.17](c10.xhtml#s10-17), Arteritic Ischemic Optic Neuropathy (Giant Cell Arteritis).\nEtiology\n\nAdults\n\nMore Common. Vasculopathic (e.g., diabetes, hypertension, other atherosclerotic risk factors), trauma, idiopathic.\n\nLess Common. Increased intracranial pressure, cavernous sinus mass (e.g., meningioma, aneurysm, metastasis), MS, sarcoidosis, vasculitis, after myelography or LP, stroke (usually with other neurologic deficits), meningeal inflammation/infection (e.g., Lyme disease, neurosyphilis), and GCA.\n\nChildren\n\nBenign and usually self-limited after viral infection or vaccination, trauma, increased intracranial pressure (e.g., obstructive hydrocephalus), pontine glioma, and Gradenigo syndrome (petrositis causing sixth and often seventh cranial nerve involvement, with or without eighth and fifth cranial nerve involvement on the same"}, {"id": "10.9", "chapter_num": "10", "chapter": "Neuro-Ophthalmology", "name": "Isolated Seventh Cranial Nerve Palsy", "raw": "10.9 Isolated Seventh Cranial Nerve Palsy\n\nSymptoms\n\nWeakness or paralysis of one side of the face, inability to close one eye, excessive drooling.\n\nSigns\n\n(See Figures 10.9.1 and 10.9.2.)\n\nFigure 10.9.1 Isolated peripheral left seventh cranial nerve palsy demonstrating lagophthalmos. \n\nFigure 10.9.2 Isolated peripheral left seventh cranial nerve palsy demonstrating paralysis of upper facial muscles. \n\nCritical. Unilateral weakness or paralysis of the facial musculature.\n\n- Central lesion: Weakness or paralysis of lower facial musculature only. Upper eyelid closure and forehead wrinkling intact.\n- Peripheral lesion: Weakness or paralysis of upper and lower facial musculature.\nOther. Flattened nasolabial fold, droop of corner of the mouth, ectropion, and lagophthalmos. May have ipsilateral decreased taste on anterior two-thirds of tongue, decreased basic tear production, or hyperacusis. May have an injected eye with a corneal epithelial defect. Synkinesis, a simultaneous movement of muscles supplied by different branches of the facial nerve or simultaneous stimulation of visceral efferent fibers of facial nerve (e.g., corner of mouth contracts when eye closes, excessive lacrimation when eating [“crocodile” tears]), secondary to aberrant regeneration implying chronicity.\n\nEtiology\n\nCentral Lesions\n\n- Cortical: Lesion of contralateral motor cortex or internal capsule (e.g., stroke, tumor). Loss of voluntary facial movement; emotional facial movement sometimes intact. May also have ipsilateral hemiparesis.\n- Extrapyramidal: Lesion of basal ganglia (e.g., parkinsonism, tumor, vascular lesion of basal ganglia). Loss of emotional facial movement; volitional facial movement intact. Not a true facial paralysis.\n- Brainstem: Lesion of ipsilateral pons (e.g., MS, stroke, tumor). Often with ipsilateral sixth cranial nerve palsy, contralateral hemiparesis. Occasionally with cerebellar signs.\nPeripheral Lesions\n\n- Cerebellopontine angle (CPA) masses (e.g., acoustic neuroma, facial neuroma, meningioma, cholesteatoma, metastasis): Gradual progressive onset, although sometimes acute. May have facial pain, twitching, or a characteristic nystagmus. This is small-amplitude rapid jerk nystagmus in which the fast phase is directed away from the side of the lesion (peripheral vestibular) in conjunction with a slow, gaze-evoked nystagmus directed toward the side of the lesion (from brainstem compression). May have eighth cranial nerve dysfunction, including hearing loss, tinnitus, vertigo, or dysequilibrium.\n- Temporal bone fracture: History of head trauma. May have Battle sign (ecchymoses over mastoid region), cerebrospinal fluid (CSF) otorrhea, hearing loss, vertigo, or vestibular nystagmus.\n- Other trauma: Accidental or iatrogenic (e.g., facial laceration, local anesthetic block, parotid or mastoid surgery).\n- Acute or chronic suppurative otitis media.\n- Malignant otitis externa: Pseudomonas infection in diabetic or elderly patients. Begins in external auditory canal but may progress to osteomyelitis, meningitis, or abscess.\n- Ramsay–Hunt syndrome (varicella zoster virus oticus): Viral prodrome followed by ear pain; vesicles on pinna, external auditory canal, tongue, face, or neck. Progresses over 10 days. May have sensorineural hearing loss, tinnitus, or vertigo.\n- Guillain–Barré syndrome: Viral syndrome followed by progressive motor weakness or paralysis or cranial nerve palsies or both. Loss of deep tendon reflexes. May have bilateral facial palsies.\n- L"}, {"id": "10.10", "chapter_num": "10", "chapter": "Neuro-Ophthalmology", "name": "Cavernous Sinus and Associated Syndromes (Multiple Ocular Motor Nerve Palsies)", "raw": "10.10 Cavernous Sinus and Associated Syndromes (Multiple Ocular Motor Nerve Palsies)\n\nSymptoms\n\nDouble vision, eyelid droop, pain in the distribution of the V-1 and V-2 branches of the ipsilateral trigeminal nerve, or numbness.\n\nSigns\n\nCritical\n\nLimitation of eye movement corresponding to any combination of a third, fourth, or sixth cranial nerve palsy on one side; facial pain or numbness or both corresponding to first or second branches of the fifth cranial nerve; ptosis and a small pupil (Horner syndrome); the pupil also may be dilated if the third cranial nerve is involved. Any combination of the above may be present simultaneously because of the anatomy of the cavernous sinus. All signs involve the same side of the face when one cavernous sinus/superior orbital fissure is involved. The circular sinus connects the cavernous sinuses, and its involvement can cause contralateral signs. Consider orbital apex syndrome when proptosis and optic neuropathy are present.\n\nOther\n\nProptosis may be present when the superior orbital fissure is involved.\n\nDifferential Diagnosis\n\n- Myasthenia gravis: Fatigable ptosis, orbicularis weakness, and limited motility. Pupils never involved and never any sensory symptoms. No proptosis. See [10.11](c10.xhtml#s10-11), Myasthenia Gravis.\n- CPEO: Progressive, painless, bilateral motility limitation with ptosis. Normal pupils. Orbicularis always weak. See [10.12](c10.xhtml#s10-12), Chronic Progressive External Ophthalmoplegia.\n- Orbital lesions (e.g., tumor, thyroid disease, inflammation). Proptosis and increased resistance to retropulsion are usually present, in addition to motility restriction. Results of forced duction tests are abnormal (see [Appendix 6](app1.xhtml#app6), Forced Duction Test and Active Force Generation Test). May have an afferent pupillary defect if the optic nerve is involved.\nNOTE: Orbital apex syndrome combines the superior orbital fissure syndrome with optic nerve dysfunction, and most commonly results from an orbital lesion.\n\n- Brainstem disease: Tumors and vascular lesions of the brainstem produce ocular motor nerve palsies, particularly the sixth cranial nerve. MRI of the posterior fossa and brainstem is best for making this diagnosis.\n- Carcinomatous meningitis: Diffuse seeding and infiltration of the leptomeninges by metastatic tumor cells can produce a rapidly sequential bilateral cranial nerve disorder. Workup includes neuroimaging and LP.\n- Skull base tumors, especially nasopharyngeal carcinoma or clivus lesions: Most commonly affects the sixth cranial nerve, but the second, third, fourth, and fifth cranial nerves may be involved as well. Typically, one cranial nerve after another is affected by invasion of the skull base. The patient may have cervical lymphadenopathy, nasal obstruction, ear pain, or popping caused by serous otitis media or blockage of the Eustachian tube, weight loss, or proptosis.\nClivus tumors may produce fluctuating symptoms of double vision with an incomitant esotropia and only very mildly limited abduction deficits. These tumors also may produce relatively comitant esotropias due to involvement of both sixth cranial nerves as they ascend the clivus.\n\n- Progressive supranuclear palsy (PSP): Vertical limitation of eye movements, typically beginning with downward gaze. Postural instability, dementia, and rigidity of the neck and trunk may be present. All eye movements are eventually lost. Significant cognitive impairment is often present and can progress rapid"}, {"id": "10.11", "chapter_num": "10", "chapter": "Neuro-Ophthalmology", "name": "Myasthenia Gravis", "raw": "10.11 Myasthenia Gravis \n\nSymptoms\n\nPainless, droopy eyelid or double vision that is variable throughout the day or worse when the individual is fatigued; may have weakness of facial muscles, proximal limb muscles, and difficulty swallowing or breathing.\n\nSigns\n\nCritical\n\nWorsening of ptosis with sustained upgaze or diplopia with continued eye movements, weakness of the orbicularis muscle (cannot close the eyelids forcefully to resist examiner’s opening them). No pupillary abnormalities or pain. See Video: Ocular Myasthenia.\n\nOther\n\nUpward twitch of ptotic eyelid when shifting gaze from inferior to primary position (Cogan eyelid twitch). Can have complete limitation of all ocular movements.\n\nDifferential Diagnosis\n\n- Eaton–Lambert syndrome: A myasthenia-like paraneoplastic condition associated with carcinoma, especially lung cancer. Isolated eye signs do not occur, although eye signs may accompany systemic signs of weakness. Unlike myasthenia, muscle strength increases after exercise. Electromyography (EMG) distinguishes between the two conditions.\n- Myasthenia-like syndrome due to medication (e.g., penicillamine, aminoglycosides).\n- CPEO: No diurnal variation of symptoms or relation to fatigue; usually a negative intravenous edrophonium chloride test. Typically no diplopia. See [10.12](c10.xhtml#s10-12), Chronic Progressive External Ophthalmoplegia.\n- Kearns–Sayre syndrome: CPEO and retinal pigmentary degeneration in a young person; heart block develops. See [10.12](c10.xhtml#s10-12), Chronic Progressive External Ophthalmoplegia.\n- Third cranial nerve palsy: Pupil may be involved, no orbicularis weakness, no fatigability, no diurnal variation. See [10.5](c10.xhtml#s10-5), Isolated Third Cranial Nerve Palsy.\nNOTE: Myasthenia may mimic cranial nerve palsies, but the pupil is never involved.\n\n- Horner syndrome: Miosis accompanies the ptosis. Pupil does not dilate well in darkness. See [10.2](c10.xhtml#s10-2), Horner Syndrome.\n- Levator muscle dehiscence or disinsertion: High eyelid crease on the side of the droopy eyelid, no variability of eyelid droop, no orbicularis weakness.\n- Thyroid eye disease: No ptosis. May have eyelid retraction or eyelid lag, may or may not have exophthalmos, no diurnal variation of diplopia. Graves disease occurs in 5% of patients with myasthenia gravis. See [7.2.1](c07.xhtml#s7-2-1), Thyroid Eye Disease.\n- Idiopathic orbital inflammatory syndrome: Proptosis, pain, ocular injection. See [7.2.2](c07.xhtml#s7-2-2), Idiopathic Orbital Inflammatory Syndrome.\n- Myotonic dystrophy: May have ptosis and rarely, gaze restriction. After a handshake, these patients are often unable to release their grip (myotonia). Polychromatic lenticular deposits (“Christmas tree” cataract) and pigmentary retinopathy present.\nEtiology\n\nAutoimmune antibody-mediated disease; sometimes associated with underlying thyroid dysfunction. May be associated with thymic enlargement, representing either a benign thymoma or rarely a malignant thymoma. Increased incidence of other autoimmune disease (e.g., systemic lupus erythematosus, MS, rheumatoid arthritis). All age groups may be affected.\n\nWorkup\n\n- History: Do the signs fluctuate throughout the day and worsen with fatigue? Any systemic weakness? Difficulty swallowing, chewing, or breathing? Medications (worsened by beta-blockers, macrolides)?\n- Assess for presence of fatigability: Measure the degree of ptosis in primary gaze. Have the patient focus on your finger in upgaze for 1 minute. Observe"}, {"id": "10.12", "chapter_num": "10", "chapter": "Neuro-Ophthalmology", "name": "Chronic Progressive External Ophthalmoplegia", "raw": "10.12 Chronic Progressive External Ophthalmoplegia\n\nSymptoms\n\nSlowly progressive, symmetric ophthalmoplegia and droopy eyelids. Almost never have diplopia. Usually bilateral; there is no diurnal variation; there may be a family history.\n\nSigns\n\nCritical. Ptosis, limitation of ocular motility (sometimes complete limitation), normal pupils, and orthophoric.\n\nOther. Weak orbicularis oculi muscles, weakness of limb and facial muscles, and exposure keratopathy.\n\nDifferential Diagnosis\n\nThe following syndromes must be ruled out when CPEO is diagnosed:\n\n- Kearns–Sayre syndrome: Onset of CPEO before age 20 years associated with retinal pigmentary degeneration (classically exhibiting a salt-and-pepper appearance) and heart block that usually occurs years after the ocular signs and may cause sudden death. Other signs may include hearing loss, mental retardation, cerebellar signs, short stature, delayed puberty, nephropathy, vestibular abnormalities, increased CSF protein, and characteristic “ragged red fiber” findings on muscle biopsy. Although some are inherited maternally, the vast majority are due to spontaneous mitochondrial deletions.\n- PSP (Steele–Richardson–Olszewski syndrome): Rare progressive neurodegenerative disorder affecting the brainstem that causes early gait instability and ophthalmoplegia. Often downgaze affected first followed by other gaze limitations; vertical more than horizontal. Other eye movement problems include abnormalities in the saccadic and pursuit subsystems of horizontal gaze. Often the eyelids are held wide open resulting in a “staring” type of facial expression. Neck and axial rigidity is an important sign.\n- Abetalipoproteinemia (Bassen–Kornzweig syndrome): Retinal pigmentary degeneration similar to retinitis pigmentosa, diarrhea, ataxia, and other neurologic signs. Acanthocytosis of red blood cells is seen on peripheral blood smear and LP demonstrates increased CSF. See [11.28](c11.xhtml#s11-28), Retinitis Pigmentosa and Inherited Chorioretinal Dystrophies.\n- Refsum disease: Retinitis pigmentosa and increased blood phytanic acid level. May have polyneuropathy, ataxia, hearing loss, anosmia, and others. See [11.28](c11.xhtml#s11-28), Retinitis Pigmentosa and Inherited Chorioretinal Dystrophies.\n- Oculopharyngeal dystrophy: Difficulty swallowing, sometimes leading to aspiration of food; may have autosomal dominant inheritance.\n- Mitochondrial myopathy and encephalopathy, lactic acidosis, and stroke-like episodes: Occurs in children and young adults. May have headache, transient hemianopsia, hemiparesis, nausea, and vomiting. Elevated serum and CSF lactate levels and may have abnormalities on MRI.\nWorkup\n\n- Careful history: Determine the rate of onset (gradual vs. sudden, as in cranial nerve disease).\n- Family history.\n- Carefully examine the pupils and ocular motility.\n- Test orbicularis oculi strength.\n- Fundus examination: Look for diffuse pigmentary changes.\n- Check swallowing function.\n- Ice test, rest test, or edrophonium chloride test to check for myasthenia gravis.\nNOTE: Some patients with CPEO are supersensitive to edrophonium chloride which may precipitate heart block and arrhythmias.\n\n- Prompt referral to a cardiologist for full cardiac workup (including yearly electrocardiograms) if Kearns–Sayre syndrome is suspected.\n- If neurologic signs and symptoms develop, consult a neurologist for workup (including possible LP).\n- Lipoprotein electrophoresis and peripheral blood smear if abetalipoproteinemia susp"}, {"id": "10.13", "chapter_num": "10", "chapter": "Neuro-Ophthalmology", "name": "Internuclear Ophthalmoplegia", "raw": "10.13 Internuclear Ophthalmoplegia \n\nDefinition\n\nOphthalmoplegia secondary to lesion in the medial longitudinal fasciculus (MLF).\n\nSymptoms\n\nDouble vision, blurry vision, or vague visual complaints.\n\nSigns\n\n(See Figures 10.13.1 and 10.13.2. See Video: Internuclear Ophthalmoplegia.)\n\nFigure 10.13.1 Left internuclear ophthalmoplegia: Left gaze showing full abduction. \n\nFigure 10.13.2 Left internuclear ophthalmoplegia: Right gaze with severe adduction deficit. \n\nCritical. Weakness or paralysis of adduction, with horizontal jerk nystagmus of the abducting eye.\n\nNOTE: INO is localized to the side with the weak adduction.\n\nOther. May be unilateral or bilateral (“wall-eyed” bilateral INO [WEBINO]). Upbeat nystagmus on upgaze may occur when INO is unilateral or bilateral. The involved eye can sometimes turn in when attempting to read (intact convergence). A skew deviation (relatively comitant vertical deviation not caused by neuromuscular junction disease or intraorbital pathology) may be present; brainstem and posterior fossa pathology should be ruled out. With skew deviation, the three-step test cannot isolate a specific muscle. See [10.7](c10.xhtml#s10-7), Isolated Fourth Cranial Nerve Palsy. In addition, presence of other neurologic signs, including gaze-evoked nystagmus, gaze palsy, dysarthria, ataxia, and hemiplegia, favors skew deviation rather than fourth cranial nerve palsy.\n\nDifferential Diagnosis of Attenuated Adduction\n\n- Myasthenia gravis: May closely mimic INO; however, ptosis and orbicularis oculi weakness are common. Nystagmus of INO is faster; myasthenia gravis is more gaze paretic. Symptoms vary throughout the day.\n- Orbital disease (e.g., tumor, thyroid disease, idiopathic orbital inflammatory syndrome): Proptosis, globe displacement, or pain may be present. Nystagmus is usually not present. See [7.1](c07.xhtml#s7-1), Orbital Disease.\n- One-and-a-half syndrome: Pontine lesion that includes the ipsilateral MLF and horizontal gaze center (sixth cranial nerve nucleus). The only preserved horizontal movement is abduction of the eye contralateral to the lesion. This is because of an ipsilateral adduction deficit (from the MLF lesion) and a horizontal gaze paresis in the direction of the lesion (from the horizontal gaze center lesion). Causes include stroke and pontine neoplasia.\nEtiology\n\n- MS: More common in young patients, usually bilateral.\n- Brainstem stroke: More common in elderly patients, usually unilateral.\n- Brainstem mass lesion.\n- Rare causes: CNS cryptococcosis, tuberculosis granuloma, pyoderma gangrenosum (all shown to cause WEBINO).\nWorkup\n\n- History: Age? Are symptoms constant or only toward the end of the day with fatigue? Prior optic neuritis, urinary incontinence, numbness or paralysis of an extremity, or another unexplained neurologic event (concerning for MS)?\n- Complete evaluation of eye movements to rule out other disorders (e.g., sixth cranial nerve palsy, skew deviation).\nNOTE: Ocular motility can appear to be full, but a muscular weakness can be detected by observing slower saccadic eye movement in the involved eye compared with the contralateral eye. The adducting saccade is assessed by having the patient fix on the examiner’s finger held laterally and then asking the patient to make a rapid eye movement from lateral to primary gaze. If an INO is present, the involved eye will show a slower adducting saccade than the uninvolved eye. The contralateral eye may be tested in a similar fashion.\n\n- Ice test, re"}, {"id": "10.14", "chapter_num": "10", "chapter": "Neuro-Ophthalmology", "name": "Optic Neuritis", "raw": "10.14 Optic Neuritis\n\nSymptoms\n\nTypical optic neuritis associated with MS causes vision loss over hours to days, with the nadir approximately 1 week after onset. Visual loss may be subtle or profound. Usually unilateral, rarely bilateral. Age typically 18 to 45 years. Retro-orbital pain, especially with eye movement. Acquired loss of color vision. Reduced perception of light intensity. May have other focal neurologic symptoms (e.g., weakness, numbness, tingling in extremities). May have antecedent flu-like viral syndrome. Occasionally altered perception of moving objects (Pulfrich phenomenon) or a worsening of symptoms with exercise or increase in body temperature (Uhthoff sign).\n\nMore recently, immune-mediated disorders of the CNS, such as neuromyelitis optica spectrum disorder (NMOSD) and myelin oligodendrocyte glycoprotein antibody-associated disease (MOGAD), have been described as causes of atypical optic neuritis. Atypical features include advanced patient age, severe vision loss with poor recovery, and simultaneous or rapidly sequential bilateral optic neuritis.\n\nSigns\n\nCritical. Relative afferent pupillary defect in unilateral or asymmetric cases; decreased color vision; central, cecocentral, or arcuate visual field defects.\n\nOther. Swollen disc (in one-third of patients) usually without peripapillary hemorrhages (papillitis most commonly seen in children and young adults) or a normal disc (in two-thirds of patients; retrobulbar optic neuritis more common in adults). Posterior vitreous cells possible.\n\nDifferential Diagnosis\n\n- Ischemic optic neuropathy: Visual loss is sudden but in up to 35% of patients may progress over 4 weeks. Typically, no pain with ocular motility, though pain may be present in 10% of cases (compared to 92% of patients with optic neuritis). Optic nerve swelling due to nonarteritic ischemic optic neuropathy (NAION) is initially hyperemic and then becomes pale. Optic nerve swelling in GCA is diffuse and may be chalk white. Patients tend to be older (40 to 60 years old for NAION and ≥55 years old in arteritic ischemic optic neuropathy). See [10.17](c10.xhtml#s10-17), Arteritic Ischemic Optic Neuropathy (Giant Cell Arteritis) and [10.18](c10.xhtml#s10-18), Nonarteritic Ischemic Optic Neuropathy.\n- Acute papilledema: Bilateral disc edema, usually no decreased color vision, minimal to no decreased visual acuity, no pain with ocular motility, and no vitreous cells. See [10.15](c10.xhtml#s10-15), Papilledema.\n- Severe systemic hypertension: Bilateral disc edema, increased blood pressure, flame-shaped retinal hemorrhages, and cotton–wool spots. See [11.10](c11.xhtml#s11-10), Hypertensive Retinopathy.\n- Orbital tumor compressing the optic nerve: Unilateral and usually associated with proptosis, resistance to retropulsion, and/or restriction of extraocular motility. See [7.4](c07.xhtml#s7-4), Orbital Tumors.\n- Intracranial mass compressing the afferent visual pathway: Normal or pale disc, afferent pupillary defect, decreased color vision, and mass evident on CT scan or MRI of the brain.\n- Leber hereditary optic neuropathy: Usually occurs in males in the second or third decade of life. Patients may have a family history and present with rapid visual loss of one and then the other eye within days to months. Early examination of the disc may reveal peripapillary telangiectasias followed by optic atrophy.\n- Toxic or metabolic optic neuropathy: Progressive painless bilateral visual loss that may be secondary to alcohol, ma"}, {"id": "10.15", "chapter_num": "10", "chapter": "Neuro-Ophthalmology", "name": "Papilledema", "raw": "10.15 Papilledema\n\nDefinition\n\nOptic disc swelling produced by increased intracranial pressure.\n\nSymptoms\n\nEpisodes of transient, usually bilateral visual loss (lasting seconds), often precipitated after rising from a lying or sitting position (altering intracranial pressure); headache; double vision; nausea; vomiting; and, rarely, a decrease in visual acuity (a mild decrease in visual acuity can occur in the acute setting if associated with a macular disturbance). Visual field defects and severe loss of central visual acuity occur more often with chronic papilledema.\n\nSigns\n\n(See Figure 10.15.1.)\n\nFigure 10.15.1 Swollen optic disc with obscured blood vessels and blurring of the disc margin. Flame-shaped hemorrhages may occur. \n\nCritical. Bilaterally swollen, hyperemic discs (in early papilledema, disc swelling may be asymmetric) with nerve fiber layer edema causing blurring of the disc margin, often obscuring the blood vessels.\n\nOther. Papillary or peripapillary retinal hemorrhages (often flame shaped); loss of venous pulsations (20% of the normal population do not have venous pulsations); dilated, tortuous retinal veins; normal pupillary response and color vision; an enlarged physiologic blind spot, nasal or other visual field defects by formal visual field testing.\n\nIn chronic papilledema, the hemorrhages and cotton–wool spots resolve, disc hyperemia disappears, and the disc becomes gray in color. Peripapillary gliosis and narrowing of the peripapillary retinal vessels occur, and optociliary shunt vessels may develop on the disc. Loss of color vision, loss of central visual acuity, and advanced visual field defects depending on the severity and duration of papilledema (especially nasally) may be observed.\n\nNOTE: Unilateral or bilateral sixth cranial nerve palsy may result from increased intracranial pressure.\n\nDifferential Diagnosis of Disc Edema or Elevation\n\n- Pseudopapilledema (e.g., optic disc drusen or congenitally anomalous disc): Not true disc swelling. Vessels overlying the disc are not obscured, the disc is not hyperemic, and the surrounding nerve fiber layer is normal. Spontaneous venous pulsations (SVPs) are often present. Buried drusen may be present and can be identified with B-scan ultrasound (US) or autofluorescence; will also be visible on CT imaging.\n- Papillitis: An afferent pupillary defect and decreased color vision are present; decreased visual acuity occurs in most cases, usually unilateral. See [10.14](c10.xhtml#s10-14), Optic Neuritis.\n- Hypertensive optic neuropathy: Extremely high blood pressure, narrowed arterioles, arteriovenous crossing changes, hemorrhages with or without cotton–wool spots extending into the peripheral retina. See [11.10](c11.xhtml#s11-10), Hypertensive Retinopathy.\n- Central retinal vein occlusion: Hemorrhages extend far beyond the peripapillary area; dilated and tortuous veins, generally unilateral; acute loss of vision in most cases. See [11.8](c11.xhtml#s11-8), Central Retinal Vein Occlusion.\n- Ischemic optic neuropathy: Disc swelling is pale but may be hyperemic; initially unilateral unless due to GCA, with sudden visual loss. See [10.17](c10.xhtml#s10-17), Arteritic Ischemic Optic Neuropathy (Giant Cell Arteritis) and [10.18](c10.xhtml#s10-18), Nonarteritic Ischemic Optic Neuropathy.\n- Infiltration of the optic disc (e.g., sarcoid or tuberculous granuloma, leukemia, metastasis, other inflammatory disease or tumor): Other ocular or systemic abnormalities may be present. Usually unil"}, {"id": "10.16", "chapter_num": "10", "chapter": "Neuro-Ophthalmology", "name": "Idiopathic Intracranial Hypertension/Pseudotumor Cerebri", "raw": "10.16 Idiopathic Intracranial Hypertension/Pseudotumor Cerebri\n\nDefinition\n\nA syndrome in which patients present with symptoms and signs of elevated intracranial pressure, the nature of which may be either idiopathic or due to various causative factors.\n\nSymptoms\n\nHeadache, transient episodes of visual loss (typically lasting seconds) often precipitated by changes in posture, double vision, pulsatile tinnitus, nausea, or vomiting accompanying the headache. Occurs predominantly in obese women.\n\nSigns\n\nCritical. By definition, the following findings are present:\n\n- Papilledema due to increased intracranial pressure.\n- Negative MRI/MRV of the brain.\n- Increased opening pressure on LP with normal CSF composition.\nOther. See [10.15](c10.xhtml#s10-15), Papilledema. Unilateral or bilateral sixth cranial nerve palsy may be present. There are no other neurologic signs on examination aside from possible sixth cranial nerve palsy.\n\nDifferential Diagnosis\n\nSee [10.15](c10.xhtml#s10-15), Papilledema.\n\nAssociated Factors\n\nObesity, significant weight gain, and pregnancy are often associated with the idiopathic form. Possible causative factors include various medications such as oral contraceptives, tetracyclines (including semisynthetic derivatives, e.g., doxycycline), cyclosporine, vitamin A (>100,000 U/d) and its derivatives such as isoretinoin and all-trans retinoic acid, sulfa antibiotics, lithium, recombinant human growth hormone, and historically nalidixic acid (now rarely used). Systemic steroid intake and withdrawal may also be causative.\n\nWorkup\n\n- History: Inquire specifically about medications.\n- Ocular examination, including pupillary examination, ocular motility, assessment for dyschromatopsia (e.g., color plates), and optic nerve evaluation.\n- Systemic examination, including blood pressure and temperature.\n- MRI/MRV of the orbit and brain. Any patient with papilledema needs to be imaged immediately. If normal, the patient should have an LP, to rule out other causes of optic nerve edema and to determine the opening pressure (see [10.15](c10.xhtml#s10-15), Papilledema).\n- Visual field test is the most important method for following these patients (e.g., Humphrey).\nTreatment\n\nTreatment is indicated in the following situations:\n\n- Severe, intractable headache.\n- Evidence of progressive decrease in visual acuity or visual field loss.\n- Some ophthalmologists suggest treating all patients with papilledema.\nMethods of treatment include the following:\n\n- Weight loss if overweight.\n- Acetazolamide 250 mg p.o. q.i.d. initially, building up to a maximum dose of 4 g/d. Use with caution in sulfa-allergic patients.\n- Discontinuation of any causative medication.\n- Consider short course of systemic steroids, especially if any plans for surgical intervention.\nIf treatment by these methods is unsuccessful, consider a surgical intervention:\n\n- A neurosurgical shunt (ventriculoperitoneal or lumboperitoneal) or venous sinus stenting procedure should be considered if intractable headache is a prominent symptom.\n- Optic nerve sheath decompression surgery or neurosurgical shunt (ventriculoperitoneal or lumboperitoneal) is often effective if vision is threatened.\nSpecial Circumstances\n\n- Pregnancy: Incidence of idiopathic intracranial hypertension does not increase during pregnancy beyond what would be expected from the weight gain. No increased risk of fetal loss. Acetazolamide may be used after 20 weeks of gestation (in consultation with OB/GYN). Intense weight"}, {"id": "10.17", "chapter_num": "10", "chapter": "Neuro-Ophthalmology", "name": "Arteritic Ischemic Optic Neuropathy (Giant Cell Arteritis)", "raw": "10.17 Arteritic Ischemic Optic Neuropathy (Giant Cell Arteritis)\n\nSymptoms\n\nSudden visual loss. Initially unilateral, but may rapidly become bilateral. Occurs in patients ≥55 years of age. Antecedent or simultaneous headache, jaw claudication (pain with chewing), scalp tenderness especially over the superficial temporal arteries (e.g., tenderness with hair combing), proximal muscle and joint aches (polymyalgia rheumatica), anorexia, weight loss, or fever may occur.\n\nSigns\n\n(See Figure 10.17.1.)\n\nFigure 10.17.1 Chalky, pale, swollen optic disc with flame-shaped hemorrhages in giant cell arteritis. \n\nCritical. Afferent pupillary defect; visual loss (often counting fingers or worse); pale, swollen disc, at times with flame-shaped hemorrhages. Later, optic atrophy and cupping occur as the edema resolves. The ESR, CRP, and platelet count may be markedly increased.\n\nOther. Visual field defect (commonly altitudinal or involving the central field); a palpable, tender, and often nonpulsatile temporal artery; and a central retinal artery occlusion or a cranial nerve palsy (especially a sixth cranial nerve palsy) may occur.\n\nDifferential Diagnosis\n\n- NAION: Patients may be younger. Visual loss often less severe, do not have the accompanying symptoms of GCA listed previously, and usually have a normal ESR and CRP. See [10.18](c10.xhtml#s10-18), Nonarteritic Ischemic Optic Neuropathy.\n- Inflammatory optic neuritis: Younger age group. Pain with eye movements. Optic disc swelling, if present, is more hyperemic. See [10.14](c10.xhtml#s10-14), Optic Neuritis.\n- Compressive optic nerve tumor: Optic nerve pallor or atrophy may be seen; disc heme unlikely. Slowly progressive visual loss. Few to no symptoms are common with GCA.\n- Central retinal vein occlusion: Severe visual loss may be accompanied by an afferent pupillary defect and disc swelling, but the retina shows diffuse retinal hemorrhages extending out to the periphery. See [11.8](c11.xhtml#s11-8), Central Retinal Vein Occlusion.\n- Central retinal artery occlusion: Sudden, painless, severe visual loss with an afferent pupillary defect. No disc swelling. Retinal edema with a cherry-red spot frequently observed. See [11.6](c11.xhtml#s11-6), Central Retinal Artery Occlusion.\nWorkup\n\n- History: GCA symptoms present? Age is critical.\n- Complete ocular examination, particularly pupillary assessment, dyschromatopsia evaluation (e.g., color plates), dilated retinal examination to rule out retinal causes of severe visual loss, and optic nerve evaluation.\n- Immediate ESR (Westergren is the most reliable method), CRP (does not rise with age), and platelet count (may have thrombocytosis). A guideline for top-normal ESR calculation: men, age/2; women, (age + 10)/2. CRP is more specific. CRP and platelet upper limit values are based on laboratory-specific standards.\n- Perform a temporal artery biopsy if GCA is suspected.\n- Consider orbital US and MRI of the brain with contrast.\n(See Figure 10.17.2.)\n\nFigure 10.17.2 MRI brain revealing enhancement of the right temporal artery (see arrow). \n\nNOTE: The biopsy should be performed within 1 week after starting systemic steroids, but a positive result may be seen up to 1 month later. Biopsy is especially important in patients in whom steroids are relatively contraindicated (e.g., diabetics).\n\nTreatment\n\n- Systemic steroids should be given immediately once GCA is suspected. Methylprednisolone 250 mg i.v., q6h for 12 doses, and then switch to prednisone 80 to 100 mg p.o. "}, {"id": "10.18", "chapter_num": "10", "chapter": "Neuro-Ophthalmology", "name": "Nonarteritic Ischemic Optic Neuropathy", "raw": "10.18 Nonarteritic Ischemic Optic Neuropathy\n\nSymptoms\n\nSudden, painless visual loss of moderate degree, initially unilateral, but may become bilateral. Typically occurs in patients 40 to 60 years of age, but well-documented cases have been reported in patients in their teenage years. In younger patients, NAION should be suspected when painless visual loss develops with a contralateral “disc at risk” (i.e., crowded disc with small or absent optic cup [cup:disc ratio less than 0.3]) and normal MRI scan. The visual deficit may improve. Hyperlipidemia, labile hypertension, and sleep apnea are the common risk factors for younger patients.\n\nSigns\n\n(See Figure 10.18.1.)\n\nFigure 10.18.1 Nonarteritic ischemic optic neuropathy with segmental disc edema and hemorrhage. \n\nCritical. Afferent pupillary defect, pale disc swelling (often segmental), flame-shaped hemorrhages, normal ESR and CRP.\n\n- Nonprogressive NAION: Sudden initial decrease in visual acuity and visual field, which stabilizes.\n- Progressive NAION: Sudden initial decrease in visual acuity and visual field followed by worsening in visual acuity or visual field days to weeks later. As many as 35% of NAION cases may be progressive.\nOther. Reduced color vision, altitudinal or central visual field defect, optic atrophy without cupping (segmental or diffuse) after the edema resolves. Crowded or congenitally anomalous disc with small or absent cup in fellow eye.\n\nDifferential Diagnosis\n\nSee [10.17](c10.xhtml#s10-17), Arteritic Ischemic Optic Neuropathy (Giant Cell Arteritis).\n\nEtiology\n\nIdiopathic: Arteriosclerosis, diabetes, hypertension, hyperlipidemia, hyperhomocysteinemia, anemia, and sleep apnea are associated risk factors, but causation has never been prove
