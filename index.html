n. Relative nocturnal hypotension may play a role, especially in patients taking antihypertensive medication. We recommend avoiding antihypertensive medications at night.\n\nNOTE: Currently, phosphodiesterase-5 inhibitors (e.g., sildenafil, vardenafil, and tadalafil) often used for erectile dysfunction have not been proven to cause NAION. However, the FDA has issued a warning regarding a possible association with these medications and NAION. It is recommended that patients with risk factors for NAION (listed previously) be counseled against the use of these medications.\n\nWorkup\n\n- Same as [10.17](c10.xhtml#s10-17), Arteritic Ischemic Optic Neuropathy (Giant Cell Arteritis).\n- Consult internist to rule out cardiovascular disease, diabetes, hypertension, and sleep apnea.\nTreatment\n\n- Observation.\n- Cardiovascular risk factor modification.\n- Consider avoiding blood pressure medication at bedtime to help avoid nocturnal hypotension.\nFollow-Up\n\n- One month.\n- Up to 40% of patients show mild improvement in vision over 3 to 6 months in some studies. Optic nerve edema resolves within 8 weeks.\n- Patients should be counseled of risk to the contralateral eye (variable).\n"}, {"id": "10.19", "chapter_num": "10", "chapter": "Neuro-Ophthalmology", "name": "Posterior Ischemic Optic Neuropathy", "raw": "10.19 Posterior Ischemic Optic Neuropathy\n\nSymptoms\n\nPainless visual loss. Most commonly occurs in the postoperative setting at any time from upon awakening from anesthesia to 4 to 7 days thereafter. May be unilateral or bilateral, with a partial or complete deficit.\n\nSigns\n\nSee [10.18](c10.xhtml#s10-18), Nonarteritic Ischemic Optic Neuropathy. Optic discs may appear normal initially in acute posterior ischemic optic neuropathy, but eventually pale disc edema, followed by pallor, develops.\n\nEtiology\n\n- Postoperative: Can be unilateral or bilateral. May occur after head and neck surgery, spinal surgery, gastrointestinal surgery, open heart surgery, or any procedure associated with hypotension, anemia, increased surgical time, large amounts of blood loss, increased central venous pressure, or positioning of head in a dependent, down-tilt position. History of peripheral vascular disease, diabetes, and anemia may increase risk.\n- May also be seen in patients undergoing dialysis with intradialytic hypotension.\nNOTE: Operative planning in high-risk patients should include attention to head positioning and length of surgical time, balance of risk and benefits of hypotensive anesthesia, aggressive replacement of blood loss, monitoring vision early in the postoperative period, and prompt ophthalmic consultation if patient describes visual disturbances.\n\n- Inflammatory/infectious: GCA, varicella zoster virus, systemic lupus erythematosus, and others.\nTreatment\n\n- Although no controlled studies exist for postoperative posterior ischemic optic neuropathy, it has been suggested that prompt blood transfusion with correction of hypotension and anemia may be beneficial and should be considered.\n- Treat any inflammatory or infectious etiology as appropriate.\n"}, {"id": "10.20", "chapter_num": "10", "chapter": "Neuro-Ophthalmology", "name": "Miscellaneous Optic Neuropathies", "raw": "10.20 Miscellaneous Optic Neuropathies\n\nTOXIC/METABOLIC OPTIC NEUROPATHY\n\nSymptoms\n\nPainless, progressive, bilateral loss of vision.\n\nSigns\n\nCritical. Bilateral cecocentral or central visual field defects, signs of alcoholism, tobacco/substance use, certain medication use, heavy metal exposure, or poor nutrition.\n\nOther. Visual acuity of 20/50 to 20/200, reduced color vision, temporal disc pallor, optic atrophy, or normal-appearing disc initially.\n\nEtiology\n\n- Tobacco/alcohol or other substance abuse.\n- Severe malnutrition with thiamine (vitamin B1) deficiency.\n- Pernicious anemia or other malabsorptive states (e.g., postgastric bypass surgery): Usually due to vitamin B12 malabsorption.\n- Toxic: Exposure to medications such as chloramphenicol, ethambutol, linezolid, isoniazid, digitalis, streptomycin, chlorpropamide, ethchlorvynol, disulfiram, amiodarone, and lead. Methanol can cause an acute optic neuropathy.\nWorkup\n\n- History: Drug or substance abuse? Medications? Diet?\n- Complete ocular examination, including pupillary assessment, dyschromatopsia evaluation, and optic nerve examination.\n- Formal visual field test.\n- CBC with differential and peripheral smear.\n- Serum vitamin B1, B12, methylmalonic acid, and folate levels.\n- Consider a heavy metal (e.g., lead, thallium) screen.\n- If disc is swollen, consider blood test for Leber hereditary optic neuropathy.\nTreatment\n\n- Thiamine 100 mg p.o. b.i.d.\n- Folate 1.0 mg p.o. daily.\n- Multivitamin tablet daily.\n- Eliminate any causative agent (e.g., alcohol, medication).\n- Coordinated care with an internist, including vitamin B12 1,000 mg intramuscularly every month for pernicious anemia.\nFollow-Up\n\nEvery month at first and then every 6 to 12 months.\n\nCOMPRESSIVE OPTIC NEUROPATHY\n\nSymptoms\n\nSlowly progressive visual loss, although occasionally acute or noticed acutely.\n\nSigns\n\nCritical. Central visual field defect, relative afferent pupillary defect.\n\nOther. The optic nerve can be normal, pale, or, occasionally, swollen; proptosis; optociliary (collateral) shunt vessels. Collateral vessels occur only with intrinsic lesions of the nerve (never with extrinsic lesions).\n\nEtiology\n\n- Optic nerve glioma: Age usually <20 years, often associated with neurofibromatosis.\n- Optic nerve meningioma: Usually adult women. Orbital imaging may show an optic nerve mass, diffuse optic nerve thickening, or a railroad-track sign (increased contrast of the periphery of the nerve).\n- Any intraorbital or intracranial mass (e.g., hemangioma, schwannoma).\nWorkup\n\nAll patients with progressive visual loss and optic nerve dysfunction should have an MRI of the orbit and brain.\n\nTreatment\n\n- Depends on the etiology.\n- Treatment for optic nerve glioma is controversial. These lesions are often monitored unless there is evidence of intracranial involvement, at which point surgical excision may be indicated. Most of these patients are young children, who are very susceptible to cognitive complications of radiotherapy. Chemotherapy may be considered if there is progressive visual loss.\n- For optic nerve sheath meningiomas, fractionated stereotactic radiotherapy treatment should be considered. Serial MRIs may be used to monitor tumor control.\nLEBER HEREDITARY OPTIC NEUROPATHY\n\nSymptoms\n\nPainless progressive visual loss in one and then the other eye within days to months of each other. Visual loss is bilateral at onset in approximately 25% of cases.\n\nSigns\n\nCritical. Mild swelling of optic disc progressing over weeks to optic a"}, {"id": "10.21", "chapter_num": "10", "chapter": "Neuro-Ophthalmology", "name": "Nystagmus", "raw": "10.21 Nystagmus\n\nNystagmus is divided into congenital and acquired forms.\n\nSymptoms\n\nCongenital and acquired nystagmus may be symptomatic with decreased visual acuity. The environment may be noted to oscillate horizontally, vertically, or torsionally in cases of acquired nystagmus, but only occasionally in congenital cases.\n\nSigns\n\nCritical. Repetitive, rhythmic oscillations of the eye horizontally, vertically, or torsionally.\n\n- Jerk nystagmus: The eye repetitively slowly drifts in one direction (slow phase) and then rapidly returns to its original position (fast phase).\n- Pendular nystagmus: Drift occurs in two phases of equal speed, giving a smooth back-and-forth slow movement of the eye.\nCONGENITAL FORMS OF NYSTAGMUS\n\nINFANTILE NYSTAGMUS\n\nOnset by age 2 to 3 months with wide, swinging eye movements. At age 4 to 6 months, small pendular eye movements are added. At age 6 to 12 months, jerk nystagmus and a null point (a position of gaze where the nystagmus is minimized) develop. Compensatory head positioning may develop at any point up to 20 years of age. Infantile nystagmus is usually horizontal and uniplanar (same direction in all gazes) and typically dampens with convergence. May have a latent component (worsens when one eye is occluded).\n\nDifferential Diagnosis\n\n- Opsoclonus/saccadomania: Repetitive, conjugate, multidirectional rapid saccadic eye movements associated with cerebellar or brainstem disease, postviral encephalitis, visceral carcinoma, or neuroblastoma.\n- Spasmus nutans: Head nodding and head turn with vertical, horizontal, or torsional nystagmus appearing between 6 months and 3 years of age and resolving between 2 and 8 years of age. Unilateral or bilateral (but asymmetric) rapid “shimmering nystagmus.” Spasmus nutans is a benign condition; however, gliomas of the anterior visual pathway may produce an identical clinical picture and need to be ruled out with MRI.\n- Latent nystagmus (see below).\n- Nystagmus blockage syndrome (see below).\nEtiology\n\n- Idiopathic.\n- Albinism: Iris transillumination defects and foveal hypoplasia. See [13.8](c13.xhtml#s13-8), Albinism.\n- Aniridia: Bilateral, near-total congenital iris absence. See [8.14](c08.xhtml#s8-14), Developmental Anterior Segment and Lens Anomalies/Dysgenesis.\n- Leber congenital amaurosis: Markedly abnormal or flat electroretinogram (ERG).\n- Others: Bilateral optic nerve hypoplasia, bilateral congenital cataracts, rod monochromatism, or optic nerve or macular disease.\nWorkup\n\n- History: Age of onset? Head nodding or head positioning? Known ocular or systemic abnormalities? Medications? Family history?\n- Complete ocular examination: Observe the head position and eye movements, perform iris transillumination, and carefully inspect the optic disc and macula.\n- Consider obtaining an eye movement recording if the diagnosis is uncertain.\n- If opsoclonus is present, obtain abdominal and chest imaging (e.g., US, CT, MRI) to rule out neuroblastoma and visceral carcinoma. Refer to primary medical doctor or pediatrician for additional workup (e.g., urinary vanillylmandelic acid) as appropriate.\n- In selected cases and in all cases of suspected spasmus nutans, obtain an MRI of the brain (axial, coronal, and parasagittal views) to rule out an anterior optic pathway lesion.\nTreatment\n\n- Maximize vision by refraction.\n- Treat amblyopia if indicated.\n- If small face turn: Prescribe prism in glasses with base toward direction of face turn.\n- If large face turn: Consider muscle surgery."}, {"id": "10.22", "chapter_num": "10", "chapter": "Neuro-Ophthalmology", "name": "Transient Visual Loss/Amaurosis Fugax", "raw": "10.22 Transient Visual Loss/Amaurosis Fugax\n\nSymptoms\n\nMonocular visual loss that usually lasts seconds to minutes, but may last up to 1 to 2 hours. Vision returns to normal.\n\nSigns\n\nCritical. May see an embolus within an arteriole or the ocular examination may be normal.\n\nOther. Signs of ocular ischemic syndrome (see [11.11](c11.xhtml#s11-11), Ocular Ischemic Syndrome/Carotid Occlusive Disease), an old branch retinal artery occlusion (sheathed arteriole), or neurologic signs and symptoms caused by cerebral ischemia (e.g., transient ischemic attacks [TIAs] with contralateral arm or leg weakness).\n\nDifferential Diagnosis of Transient Visual Loss\n\n- Papilledema: Optic disc swelling is evident. Visual loss lasts seconds, is usually bilateral, and is often associated with postural change or Valsalva maneuver. See [10.15](c10.xhtml#s10-15), Papilledema.\n- GCA: ESR, CRP, and platelet count typically elevated. GCA symptoms often present. Transient visual loss may precede an ischemic optic neuropathy or central retinal artery occlusion. See [10.17](c10.xhtml#s10-17), Arteritic Ischemic Optic Neuropathy (Giant Cell Arteritis).\n- Impending central retinal vein occlusion: Dilated, tortuous retinal veins are observed, though the fundus may be normal. See [11.8](c11.xhtml#s11-8), Central Retinal Vein Occlusion.\n- Migraine with aura: Visual loss/disturbance from 10 to 50 minutes, often with history of carsickness or migraine headache (personal or family). Vision loss is associated with “positive phenomena (e.g., scintillating scotoma).” See [10.27](c10.xhtml#s10-27), Migraine.\n- Acephalgic migraine: Visual aura without migraine headache. Usually a diagnosis of exclusion. Often have recurrent episodes. See [10.27](c10.xhtml#s10-27), Migraine.\n- Vertebrobasilar artery insufficiency: Transient, bilateral blurred vision. Associated with vertigo, dysarthria or dysphasia, perioral numbness, and hemiparesis or hemisensory loss. History of drop attacks. See [10.23](c10.xhtml#s10-23), Vertebrobasilar Artery Insufficiency.\n- Basilar artery migraine: Mimics vertebrobasilar artery insufficiency. Bilateral blurring or vertigo, gait disturbances, formed hallucinations, and dysarthria or dysphasia in a patient with migraine. See [10.23](c10.xhtml#s10-23), Vertebrobasilar Artery Insufficiency and [10.27](c10.xhtml#s10-27), Migraine.\n- Vertebral artery dissection: After trauma or resulting from atherosclerotic disease.\n- Intermittent intraocular hemorrhage (e.g., vitreous hemorrhage, uveitis–glaucoma–hyphema [UGH] syndrome [see [9.15.3](c09.xhtml#s9-15-3), Uveitis, Glaucoma, Hyphema Syndrome)].\n- Others: Optic nerve head drusen, intermittent angle closure, intermittent pigment dispersion.\nEtiology\n\n- Embolus from the carotid artery (most common), heart, or aorta.\n- Vascular insufficiency as a result of arteriosclerotic disease of vessels anywhere along the path from the aorta to the globe causing hypoperfusion often precipitated by a postural change or cardiac arrhythmia.\n- Hypercoagulable/hyperviscosity state.\n- Rarely, an intraorbital mass may compress the optic nerve or a nourishing vessel in certain gaze positions, causing gaze-evoked transient visual loss.\n- Vasospasm.\nWorkup\n\n- Amaurosis fugax is considered by the American Heart Association to be a form of TIA. Current guidelines recommend MRI with diffusion weighted imaging, urgent carotid and cardiac studies, and neurology consultation. If patient is seen within days of the event, emergent referral to a strok"}, {"id": "10.23", "chapter_num": "10", "chapter": "Neuro-Ophthalmology", "name": "Vertebrobasilar Artery Insufficiency", "raw": "10.23 Vertebrobasilar Artery Insufficiency\n\nSymptoms\n\nTransient, bilateral blurred vision, sometimes with flashing lights. Ataxia, vertigo, dysarthria or dysphagia, perioral numbness, and hemiparesis or hemisensory loss may occur. History of drop attacks (the patient suddenly falls to the ground without warning or loss of consciousness). Symptoms may be induced by position changes or neck hyperextension. Recurrent attacks are common.\n\nSigns\n\nOften presents with a normal ocular examination, but may have a hemianopsia, ocular motility deficits, or nystagmus.\n\nDifferential Diagnosis of Transient Visual Loss\n\nSee Differential Diagnosis in [10.22](c10.xhtml#s10-22), Transient Visual Loss/Amaurosis Fugax.\n\nEtiology\n\nDecreased blood flow in the posterior circulation serving the brain stem and bilateral occipital lobes, often related to atherosclerosis.\n\nWorkup\n\n- History: Associated symptoms of vertebrobasilar insufficiency? History of carsickness or migraine? Symptoms of GCA? Smoker?\n- Dilated fundus examination.\n- Blood pressure in each arm to rule out subclavian steal syndrome.\n- Cardiac auscultation to rule out arrhythmia.\n- CBC to rule out anemia and polycythemia, with immediate ESR, CRP, and platelet count if GCA is considered.\n- Electrocardiography, echocardiography, and cardiac monitoring to rule out dysrhythmia.\n- Consider noninvasive carotid flow studies.\n- MRA, CTA, or transcranial/vertebral artery Doppler US to evaluate posterior cerebral blood flow.\nTreatment\n\n- Coordinated care with internal medicine or neurology with initiation of antiplatelet and/or anticoagulation therapy.\n- Consult internist for hypertension, diabetes, and dyslipidemia control if present.\n- Lifestyle modification (e.g., smoking cessation).\n- Correct any underlying problem revealed by the workup.\nFollow-Up\n\nIf outpatient, 1 week to check test results. Thereafter follow-up time is dictated by identified underlying causative condition(s).\n\n"}, {"id": "10.24", "chapter_num": "10", "chapter": "Neuro-Ophthalmology", "name": "Cortical Blindness", "raw": "10.24 Cortical Blindness\n\nSymptoms\n\nBilateral complete or severe loss of vision. Patients may deny they are blind (Anton syndrome) or may perceive moving targets but not stationary ones in the blind field (Riddoch phenomenon).\n\nSigns\n\nCritical. Markedly decreased vision and visual field in both eyes (sometimes no light perception) with normal pupillary responses.\n\nEtiology\n\n- Most common: Bilateral occipital lobe infarctions.\n- Other: Toxic, postpartum (amniotic embolus), posterior reversible encephalopathy syndromes, posterior cortical atrophy.\n- Rare: Neoplasm (e.g., metastasis, meningioma), incontinentia pigmenti.\nWorkup\n\n- Test vision at distance (patients with bilateral occipital lobe infarcts may appear completely blind, but actually have a very small residual visual field). Patients will do much worse with near-card testing than distance if only a small island remains.\n- Complete ocular and neurologic examinations.\n- MRI of the brain.\n- Rule out nonphysiologic visual loss by appropriate testing (see [10.25](c10.xhtml#s10-25), Nonphysiologic Visual Loss).\n- Cardiac auscultation and electrocardiography to rule out arrhythmia.\n- Check blood pressure.\n- Consult neurologist or internist for evaluation of stroke risk factors.\nTreatment\n\n- Patients diagnosed with a stroke within 72 hours of symptom onset are admitted to the hospital for neurologic evaluation and observation.\n- If possible, treat the underlying condition.\n- Arrange for services to help the patient optimize function at home and their surrounding environment.\nFollow-Up\n\nAs per the internist or neurologist.\n\n"}, {"id": "10.25", "chapter_num": "10", "chapter": "Neuro-Ophthalmology", "name": "Nonphysiologic Visual Loss", "raw": "10.25 Nonphysiologic Visual Loss\n\nSymptoms\n\nLoss of vision. Malingerers frequently are involved with an insurance claim or are looking for other forms of financial gain. Those with psychogenic visual loss truly believe they have lost vision.\n\nSigns\n\nCritical. No ocular or neuro-ophthalmic findings that would account for the decreased vision. Normal pupillary light reaction.\n\nDifferential Diagnosis\n\n- Amblyopia: Poor vision in one eye since childhood, rarely both eyes. Patient often has strabismus or anisometropia. Vision is no worse than counting fingers, especially in the temporal periphery of an amblyopic eye. See [8.5](c08.xhtml#s8-5), Amblyopia.\n- Cortical blindness: Bilateral complete or severe visual loss with normal pupils. See [10.24](c10.xhtml#s10-24), Cortical Blindness.\n- Retrobulbar optic neuritis: Afferent pupillary defect and dyschromatopsia are present. See [10.14](c10.xhtml#s10-14), Optic Neuritis.\n- Cone–rod or cone dystrophy: Positive family history, decreased color vision, abnormal results on dark adaptation studies, and multifocal ERG. See [11.29](c11.xhtml#s11-29), Cone Dystrophies.\n- Chiasmal tumor: Visual loss may precede optic atrophy. Pupils usually react sluggishly to light, and an afferent pupillary defect is often present. Visual fields are abnormal.\n- Cancer-associated retinopathy or melanoma-associated retinopathy: Immune-mediated attack of photoreceptors. Fundus often appears normal. Abnormal macular optical coherence tomography (OCT) and ERG.\nWorkup\n\nThe following tests may be used to diagnose a patient with nonphysiologic visual loss (to prove the malingerer or hysteric can see better than he or she admits).\n\nTwo “codes” are used to test patients feigning decreased vision in the list below:\n\nU: Unilateral visual loss\n\nB: Bilateral visual loss\n\nPatients Claiming No Light Perception\n\nDetermine each pupil’s reaction to light (U or B): The presence of a normal pupillary reaction suggests that anterior visual pathways are intact, but does not prove nonphysiologic visual loss (pupillary response is maintained in cortical blindness). When only one eye has no light perception, that pupil will not react to light. The pupil should not appear dilated unless the patient has bilateral lack of light perception or third cranial nerve involvement. If a patient responds aversely to light stimulus, one can establish some level of afferent input.\n\nPatients Claiming Counting Fingers to No Light Perception\n\n- Test for an afferent pupillary defect (U): A defect should be present in unilateral or asymmetric visual loss to this degree.\n- Mirror test (U or B): Cover the better-seeing eye if monocular visual loss; with bilateral complaints leave both eyes open. Slowly tilt a large mirror from side to side in front of the patient’s eyes, holding it beyond their range of hand motion vision. If the eyes move in the same direction of the mirror, the patient can see better than hand motion.\n- Optokinetic test (U or B): Cover the better-seeing eye if monocular visual loss. Ask the patient to look straight ahead and slowly move an optokinetic tape in front of the eyes (or rotate an optokinetic drum). If nystagmus can be elicited, vision is better than 20/400. Patients can suppress this ocular response by focusing past the drum.\n- Base-out prism test (U): Place a 4- to 6-diopter prism base-out in front of the supposedly poorly seeing eye. If there is an inward shift of the eye (or a convergent movement of the opposite eye), this indicate"}, {"id": "10.26", "chapter_num": "10", "chapter": "Neuro-Ophthalmology", "name": "Headache", "raw": "10.26 Headache\n\nMost headaches are not dangerous or ominous; however, they can be symptoms of a life-threatening or vision-threatening problem. Accompanying signs and symptoms that may indicate a life-threatening or vision-threatening headache and some of the specific signs and symptoms of various headaches are listed below.\n\nWarning Symptoms and Signs of a Serious Disorder\n\n- Scalp tenderness, weight loss, pain with chewing, muscle pains, or malaise in patients at least 55 years of age (GCA).\n- Optic nerve swelling.\n- Fever.\n- Altered mentation or behavior.\n- Stiff neck.\n- Decreased vision.\n- Neurologic signs: cranial nerve palsies, hemibody weakness or bulbar signs.\n- Subhyaloid (preretinal) hemorrhages on fundus examination.\nSuggestive Symptoms and Signs\n\n- Onset in a previously headache-free individual.\n- A different, more severe headache than the usual headache.\n- A headache that is always in the same location.\n- A headache that awakens the person from sleep.\n- A headache that does not respond to pain medications that previously relieved it.\n- Nausea and vomiting, particularly projectile vomiting.\n- A headache followed by migraine-like visual symptoms (abnormal time course of events).\nEtiology\n\nLife or Vision Threatening\n\n- GCA: Age ≥55 years. May have high ESR, CRP, and platelet count. See [10.17](c10.xhtml#s10-17), Arteritic Ischemic Optic Neuropathy (Giant Cell Arteritis).\n- Acute angle-closure glaucoma: Decreased vision, painful eye, fixed mid-dilated pupil, and high intraocular pressure. See [9.4](c09.xhtml#s9-4), Acute Angle Closure Attack.\n- Ocular ischemic syndrome: Periorbital eye pain. See [11.11](c11.xhtml#s11-11), Ocular Ischemic Syndrome/Carotid Occlusive Disease.\n- Malignant hypertension: Marked increase of blood pressure, often accompanied by retinal cotton–wool spots, hemorrhages, and, when severe, optic nerve swelling. See [11.10](c11.xhtml#s11-10), Hypertensive Retinopathy.\n- Increased intracranial pressure: May have papilledema and/or a sixth cranial nerve palsy. Headaches usually worse in the morning and with Valsalva. See [10.15](c10.xhtml#s10-15), Papilledema.\n- Infectious CNS disorder (meningitis or brain abscess): Fever, stiff neck, mental status changes, photophobia, and neurologic signs.\n- Structural abnormality of the brain (e.g., tumor, aneurysm, AVM): Mental status change, signs of increased intracranial pressure, or neurologic signs during, and often after, the headache episode.\n- Subarachnoid hemorrhage: Extremely severe headache (classically described as a thunderclap headache), stiff neck, mental status change; rarely, subhyaloid hemorrhages seen on fundus examination, usually from a ruptured aneurysm.\n- Epidural or subdural hematoma: Follows head trauma; altered level of consciousness; may produce anisocoria or cranial neuropathy.\nOthers\n\n- Migraine (see [10.27](c10.xhtml#s10-27), Migraine).\n- Cluster headache (see [10.28](c10.xhtml#s10-28), Cluster Headache).\n- Tension headache.\n- Varicella zoster virus: Headache or pain may precede the herpetic vesicles (see [4.17](c04.xhtml#s4-17), Herpes Zoster Ophthalmicus/Varicella Zoster Virus).\n- Sinus disease.\nNOTE: A “sinus” headache may be a serious headache in diabetic patients and immunocompromised hosts given the possibility of zygomycosis infection (e.g., mucormycosis).\n\n- Tolosa–Hunt syndrome.\n- Cervical spine disease.\n- Temporomandibular joint syndrome.\n- Dental disease.\n- Trigeminal neuralgia (tic douloureux).\n- Anterior uveitis: See [12.1](c12.xh"}, {"id": "10.27", "chapter_num": "10", "chapter": "Neuro-Ophthalmology", "name": "Migraine", "raw": "10.27 Migraine\n\nSymptoms\n\nTypically unilateral (although it may occur behind both eyes or across the entire front of the head), throbbing or boring head pain accompanied at times by nausea, vomiting, mood changes, fatigue, photophobia, or phonophobia. An aura with visual disturbances, including flashing (zig-zagging or kaleidoscopic) lights, blurred vision, or a visual field defect lasting 15 to 50 minutes, may precede the migraine. May experience temporary or rarely permanent neurologic deficits, such as paralysis, numbness, tingling, or others. A family history is common. Motion sickness or cyclic vomiting as a child is also common. Migraine in children may be seen as recurrent abdominal pain and malaise. Of these patients, 60% to 70% are girls.\n\nMigraine prevalence is highest between ages 30 and 39 years and progressively declines after age 40. Migraine attacks may be shorter and less typical with advancing age. New-onset migraines are uncommon after the age of 50, and these patients should be worked up for secondary causes such as vascular lesions, intracranial hemorrhages, infarcts, masses, or GCA.\n\nNOTE: Most unilateral migraine headaches at some point change sides of the head. Headaches always on the same side of the head may have another cause of headache (e.g., intracranial structural lesions).\n\nDetermine if headache precedes visual symptoms, which is more common with AVMs, mass lesions with cerebral edema, or seizure foci.\n\nSigns\n\nUsually none. Complicated migraines may have a permanent neurologic or ocular deficit (see the following discussion).\n\nDifferential Diagnosis\n\nSee [10.26](c10.xhtml#s10-26), Headache.\n\nInternational Classification\n\nConsult International Classification of Headache Disorders, 3rd edition, for further information.\n\n- Migraine without aura (common migraine; 80%): Lasts 4 to 72 hours. Unilateral location, pulsating quality, moderate-to-severe pain, and/or aggravation by physical activity. Nausea, vomiting, photophobia, and/or phonophobia are the characteristics.\n- Migraine with typical aura (classic migraine; 10%): Fully reversible binocular visual symptoms that may be perceived as monocular (e.g., flickering lights, spots, lines, loss of vision) or fully reversible unilateral sensory symptoms (e.g., numbness, “pins and needles”). Symptoms gradually develop over 5 minutes and last between 5 and 60 minutes. No motor symptoms are present.\n- Typical aura without headache (acephalgic migraine): Visual or sensory symptoms as above without accompanying or subsequent headache.\n- Familial hemiplegic and sporadic hemiplegic migraine: Migraine with aura as above with accompanying motor weakness with (familial) or without (sporadic) history in a first-degree or second-degree relative. Sporadic cases always require neuroimaging.\n- Retinal migraine: Fully reversible monocular visual phenomenon (e.g., scintillations, scotoma, blindness) accompanied by headache fulfilling migraine definition. Appropriate investigations to exclude other causes of transient monocular blindness should be completed. Existence of retinal migraine is controversial.\n- Basilar-type migraine: Aura symptoms mimic vertebrobasilar artery insufficiency in a patient with migraine. See [10.23](c10.xhtml#s10-23), Vertebrobasilar Artery Insufficiency.\n- Ophthalmoplegic migraine: Onset in childhood. Headache with third cranial nerve palsy. Likely an inflammation, rather than migraine, as MRI shows enhancement of CNIII.\nAssociations or Precipitating Facto"}, {"id": "10.28", "chapter_num": "10", "chapter": "Neuro-Ophthalmology", "name": "Cluster Headache", "raw": "10.28 Cluster Headache\n\nSymptoms\n\nTypically unilateral, very painful (stabbing), periorbital, frontal, or temporal headache associated with ipsilateral tearing, rhinorrhea, sweating, nasal stuffiness, and/or a droopy eyelid. Usually lasts for minutes to hours. Typically recurs once or twice daily for several weeks, followed by a headache-free interval of months to years. The cycle may repeat. Predominantly affects men. Headache awakens patients, whereas migraine does not.\n\nSigns\n\nIpsilateral conjunctival injection, facial flush, or Horner syndrome (third-order neuron etiology) may be present. Ptosis may become permanent.\n\nPrecipitating Factors\n\nAlcohol, nitroglycerin.\n\nDifferential Diagnosis\n\n- Migraine headache: Typically unilateral headache possibly associated with visual and neurologic symptoms. See [10.27](c10.xhtml#s10-27), Migraine.\n- Chronic paroxysmal hemicrania: Several attacks of pain and cranial autonomic features (e.g., tearing, ocular injection, rhinorrhea) occurring throughout the day and typically lasting no more than 30 minutes. Patients have dramatic improvement with indomethacin.\n- Idiopathic stabbing “ice pick” headache: Episodic, momentary sharp pain, or stabbing sensations lasting less than a second that may occur in patients with preexisting migraine or cluster headache history. Lack of the classic autonomic features of cluster headaches.\n- Short-lasting unilateral neuralgiform headache attacks with conjunctival injection and tearing: A trigeminal autonomic cephalgia that presents with burning or stabbing pain felt unilaterally, primarily around the eye. Pain lasts for seconds to minutes and may occur >100 times per day. May have tearing, ptosis, eyelid edema, and conjunctival injection. Episodes last days to months and often recur. Distinguish from cluster headaches due to shorter duration, increased frequency, and more prominent autonomic findings.\n- Others: See [10.26](c10.xhtml#s10-26), Headache.\nWorkup\n\n- History and complete ocular examination.\n- Neurologic examination, particularly a cranial nerve evaluation.\n- If Horner syndrome present, consider imaging studies to eliminate other causes. See [10.2](c10.xhtml#s10-2), Horner Syndrome.\n- Obtain an MRI of the brain when the history is atypical or a neurologic abnormality is present.\nTreatment\n\n- Avoid alcoholic beverages or cigarette smoking during a cluster cycle.\n- Refer patient to neurologist to help coordinate pharmacologic therapy.\n- Abortive therapy for acute attack:\n- Oxygen, 5 to 8 L/min by face mask for 10 minutes at onset of attack. Relieves pain in 70% of adults.\n- Sumatriptan used subcutaneously (6 mg) or intranasally (20 mg) is often effective in relieving pain.\n- Zolmitriptan 5 or 10 mg intranasally also appears to be effective.\n- Less frequent medications used include ergotamine inhalation, dihydroergotamine, or corticosteroids.\n- Many prophylactic options are now available and are best managed by neurologists with expertise in headache medicine:\n- Calcium channel blockers (e.g., verapamil 360 to 480 mg/d p.o. in divided doses).\n- Lithium 600 to 900 mg p.o. daily is administered in conjunction with the patient’s medical doctor. Baseline renal (blood urea nitrogen, creatinine, urine electrolytes) and thyroid function tests (triiodothyronine, thyroxine, TSH) are obtained. Lithium intoxication may occur in patients using indomethacin, tetracycline, or methyldopa.\n- Oral steroids (e.g., prednisone 40 to 80 mg p.o. for 1 week, tapering rapidly over a"}, {"id": "11.1", "chapter_num": "11", "chapter": "Retina", "name": "Posterior Vitreous Detachment", "raw": "11.1 Posterior Vitreous Detachment \n\nSymptoms\n\nFloaters, blurred vision, and/or flashes of light which are more common in dim illumination or with eye movement. Symptoms usually present acutely and can evolve over hours to days.\n\nSigns\n\nCritical. One or more discrete near-translucent or light gray vitreous opacities, one often in the shape of a ring (“Weiss ring”) or broken ring, suspended over the optic disc (see Figure 11.1.1).\n\nFigure 11.1.1 Posterior vitreous detachment. \n\nOther. Retinal break/tear (RT), retinal detachment (RD), pigmented cells in the anterior vitreous (“tobacco dust” or Shafer sign), or vitreous hemorrhage (VH) may occur with or without a posterior vitreous detachment (PVD), with similar symptoms. Peripheral retinal and disc margin hemorrhages.\n\nNOTE: Approximately 10% of all patients with acute symptomatic PVD have a retinal break. The presence of pigmented cells in the anterior vitreous or VH in association with an acute PVD indicates a high probability (>70%) of a coexisting retinal break. See [11.2](c11.xhtml#s11-2), Retinal Break (Tear).\n\nDifferential Diagnosis\n\n- Uveitis: In vitritis, vitreous cells may be found in both the posterior and anterior vitreous, the condition may be bilateral, and the cells are not typically pigmented. Many uveitides, particularly white dot syndromes, will also present with floaters and photopsias. See [12.3](c12.xhtml#s12-3), Posterior Uveitis.\n- Migraine: Multicolored photopsias in a repetitive zig-zag pattern that obstructs vision lasts approximately 20 minutes. A headache may or may not follow, and symptoms may be bilateral. Normal fundus examination. See [10.27](c10.xhtml#s10-27), Migraine.\nWorkup\n\n- History: Duration of symptoms? Distinguish retinal photopsias from the visual phenomenon of migraine, which may be accompanied by new floaters. Presence and location of photopsias do not correlate with location of retinal break(s). Risk factors for retinal break (trauma, previous intraocular surgery, yttrium aluminum garnet [YAG] laser capsulotomy, high myopia, personal or family history of RT/RD)?\n- Complete ocular examination, including evaluation of the vitreous for pigmented cells or VH and a dilated fundus examination with indirect ophthalmoscopy and scleral depression to rule out a retinal break and detachment. Optical coherence tomography (OCT) can be helpful in confirming the presence or absence of a PVD. Pseudophakic patients may have smaller and more anterior breaks compared to phakic patients. Examine the fellow eye to assess for presence of PVD and peripheral retinal pathology. See Video: Scleral Depression Tutorial. See Video: Smartphone Video Indirect Ophthalmoscopy Guide.\n- Visualize the PVD at the slit lamp with a handheld lens by identifying a gray-to-white ring or broken ring suspended in the vitreous. If not visible, have the patient make rapid saccades and then look straight to float the PVD into view.\n- If VH obscures visualization of the retina, ultrasound (US) is indicated to identify the PVD and rule out a retinal break, RD, or other causes of VH. Inferior layering of VH may mimic a retinal break on US. See [11.13](c11.xhtml#s11-13), Vitreous Hemorrhage.\nTreatment\n\nNo treatment is indicated for PVD unless an acute retinal break or dense VH is found; see [11.2](c11.xhtml#s11-2), Retinal Break (Tear).\n\nNOTE: In the setting of acute PVD symptoms, consider treatment of chronic (pigmented) retinal breaks or lattice degeneration.\n\nFollow-Up\n\n- The patient should "}, {"id": "11.2", "chapter_num": "11", "chapter": "Retina", "name": "Retinal Break (Tear)", "raw": "11.2 Retinal Break (Tear)\n\nSymptoms\n\nAcute retinal break: Flashes of light, floaters (“cobwebs,” “hair,” or “film” that changes position with eye movement) with or without visual acuity changes. Can be identical to PVD symptoms, though may be more substantial.\n\nChronic retinal breaks or atrophic retinal holes: Usually asymptomatic.\n\nSigns\n\n(See Figure 11.2.1.)\n\nFigure 11.2.1 Giant retinal tear. \n\nCritical. A full-thickness retinal defect, usually seen in the periphery.\n\nOther. Acute retinal break: Pigmented cells in the anterior vitreous, VH, PVD, retinal flap, subretinal fluid (SRF), or an operculum (a free-floating piece of retina suspended above an RT).\n\nChronic retinal break: Surrounding pigmentation ring or demarcation line between attached and detached retina and signs (but not necessarily symptoms) of an acute retinal break.\n\nPredisposing Conditions\n\nLattice degeneration, high myopia, aphakia, pseudophakia, history of previous retinal break or detachment in the fellow eye, family history of retinal break or detachment, collagen vascular disorders, and trauma.\n\nDifferential Diagnosis\n\n- Lattice degeneration\n- White without pressure: Abrupt changes in retinal pigmentation that may mimic a break or SRF. Benign finding, etiology unclear.\n- Choroidal rupture or retinal hemorrhage (all layers): May occur without retinal break or obscure retinal break.\n- Meridional fold: Small radial fold of retina perpendicular to the ora serrata and overlying an oral tooth; may have small retinal hole at the base.\n- Vitreoretinal tuft: Focal area of vitreous traction causing elevation of the retina.\nWorkup\n\nComplete ocular examination with a slit lamp and indirect ophthalmoscopy of both eyes with scleral depression. After trauma, scleral depression may be gently performed once open globe injury has been ruled out. B-scan US may be helpful when the retina is not visible (e.g., VH, dense cataract, etc.).\n\nTreatment\n\nIn general, laser therapy or cryotherapy is required within 24 hours for acute retinal breaks. Treatment may be less urgent for chronic breaks. However, each case must be individualized based on patient risk factors. We follow these general guidelines:\n\nTreatment is recommended for:\n\n- Acute symptomatic break (e.g., a horseshoe or operculated tear).\n- Acute traumatic break (including a dialysis).\n- Asymptomatic retinal break that is large (e.g., ≥1.5 mm), above the horizontal meridian, or both, particularly in the absence of PVD.\n- Asymptomatic retinal break in an aphakic or pseudophakic eye, a highly myopic eye, or an eye in which the involved or contralateral eye has had an RD.\nFollow-Up\n\n- Patients with predisposing conditions or retinal breaks that do not require treatment are followed at 3 months and then every 6 to 12 months if stable.\n- Patients treated for a retinal break are re-examined in 1 to 2 weeks, 4 to 6 weeks, 3 months, and then 6 months or so to ensure no new tears, no progression of previously treated tears, and for epiretinal membrane formation.\n- RD symptoms (a dramatic increase in floaters or flashing lights, worsening visual acuity, or the appearance of a curtain, shadow, or bubble anywhere in the field of vision) are explained and patients are told to return immediately if these symptoms develop.\n"}, {"id": "11.3", "chapter_num": "11", "chapter": "Retina", "name": "Retinal Detachment", "raw": "11.3 Retinal Detachment \n\nThere are three distinct types of RD.\n\nRHEGMATOGENOUS RETINAL DETACHMENT\n\nSymptoms\n\nFlashes of light, floaters, a curtain or shadow moving over the field of vision, peripheral or central visual loss, or both.\n\nSigns\n\n(See Figures 11.3.1 to 11.3.4.)\n\nFigure 11.3.1 Rhegmatogenous retinal detachment. \n\nFigure 11.3.2 Retinal detachment with retinal break in lattice degeneration. \n\nFigure 11.3.3 Fovea splitting retinal detachment. \n\nFigure 11.3.4 B-scan ultrasound of retinal detachment. \n\nCritical. Elevation of the retina from the retinal pigment epithelium (RPE) by fluid in the subretinal space due to an accompanying full-thickness retinal break or breaks. See [11.2](c11.xhtml#s11-2), Retinal Break (Tear).\n\nOther. Anterior vitreous pigmented cells; VH; PVD; may have low (due to increased fluid pumping through the RPE), high (Schwartz–Matsuo syndrome, released photoreceptors clogging trabecular meshwork), or normal intraocular pressure (IOP) in the affected eye. SRF is clear and does not shift with gravity. The detached retina is often corrugated and partially opaque in appearance. A mild relative afferent pupillary defect (RAPD) may be present in large RDs.\n\nNOTE: A chronic rhegmatogenous retinal detachment (RRD) often shows a pigmented demarcation line at the posterior extent of the RD, intraretinal cysts, fixed folds, and/or subretinal precipitates or a combination of these with a relative visual field defect. It should be differentiated from retinoschisis, which is typically smooth and dome-shaped, translucent through which the underlying choroidal vasculature is visible (unlike acute RRD, where it is obscured), and produces an absolute visual field defect.\n\nEtiology\n\n- A retinal break allows fluid to move through the hole and separate the retina from the RPE.\n- Stickler syndrome: Commonly myopic, at risk for cataracts at a younger age (commonly congenital), congenital glaucoma, optically empty vitreous. The average onset of RRD is 10 to 30 years old. Type 1 has 60% to 70% risk of RRD (half of patients bilateral RRD), Type 2 has 40% risk of RRD. May have associated hearing loss, midface hypoplasia, and musculoskeletal abnormalities.\nWorkup\n\n- Slit-lamp examination to assess for signs of uveitis, lens status, presence of vitreous pigment/hemorrhage, and PVD.\n- Indirect ophthalmoscopy with scleral depression of both eyes. Slit-lamp examination of the periphery with a 90-diopter or widefield lens may help in finding small breaks.\n- B-scan US may be helpful if media opacities are present. See Video: B-scan Ultrasound Tutorial.\nEXUDATIVE/SEROUS RETINAL DETACHMENT\n\nSymptoms\n\nVisual field defect with varying degrees of vision loss; visual changes may vary with changes in head position.\n\nSigns\n\n(See Figure 11.3.5.)\n\nFigure 11.3.5 Exudative retinal detachment. \n\nCritical. Serous elevation of the retina with shifting SRF with patient positioning. While sitting, the SRF accumulates inferiorly, detaching the inferior retina; while in the supine position, the fluid accumulates in the posterior pole, detaching the macula. There is no retinal break; fluid accumulation is due to breakdown of the normal blood–retinal barrier. The detachment typically does not extend to the ora serrata.\n\nOther. The detached retina is smooth and may become quite bullous. A mild RAPD may be present in large RDs.\n\nEtiology\n\n- Idiopathic central serous chorioretinopathy (CSCR): May rarely present with bullous RD. See [11.15](c11.xhtml#s11-15), Centra"}, {"id": "11.4", "chapter_num": "11", "chapter": "Retina", "name": "Retinoschisis", "raw": "11.4 Retinoschisis\n\nRetinoschisis, a splitting of the retina, occurs in X-linked (juvenile) and age-related (degenerative) forms.\n\nX-LINKED (JUVENILE) RETINOSCHISIS\n\nSymptoms\n\nDecreased vision due to macular involvement. Sometimes VH. Can be asymptomatic. The condition is congenital but may not be detected at birth if an examination is not performed. A family history may or may not be elicited (X-linked recessive).\n\nSigns\n\nCritical. Foveal schisis seen as stellate maculopathy: Cystoid foveal changes with retinal folds that radiate from the center of the fovea (petaloid pattern). Unlike the cysts of cystoid macular edema (CME), they do not stain or leak on IVFA, although may be seen on OCT. The macular appearance changes in adulthood and the petaloid pattern may disappear.\n\nOther. Peripheral retinoschisis is present in 33% to 60% of eyes. Schisis may occur between any two retinal layers, and recent evidence suggests that the outer plexiform layer is frequently separated in X-linked forms. RD, VH, and pigmentary changes may also occur. Pigmented demarcation lines may be seen (indicating previous RRD) even in the absence of active detachment, unlike acquired age-related degenerative retinoschisis. Less commonly, macular dragging, neovascular glaucoma, and optic atrophy may occur.\n\nDifferential Diagnosis\n\n- Age-related (degenerative) retinoschisis (see below).\n- RRD: Usually unilateral, acquired, and associated with an RT. Pigment in the anterior vitreous is seen. See [11.3](c11.xhtml#s11-3), Retinal Detachment.\n- Goldmann–Favre, nicotinic acid, and retinitis pigmentosa (RP): May have nonleaking macular edema (ME) on IVFA.\nWorkup\n\n- Family history, genetic testing for RS1 mutations, and genetic counseling.\n- Dilated fundus examination with scleral depression to rule out retinal break or detachment.\n- OCT can help determine the layer of schisis and help to differentiate schisis from an RD.\n- IVFA will show no leakage.\n- Fundus autofluorescence (FAF) may help delineate areas of schisis.\n- Electroretinography (ERG) is not necessary for diagnosis but can show a reduced b-wave with a preserved a-wave.\nTreatment\n\n- No definitive treatment for stellate maculopathy. Topical carbonic anhydrase inhibitors have been shown to decrease foveal thickness and improve visual acuity in some patients.\n- For nonclearing VH, consider vitrectomy.\n- Surgical repair of an RRD should be performed.\n- Superimposed amblyopia may be present in children younger than 11 years of age when one eye is more severely affected, and a trial of patching should be considered. See [8.5](c08.xhtml#s8-5), Amblyopia.\nFollow-Up\n\nEvery 6 months; more frequently if treating amblyopia.\n\nAGE-RELATED (DEGENERATIVE) RETINOSCHISIS\n\nSymptoms\n\nUsually asymptomatic; may have decreased vision.\n\nSigns\n\n(See Figure 11.4.1.)\n\nFigure 11.4.1 Retinoschisis. \n\nCritical. The schisis cavity is dome-shaped with a smooth surface and is usually located temporally, typically inferotemporally. The findings are usually bilateral and may show sheathing of retinal vessels and “snowflakes” or “frosting” (persistent Mueller fibers) on the elevated inner wall of the schisis cavity. Splitting usually occurs at the level of the outer plexiform layer. The area of schisis is not mobile and there is no associated RPE pigmentation in contrast to an RD, which may have corrugations and a pigmented demarcation line.\n\nOther. Prominent cystoid degeneration near the ora serrata, an absolute scotoma corresponding to the area of"}, {"id": "11.5", "chapter_num": "11", "chapter": "Retina", "name": "Cotton", "raw": "11.5 Cotton–Wool Spot\n\nSymptoms\n\nVisual acuity usually normal. Often asymptomatic.\n\nSigns\n\n(See Figure 11.5.1.)\n\nFigure 11.5.1 Cotton–wool spot. \n\nCritical. Localized whitening in the superficial retinal NFL with fluffy appearance to margins.\n\nNOTE: The presence of even a single cotton–wool spot (CWS) is not normal. In a patient without diabetes mellitus, acute changes in blood pressure (most commonly HTN), or an RVO, a workup for an underlying systemic condition should be performed.\n\nDifferential Diagnosis\n\n- Retinal whitening secondary to infectious retinitis, such as that seen in toxoplasmosis, herpes simplex virus, varicella zoster virus, and cytomegalovirus. These entities typically have vitritis and retinal hemorrhages associated with them. See [12.9](c12.xhtml#s12-9), Toxoplasmosis and [12.13](c12.xhtml#s12-13), Acute Retinal Necrosis.\n- Myelinated NFL: Develops postnatally. Usually peripapillary but may be in retinal areas remote from the disc (see Figure 11.5.2).\nFigure 11.5.2 Myelinated nerve fiber layer. \n\nEtiology\n\nThought to be an acute obstruction of a precapillary retinal arteriole causing blockage of axoplasmic flow and subsequent buildup of axoplasmic debris in the NFL.\n\n- Diabetes mellitus: Most common cause. Often associated with microaneurysms, dot-blot hemorrhages, and hard exudates. See [11.12](c11.xhtml#s11-12), Diabetic Retinopathy.\n- Chronic or acute HTN: May see retinal arteriolar narrowing and flame hemorrhages in chronic HTN. Acute HTN may have hard exudates, optic nerve swelling, exudative RD. See [11.10](c11.xhtml#s11-10), Hypertensive Retinopathy.\n- RVO: Unilateral, multiple hemorrhages, venous dilation, and tortuosity. Multiple CWSs, usually ≥6, seen in ischemic varieties. See [11.8](c11.xhtml#s11-8), Central Retinal Vein Occlusion and [11.9](c11.xhtml#s11-9), Branch Retinal Vein Occlusion.\n- Retinal emboli: Often from carotid arteries or heart with resulting ischemia and subsequent CWS distal to arterial occlusion. Patients require carotid Doppler examination and echocardiography. See [10.22](c10.xhtml#s10-22), Transient Visual Loss/Amaurosis Fugax.\n- Collagen vascular disease: Systemic lupus erythematosus (most common), granulomatosis with polyangiitis (formerly Wegener granulomatosis), polyarteritis nodosa, scleroderma, etc.\n- Giant cell arteritis (GCA): Age ≥55 years. Symptoms include vision loss, scalp tenderness, jaw claudication, proximal muscle aches, etc. See [10.17](c10.xhtml#s10-17), Arteritic Ischemic Optic Neuropathy (Giant Cell Arteritis).\n- HIV retinopathy: Single or multiple CWSs in the posterior pole. See [12.11](c12.xhtml#s12-11), HIV Retinopathy.\n- Other infections: Toxoplasmosis, orbital zygomycosis, Lyme disease, leptospirosis, Rocky Mountain spotted fever, onchocerciasis, subacute bacterial endocarditis, others.\n- Hypercoagulable state: Polycythemia, multiple myeloma, cryoglobulinemia, Waldenström macroglobulinemia, antiphospholipid syndrome, factor V Leiden, activated protein C resistance, hyperhomocysteinemia, protein C and S deficiency, antithrombin III mutation, prothrombin mutation, etc.\n- Radiation retinopathy: Follows radiation therapy to the eye or periocular structures when the eye is irradiated inadvertently. May occur any time after radiation, but occurs most commonly within a few years. Maintain a high suspicion even in patients in whom the eye was reportedly shielded. Usually, 3,000 cGy is necessary, but it has been noted to occur with 1,500 cGy. Resembles diabetic retin"}, {"id": "11.6", "chapter_num": "11", "chapter": "Retina", "name": "Central Retinal Artery Occlusion", "raw": "11.6 Central Retinal Artery Occlusion\n\nSymptoms\n\nUnilateral, painless, acute vision loss (counting fingers to light perception in 94% of eyes) occurring over seconds; may have a history of transient visual loss (amaurosis fugax).\n\nSigns\n\n(See Figure 11.6.1.)\n\nFigure 11.6.1 Central retinal artery occlusion. \n\nCritical. Superficial opacification or whitening of the retina in the posterior pole and a cherry-red spot in the center of the macula (may be subtle).\n\nOther. Marked RAPD. Narrowed retinal arterioles; boxcarring or segmentation of the blood column in the arterioles. Occasionally, retinal arteriolar emboli or cilioretinal artery sparing of the foveola is evident. If visual acuity is light perception or worse, strongly suspect ophthalmic artery occlusion.\n\nDifferential Diagnosis\n\n- Acute ophthalmic artery occlusion: Usually no cherry-red spot; the entire retina appears whitened. Increased concern for GCA.\n- Commotio retinae: Retinal whitening from intracellular edema and fragmentation of the photoreceptor outer segments and RPE. Follows blunt trauma, resolves spontaneously. May result in permanent retinal damage. May mimic a cherry-red spot when the posterior pole is involved (Berlin edema). See [3.13](c03.xhtml#s3-13), Commotio Retinae.\n- Other causes of a cherry-red spot: Tay–Sachs, Niemann–Pick disease type A, others. These conditions present early in life with other, often severe, systemic manifestations. Ophthalmic findings are usually bilateral.\nEtiology\n\n- Embolus: Three main types include cholesterol, platelet-fibrin, and calcium emboli. All are seen within a vessel. Cholesterol emboli (Hollenhorst plaque) are typically refractile, yellow, and seen at retinal vessel bifurcations. They arise from ulcerated atheromas, usually from the carotid arteries. Platelet-fibrin emboli are dull white and typically arise from atheromas in the carotid arteries. Calcium emboli are white and frequently cause distal retinal infarction and often arise from cardiac valves.\n- Thrombosis.\n- GCA: May produce central retinal artery occlusion (arteritic CRAO), branch retinal artery occlusion (BRAO), ophthalmic artery occlusion, or an ischemic optic neuropathy. See [10.17](c10.xhtml#s10-17), Arteritic Ischemic Optic Neuropathy (Giant Cell Arteritis).\n- Other collagen vascular diseases: Systemic lupus erythematosus, polyarteritis nodosa, others.\n- Hypercoagulable state: Polycythemia, multiple myeloma, cryoglobulinemia, Waldenström macroglobulinemia, antiphospholipid syndrome, factor V Leiden, activated protein C resistance, hyperhomocysteinemia, protein C and S deficiency, antithrombin III mutation, prothrombin mutation, etc.\n- Rare causes: Migraine, Behçet disease, syphilis, sickle cell disease.\n- Trauma.\nWorkup\n\n- Should be treated as an acute stroke. The American Academy of Ophthalmology (AAO) 2019 guidelines suggest that all these patients should be sent immediately to an emergency department, preferably one with a stroke center, for evaluation and workup.\n- Immediate ESR, CRP, and platelets to rule out GCA if the patient is 55 years of age or older and no embolus seen on examination. Query GCA review of systems. If the patient’s history and/or laboratories are consistent with GCA, start high-dose systemic steroids. See [10.17](c10.xhtml#s10-17), Arteritic Ischemic Optic Neuropathy (Giant Cell Arteritis).\n- Check the blood pressure.\n- Other blood tests: Fasting blood sugar and HbA1c, complete blood count (CBC) with differential, prothrombin time/ac"}, {"id": "11.7", "chapter_num": "11", "chapter": "Retina", "name": "Branch Retinal Artery Occlusion", "raw": "11.7 Branch Retinal Artery Occlusion\n\nSymptoms\n\nUnilateral, painless, abrupt change in vision, usually partial visual field loss; may have a history of transient visual loss (amaurosis fugax).\n\nSigns\n\n(See Figure 11.7.1.)\n\nFigure 11.7.1 Branch retinal artery occlusion with Hollenhorst plaque. \n\nCritical. Superficial opacification or whitening along the distribution of a branch retinal artery. The affected retina becomes edematous.\n\nOther. Narrowed branch retinal artery; boxcarring, segmentation of the blood column, or emboli are sometimes seen in the affected branch retinal artery. Cholesterol emboli appear as bright, reflective crystals, usually at a vessel bifurcation. CWSs may appear in the involved area.\n\nEtiology\n\nSee [11.6](c11.xhtml#s11-6), Central Retinal Artery Occlusion.\n\nWorkup\n\nSee [11.6](c11.xhtml#s11-6), Central Retinal Artery Occlusion. Unlike in CRAO, an ERG is not helpful.\n\nNOTE: When a BRAO is accompanied by optic nerve edema or retinitis, obtain appropriate serologic testing to rule out cat-scratch disease (Bartonella [Rochalimaea] henselae), syphilis, Lyme disease, and toxoplasmosis.\n\nTreatment\n\n- The AAO 2019 guidelines suggest that all these patients should be sent immediately to an emergency department, preferably one with a stroke center, for evaluation and workup. See Treatment in [11.6](c11.xhtml#s11-6), Central Retinal Artery Occlusion.\n- No ocular therapy of proven value is available.\n- Treat any underlying medical problem.\nFollow-Up\n\n- Patients need immediate evaluation to treat any underlying disorders (especially GCA).\n- Reevaluate every 3 to 6 months initially to monitor progression. Ocular neovascularization after BRAO is rare.\nREFERENCE\n\nRetina and ophthalmic artery occlusions PPP 2019. [https://www.aao.org/education/preferred-practice-pattern/retinal-ophthalmic-artery-occlusions-ppp](https://www.aao.org/education/preferred-practice-pattern/retinal-ophthalmic-artery-occlusions-ppp)\n\n"}, {"id": "11.8", "chapter_num": "11", "chapter": "Retina", "name": "Central Retinal Vein Occlusion", "raw": "11.8 Central Retinal Vein Occlusion\n\nSymptoms\n\nPainless loss of vision, usually unilateral.\n\nSigns\n\n(See Figure 11.8.1.)\n\nFigure 11.8.1 Central retinal vein occlusion with dilated, tortuous vasculature, diffuse retinal hemorrhages in all four quadrants, and macular edema. \n\nCritical. Diffuse retinal hemorrhages in all four quadrants of the retina; dilated, tortuous retinal veins.\n\nOther. CWSs; disc edema and hemorrhages; ME; optociliary collateral vessels on the disc (later finding); NVD, NVI, NVA, and NVE.\n\nDifferential Diagnosis\n\n- Ocular ischemic syndrome (OIS) or carotid occlusive disease: Dilated and irregular veins without tortuosity. Midperipheral retinal hemorrhages are typically present, but disc edema and disc hemorrhages are not characteristic. NVD is present in one-third of cases. Patients may have a history of transient visual loss (amaurosis fugax), transient ischemic attacks, or orbital pain. IOP may be decreased. May have pain or intraocular inflammation. Can have abnormal ophthalmodynamometry. See [11.11](c11.xhtml#s11-11), Ocular Ischemic Syndrome/Carotid Occlusive Disease.\n- Diabetic retinopathy: Hemorrhages and microaneurysms concentrated in the posterior pole. Typically bilateral. IVFA differentiates this condition from central retinal vein occlusion (CRVO). See [11.12](c11.xhtml#s11-12), Diabetic Retinopathy.\n- Papilledema: Bilateral disc swelling with flame-shaped hemorrhages surrounding the disc. Would not expect as extensive and diffuse retinal hemorrhage and vascular tortuosity. See [10.15](c10.xhtml#s10-15), Papilledema.\n- Radiation retinopathy: History of irradiation. Disc swelling with radiation papillopathy and retinal neovascularization may be present. Generally, CWSs are a more prominent feature than hemorrhages.\nEtiology\n\n- Atherosclerosis of the adjacent central retinal artery: The artery compresses the central retinal vein in the region of the lamina cribrosa, secondarily inducing thrombosis in the vein lumen.\n- HTN: Most common systemic disease associated with CRVO.\n- Optic disc edema.\n- Glaucoma: Most common ocular disease associated with CRVO.\n- Optic disc drusen.\n- Hypercoagulable state: Polycythemia, multiple myeloma, cryoglobulinemia, Waldenström macroglobulinemia, antiphospholipid syndrome, factor V Leiden, activated protein C resistance, hyperhomocysteinemia, protein C and S deficiency, antithrombin III mutation, prothrombin mutation, and others.\n- Vasculitis: Sarcoidosis, syphilis, systemic lupus erythematosus, and others.\n- Drugs: Oral contraceptives, diuretics, and others.\n- Abnormal platelet function.\n- Orbital disease: Thyroid eye disease, orbital tumors, arteriovenous fistula, and others.\n- Migraine: Rare.\nTypes\n\n- Ischemic CRVO: Vision typically worse (<20/200) with RAPD and visual field defects. Extensive retinal hemorrhage, CWSs, venous tortuosity, and widespread capillary nonperfusion on IVFA (often >10 disc diameters). ERG shows decreased b-wave amplitude. Higher risk of neovascularization.\n- Nonischemic CRVO: Vision often better than 20/200, mild or no RAPD, mild fundus changes. Lower risk of neovascularization.\nWorkup\n\nOcular\n\n- Complete ocular examination, including IOP measurement, careful slit-lamp examination including gonioscopy when needed to rule out NVI and NVA (both of which are best observed before dilation), and dilated fundus examination.\n- IVFA: Risk of neovascularization proportional to degree of capillary nonperfusion.\n- OCT: Used to help detect presence and extent o"}, {"id": "11.9", "chapter_num": "11", "chapter": "Retina", "name": "Branch Retinal Vein Occlusion", "raw": "11.9 Branch Retinal Vein Occlusion\n\nSymptoms\n\nBlind spot in the visual field or loss of vision, usually unilateral.\n\nSigns\n\n(See Figure 11.9.1.)\n\nFigure 11.9.1 Branch retinal vein occlusion. \n\nCritical. Superficial hemorrhages in a sector of the retina along a retinal vein. The hemorrhages usually do not cross the horizontal raphe (midline).\n\nOther. CWSs, retinal edema, a dilated and tortuous retinal vein, narrowing and sheathing of the adjacent artery, retinal neovascularization, VH.\n\nDifferential Diagnosis\n\n- Diabetic retinopathy: Dot-blot hemorrhages and microaneurysms extend across the horizontal raphe. Nearly always bilateral. See [11.12](c11.xhtml#s11-12), Diabetic Retinopathy.\n- Hypertensive retinopathy: Narrowed retinal arterioles. Hemorrhages are not confined to a sector of the retina and usually cross the horizontal raphe. Bilateral in most. See [11.10](c11.xhtml#s11-10), Hypertensive Retinopathy.\nEtiology\n\nDisease of the adjacent arterial wall (usually secondary to HTN, arteriosclerosis, or diabetes) compresses the venous wall at a crossing point.\n\nWorkup\n\n- History: Systemic disease, particularly HTN or diabetes.\n- Complete ocular examination, including dilated fundus examination with indirect ophthalmoscopy to look for retinal neovascularization and ME.\n- OCT: Used to help detect presence and extent of ME as well as monitor response to therapy.\n- Check blood pressure.\n- Blood tests: Fasting blood sugar and HbA1c, lipid profile, CBC with differential, PT/PTT. If clinically indicated, consider a more comprehensive workup. See [11.8](c11.xhtml#s11-8), Central Retinal Vein Occlusion.\n- Medical examination: Performed by an internist to check for cardiovascular disease.\n- An IVFA is obtained after the hemorrhages clear or sooner if neovascularization is suspected.\nTreatment\n\n- Retinal neovascularization: Sector PRP to the ischemic area, which corresponds to area of capillary nonperfusion on IVFA. Anti-VEGF medications can also be used particularly if there is concomitant ME.\n- Prompt and appropriate treatment of underlying medical conditions (e.g., HTN).\nBRVO-Related Macular Edema\n\n- Anti-VEGF treatment is now the gold standard. Intravitreal ranibizumab 0.5 mg, faricimab 6 mg, and aflibercept 2 mg are FDA-approved for treating RVO-associated ME. Intravitreal bevacizumab has also been used off-label. Risks of intravitreal injection are low but include VH and endophthalmitis.\n- Focal retinal laser photocoagulation has historically been the standard treatment if edema is present for 3 to 6 months duration, and visual acuity is below 20/40 with macular capillary perfusion. However, anti-VEGF treatment has supplanted laser. Limitations of focal laser include length of time before effect (often several months) and the need to wait until retinal hemorrhages clear as well as less chance of visual improvement versus anti-VEGF therapy.\n- Dexamethasone intravitreal implant or off-label intravitreal steroid (e.g., triamcinolone 40 mg/mL, inject 1 to 4 mg). See [11.8](c11.xhtml#s11-8), Central Retinal Vein Occlusion.\nFollow-Up\n\nIn general, every month initially, with gradual interval taper based on vision, presence of ME, and treatment response. At each visit, the patient should be checked for neovascularization and ME.\n\n"}, {"id": "11.10", "chapter_num": "11", "chapter": "Retina", "name": "Hypertensive Retinopathy", "raw": "11.10 Hypertensive Retinopathy\n\nSymptoms\n\nUsually asymptomatic, although may have decreased vision.\n\nSigns\n\n(See Figure 11.10.1.)\n\nFigure 11.10.1 Chronic hypertensive retinopathy with arteriolar narrowing and arteriovenous nicking. \n\nCritical. Generalized or localized retinal arteriolar narrowing, almost always bilateral.\n\nOther\n\n- Chronic HTN: Arteriovenous crossing changes (“AV nicking”), retinal arteriolar sclerosis (“copper” or “silver” wiring), CWSs, flame-shaped hemorrhages, arterial macroaneurysms, central or branch occlusion of an artery or vein. Rarely, neovascular complications can develop.\n- Acute (“malignant”) HTN or accelerated HTN: Hard exudates often in a “macular star” configuration, retinal edema, CWSs, flame-shaped hemorrhages, optic nerve head edema. Rarely serous RD or VH. Areas of focal chorioretinal atrophy (from previous choroidal infarcts [Elschnig spots]) are a sign of past episodes of acute HTN.\n(See Figure 11.10.2.)\n\nFigure 11.10.2 Acute (“malignant”) hypertensive retinopathy. \n\nNOTE: When unilateral, suspect carotid artery obstruction on the side of the normal-appearing eye, sparing the retina from the effects of the HTN.\n\nDifferential Diagnosis\n\n- Diabetic retinopathy: Hemorrhages are usually dot-blot and microaneurysms are common; vessel attenuation is less common. See [11.12](c11.xhtml#s11-12), Diabetic Retinopathy.\n- Collagen vascular disease: May show multiple CWSs, but few to no other fundus findings characteristic of HTN.\n- Anemia: Mainly hemorrhage without marked arterial changes.\n- Radiation retinopathy: History of irradiation. Most commonly occurs within a few years, but can develop at any time.\n- CRVO or BRVO: Unilateral, multiple hemorrhages, venous dilation, and tortuosity. May be the result of HTN. See [11.8](c11.xhtml#s11-8), Central Retinal Vein Occlusion or [11.9](c11.xhtml#s11-9), Branch Retinal Vein Occlusion.\nEtiology\n\n- Primary HTN: No known underlying cause.\n- Secondary HTN: Typically the result of preeclampsia/eclampsia, pheochromocytoma, kidney disease, adrenal disease, aortic coarctation, others.\nWorkup\n\n- History: Known HTN, diabetes, or adnexal radiation?\n- Check blood pressure.\n- Complete ocular examination, particularly dilated fundus examination.\n- Refer patient for medical evaluation. The urgency depends on the blood pressure reading and whether the patient is symptomatic. A systolic blood pressure ≥180 mm Hg, a diastolic blood pressure ≥110 mm Hg or the presence of chest pain, difficulty breathing, headache, change in mental status, or blurred vision with optic disc swelling requires immediate medical attention including sending patient to the emergency department.\n- Patients may need workup for secondary causes of HTN such as those listed above.\nTreatment\n\nControl the HTN, as per the internist.\n\nFollow-Up\n\nEvery 2 to 3 months at first and then every 6 to 12 months.\n\n"}, {"id": "11.11", "chapter_num": "11", "chapter": "Retina", "name": "Ocular Ischemic Syndrome/Carotid Occlusive", "raw": "11.11 Ocular Ischemic Syndrome/Carotid Occlusive Disease\n\nSymptoms\n\nDecreased vision, ocular or periorbital pain, afterimages or prolonged recovery of vision after exposure to bright light, may have a history of transient monocular visual loss (amaurosis fugax). Usually unilateral, although up to 20% of cases can be bilateral. Typically occurs in patients aged 50 to 80 years. Men outnumber women 2:1.\n\nSigns\n\nCritical. Although retinal veins are dilated and irregular in caliber, they are typically not tortuous. The retinal arterioles are narrowed. Associated findings include midperipheral retinal hemorrhages (80%), NVI (66%), NVD (35%), and NVE (8%).\n\nOther. External collateral vessels on the forehead, episcleral injection, corneal edema, mild anterior uveitis, neovascular glaucoma, iris atrophy, cataract, retinal microaneurysms, CWSs, spontaneous pulsations of the central retinal artery, and cherry-red spot. CRAO may occur.\n\nDifferential Diagnosis\n\n- CRVO: Diffuse retinal hemorrhages. Dilated and tortuous retinal veins. Decreased vision after exposure to light and orbital pain are not typically found. Ophthalmodynamometry and IVFA may aid in differentiating OIS from CRVO. See [11.8](c11.xhtml#s11-8), Central Retinal Vein Occlusion.\n- Diabetic retinopathy: Bilateral, usually symmetric. Hard exudates are often present. See [11.12](c11.xhtml#s11-12), Diabetic Retinopathy.\n- Aortic arch disease: Caused by atherosclerosis, syphilis, or Takayasu arteritis. Produces a clinical picture identical to OIS, but usually bilateral. Examination reveals absent arm and neck pulses, cold hands, and arm muscle spasms with exercise.\nEtiology\n\n- Ipsilateral carotid artery disease: Usually ≥90% stenosis.\n- Ipsilateral ophthalmic artery disease: Less common.\n- Ipsilateral central retinal artery obstruction: Rare.\n- Giant cell arteritis: Rare.\nWorkup\n\n- History: Previous episodes of transient monocular visual loss? Cold hands or arm muscle spasms with exercise?\n- Complete ocular examination: Search carefully for anterior chamber flare, asymmetric cataract, and NVI/NVA/NVD/NVE.\n- Medical examination: Evaluate for HTN, diabetes, and atherosclerotic disease. Check pulses. Cardiac and carotid auscultation.\n- Laboratory workup for GCA in the appropriate settings. See [10.17](c10.xhtml#s10-17), Arteritic Ischemic Optic Neuropathy (Giant Cell Arteritis).\n- Consider IVFA for diagnostic purposes.\n- Noninvasive carotid artery evaluation: Duplex Doppler US, oculoplethysmography, magnetic resonance angiography, others.\n- Consider orbital color Doppler US.\n- Consider ophthalmodynamometry if CRVO diagnosis cannot be excluded.\n- Carotid arteriography is reserved for patients in whom surgery is to be performed.\n- Consider cardiology consultation, given the high association with cardiac disease.\nTreatment\n\n- Carotid endarterectomy for significant stenosis. Refer to neurovascular surgeon.\n- Consider PRP and anti-VEGF agents in the presence of neovascularization.\n- Manage glaucoma if present. See [9.13](c09.xhtml#s9-13), Neovascular Glaucoma.\n- Control HTN, diabetes, and cholesterol. Refer to internist.\n- Lifestyle modification (e.g., smoking cessation).\nFollow-Up\n\nDepends on the age, general health of the patient, and the symptoms and signs of disease. Surgical candidates should be evaluated urgently.\n\n"}, {"id": "11.12", "chapter_num": "11", "chapter": "Retina", "name": "Diabetic Retinopathy", "raw": "11.12 Diabetic Retinopathy\n\nDiabetic Retinopathy Disease Severity Scale\n\n- No apparent retinopathy.\n- Mild nonproliferative diabetic retinopathy (NPDR): Microaneurysms only.\n- Moderate NPDR: More than mild NPDR, but less than severe NPDR (see Figure 11.12.1). May have CWSs and venous beading.\nFigure 11.12.1 Moderate nonproliferative diabetic retinopathy with microaneurysms and cotton–wool spots. \n\n- Severe NPDR: Any of the following in the absence of PDR: Diffuse (traditionally >20) intraretinal hemorrhages in all 4 quadrants, ≥2 quadrants of venous beading, or ≥1 quadrant of prominent intraretinal microvascular abnormalities (see Figure 11.12.2).\nFigure 11.12.2 Intravenous fluorescein angiography of intraretinal microvascular abnormality. \n\n- PDR: Neovascularization of any of the following: iris, angle, optic disc, or elsewhere in retina; or vitreous/preretinal hemorrhage (see Figures 11.12.3 and 11.12.4).\nFigure 11.12.3 Proliferative diabetic retinopathy with neovascularization and scattered microaneurysms. \n\nFigure 11.12.4 Proliferative diabetic retinopathy with neovascularization of the optic disc. \n\n- Diabetic macular edema (DME): May be present in any of the stages. DME affecting or threatening the fovea is an indication for treatment (see Figure 11.12.5).\nFigure 11.12.5 Nonproliferative diabetic retinopathy with clinically significant macular edema. \n\nDifferential Diagnosis for Nonproliferative Diabetic Retinopathy\n\n- CRVO: Optic disc swelling, veins are more dilated and tortuous, hard exudates and microaneurysms usually not found, hemorrhages are nearly always in the NFL (“splinter hemorrhages”). CRVO is generally unilateral and of more sudden onset. See [11.8](c11.xhtml#s11-8), Central Retinal Vein Occlusion.\n- BRVO: Hemorrhages are distributed along a vein and generally respect the horizontal raphe. See [11.9](c11.xhtml#s11-9), Branch Retinal Vein Occlusion.\n- OIS: Hemorrhages mostly in the midperiphery and larger; exudates are absent. Usually accompanied by pain; mild anterior chamber reaction; corneal edema; episcleral vascular congestion; a mid-dilated, poorly reactive pupil; iris neovascularization. See [11.11](c11.xhtml#s11-11), Ocular Ischemic Syndrome/Carotid Occlusive Disease.\n- Hypertensive retinopathy: Hemorrhages fewer and typically flame shaped, microaneurysms rare, and arteriolar narrowing present often with arteriovenous crossing changes (“AV nicking”). See [11.10](c11.xhtml#s11-10), Hypertensive Retinopathy.\n- Radiation retinopathy: Usually develops within a few years of radiation. Microaneurysms are rarely present. See [11.5](c11.xhtml#s11-5), Cotton–Wool Spot.\nDifferential Diagnosis for Proliferative Diabetic Retinopathy\n\n- Neovascular complications of CRAO, CRVO, or BRVO: See specific sections.\n- Sickle cell retinopathy: Peripheral retinal neovascularization with “sea fan” configuration. See [11.20](c11.xhtml#s11-20), Sickle Cell Retinopathy (Including Sickle Cell Disease, Anemia, and Trait).\n- Embolization from intravenous drug abuse (talc retinopathy): Peripheral retinal neovascularization in patient with history of intravenous drug abuse. Typically see talc particles in retinal vessels. See [11.33](c11.xhtml#s11-33), Crystalline Retinopathy.\n- Sarcoidosis: May have uveitis, exudates around veins (“candle-wax drippings”), NVE, or systemic findings. See [12.5](c12.xhtml#s12-5), Retinal Vasculitis.\n- Other inflammatory syndromes (e.g., systemic lupus erythematosus).\n- OIS: See [11.11](c11.xhtml#s11-11), Ocula"}, {"id": "11.13", "chapter_num": "11", "chapter": "Retina", "name": "Vitreous Hemorrhage", "raw": "11.13 Vitreous Hemorrhage \n\nSymptoms\n\nSudden, painless loss of vision or sudden appearance of black spots, cobwebs, or haze in the vision.\n\nSigns\n\n(See Figure 11.13.1.)\n\nFigure 11.13.1 Vitreous and preretinal hemorrhage due to proliferative diabetic retinopathy. \n\nCritical. In severe VH, the red fundus reflex may be absent, and there may be limited or no view to the fundus. Red blood cells may be seen in the anterior vitreous (or anterior chamber). In mild VH, there may be a partially obscured view to the fundus. Chronic VH has a yellow-white appearance due to hemoglobin breakdown.\n\nOther. A mild RAPD is possible in the setting of dense hemorrhage. Depending on the etiology, there may be other fundus abnormalities.\n\nDifferential Diagnosis\n\n- Vitritis (white blood cells in the vitreous): Usually not sudden onset; anterior or posterior uveitis may also be present. No red blood cells are seen in the vitreous. See [12.3](c12.xhtml#s12-3), Posterior Uveitis.\n- RD: May occur without a VH, but the symptoms may be similar. In VH due to RD, the peripheral retina may be obscured on indirect ophthalmoscopy requiring B-scan US to detect the detachment. See [11.3](c11.xhtml#s11-3), Retinal Detachment.\nEtiology\n\n- Diabetic retinopathy: Usually history of diabetes with diabetic retinopathy. Diabetic retinopathy is usually evident in the contralateral eye. In VH due to PDR, the peripheral retina is often visible on indirect ophthalmoscopy. See [11.12](c11.xhtml#s11-12), Diabetic Retinopathy.\n- PVD: Common in middle-aged or elderly patients. Usually patients note floaters and flashing lights. The co-occurrence of PVD and VH is associated with a high likelihood of a retinal break(s). See [11.1](c11.xhtml#s11-1), Posterior Vitreous Detachment.\n- Retinal break: Commonly superior in cases of dense VH. This may be demonstrated by scleral depression and, if poor view, B-scan US. See [11.2](c11.xhtml#s11-2), Retinal Break (Tear).\n- RD: May be diagnosed by B-scan US if the retina cannot be viewed on clinical examination. See [11.3](c11.xhtml#s11-3), Retinal Detachment.\n- RVO (usually a BRVO): Commonly occurs in older patients with a history of high blood pressure. See [11.9](c11.xhtml#s11-9), Branch Retinal Vein Occlusion.\n- Exudative age-related macular degeneration (AMD): Usually with advanced CNV. Poor vision before the VH as a result of the underlying macular disease. Macular drusen and/or other findings of AMD are found in the contralateral eye. B-scan US may aid in the diagnosis. See [11.17](c11.xhtml#s11-17), Neovascular or Exudative (Wet) Age-Related Macular Degeneration.\n- Sickle cell disease: May have peripheral retinal neovascularization in the contralateral eye, typically in a “sea fan” configuration and salmon color. See [11.20](c11.xhtml#s11-20), Sickle Cell Retinopathy (Including Sickle Cell Disease, Anemia, and Trait).\n- Trauma: By history.\n- Valsalva: By history.\n- Intraocular tumor: May be visible on ophthalmoscopy or B-scan US. See [5.14](c05.xhtml#s5-14), Malignant Melanoma of the Iris and [11.36](c11.xhtml#s11-36), Choroidal Nevus and Malignant Melanoma of the Choroid.\n- Subarachnoid or subdural hemorrhage (Terson syndrome): Frequently bilateral preretinal or VHs may occur. A severe headache usually precedes the fundus findings. Coma may occur.\n- Others: Ruptured arterial macroaneurysm, Eales disease, Coats disease, retinopathy of prematurity, retinal capillary angiomas of von Hippel–Lindau syndrome, congenital prepapillary vascular loop, r"}, {"id": "11.14", "chapter_num": "11", "chapter": "Retina", "name": "Cystoid Macular Edema", "raw": "11.14 Cystoid Macular Edema\n\nSymptoms\n\nDecreased vision.\n\nSigns\n\n(See Figures 11.14.1 to 11.14.3.)\n\nFigure 11.14.1 Cystoid macular edema. \n\nFigure 11.14.2 Intravenous fluorescein angiography of cystoid macular edema. \n\nFigure 11.14.3 Optical coherence tomography of cystoid macular edema. \n\nCritical. Irregularity and blunting of the foveal light reflex, macular thickening with or without small intraretinal cysts in the foveal region.\n\nOther. Vitreous cells, optic nerve swelling, and dot hemorrhages may be observed depending upon etiology of CME.\n\nEtiology\n\n- Postoperative, following any ocular surgery, including laser photocoagulation and cryotherapy. The peak incidence of post cataract extraction CME, or Irvine–Gass, is approximately 6 to 10 weeks; the incidence increases with cataract surgical complications including vitreous loss, vitreous to the corneoscleral wound, iris prolapse, or uveal incarceration.\n- Diabetic retinopathy: See [11.12](c11.xhtml#s11-12), Diabetic Retinopathy.\n- CRVO and BRVO: See [11.8](c11.xhtml#s11-8), Central Retinal Vein Occlusion and [11.9](c11.xhtml#s11-9), Branch Retinal Vein Occlusion.\n- Uveitis: Particularly pars planitis; see [12.2](c12.xhtml#s12-2), Intermediate Uveitis.\n- RP: See [11.28](c11.xhtml#s11-28), Retinitis Pigmentosa and Inherited Chorioretinal Dystrophies.\n- Topical drops: Epinephrine, dipivefrin, and prostaglandin analogs, especially in patients who have undergone cataract surgery.\n- Retinal vasculitis: Eales disease, Behçet syndrome, sarcoidosis, necrotizing angiitis, multiple sclerosis, cytomegalovirus retinitis, others.\n- Retinal telangiectasias: Coats disease, idiopathic macular telangiectasia, others.\n- AMD: See [11.16](c11.xhtml#s11-16), Nonexudative (Dry) Age-Related Macular Degeneration and [11.17](c11.xhtml#s11-17), Neovascular or Exudative (Wet) Age-Related Macular Degeneration.\n- ERM: See [11.26](c11.xhtml#s11-26), Epiretinal Membrane (Macular Pucker, Surface-Wrinkling Retinopathy, Cellophane Maculopathy).\n- Associated with other ocular conditions: RD, subfoveal CNV, intraocular tumors, others.\n- Others: Systemic HTN, collagen vascular disease, autosomal dominant CME, others.\n- Pseudo-CME (no leakage on IVFA): Nicotinic acid maculopathy (typically seen only with relatively high doses of nicotinic acid), taxane drugs, X-linked retinoschisis (can see leakage with ICGA), myopic foveal schisis, Goldmann–Favre disease (and other NR2E3-related retinopathies), pseudohole from an ERM.\nWorkup\n\n- History: Recent intraocular surgery? Diabetes? Previous uveitis or ocular inflammation? Night blindness or family history of eye disease? Medications, includin
