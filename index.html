 wear, the frequency of replacement, and the cleaning and enzyme treatment regimen.\n- Slit-lamp examination: Evert the upper eyelids and examine for large papillae (≥1 mm).\nTreatment\n\n- Modify contact lens regimen as follows:\nMild-to-Moderate Giant Papillary Conjunctivitis\n\n- Replace and refit the contact lens. Consider planned replacement or daily-disposable lenses (daily-disposable lenses preferred).\n- Reduce contact lens wearing time (switch from extended-wear contact lens to daily-wear).\n- Have the patient clean the lenses more thoroughly, preferably by using preservative-free solutions, preservative-free saline, and a hydrogen peroxide–based disinfection system.\n- Increase enzyme use (use at least every week).\nSevere Giant Papillary Conjunctivitis\n\n- Suspend contact lens wear.\n- Restart with a new contact lens when the symptoms and signs clear (usually 1 to 4 months), preferably with daily-disposable soft contact lenses.\n- Careful lens hygiene as described earlier.\n- Start a topical mast cell stabilizer or combination antihistamine/mast cell stabilizer (e.g., pemirolast, nedocromil, lodoxamide, cromolyn, alcaftadine, olopatadine, bepotastine, or epinastine).\n- In unusually severe cases, short-term use of a low-dose topical steroid may be considered (e.g., loteprednol 0.5%, fluorometholone 0.1%, or fluorometholone acetate 0.1% q.i.d.). Contact lenses should not be worn while using a topical steroid.\n- Steroid-sparing topical anti-inflammatory agents such as cyclosporine 0.05% to 0.1% or lifitegrast 5% may be beneficial if long-term treatment is needed.\nFollow-Up\n\nIn 2 to 4 weeks. The patient may resume contact lens wear once the symptoms are resolved. Symptoms may improve before papillae resolve. Mast cell stabilizers are continued while the signs remain, and they may need to be used chronically to maintain contact lens tolerance. If topical steroids are used, they are usually slowly tapered and patients need to be monitored for steroid side effects.\n\nNOTE: Giant papillary conjunctivitis can result not only from contact lens wear and atopic/vernal conjunctivitis, but also from an exposed suture or an ocular prosthesis. Exposed sutures are removed. Prostheses should undergo routine cleaning an"}, {"id": "4.23", "chapter_num": "4", "chapter": "Cornea", "name": "Peripheral Corneal Thinning/Ulceration", "raw": "4.23 Peripheral Corneal Thinning/Ulceration \n\nSymptoms\n\nPain, photophobia, red eye; may be asymptomatic.\n\nSigns\n\nPeripheral corneal thinning (best seen with a narrow slit beam); may be associated with sterile infiltrate or ulcer.\n\nDifferential Diagnosis\n\nInfectious infiltrate or ulcer. Lesions are often treated as infectious until cultures come back negative. See [4.12](c04.xhtml#s4-12), Bacterial Keratitis.\n\nEtiology\n\n- Peripheral ulcerative keratitis (PUK), idiopathic or related to systemic connective tissue disease: Rheumatoid arthritis, GPA, relapsing polychondritis, polyarteritis nodosa, systemic lupus erythematosus, others. Peripheral (unilateral or bilateral) corneal thinning/ulcers may be associated with sterile inflammatory infiltrates. The sclera may be involved. May progress circumferentially to involve the entire peripheral cornea. Perforation may occur. This may be the first manifestation of systemic disease (see Figure 4.23.1).\nFigure 4.23.1 Peripheral ulcerative keratitis with both scleral and corneal involvement. \n\n- Terrien marginal degeneration: Usually bilateral, often asymptomatic. Slowly progressive thinning of the peripheral cornea; typically superior; more often in men. The anterior chamber is quiet, and the eye is typically not injected although may be associated with inflammatory signs and symptoms secondary to epithelial breakdown and inflammatory or infectious infiltrates. A yellow line (lipid) may appear, with a fine pannus along the central edge of the thinning. The thinning may slowly spread circumferentially. Refractive changes, including irregular and against-the-rule astigmatism are often present. The epithelium usually remains intact, but perforation may occur with minor trauma.\n- Mooren ulcer: Unilateral or bilateral. Painful corneal thinning and ulceration with inflammation. Initially starts as a focal area in the peripheral cornea, nasally or temporally with involvement of the limbus; later extends circumferentially or centrally. Unlike PUK, Mooren ulcer usually does not involve the sclera. An epithelial defect, stromal infiltrate/thinning, and an undermined leading edge are typically present. Limbal blood vessels may grow into the ulcer, and perforation can occur. Often idiopathic (autoimmunity may play a key role); diagnosis of exclusion after ruling out the aforementioned systemic causes of PUK. Mooren-like ulcer has been associated with systemic hepatitis C virus infection. Bilateral cases are more resistant to treatment than unilateral cases.\n- Pellucid marginal degeneration: Painless, noninflammatory bilateral asymmetric corneal thinning of the inferior peripheral cornea (usually from the 4- to 8-o’clock positions). There is no anterior chamber reaction, conjunctival injection, lipid deposition, or vascularization. The epithelium is intact. Corneal protrusion may be seen above the area of thinning. The thinning may slowly progress.\n- Furrow degeneration: Painless corneal thinning just peripheral to an arcus senilis, typically in the elderly. Noninflammatory without vascularization. Perforation is rare. Usually nonprogressive and does not require treatment.\n- Delle: Painless oval corneal thinning resulting from corneal drying and stromal dehydration adjacent to an abnormal conjunctival or corneal elevation. The overlying epithelium may be compromised but is often intact. See [4.24](c04.xhtml#s4-24), Delle.\n- Staphylococcal hypersensitivity/marginal keratitis: Peripheral, white corneal infiltrate"}, {"id": "4.24", "chapter_num": "4", "chapter": "Cornea", "name": "Delle", "raw": "4.24 Delle\n\nSymptoms\n\nIrritation and foreign body sensation or may be asymptomatic.\n\nSigns\n\nCritical. Corneal thinning, usually at the limbus, often in the shape of an ellipse, accompanied by an adjacent focal conjunctival or corneal elevation.\n\nOther. Fluorescein pooling in the area but can stain. No infiltrate, no anterior chamber reaction, mild-to-moderate hyperemia.\n\nDifferential Diagnosis\n\nSee [4.23](c04.xhtml#s4-23), Peripheral Corneal Thinning/Ulceration.\n\nEtiology\n\nPoor spread of the tear film over a focal area of cornea (with resultant stromal dehydration) due to an adjacent surface elevation (e.g., chemosis, conjunctival hemorrhage, filtering bleb, pterygium, tumor, and poststrabismus surgery).\n\nWorkup\n\n- History: Previous eye surgery? History of eye trauma?\n- Slit-lamp examination with fluorescein staining: look for an adjacent area of elevation.\nTreatment\n\n- Lubricating or antibiotic ophthalmic ointment every 2 to 4 hours and q.h.s. Temporary patching can be helpful in promoting corneal stromal rehydration in presence of excessive thinning.\n- If there is fluorescein staining rather than just pooling (use cotton-tipped applicator or tissue to wick away fluorescein to reveal potential underlying staining), treat as a corneal abrasion with antibiotic ophthalmic drops and ointment until the epithelial defect has resolved. See [3.3](c03.xhtml#s3-3), Corneal Abrasion.\n- Treat the causative elevated lesion according to etiology. Surgical excision may be necessary.\n- If the cause cannot be removed (e.g., filtering bleb), lubricating ointment should be applied nightly, and viscous artificial tear drops should be used four to eight times per day. If drops are needed more than four times per day, a preservative-free drop should be used.\nFollow-Up\n\nUnless there is severe thinning, reexamination can be performed in 1 to 7 days, at which time the cornea can be expected to be of normal thickness. If it is not, continue aggressive lubrication.\n\n"}, {"id": "4.25", "chapter_num": "4", "chapter": "Cornea", "name": "Keratoconus", "raw": "4.25 Keratoconus\n\nSymptoms\n\nProgressive decrease in vision, starbursts, and halos, usually beginning in adolescence and continuing into middle age. Acute corneal hydrops can cause a sudden decrease in acuity, pain, red eye, photophobia, and profuse tearing.\n\nSigns\n\n(See Figure 4.25.1.)\n\nFigure 4.25.1 Keratoconus. \n\nCritical. Noninflammatory ectasia of corneal stroma seen as slowly progressive irregular astigmatism resulting from paracentral (usually inferior) thinning and bulging of the cornea (maximal thinning near the apex of the protrusion), vertical tension lines in the posterior cornea (Vogt striae), an irregular corneal retinoscopic reflex (scissor reflex), and egg-shaped mires on keratometry. Inferior steepening is seen on corneal topographic evaluation, and inferocentral posterior elevation and thinning are seen on tomographic evaluation. Almost always bilateral but often asymmetric.\n\nOther. Fleischer ring (epithelial iron deposits at the base of the cone), bulging of the lower eyelid when looking downward (Munson sign), superficial apical scarring, conical reflection seen on the nasal cornea when shining a penlight from the temporal side (Rizutti sign). Corneal hydrops (sudden development of corneal edema) results from a rupture in Descemet membrane (see Figure 4.25.2).\n\nFigure 4.25.2 Acute corneal hydrops. \n\nAssociations\n\nKeratoconus is associated with sleep apnea, floppy eyelid syndrome, Down syndrome, atopic disease, Turner syndrome, Leber congenital amaurosis, mitral valve prolapse, retinitis pigmentosa, thyroid disorders, and connective tissue disorders (Ehlers–Danlos syndrome/Marfan syndrome). It frequently is related to chronic eye rubbing. Family history of keratoconus is also a risk factor.\n\nDifferential Diagnosis\n\n- Pellucid marginal degeneration: Uncommon, nonhereditary. Typically presents in the second to fifth decade. Corneal thinning in the inferior periphery from 4 to 8 o’clock, 1 to 2 mm from the limbus. Absence of inflammation. The cornea protrudes superior to the band of thinning manifesting in high irregular against the rule astigmatism.\n- Keratoglobus: Rare, congenital, nonhereditary, nonprogressive. Uniform globular-shaped cornea with diffuse thinning from limbus to limbus. Associated with Leber congenital amaurosis, Ehlers–Danlos syndrome, and blue sclera.\n- Postrefractive surgery ectasia: After lamellar refractive surgery such as LASIK and SMILE, and rarely surface ablation, a condition very similar to keratoconus can develop. It is treated in a similar manner to keratoconus.\nNOTE: Treatment for pellucid marginal degeneration is the same as for keratoconus, except corneal transplantation (penetrating or lamellar) is technically more difficult due to peripheral thinning and has a higher failure rate because larger grafts are necessary.\n\nWorkup\n\n- History: Duration and rate of decreased vision? Frequent change in eyeglass prescriptions? History of eye rubbing? Allergies? Medical problems? Family history? Previous refractive surgery?\n- Slit-lamp examination with close attention to location and characteristics of corneal thinning, Vogt striae, and a Fleischer ring (may be best appreciated with cobalt blue light).\n- Retinoscopy and refraction. Look for irregular astigmatism and an oil-drop or scissors red reflex.\n- Corneal topography (can show central and inferior steepening), tomography (can show posterior corneal elevation, thinning, and inferior displacement of the thinnest location), and keratometry (irreg"}, {"id": "4.26", "chapter_num": "4", "chapter": "Cornea", "name": "Corneal Dystrophies", "raw": "4.26 Corneal Dystrophies\n\nTypically bilateral, progressive corneal disorders without inflammation or corneal neovascularization. No relationship to environmental or systemic factors. Most are autosomal dominant disorders except for macular dystrophy, type 3 lattice dystrophy, and congenital hereditary endothelial dystrophy which are autosomal recessive.\n\nNOTE: The IC3D (International Committee for Classification of Corneal Dystrophies) system of corneal dystrophy classification has described dystrophies according to the layer chiefly affected; epithelial and subepithelial, epithelial–stromal, stromal, and those affecting Descemet membrane and the endothelium. Dystrophies with a known common genetic basis (transforming growth factor beta induced [TGFBI]) are also grouped together.\n\nEPITHELIAL AND SUBEPITHELIAL DYSTROPHIES\n\nEpithelial Basement Membrane Dystrophy (Map–Dot–Fingerprint Dystrophy)\n\nMost common anterior dystrophy. Diffuse gray patches (maps), creamy-white cysts (dots), or fine refractile lines (fingerprints) in the corneal epithelium, best seen with retroillumination or a broad slit-lamp beam angled from the side (see Figures 4.26.1 and 4.26.2). Spontaneous painful corneal erosions may develop, particularly on opening the eyes after sleep. May cause decreased vision, monocular diplopia, and shadow images. See [4.2](c04.xhtml#s4-2), Recurrent Corneal Erosion, for treatment.\n\nFigure 4.26.1 Epithelial basement membrane dystrophy with multiple “maps and dots” centrally. \n\nFigure 4.26.2 Epithelial basement membrane dystrophy depicting multiple “fingerprint” lines. \n\nMeesmann Dystrophy\n\nRare, epithelial dystrophy that is seen in the first years of life, but is usually asymptomatic until middle age. Retroillumination shows discrete, tiny epithelial vesicles involving the whole cornea but can be segmental (see Figure 4.26.3). Although treatment is usually not required, bandage soft contact lenses or superficial keratectomy may be beneficial if significant photophobia is present or if visual acuity is severely affected.\n\nFigure 4.26.3 Meesmann corneal dystrophy demonstrating multiple tiny discrete vesicles in direct illumination. \n\nEpithelial–Stromal TGFBI Dystrophies: Reis–Bücklers and Thiel–Behnke\n\nAppears early in life. Subepithelial, gray reticular opacities are seen primarily in the central cornea (see Figure 4.26.4). Painful episodes from recurrent erosions are relatively common and require treatment. Corneal transplantation surgery may be necessary to improve vision, but the dystrophy often recurs in the graft. Excimer laser PTK or superficial lamellar keratectomy may be adequate treatment in many cases.\n\nFigure 4.26.4 Reis–Bücklers corneal dystrophy. \n\nCORNEAL STROMAL DYSTROPHIES\n\nWhen these conditions cause reduced vision, patients usually benefit from a corneal transplant (lamellar or penetrating) or excimer laser PTK.\n\nLattice Dystrophy\n\nFour clinical forms:\n\n- Type 1 (most common): Refractile branching lines, white subepithelial dots, and scarring of the corneal stroma centrally, best seen with retroillumination. Recurrent erosions are common (see [4.2](c04.xhtml#s4-2), Recurrent Corneal Erosion). The corneal periphery is typically clear (see Figure 4.26.5). Tends to recur within 5 years after excimer laser PTK or corneal transplantation.\n- Type 2 (Meretoja syndrome): Associated with systemic amyloidosis, mask-like facies, ear abnormalities, cranial and peripheral nerve palsies, and dry and lax skin.\n- Types 3 and 4: Sympto"}, {"id": "4.27", "chapter_num": "4", "chapter": "Cornea", "name": "Fuchs Endothelial Dystrophy", "raw": "4.27 Fuchs Endothelial Dystrophy\n\nSymptoms\n\nGlare and blurred vision, worse on awakening. May progress to severe pain due to ruptured bullae. Symptoms usually develop in the fifth and sixth decades.\n\nSigns\n\nCritical. Cornea guttae with stromal ± epithelial edema (see Figure 4.27.1). Bilateral, but may be asymmetric.\n\nFigure 4.27.1 Corneal edema secondary to Fuchs endothelial dystrophy. \n\nNOTE: Central cornea guttae without stromal edema is called endothelial dystrophy (see Figure 4.27.2). This condition may progress to Fuchs dystrophy over years.\n\nFigure 4.27.2 Corneal guttae in endothelial dystrophy. \n\nOther. Fine pigment dusting on the endothelium, central epithelial edema and bullae, folds in Descemet membrane, stromal edema, subepithelial haze, or scarring.\n\nDifferential Diagnosis\n\n- Postsurgical corneal edema (also known as aphakic or pseudophakic bullous keratopathy): History of cataract surgery or other anterior segment surgery (e.g., tube shunt). See [4.28](c04.xhtml#s4-28), Aphakic Bullous Keratopathy/Pseudophakic Bullous Keratopathy.\n- Congenital hereditary endothelial dystrophy: Bilateral corneal edema at birth. See [4.26](c04.xhtml#s4-26), Corneal Dystrophies.\n- Posterior polymorphous corneal dystrophy: Seen early in life. Corneal endothelium shows grouped vesicles, geographic gray lesions, or broad bands. Occasionally corneal edema. See [4.26](c04.xhtml#s4-26), Corneal Dystrophies.\n- Iridocorneal endothelial syndrome: “Beaten metal” corneal endothelial appearance, with corneal edema, peripheral anterior synechiae, increased IOP, variable iris thinning, corectopia, and polycoria. Typically unilateral, in young to middle-aged adults. See [9.14](c09.xhtml#s9-14), Iridocorneal Endothelial Syndrome.\nWorkup\n\n- History: Previous surgery?\n- Slit-lamp examination: Cornea guttae are best seen with retroillumination. Fluorescein staining may demonstrate intact or ruptured bullae.\n- Measure IOP.\n- Corneal pachymetry to determine the central corneal thickness.\n- Consider specular microscopy to evaluate the endothelial cells although may be difficult to image the endothelial layer through an edematous cornea and in between guttate changes.\n- Consider corneal tomography to help monitor progression of disease.\nTreatment\n\n- Topical sodium chloride 5% drops q.i.d. and ointment q.h.s.\n- May gently blow warm air from a hair dryer at arm’s length toward the eyes for a few minutes every morning to dehydrate the cornea.\n- IOP reduction if indicated; also may help with corneal edema.\n- Smoking cessation and limiting sunlight/ultraviolet exposure may slow down progression.\n- Ruptured corneal bullae are painful and should be treated as recurrent erosions (see [4.2](c04.xhtml#s4-2), Recurrent Corneal Erosion).\n- Surgery: Endothelial keratoplasty (Descemet membrane endothelial keratoplasty [DMEK] or descemet stripping endothelial keratoplasty [DSEK]) is usually indicated when visual acuity decreases due to corneal edema; PK is indicated if significant anterior stromal scarring is present. Descemet stripping only (DSO) may be an option for milder forms of Fuchs endothelial dystrophy.\nFollow-Up\n\nEvery 3 to 12 months to check IOP and assess corneal edema. The condition progresses very slowly, and visual acuity typically remains good until stromal edema, epithelial edema, and/or corneal scarring develop.\n\n"}, {"id": "4.28", "chapter_num": "4", "chapter": "Cornea", "name": "Aphakic Bullous Keratopathy/Pseudophakic Bullous Keratopathy", "raw": "4.28 Aphakic Bullous Keratopathy/Pseudophakic Bullous Keratopathy\n\nSymptoms\n\nDecreased vision, pain, tearing, foreign body sensation, photophobia, and redness. History of cataract surgery in the involved eye.\n\nSigns\n\n(See Figure 4.28.1.)\n\nFigure 4.28.1 Pseudophakic bullous keratopathy. \n\nCritical. Corneal edema in an eye in which the native lens has been removed.\n\nOther. Corneal bullae, Descemet folds, subepithelial haze or scarring, corneal neovascularization, with or without preexisting guttae. Cystoid macular edema (CME) may be present.\n\nEtiology\n\nMultifactorial: Corneal endothelial damage, intraocular inflammation, vitreous or subluxed intraocular lens or tube shunt touching (or intermittently touching) the cornea, preexisting endothelial dysfunction, and glaucoma.\n\nWorkup\n\n- Slit-lamp examination: Stain the cornea with fluorescein to check for denuded epithelium. Check the position of the intraocular lens if present, determine whether vitreous is touching the corneal endothelium, and evaluate the eye for inflammation. Check for subepithelial haze or scarring. Evaluate the fellow eye for endothelial dystrophy.\n- Check IOP.\n- Dilated fundus examination: Look for CME.\n- Consider a fluorescein angiogram or optical coherence tomography (OCT) to help detect CME, although evaluation may be limited by corneal opacification.\nTreatment\n\n- Topical sodium chloride 5% drops q.i.d. and ointment q.h.s., if epithelial edema is present.\n- Reduce IOP with medications if needed. Avoid epinephrine derivatives and prostaglandin analogs, if possible, because of the risk of CME (see [9.1](c09.xhtml#s9-1), Primary Open-Angle Glaucoma).\n- Ruptured epithelial bullae (producing corneal epithelial defects) may be treated medically with the following:\n- Antibiotic drops (e.g., ofloxacin or moxifloxacin q.i.d.) or ointment (e.g., erythromycin or bacitracin q.i.d.) and a cycloplegic (e.g., cyclopentolate 1% t.i.d.). The topical antibiotic can be used even more frequently (e.g., q2h).\n- A bandage soft contact lens can be considered in conjunction with topical antibiotic drops (see [4.2](c04.xhtml#s4-2), Recurrent Corneal Erosion).\n- Endothelial keratoplasty (DMEK or DSEK) or full-thickness corneal transplant (PK), possibly combined with intraocular lens repositioning, replacement, or removal and/or vitrectomy may be indicated when vision decreases or fails to recover, or when the disease becomes advanced and painful.\n- In patients with painful eyes and limited visual potential, anterior stromal micropuncture, excimer laser PTK, conjunctival flap, or amniotic membrane graft surgery may be considered.\n- See [11.14](c11.xhtml#s11-14), Cystoid Macular Edema, for treatment of CME.\nNOTE: Although both CME and corneal disease may contribute to decreased vision, the precise role of each is often difficult to determine preoperatively. CME is less likely with posterior chamber or open-loop anterior chamber intraocular lenses than closed-loop anterior chamber intraocular lenses, which are no longer used.\n\nFollow-Up\n\nIf ruptured bullae, every 1 to 3 days until improvement demonstrated, and then every 5 to 7 days until the epithelial defect heals. Otherwise, every 1 to 6 months, depending on symptoms.\n\n"}, {"id": "4.29", "chapter_num": "4", "chapter": "Cornea", "name": "Corneal Graft Rejection", "raw": "4.29 Corneal Graft Rejection\n\nSymptoms\n\nDecreased vision, mild pain, redness, and photophobia with history of prior corneal transplantation, usually months to years beforehand. Can occur in the presence or absence of topical steroid use, but recently lowered or stopped topical steroid use is suggestive of new-onset graft rejection. Often asymptomatic and diagnosed on routine follow-up examination.\n\nSigns\n\n(See Figures 4.29.1 and 4.29.2.)\n\nFigure 4.29.1 Corneal graft rejection with endothelial rejection line and keratic precipitates. \n\nFigure 4.29.2 Failed full-thickness corneal graft with corneal edema and scarring. \n\nCritical. New keratic precipitates are localized to the donor endothelium. May be associated with stromal and/or epithelial edema, a line of keratic precipitates on the corneal endothelium (endothelial rejection line or Khodadoust line), subepithelial infiltrates (Krachmer spots), an irregularly elevated epithelial line (epithelial rejection line), or localized stromal neovascularization into the graft.\n\nOther. Conjunctival injection (particularly circumcorneal), anterior chamber inflammation, neovascularization growing up to or extending onto the graft, and broken graft suture. Tearing may occur, but a mucoid discharge is not present.\n\nDifferential Diagnosis\n\n- Suture abscess or corneal infection: May have a corneal infiltrate, hypopyon, or a purulent discharge. Remove the suture (by pulling the contaminated portion through the shortest track possible) and obtain smears and cultures, including a culture of the suture. Steroid frequency is usually reduced. Check for endophthalmitis. Treat with intensive topical fluoroquinolone or fortified antibiotics and monitor closely, sometimes in the hospital. See [4.12](c04.xhtml#s4-12), Bacterial Keratitis.\n- Uveitis: Anterior chamber cells and flare with keratic precipitates that are not limited to the graft endothelium. Often, a previous history of uveitis is obtained, but it is best to treat it as if it were a graft rejection. If known history of HSV, add suppressive antiviral therapy if not on it already. HSV iritis is frequently associated with elevated IOP. See [Chapter 12](c12.xhtml), Uveitis.\n- Epithelial downgrowth: May present as an advancing line with smooth or scalloped borders on the endothelial surface. Can be present on the donor and/or the recipient endothelium. Will not respond to steroids and is associated with less corneal edema. See [4.30](c04.xhtml#s4-30), Epithelial Downgrowth.\n- Increased IOP: A markedly increased IOP may produce epithelial corneal edema without other graft rejection signs. Edema clears after the IOP is reduced.\n- Other causes of graft failure: Non–immune-mediated late corneal graft endothelial decompensation or recurrent disease in the graft (e.g., herpes keratitis, corneal dystrophy).\nWorkup\n\n- History: Time since corneal transplantation? Current eye medications? Compliance with eye medications and postoperative follow-up. Recent change in topical steroid regimen? Indication for corneal transplantation (e.g., HSV)?\n- Slit-lamp examination, with careful inspection for endothelial rejection line, keratic precipitates, subepithelial infiltrates, and other signs listed above.\nTreatment\n\nEndothelial Rejection (Endothelial Rejection Line, Corneal Edema, and/or Keratic Precipitates)\n\n- Topical steroids (e.g., prednisolone acetate 1% q1h or difluprednate 0.05% q2h while awake; can add dexamethasone 0.1% ointment q.h.s.).\n- If rejection is severe, re"}, {"id": "4.30", "chapter_num": "4", "chapter": "Cornea", "name": "Epithelial Downgrowth", "raw": "4.30 Epithelial Downgrowth\n\nNOTE: Epithelial downgrowth is when epithelial cells from the ocular surface gain access to the inside of the eye. Any ocular surgery or even trauma involving corneal incisions or lacerations may cause corneal epithelium to track downward (epithelial downgrowth) into the anterior chamber. Epithelial ingrowth, on the other hand, is when epithelial cells invade a corneal lamellar interface; it most commonly occurs after LASIK procedures and can also be seen after SMILE.\n\nSymptoms\n\nCan be asymptomatic. Ocular surface irritation can occur. Decreased vision or glare symptoms may occur in advanced cases.\n\nSigns\n\n- When the epithelial cells grow onto iris, they flatten the iris crypts and often appear gray or cream colored. This membrane can cause variable iris pigmentation and ectropion uvea if it reaches the pupillary margin.\n- When the epithelial cells grow onto the corneal endothelium, they can cause a wavy gray or cream colored demarcation line. Extensive endothelial involvement can result in corneal edema.\n- Epithelial cells tracking into the angle may cause increased IOP.\n- There may be a persistently Seidel-positive wound.\nWorkup\n\n- Complete ophthalmic examination, including IOP measurement, and fluorescein staining for epithelial defects or a Seidel-positive fistula, and a dilated fundus examination.\n- Anterior segment OCT may be helpful for visualization.\nTreatment\n\n- If asymptomatic and nonprogressive, can be observed.\n- Low-setting argon laser can be applied to areas of epithelial downgrowth on the iris. This technique is mainly used to confirm the diagnosis of epithelial downgrowth (laser spots cause whitening of epithelial downgrowth but not normal iris) but has been reported to cause regression in some cases.\n- If there is a fistula, surgical intervention to close the fistula, possibly with addition of cryotherapy, should be considered.\n- Surgery to remove all the intraocular epithelial cells can be attempted, but is often extensive and unsuccessful. Intraocular 5-fluorouracil or methotrexate can also be used, but may require multiple injections and has a guarded prognosis.\n- Treat increased IOP with topical medications initially. If uncontrolled, may be an indication for surgical intervention.\nFollow-Up\n\nShould be followed every 1 to 2 weeks if there are signs of progression, otherwise can be spaced to longer intervals.\n\n"}, {"id": "4.31", "chapter_num": "4", "chapter": "Cornea", "name": "Corneal Refractive Surgery Complications", "raw": "4.31 Corneal Refractive Surgery Complications\n\nThe basic principle of corneal refractive surgery is to induce a change in the curvature of the cornea to correct a preexisting refractive error.\n\nCOMPLICATIONS OF SURFACE ABLATION PROCEDURES (PHOTOREFRACTIVE KERATECTOMY, LASER SUBEPITHELIAL KERATECTOMY, AND EPITHELIAL LASER IN SITU KERATOMILEUSIS)\n\nIn PRK, the corneal epithelium is removed and the corneal stroma is ablated using an argon–fluoride excimer laser (193 nm, ultraviolet) to correct a refractive error. In laser subepithelial keratomileusis (LASEK), the epithelium is chemically separated from the Bowman layer, moved to the side before laser ablation of the stroma, and then repositioned centrally. In epithelial laser in situ keratomileusis (epi-LASIK), the epithelium is mechanically separated from the Bowman layer, moved to the side before laser ablation of the stroma, and then repositioned centrally or discarded (see Table 4.31.1).\n\nTABLE 4.31.1 Refractive Surgery Characteristics\n\nSymptoms\n\nEarly (1 to 14 Days). Decreasing visual acuity and increased pain.\n\nNOTE: The induced epithelial defect at surgery, which usually takes a few days to heal, normally will cause postoperative pain. A bandage soft contact lens is used to minimize this discomfort.\n\nLater (2 Weeks to Several Months). Decreasing visual acuity, severe glare, and monocular diplopia.\n\nSigns\n\nCorneal infiltrate and central corneal scar.\n\nEtiology\n\nEarly\n\n- Dislocated or poorly fit bandage soft contact lens (see [4.21](c04.xhtml#s4-21), Contact Lens–Related Problems).\n- Nonhealing epithelial defect (see [3.3](c03.xhtml#s3-3), Corneal Abrasion). Must also consider HSV keratitis.\n- Corneal ulcer (see [4.12](c04.xhtml#s4-12), Bacterial Keratitis).\n- Medication allergy (see [5.1](c05.xhtml#s5-1), Acute Conjunctivitis).\nLater\n\n- Undercorrection or overcorrection.\n- Corneal haze (scarring) noted in anterior corneal stroma.\n- Irregular astigmatism (e.g., central island, decentered ablation).\n- Regression or progression of refractive error.\n- Steroid-induced glaucoma or ocular hypertension (see [9.8](c09.xhtml#s9-8), Steroid-Response Glaucoma).\nWorkup\n\n- Complete ophthalmic examination, including IOP measurement. IOP may be underestimated given decreased corneal thickness.\n- Refraction if change in refractive error suspected. Hard contact lens overrefraction corrects irregular astigmatism.\n- Corneal topography and/or tomography if irregular astigmatism is suspected.\nTreatment and Follow-Up\n\n- Epithelial defect (see [3.3](c03.xhtml#s3-3), Corneal Abrasion).\n- Infectious keratitis (see [4.16](c04.xhtml#s4-16), Herpes Simplex Keratitis and [4.12](c04.xhtml#s4-12), Bacterial Keratitis).\n- Corneal haze: Increase steroid drop frequency. Follow up in 1 to 2 weeks. Cases of severe haze may respond to excimer laser PTK with mitomycin C.\n- Refractive error or irregular astigmatism: Consider surface ablation enhancement. If irregular astigmatism is present, hard contact lens, topography-guided surface ablation, or excimer laser PTK may be needed.\n- Steroid-induced glaucoma. See [9.8](c09.xhtml#s9-8), Steroid-Response Glaucoma.\nCOMPLICATIONS OF LASER IN SITU KERATOMILEUSIS\n\nIn LASIK, a hinged, partial-thickness corneal flap is created using a microkeratome or femtosecond laser (1,053 nm, near-infrared), and then the underlying stroma is ablated with an excimer laser to correct refractive error. The corneal flap is repositioned over the stromal bed without sutures.\n\nSymptoms\n\nEarly (1 to 14 D"}, {"id": "5.1", "chapter_num": "5", "chapter": "Conjunctiva & Lids", "name": "Acute Conjunctivitis", "raw": "5.1 Acute Conjunctivitis\n\nSymptoms\n\n“Red eye” (conjunctival hyperemia), discharge, eyelids sticking or crusting (worse upon awakening from sleep), and foreign body sensation, with <4-week duration of symptoms (otherwise, see [5.2](c05.xhtml#s5-2), Chronic Conjunctivitis) (see Figure 5.1.1).\n\nFigure 5.1.1 Algorithm for follicles and papillae. \n\nVIRAL CONJUNCTIVITIS/EPIDEMIC KERATOCONJUNCTIVITIS\n\nSymptoms\n\nItching, burning, tearing, and gritty or foreign body sensation; history of recent upper respiratory tract infection or contact with someone with viral conjunctivitis. Often starts in one eye and involves the fellow eye a few days later.\n\nSigns\n\n(See Figure 5.1.2.)\n\nFigure 5.1.2 Viral conjunctivitis. \n\nCritical. Inferior palpebral conjunctival follicles (see Figure 5.1.3) and tender palpable preauricular lymph node.\n\nFigure 5.1.3 Follicles on the inferior palpebral conjunctiva. \n\nOther. Watery discharge, red and edematous eyelids, pinpoint subconjunctival hemorrhages, punctate keratopathy (epithelial erosion in severe cases), and membrane/pseudomembrane (see Figure 5.1.4). Fine intraepithelial microcysts are an early corneal finding, which, if present, can be helpful in diagnosis. Subepithelial (anterior stromal) infiltrates (SEIs) can develop 1 to 2 weeks after the onset of the conjunctivitis (see Figure 5.1.5).\n\nFigure 5.1.4 Viral conjunctivitis with pseudomembranes. \n\nFigure 5.1.5 Several persistent subepithelial infiltrates after resolution of viral conjunctivitis. \n\nEtiology and Variants of Viral Conjunctivitis\n\n- Most commonly adenovirus: Epidemic keratoconjunctivitis is most commonly caused by subgroup D of serotypes 8, 19, and 37. Pharyngoconjunctival fever is associated with pharyngitis and fever, usually in children, and is most commonly caused by serotypes 3 and 7.\n- Acute hemorrhagic conjunctivitis: Associated with prominent subconjunctival hemorrhages, usually 1 to 2 weeks in duration, and tends to occur in tropical regions. Caused by enterovirus 70 (rarely followed by polio-like paralysis), coxsackievirus A24, and adenovirus serotype 11.\nNOTE: Many systemic viral syndromes (e.g., measles, mumps, influenza, and coronavirus) can cause a nonspecific conjunctivitis. The underlying condition should be managed appropriately; the eyes are treated with artificial tears four to eight times per day. If tears are used more than four times daily, preservative-free tears are recommended.\n\nWorkup\n\nNo conjunctival cultures/swabs are indicated unless the discharge is excessive or the condition becomes chronic (see [5.2](c05.xhtml#s5-2), Chronic Conjunctivitis).\n\nTreatment\n\n- Counsel the patient that viral conjunctivitis is a self-limited condition that typically gets worse for the first 4 to 7 days after the onset and may not resolve for 2 to 3 weeks (potentially longer with corneal involvement).\n- Viral conjunctivitis is highly contagious (usually for 10 to 12 days from the onset) when the eyes are red (when not on steroids) or have active discharge/tearing. Patients should avoid touching their eyes, shaking hands, sharing towels or pillows, etc. Restrict work and school for patients with significant exposure to others while the eyes are red and weeping.\n- Frequent hand washing.\n- Application of preservative-free artificial tears or tear ointment four to eight times per day for 1 to 3 weeks. Advise single-use vials to limit tip contamination and spread of the condition.\n- Cool compresses several times per day.\n- Application of antihistam"}, {"id": "5.2", "chapter_num": "5", "chapter": "Conjunctiva & Lids", "name": "Chronic Conjunctivitis", "raw": "5.2 Chronic Conjunctivitis\n\nSymptoms\n\n“Red eye” (conjunctival hyperemia), conjunctival discharge, eyelids sticking (worse on awakening from sleep), and foreign body sensation, duration >4 weeks (otherwise see [5.1](c05.xhtml#s5-1), Acute Conjunctivitis).\n\nDifferential Diagnosis\n\n- Parinaud oculoglandular conjunctivitis (see [5.3](c05.xhtml#s5-3), Parinaud Oculoglandular Conjunctivitis).\n- Silent dacryocystitis (see [6.11](c06.xhtml#s6-11), Dacryocystitis/Inflammation of the Lacrimal Sac).\n- Contact lens related (see [4.21](c04.xhtml#s4-21), Contact Lens-Related Problems).\n- Conjunctival tumors (see [5.13](c05.xhtml#s5-13), Conjunctival Tumors).\n- Autoimmune disease (e.g., reactive arthritis, sarcoidosis, discoid lupus, and others).\nCHLAMYDIAL INCLUSION CONJUNCTIVITIS\n\nSexually transmitted, due to Chlamydia trachomatis serotypes D–K, and typically found in young adults. A history of vaginitis, cervicitis, or urethritis may be present.\n\nSigns\n\nInferior tarsal or bulbar conjunctival follicles, superior corneal pannus, palpable preauricular node, or peripheral SEIs. A stringy, mucous discharge may be present.\n\nWorkup\n\n- History: Determine the duration of red eye, any prior treatment, concomitant vaginitis, cervicitis, or urethritis. Sexually active?\n- Slit-lamp examination.\n- In adults, direct chlamydial immunofluorescence test, DNA probe, chlamydial culture, or polymerase chain reaction of the conjunctival sample.\n- Consider conjunctival scraping for Giemsa stain: Shows basophilic intracytoplasmic inclusion bodies in epithelial cells, polymorphonuclear leukocytes, and lymphocytes in newborns.\nNOTE: Topical fluorescein can interfere with immunofluorescence test results.\n\nTreatment\n\n- Azithromycin 1 g p.o. single dose, doxycycline 100 mg p.o. b.i.d., or erythromycin 500 mg p.o. q.i.d. for 7 days is given to the patient and his or her sexual partners.\n- Topical erythromycin or tetracycline ointment b.i.d. to t.i.d. for 2 to 3 weeks.\nFollow-Up\n\nIn 2 to 3 weeks, depending on the severity. The patient and sexual partners should be evaluated by their medical doctors for other sexually transmitted diseases. Occasionally a 6-week course of doxycycline may be required.\n\nTRACHOMA\n\nPrincipally occurs in developing countries in areas of poor sanitation and crowded conditions. Due to C. trachomatis serotypes A–C.\n\nSigns\n\n(See Figure 5.2.1.)\n\nFigure 5.2.1 Trachoma showing Arlt line, or scarring, of the surgery tarsal conjunctiva. \n\nMacallan Classification\n\n- Stage 1: Superior tarsal follicles, mild superior SPK, and pannus, often preceded by purulent discharge and tender preauricular node.\n- Stage 2: Florid superior tarsal follicular reaction (2a) or papillary hypertrophy (2b) associated with superior corneal SEIs, pannus, and limbal follicles.\n- Stage 3: Follicles and scarring of superior tarsal conjunctiva.\n- Stage 4: No follicles, extensive conjunctival scarring.\n- Late complications: Severe dry eyes, trichiasis, entropion, keratitis, corneal scarring, superficial fibrovascular pannus, Herbert pits (scarred limbal follicles), corneal bacterial superinfection, and ulceration.\nWorld Health Organization Classification\n\n- TF (trachomatous inflammation: follicular): More than five follicles on the upper tarsus.\n- TI (trachomatous inflammation: intense): Inflammation with thickening obscuring >50% of the tarsal vessels.\n- TS (trachomatous scarring): Cicatrization of tarsal conjunctiva with fibrous white bands.\n- TT (trachomatous trichiasis): Trichiasis of a"}, {"id": "5.3", "chapter_num": "5", "chapter": "Conjunctiva & Lids", "name": "Parinaud Oculoglandular Conjunctivitis", "raw": "5.3 Parinaud Oculoglandular Conjunctivitis\n\nSymptoms\n\nRed eye, mucopurulent discharge, and foreign body sensation.\n\nSigns\n\nCritical. Granulomatous nodule(s) on the palpebral and bulbar conjunctiva; visibly swollen ipsilateral preauricular or submandibular lymph nodes.\n\nOther. Fever, rash, and follicular conjunctivitis.\n\nEtiology\n\n- Cat-scratch disease from Bartonella henselae (most common cause): Often a history of being scratched or licked by a kitten within 2 weeks of symptom onset.\n- Tularemia: History of contact with rabbits, other small wild animals, or ticks. Patients have severe headache, fever, and other systemic manifestations.\n- Tuberculosis and other mycobacteria.\n- Rare causes: Syphilis, leukemia, lymphoma, mumps, Epstein–Barr virus, HSV, fungi, sarcoidosis, listeria, typhus, and others.\nWorkup\n\nInitiated when etiology is unknown (e.g., no recent cat scratch). Consider:\n\n- Conjunctival biopsy with scrapings for Gram, Giemsa, and acid-fast stains.\n- Conjunctival cultures on blood, Löwenstein–Jensen, Sabouraud, and thioglycolate media.\n- Complete blood count, rapid plasma reagin (RPR) or Venereal Disease Research Laboratory (VDRL), fluorescent treponemal antibody absorption (FTA-ABS) or treponemal-specific assay (e.g., microhemagglutination assay for Treponema pallidum [MHA-TP]), angiotensin-converting enzyme (ACE), and, if the patient is febrile, blood cultures.\n- Chest x-ray, purified protein derivative (PPD) of tuberculin, and/or interferon-gamma release assay (IGRA, QuantiFERON-TB Gold).\n- If tularemia is suspected, serologic titers are necessary.\n- If diagnosis of cat-scratch disease is uncertain, then cat-scratch serology and cat-scratch skin test (Hanger–Rose) can be performed.\nTreatment\n\n- Warm compresses for tender lymph nodes.\n- Antipyretics as needed.\n- Disease specific:\n- Cat-scratch disease: Generally resolves spontaneously in 6 weeks. Consider azithromycin 500 mg p.o. q.i.d., then 250 mg daily for four doses (for children, 10 mg/kg q.i.d., then 5 mg/kg daily for four doses); alternatives include trimethoprim/sulfamethoxazole (160/800 mg b.i.d.) or ciprofloxacin 500 mg p.o. b.i.d. Duration should be individualized based on severity and response to treatment. Use a topical antibiotic (e.g., bacitracin/polymyxin B ointment or gentamicin drops q.i.d.). The cat does not need to be removed.\n- Tularemia: Recommended therapy is gentamicin 5mg/kg once daily i.m. or i.v. for 10 days. For mild illness, alternative therapies include ciprofloxacin 500 mg p.o. b.i.d. for 10 to 14 days or doxycycline 100 mg p.o. b.i.d. for 14 to 21 days. Systemic medication should coincide with gentamicin 0.3% drops q2h for 1 week and then five times per day until resolved. Often patients are systemically ill and under the care of a medical internist for tularemia; if not, refer to a medical internist for systemic management.\n- Tuberculosis: Refer to an internist for antituberculosis medication.\n- Syphilis: Systemic penicillin (dose and route depend on the stage of syphilis) and topical tetracycline ointment (see [12.10](c12.xhtml#s12-10), Syphilis).\nFollow-Up\n\nRepeat the ocular examination in 1 to 2 weeks. Conjunctival granulomas and lymphadenopathy can take 4 to 6 weeks to resolve for the cat-scratch disease.\n\n"}, {"id": "5.4", "chapter_num": "5", "chapter": "Conjunctiva & Lids", "name": "Superior Limbic Keratoconjunctivitis", "raw": "5.4 Superior Limbic Keratoconjunctivitis\n\nSymptoms\n\nRed eye, burning, foreign body sensation, pain, tearing, itching, mild photophobia, and frequent blinking. The course can be chronic with exacerbations and remissions.\n\nSigns\n\nCritical. Sectoral thickening, inflammation, and radial injection of the superior bulbar conjunctiva, especially at the limbus. Superior bulbar conjunctivochalasis often present (see Figure 5.4.1).\n\nFigure 5.4.1 Superior limbic keratoconjunctivitis. \n\nOther. Fine papillae on the superior tarsal conjunctiva; fine punctate fluorescein or lissamine green staining on the superior cornea, limbus, and conjunctiva; superior corneal micropannus and filaments. Usually bilateral, frequently asymmetric.\n\nWorkup\n\n- History: Recurrent episodes? Thyroid disease?\n- Slit-lamp examination with fluorescein, lissamine green, or rose bengal staining, particularly of the superior cornea and adjacent conjunctiva. Lift the upper eyelid to see the superior limbal area and then evert to visualize the tarsus. Sometimes the localized hyperemia is best appreciated by direct inspection with room light rather than at the slit lamp, by raising the eyelids of the patient on downgaze.\n- Thyroid function tests (there is a 50% prevalence of current or remote thyroid disease in patients with superior limbic keratoconjunctivitis).\nTreatment\n\nMild\n\n- Aggressive lubrication with preservative-free artificial tears four to eight times per day and artificial tear ointment q.h.s.\n- Consider punctal occlusion with plugs or cautery because of association with dry eyes.\n- Treat any concurrent blepharitis.\n- Consider treatment with cyclosporine 0.05% to 0.1% or lifitegrast 5% b.i.d. if not responding to lubrication.\n- In the absence of dry eyes, a therapeutic bandage soft contact lens can be placed to help relieve symptoms and facilitate healing.\nModerate to Severe (in Addition to Preceding)\n\n- Autologous serum or plasma rich protein drops four to six times per day.\n- Consider treatment with topical tacrolimus 0.03% ointment b.i.d. if there is no improvement with aggressive lubrication (off-label in the eye).\n- If a significant amount of mucus or filaments are present, add acetylcysteine 10% drops four to six times per day. Low potency topical steroids such as loteprednol, rimexolone, or fluorometholone can be used for short courses to treat exacerbations.\n- Application of silver nitrate 0.5% solution on a cotton-tipped applicator for 10 to 20 seconds to the superior tarsal and superior bulbar conjunctiva after topical anesthesia (e.g., proparacaine). This is followed by irrigation with saline and use of antibiotic ointment (e.g., erythromycin) q.h.s. for 1 week.\n- A low dose of doxycycline can be a helpful adjuvant to counteract matrix metalloproteinase upregulation caused by superior limbic keratoconjunctivitis.\n- Botulinum toxin can be injected into the muscle of Riolan for temporary relief of symptoms.\n- Surgical considerations include conjunctival cautery, cryotherapy, conjunctival resection (with or without amniotic membrane graft), recession of the superior bulbar conjunctiva, or high-frequency radiowave electrosurgery.\nNOTE: ﻿Do not use silver nitrate (75% to 95%) cautery sticks, which cause severe ocular burns.\n\nFollow-Up\n\nEvery 2 to 4 weeks during an exacerbation. If signs and symptoms persist despite multiple medical treatment strategies, surgical options should be considered.\n\n"}, {"id": "5.5", "chapter_num": "5", "chapter": "Conjunctiva & Lids", "name": "Subconjunctival Hemorrhage", "raw": "5.5 Subconjunctival Hemorrhage\n\nSymptoms\n\nRed eye, foreign body sensation, but usually asymptomatic unless there is associated chemosis.\n\nSigns\n\nBlood underneath the conjunctiva, may be in one sector of the eye or diffuse and obstructing the entire view of the sclera (see Figure 5.5.1).\n\nFigure 5.5.1 Subconjunctival hemorrhage. \n\nDifferential Diagnosis\n\n- Kaposi sarcoma: Red or purple lesion beneath the conjunctiva, usually elevated slightly. HIV/AIDS testing should be performed.\n- Other conjunctival lesions (e.g., lymphoma or amyloid) with secondary hemorrhage.\nEtiology\n\n- Valsalva (e.g., coughing, sneezing, vomiting, bearing down with constipation, or other forms of straining).\n- Traumatic: Can be isolated or associated with a retrobulbar hemorrhage or ruptured globe.\n- Hypertension and diabetes.\n- Bleeding disorder.\n- Antiplatelet or anticoagulant medications (e.g., aspirin, clopidogrel, warfarin, ticagrelor, dabigatran, rivaroxaban, apixaban, and edoxaban).\n- Topical steroid therapy.\n- Hemorrhage due to orbital mass (rare).\n- Idiopathic.\nWorkup\n\n- History: Bleeding or clotting problems? Medications? Eye rubbing, trauma, heavy lifting, or Valsalva? Recurrent subconjunctival hemorrhage? Acute or chronic cough?\n- Check blood pressure.\n- Ocular examination: If recurrent, rule out a conjunctival lesion when resolved. If severe, check extraocular motility, resistance to retropulsion, and IOP. In traumatic cases, rule out other ocular injuries (e.g., a ruptured globe [signs may include reduced visual acuity, abnormally deep or shallow anterior chamber, severe bullous subconjunctival hemorrhage, hyphema, vitreous hemorrhage, or uveal prolapse], retrobulbar hemorrhage [associated with proptosis and increased IOP], or orbital fracture). See [3.10](c03.xhtml#s3-10), Ruptured Globe and Penetrating Ocular Injury, [3.20](c03.xhtml#s3-20), Traumatic Retrobulbar Hemorrhage (Orbital Hemorrhage), and [3.19](c03.xhtml#s3-19), Orbital Blowout Fracture.\n- If the patient has recurrent subconjunctival hemorrhages or a history of bleeding problems, prothrombin time, activated partial thromboplastin time, complete blood count with differential and peripheral blood smear (to evaluate for thrombocytopenia or leukemia), liver function tests, and protein C and S should be considered.\n- If orbital signs are present (proptosis, decreased extraocular motility, elevated IOP) in atraumatic cases, perform axial, coronal, and parasagittal imaging (computed tomography [CT], or magnetic resonance imaging [MRI]) of the orbits with and without contrast to evaluate for an orbital mass (e.g., neuroblastoma in children or lymphangioma in adults). In traumatic cases, image as appropriate based on clinical findings, mechanism of injury, etc. (see [Chapter 3](c03.xhtml), Trauma).\nTreatment\n\nNone required. Artificial tear drops q.i.d. can be given if mild ocular irritation is present. Lubricating ointment can be considered if associated chemosis is significant. In addition, elective use of aspirin products and NSAIDs should be discouraged unless in the context of coexisting medical conditions. Blood thinners should not be stopped unless a patient is cleared by their primary medical physician.\n\nFollow-Up\n\nUsually resolves spontaneously within 2 to 4 weeks. Patients should be advised that the blood may spread to involve a greater surface area, and consequently look worse, as the condition resolves. Patients are told to return if the blood does not fully resolve or if they experien"}, {"id": "5.6", "chapter_num": "5", "chapter": "Conjunctiva & Lids", "name": "Episcleritis", "raw": "5.6 Episcleritis\n\nSymptoms\n\nAcute or rapid onset of redness and mild pain in one or both eyes, typically in young to middle-aged adults, more common in women; a history of recurrent episodes is common. No discharge or photophobia.\n\nSigns\n\nCritical. Sectoral (and, less commonly, diffuse) redness of one or both eyes, mostly due to engorgement of the episcleral vessels. These vessels are large, run in a radial direction beneath the conjunctiva, and can be moved slightly with a cotton-tip applicator (see Figure 5.6.1).\n\nFigure 5.6.1 Episcleritis. \n\nOther. Mild-to-moderate tenderness over the area of episcleral injection or a nodule that can be moved slightly over the underlying sclera may be seen. Fluorescein staining can sometimes be seen over the nodule. Associated anterior uveitis and corneal involvement are rare. Vision is normal.\n\nDifferential Diagnosis\n\n- Scleritis: Typically older patient. May have known underlying immune-mediated disease (e.g., collagen vascular disease). Pain is deep, severe, and often radiates to the ipsilateral side of the head or face. Scleral, episcleral, and conjunctival vessels are injected. The scleral vessels cannot be moved with a cotton swab and do not blanch with topical phenylephrine 2.5%. Possible corneal involvement with adjacent peripheral stromal keratitis. See [5.7](c05.xhtml#s5-7), Scleritis.\n- Iritis: Cells and flare in the anterior chamber. May be present with scleritis. See [3.6](c03.xhtml#s3-6), Traumatic Iritis and [12.1](c12.xhtml#s12-1), Anterior Uveitis (Iritis/Iridocyclitis).\n- Conjunctivitis: Diffuse redness and discharge with follicles or papillae. See [5.1](c05.xhtml#s5-1), Acute Conjunctivitis and [5.2](c05.xhtml#s5-2), Chronic Conjunctivitis.\n- Contact lens-related: Overwear, tight contact lens syndrome, or reaction to contact lens solution. Must be considered in all contact lens wearers. See [4.21](c04.xhtml#s4-21), Contact Lens-Related Problems.\nEtiology\n\n- Idiopathic: Most common; 60% of patients have no underlying systemic disease.\n- Infectious: Herpes zoster virus (scars from an old facial rash may be present, may cause episcleritis or scleritis), sexually transmitted infections, protozoa, and others.\n- Medications (e.g., topiramate and pamidronate).\n- Others: Rosacea, atopy, collagen vascular diseases (e.g., rheumatoid arthritis, inflammatory bowel disease, ankylosing spondylitis, psoriatic arthritis, systemic lupus erythematosus), vasculitides, and gout.\nWorkup\n\n- History: Assess for a history of rash, arthritis, venereal disease, recent viral illness, and other medical problems.\n- External examination in natural light: Look for the violaceous hue of scleritis.\n- Slit-lamp examination: Anesthetize (e.g., topical proparacaine) and move the conjunctiva with a cotton-tipped applicator to determine the depth of the injected blood vessels. Evaluate for any corneal or anterior chamber involvement. Check IOP.\n- Place a drop of phenylephrine 2.5% in the affected eye and re-examine the vascular pattern 10 to 15 minutes later. Episcleral vessels should blanch, highlighting any underlying scleral vascular engorgement.\n- If the history suggests an underlying etiology (systemic disease usually precedes ocular involvement), or in cases with multiple recurrences, the appropriate laboratory tests should be obtained (e.g., complete blood count, comprehensive metabolic panel, antinuclear antibody [ANA], rheumatoid factor, anticyclic citrullinated peptide [anti-CCP], erythrocyte sedimentation ra"}, {"id": "5.7", "chapter_num": "5", "chapter": "Conjunctiva & Lids", "name": "Scleritis", "raw": "5.7 Scleritis\n\nSymptoms\n\nSevere and boring eye pain (most prominent feature), which may radiate to the forehead, brow, jaw, or sinuses and classically awakens the patient at night. Pain worsens with eye movement and with touch. Gradual or acute onset with red eye. May have tearing, photophobia, or a decrease in vision. Recurrent episodes are common. Scleromalacia perforans (necrotizing scleritis without inflammation) may have minimal symptoms.\n\nSigns\n\nCritical. Inflammation of scleral, episcleral, and conjunctival vessels (scleral vessels are large, deep vessels that cannot be moved with a cotton swab and do not blanch with topical 2.5% or 10% phenylephrine). Can be sectoral, nodular, or diffuse with associated scleral edema. Characteristic violaceous scleral hue (best seen in natural light by gross inspection). Areas of scleral thinning or remodeling may appear with recurrent episodes, allowing the underlying uvea to become visible or even bulge outward.\n\nOther. Scleral nodules, corneal changes (peripheral keratitis, limbal guttering, or keratolysis), glaucoma, uveitis, or cataract.\n\nSigns of Posterior Scleritis. Subretinal granuloma, circumscribed fundus mass, choroidal folds, retinal striae, exudative retinal detachment, optic disc swelling, macular edema, proptosis, or rapid-onset hyperopia.\n\nDifferential Diagnosis\n\n- Episcleritis: Sclera not involved. Blood vessels blanch with topical phenylephrine. Usually more acute onset than scleritis. Patients tend to be younger and have mild symptoms, if any. See [5.6](c05.xhtml#s5-6), Episcleritis.\n- Vogt–Koyanagi–Harada (VKH) disease, choroidal melanoma, metastatic choroidal tumor, and choroidal hemangioma can mimic posterior scleritis.\n- Scleritis associated with other orbital inflammatory foci (myositis, dacryoadenitis, etc.) may be part of idiopathic orbital inflammatory syndrome (IOIS) commonly known as orbital pseudotumor.\n- Orbital cellulitis.\nEtiology\n\nUp to 50% of patients with scleritis have an associated systemic disease, typically connective tissue or vasculitic in nature. Workup indicated if no known underlying disease is present.\n\nMore Common. Connective tissue disease (e.g., rheumatoid arthritis, granulomatosis with polyangiitis, relapsing polychondritis, systemic lupus erythematosus, reactive arthritis, polyarteritis nodosa, ankylosing spondylitis, inflammatory bowel disease), infectious (e.g., Pseudomonas, atypical mycobacteria, fungi, Nocardia, syphilis), trauma including status-post surgery (especially scleral buckle or pterygium surgery with mitomycin-C or beta irradiation), and gout.\n\nLess Common. Varicella zoster, tuberculosis, Lyme disease, other bacteria (e.g., Pseudomonas species with scleral ulceration, Proteus species associated with scleral buckle), sarcoidosis, foreign body, medications (e.g., pembrolizumab), or parasite.\n\nClassification\n\n- Diffuse anterior scleritis: Widespread inflammation of the anterior segment.\n- Nodular anterior scleritis: Immovable inflamed nodule(s) (see Figure 5.7.1).\n- Necrotizing anterior scleritis with inflammation (see Figure 5.7.2): Extreme pain. The sclera becomes transparent (choroidal pigment visible) because of necrosis. High association with systemic inflammatory diseases.\n- Necrotizing anterior scleritis without inflammation (scleromalacia perforans): Typically asymptomatic. Seen most often in older women with long-standing rheumatoid arthritis.\n- Posterior scleritis: May start posteriorly, or rarely be an extension of anterio"}, {"id": "5.8", "chapter_num": "5", "chapter": "Conjunctiva & Lids", "name": "Blepharitis/Meibomitis", "raw": "5.8 Blepharitis/Meibomitis\n\nSymptoms\n\nItching, burning, mild pain, foreign body sensation, tearing, erythema of the eyelids, and crusting around the eyes upon awakening. This is in contrast to dry eye syndrome in which symptoms are usually worse later in the day.\n\nSigns\n\nCritical. Crusty, red, thickened eyelid margins with prominent blood vessels (see Figure 5.8.1) or inspissated oil glands at the eyelid margins (see Figure 5.8.2). Collarettes, and/or cylindrical sleeves around lashes are indicative of Demodex mites.\n\nFigure 5.8.1 Blepharitis with crusting. \n\nFigure 5.8.2 Meibomitis with inspissated meibomian glands. \n\nOther. Conjunctival injection, swollen eyelids, mild mucous discharge, and SPK. Rosacea may be present. Corneal infiltrates, pannus, and phlyctenules may be present.\n\nDifferential Diagnosis\n\n- Pediculosis. See [5.1](c05.xhtml#s5-1), Acute Conjunctivitis.\nEtiology\n\n- Staphylococcal infection\n- Seborrheic dermatitis\n- Demodicosis. Demodex mites may play a role in patients with chronic blepharitis. Look for cylindrical sleeves on lashes. Microscopic evaluation of epilated eyelash is diagnostic.\nTreatment\n\nSee [5.9](c05.xhtml#s5-9), Ocular Rosacea, for treatment options in the presence of acne rosacea.\n\n- Scrub the eyelid margins twice a day with a commercial eyelid scrub or mild shampoo on a washcloth.\n- Warm compresses for 5 to 10 minutes b.i.d. to q.i.d.\n- If associated with dry eyes, use preservative-free artificial tears four to eight times per day.\n- If moderately severe, add erythromycin ointment or azithromycin gel-drop to the eyelids q.h.s.\n- Consider omega-3 fatty acid oral supplementation as well as cyclosporine 0.05–0.1%, or lifitegrast 5% drops b.i.d.\n- Unresponsive meibomitis can be treated with topical ophthalmic antibiotic/steroid ointments (e.g., tobramycin 0.3%/dexamethasone 0.1% or tobramycin 0.3%/dexamethasone 0.05% b.i.d. to t.i.d.). Also consider an oral agent such as doxycycline 100 mg p.o. daily for 1 to 2 weeks; slowly taper to one-fourth full dose and maintain for 3 to 6 months. Oral azithromycin 500 mg/d × 3 days for 3 cycles with 7-day intervals, or 500 mg/d × 1 day followed by 250 mg/d × 4 days, may also be used.\n- If Demodex mite infestation is suspected, due to the presence of collarettes, and patients have failed the above regimen, consider tea-tree oil eyelid scrubs or an eyelid cleansing agent with hypochlorous acid once or twice daily for a minimum of 6 weeks. Lotilaner 0.25% ophthalmic solution twice daily for 6 weeks is very effective for the treatment of Demodex blepharitis.\n- If little improvement has been made, consider thermal treatment to the meibomian glands with expression, intense pulsed light therapy, microblepharoexfoliation, and probing of meibomian glands.\nNOTE: Tetracycline derivatives such as doxycycline should not be used in pregnant women, nursing mothers, or children ≤8 years. Azithromycin (see above) or erythromycin 250 mg p.o. b.i.d. are alternatives in these cases.\n\nNOTE: Use azithromycin with caution in patients with cardiovascular disorders (e.g., QT prolongation, proarrhythmic conditions) or with other drugs that prolong the QT interval.\n\nFollow-Up\n\nTwo to four weeks depending on the severity of presenting symptoms. Eyelid scrubs and warm compresses may be reduced to once daily as the condition improves but may need to be maintained indefinitely.\n\nNOTE: Intractable, unilateral, or asymmetric (not only of eye laterality but also upper versus lower eyelid) blepharitis "}, {"id": "5.9", "chapter_num": "5", "chapter": "Conjunctiva & Lids", "name": "Ocular Rosacea", "raw": "5.9 Ocular Rosacea\n\nSymptoms\n\nBilateral chronic ocular irritation, dry eyes, redness, burning, photophobia, and foreign body sensation. Typically middle-aged adults, but it can be found in children. More common in women. Associated facial symptoms include recurrent facial flushing episodes, persistent midfacial erythema, telangiectasias, and papular skin lesions.\n\nSigns\n\nCritical. Telangiectasias, pustules, papules, or erythema of the cheeks, forehead, and nose. Findings may be subtle especially in heavily pigmented individuals, often best seen under natural light. Superficial or deep corneal vascularization, particularly in the inferior cornea, is sometimes seen and may extend into a stromal infiltrate.\n\nOther. Blepharitis, meibomian gland dysfunction, tear film insufficiency, and a history of recurrent chalazia are common. Conjunctival injection, SPK, phlyctenules, perilimbal infiltrates of staphylococcal hypersensitivity, iritis, or even corneal ulceration and perforation (rare) may occur. Rhinophyma of the nose occurs in the late stages of the disease, especially in men.\n\nDifferential Diagnosis\n\n- Herpes simplex keratitis: Usually unilateral. Stromal keratitis with neovascularization may appear similar. See [4.16](c04.xhtml#s4-16), Herpes Simplex Virus.\n- See [4.1](c04.xhtml#s4-1), Superficial Punctate Keratopathy, for additional differential diagnoses.\n- See [4.23](c04.xhtml#s4-23), Peripheral Corneal Thinning/Ulceration for peripheral ulcerative keratitis associated with systemic disease.\nEtiology\n\nUnknown, however, thought to be an inflammatory condition with immune and vascular dysfunction. Signs and symptoms are often induced by certain environmental/local factors, including hot beverages (e.g., coffee or tea), tobacco, vasodilating medications, alcohol, and emotional stress.\n\nWorkup\n\n- External examination: Look at the face for the characteristic skin findings.\n- Slit-lamp examination: Look for telangiectasias and meibomitis on the eyelids, conjunctival injection, and corneal scarring and vascularization.\nTreatment\n\n- Warm compresses and eyelid hygiene for blepharitis or meibomitis (see [5.8](c05.xhtml#s5-8), Blepharitis/Meibomitis). Treat dry eyes if present (see [4.3](c04.xhtml#s4-3), Dry Eye Syndrome).\n- Avoidance of exacerbating foods, beverages, and environmental factors.\n- Doxycycline 100 mg p.o. b.i.d. for 1 to 2 weeks and then daily; taper the dose slowly once relief from symptoms is obtained. Some patients are maintained on low-dose doxycycline (e.g., 20 to 100 mg p.o. daily or less than daily) indefinitely if the active disease recurs when the patient is off medication. Erythromycin 250 mg b.i.d. to q.i.d. or oral azithromycin 500 mg/d × 3 days for three cycles with 7-day intervals, or 500 mg/d for 1 day followed by 250 mg/d for 4 days, are alternatives if doxycycline is contraindicated.\n- Consider oral omega-3 fatty acid supplements, cyclosporine 0.05% to 0.1%, or lifitegrast 5% drops b.i.d., and topical steroids for chronic rosacea-related ocular and eyelid inflammation (see [5.8](c05.xhtml#s5-8), Blepharitis/Meibomitis).\n- Facial lesions can be treated with metronidazole gel (0.75%) application b.i.d. or azelaic acid gel (15%) application b.i.d.\n- Treat chalazia as needed (see [6.7](c06.xhtml#s6-7), Chalazion/Hordeolum).\n- Corneal perforations may be treated with cyanoacrylate tissue adhesive if small (<1 to 2 mm), whereas larger perforations may require surgical correction. Doxycycline is indicated if there is a "}, {"id": "5.10", "chapter_num": "5", "chapter": "Conjunctiva & Lids", "name": "Mucous Membrane Pemphigoid (Ocular Cicatricial Pemphigoid)", "raw": "5.10 Mucous Membrane Pemphigoid (Ocular Cicatricial Pemphigoid)\n\nSystemic autoimmune disease leading to mucocutaneous inflammation and eventual scarring.\n\nSymptoms\n\nInsidious onset of dryness, redness, blepharospasm, itching, foreign body sensation, tearing, burning, decreased vision, and photophobia. Bilateral involvement. The course is characterized by remissions and exacerbations. Usually occurs in patients older than 55 years. History of frequent epilation for trichiasis prior to diagnosis is common.\n\nSigns\n\nCritical. Inferior symblepharon (linear folds of conjunctiva connecting the palpebral conjunctiva of the lower eyelid to the inferior bulbar conjunctiva), foreshortening and tightness of the lower fornix, and scarring of palpebral conjunctiva on eyelid eversion (see Figure 5.10.1).\n\nFigure 5.10.1 Mucous membrane pemphigoid with symblepharon. \n\nOther. Secondary bacterial conjunctivitis, SPK, and corneal ulcer. Potential later findings include poor tear film, resulting in severe dry eye syndrome; entropion; trichiasis or distichiasis (if present, carefully examine fornices for symblepharon); corneal opacification with pannus, neovascularization, and keratinization; obliteration of the fornices, with eventual limitation of ocular motility; and ankyloblepharon.\n\nSystemic. Mucous membrane (e.g., oropharynx, esophagus, anus, vagina, and urethra) vesicles; scarring or strictures; ruptured or formed bullae; denuded epithelium. Desquamative gingivitis is common. Cutaneous vesicles and bullae may occur, sometimes with erythematous plaques or scars near affected mucous membranes.\n\nBased on clinical findings, the disease can be divided into four stages:\n\n- Stage I—Chronic conjunctivitis with mild corneal involvement.\n- Stage II—Cicatrization with conjunctival shrinkage and foreshortening of fornices.\n- Stage III—Above with the additional presence of symblepharon. Subepithelial scarring leads to distortion of lashes.\n- Stage IV—End stage, with ankyloblepharon and severe corneal involvement (persistent epithelial defects, stromal ulcers, scarring, neovascularization, and diffuse keratinization).\nDifferential Diagnosis\n\n- Stevens–Johnson syndrome (SJS) (erythema multiforme [EM] major) and toxic epidermal necrolysis (TEN): Acute onset, but similar ocular involvement as ocular pemphigoid. Often precipitated by drugs (e.g., sulfa, penicillin, other antibiotics, phenytoin) or infections (e.g., herpes and mycoplasma). See [5.11](c05.xhtml#s5-11), Stevens–Johnson Syndrome (Erythema Multiforme Major).\n- History of membranous conjunctivitis with scarring: Usually adenovirus or beta-hemolytic Streptococcus. See [5.1](c05.xhtml#s5-1), Acute Conjunctivitis and [5.2](c05.xhtml#s5-2), Chronic Conjunctivitis.\n- Severe chemical burns. See [3.1](c03.xhtml#s3-1), Chemical Burn.\n- Chronic topical medicine: Examples include glaucoma medications (especially pilocarpine or phospholine iodide) and antiviral agents.\n- Others: Atopic keratoconjunctivitis, radiation treatment, and squamous cell carcinoma.\nNOTE: Symblepharon is a nonspecific finding and can follow severe conjunctivitis, chemical injury, trauma, radiation exposure, etc. However, symblepharon associated with mucous membrane pemphigoid (MMP)/ocular cicatricial pemphigoid (OCP) is usually progressive.\n\nWorkup\n\n- History: Long-term topical medications? Acute onset of severe systemic illness in the past? Recent systemic medications?\n- Skin and mucous membrane examination.\n- Slit-lamp examination: check for f"}, {"id": "5.11", "chapter_num": "5", "chapter": "Conjunctiva & Lids", "name": "Erythema Multiforme, Stevens–Johnson Syndrome, and Toxic Epidermal Necrolysis", "raw": "5.11 Erythema Multiforme, Stevens–Johnson Syndrome, and Toxic Epidermal Necrolysis\n\nEM is distinct from SJS and TEN. SJS and TEN are considered variants along the same disease spectrum. All three conditions cause mucocutaneous lesions that can involve the eye.\n\nSymptoms\n\nFlu-like prodrome (fever, malaise, arthralgia, dysphagia), red eyes, eye pain/burning, and skin rash.\n\nSigns\n\nSystemic. Classic “target” lesions (central red macule/papule surrounded by concentric circles of a pale/white intermediate zone and outer erythematous rim), atypical “target” lesions, dusky macules, bullous lesions, tender erythematous mucocutaneous lesions involving oral (e.g., ulcerative stomatitis; hemorrhagic lip crusting), GI, respiratory, or genital tracts.\n\nOcular\n\n- Acute phase: Mucopurulent or pseudomembranous conjunctivitis; episcleritis; iritis; corneal punctate erosions, epithelial defects, and ulcers; eyelid margin ulceration.\n- Late complications: Severe dry eye; trichiasis; conjunctival scarring, symblepharon, and ankyloblepharon; eyelid deformities (e.g., entropion); tear deficiency; corneal neovascularization, ulceration, perforation, or scarring.\nTypes\n\n- EM minor: Mainly skin involvement; absent or mild mucosal involvement; no systemic symptoms.\n- EM major: Skin involvement with moderate-to-severe mucosal involvement; usually has systemic symptoms.\nSJS and TEN have severe mucosal involvement and are defined by the body surface area (BSA) of skin detachment.\n\n- SJS: <10% BSA epidermal detachment.\n- SJS–TEN overlap: 10% to 30% BSA epidermal detachment.\n- TEN: >30% BSA epidermal detachment; most severe form with extensive vesiculobullous eruptions and epidermal sloughing. More common in children and immunosuppressed patients.\nEtiology\n\nAn immune complex–mediated hypersensitivity reaction precipitated by many agents.\n\nErythema Multiforme\n\n- Infectious agents (most common): herpes simplex virus, Mycoplasma pneumoniae, and adenovirus.\n- Rarely drug exposure.\nStevens–Johnson Syndrome and Toxic Epidermal Necrolysis\n\n- Drug exposure (most common): Antibiotics (e.g., sulfonamides, penicillins, cephalosporins), anticonvulsants (e.g., carbamazepine, phenytoin, barbiturates), NSAIDs (oxicam type), allopurinol, corticosteroids, and others. Highest risk of reaction occurs during the first 2 months of treatment.\n- Allergy and autoimmune diseases.\n- Genetics: HLA-B15:02 and carbamazepine in Asian populations; HLA-B58:01 and allopurinol.\n- Radiation therapy.\n- Malignancy.\n- Idiopathic (50% of cases).\nWorkup\n\n- History: Attempt to determine the precipitating factor (e.g., drug exposure, recent illness).\n- Slit-lamp examination, including eyelid eversion with examination of the fornices.\n- Conjunctival or corneal cultures if infection is suspected. See [Appendix 8](app1.xhtml#app8), Corneal Culture Procedure.\n- Consult internal medicine for a systemic workup and dermatology for a full-body examination and possible skin biopsy which may aid in the diagnosis.\nTreatment\n\nEM. Supportive care; treat underlying infection if identified.\n\nSJS, TEN\n\n- Hospitalization, often requiring burn unit if available.\n- Remove (e.g., drug) or treat (e.g., infection) the inciting factor.\n- Supportive care is the mainstay of therapy.\n- Comanagement with internal medicine and dermatology.\nOcular\n\n- Ocular surface inflammation: Topical steroid drops (e.g., prednisolone acetate 1% or difluprednate 0.05% four to eight times per day).\n- Tear deficiency: Aggressive lubrication with preserv"}, {"id": "5.12", "chapter_num": "5", "chapter": "Conjunctiva & Lids", "name": "Contact Dermatitis", "raw": "5.12 Contact Dermatitis\n\nSymptoms\n\nSudden onset of a periorbital rash, usually pruritic, and/or eyelid swelling.\n\nSigns\n\nCritical. Periorbital edema, erythema, vesicles, and lichenification of the skin. Conjunctival chemosis out of proportion to injection and papillary response (see Figure 5.12.1).\n\nFigure 5.12.1 Contact dermatitis. \n\nOther. Watery discharge; crusting of the skin may develop.\n\nDifferential Diagnosis\n\n- Varicella zoster virus (shingles): Dermatomal pattern with severe pain. See [4.17](c04.xhtml#s4-17), Herpes Zoster Ophthalmicus/Varicella Zoster Virus.\n- Eczema: Recurrent in nature and is markedly pruritic.\n- Impetigo: Pruritic with honey-colored crusts.\n- Orbital cellulitis or preseptal cellulitis: See [7.3.1](c07.xhtml#s7-3-1), Orbital Cellulitis and [6.9](c06.xhtml#s6-9), Preseptal Cellulitis.\nEtiology\n\nMost commonly eye drops and cosmetics.\n\nTreatment\n\n- Avoid the offending agent(s).\n- Cool compresses four to six times per day.\n- Preservative-free artificial tears four to eight times per day and topical antihistamines (e.g., levocabastine 0.05% q.i.d.).\n- Consider tacrolimus 0.03% to 0.1% q.h.s. or b.i.d. (preferred).\n- Consider a mild steroid ointment (e.g., fluorometholone 0.1%, or loteprednol 0.5%) applied to the periocular area b.i.d. to t.i.d. for 4 to 5 days for skin involvement.\n- Consider an oral antihistamine (e.g., diphenhydramine 25 to 50 mg p.o. t.i.d. to q.i.d.) for several days.\nFollow-Up\n\nRe-examine within 1 week.\n\n"}, {"id": "5.13", "chapter_num": "5", "chapter": "Conjunctiva & Lids", "name": "Conjunctival Tumors", "raw": "5.13 Conjunctival Tumors\n\nThe following are the most common and important conjunctival tumors. See [4.9](c04.xhtml#s4-9), Pterygium/Pinguecula and [4.20](c04.xhtml#s4-20), Phlyctenulosis for discussions on those topics.\n\nAMELANOTIC LESIONS\n\nLimbal Dermoid\n\nA congenital benign tumor, usually located in the inferotemporal quadrant of the limbus but can involve the more central cornea. Lesions are white, solid, fairly well-circumscribed, elevated, and can have hair arising from their surface. May enlarge, particularly at puberty. With time, intracorneal lipid deposition can occur at the leading edge of the dermoid. May be associated with eyelid coloboma, preauricular skin tags, and vertebral abnormalities (Goldenhar syndrome). Surgical removal may be performed for cosmetic or visual purposes, although a white corneal scar may persist postoperatively and cause astigmatism. Penetrating keratoplasty may be needed.\n\nNOTE: The cornea or sclera underlying a dermoid can be very thin or even absent. Penetration of the eye can occur with surgical resection. Ultrasound biomicroscopy (UBM) or anterior segment optical coherence tomography (AS-OCT) may be helpful to determine the depth.\n\nDermolipoma\n\nA congenital benign tumor, usually occurring under the bulbar conjunctiva temporally or superotemporally. Yellow-white, solid tumor. Can have hair arising from its surface and fat within the stroma. High association with Goldenhar syndrome. Surgical removal is generally avoided because of the frequent posterior extension of this tumor into the orbit. If necessary, partial resection of the anterior portion can usually be done.\n\nPyogenic Granuloma\n\nBenign, deep-red, and pedunculated mass. Typically develops at a site of prior surgery, trauma, or chalazion. Consists of exuberant granulation tissue. May respond to topical steroids. A topical steroid–antibiotic combination (e.g., dexamethasone/tobramycin 0.1%/0.3% q.i.d. for 1 to 2 weeks) can be helpful because infection can be present. Excision is required if it persists.\n\nLymphangioma\n\nA slowly progressive benign lesion that appears as a diffuse, multiloculated, and cystic mass. Often congenital but often not detected until years after birth. Seen most commonly between birth and young adulthood, often before 6 years of age. Hemorrhage into the cystic spaces can produce a “chocolate cyst.” Can enlarge, sometimes due to an upper respiratory tract infection. Concomitant eyelid, orbital, facial, nasal, or oropharyngeal lymphangiomas can be present. Surgical excision may be performed for cosmetic or functional purposes, but it often must be repeated because it is difficult to remove the entire tumor with one surgical procedure. Sclerotherapy (intralesional injections of 2 to 4 mg of 1 mg/mL bleomycin administered every 4 weeks depending on clinical response) can lead to involution and fibrosis of the lesion but is reserved for more advanced or chronically recurrent tumors. Lesions often stabilize in early adulthood but do not regress like capillary hemangiomas.\n\nGranuloma\n\nCan occur at any age, predominantly on the tarsal conjunctiva. No distinct clinical appearance, but patients can have an associated embedded foreign body, sarcoidosis, tuberculosis, or another granulomatous disease. For systemic granulomatous diseases (e.g., sarcoidosis), conjunctival granulomas can be an excellent source of diagnostic tissue. Management often includes a course of topical steroids or excisional biopsy.\n\nPapilloma\n\n- Viral: Singl"}, {"id": "5.14", "chapter_num": "5", "chapter": "Conjunctiva & Lids", "name": "Malignant Melanoma of the Iris", "raw": "5.14 Malignant Melanoma of the Iris\n\nMalignant melanoma of the iris can occur as a localized or diffuse pigmented (melanotic) or nonpigmented (amelanotic) lesion.\n\nSigns\n\nCritical. Unilateral brown or translucent iris mass lesion exhibiting slow growth. It is more common in the inferior half of the iris and in light-skinned individuals. Rare in Black patients (see Figure 5.14.1).\n\nFigure 5.14.1 Iris melanoma. \n\nOther. A localized melanoma is usually >3 mm in diameter at the base and >1 mm in depth with a variable prominent feeding vessel. Can produce a sector cortical cataract, ectropion iridis, spontaneous hyphema, seeding of tumor cells into the anterior chamber, or direct invasion of tumor into the trabecular meshwork and secondary glaucoma. A diffuse melanoma causes progressive darkening of the involved iris, loss of iris crypts, angle invasion, and increased IOP. Focal iris nodules can be present.\n\nDifferential Diagnosis\n\nMelanotic Masses\n\n- Nevi: Typically become clinically apparent at puberty, usually flat or minimally elevated (i.e., <1 mm) and uncommonly exceed 3 mm in diameter. Can cause ectropion iridis, sector cortical cataract, or secondary glaucoma. Usually not vascular. More common in the inferior half of the iris. Nevi do not usually grow.\n- Tumors of the iris pigment epithelium: Usually black, in contrast to melanomas, which are often brown or amelanotic. Found on the posterior aspect of the iris.\nAmelanotic Masses\n\n- Metastasis: Grows rapidly. More likely to be multiple or bilateral than melanoma. Frequently liberates cells and produces a pseudohypopyon. Involves the superior and inferior halves of the iris equally.\n- Leiomyoma: Amelanotic and vascular. Difficult to distinguish from an amelanotic melanoma.\n- Iris cyst: Unlike melanoma, most transmit light with transillumination. Can arise from the iris pigment epithelium or within the iris stroma. Each has very different clinical features.\n- Inflammatory granuloma: Sarcoidosis, tuberculosis, juvenile xanthogranuloma, and others. Often have other signs of inflammation such as keratic precipitates, synechiae, and posterior subcapsular cataract. A history of iritis or a systemic inflammatory disease may be elicited. See [Chapter 12](c12.xhtml), Uveitis.\nDiffuse Lesions\n\n- Congenital iris heterochromia: The darker iris is present at birth or in early childhood. It is nonprogressive and usually is not associated with glaucoma. The iris has a smooth appearance. Can be associated with ocular melanocytosis.\n- Fuchs heterochromic iridocyclitis: Asymmetry of iris color, mild iritis in t
