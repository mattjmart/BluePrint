er covers the originally fixating eye during the cover–uncover test. See [Appendix 3](app1.xhtml#app3), Cover/Uncover and Alternate Cover Tests.\n\nOther. Amblyopia, overaction of the inferior oblique muscles, dissociated vertical deviation, and/or latent nystagmus may be present.\n\nDifferential Diagnosis\n\n- Pseudoesotropia: The eyes appear esotropic; however, there is no ocular misalignment detected during cover–uncover or corneal light reflex testing. Usually, the child has a wide nasal bridge, prominent epicanthal folds, or a small interpupillary distance (see Figure 8.6.2).\n- See [8.8](c08.xhtml#s8-8), Strabismus Syndromes.\nFigure 8.6.2 Pseudoesotropia. \n\nTypes\n\nComitant Esotropic Deviations\n\nA manifest convergent misalignment of the eyes in which the measured angle of esodeviation is nearly constant in all fields of gaze at distance fixation.\n\n- Congenital (infantile) esotropia: Manifests by age 6 months. The angle of esodeviation is usually large (>40 prism diopters [PD]) and equal at distance and near fixation. Refractive error is usually normal for age (slightly hyperopic). Amblyopia is uncommon but may be present in those who do not cross-fixate. Prohibits development of binocular vision. Family history may be present. Latent nystagmus, inferior oblique overaction, and dissociated vertical deviation may develop as late findings. Congenital esotropia can occur in up to 30% of children with neurologic and developmental disorders (e.g., cerebral palsy, hydrocephalus); however, it is not necessary to perform a neurologic workup in the absence of other findings. Cycloplegic refraction should be considered first, but treatment is often surgical (in the absence of neurologic delays) when the deviation is stable.\n- Acquired nonaccommodative esotropia: Convergent misalignment of the eyes not corrected by hyperopic lenses that develops after 6 months of age. Typically starts as intermittent but can become constant over time. Esodeviation is comitant and usually smaller (20 to 35 PD) than in congenital esotropia. Patients may experience diplopia. Usually corrected with strabismus surgery once the angle of the esotropia becomes consistent. In children older than 6 years, this must be assumed to be posterior fossa pathology until proven otherwise and worked up with imaging emergently.\n- Accommodative esotropia: Convergent misalignment of the eyes associated with the accommodative reflex. May present at 6 months to 6 years of age with the average age of onset being 2.5 years. Subtypes of accommodative esotropia:\n- Refractive accommodative esotropia (normal accommodative convergence to accommodation [AC/A] ratio): These children have uncorrected hyperopia in the range of +3.00 to +10.00 D (average, +4.75 D). The measured angle of esodeviation is usually moderate (20 to 30 PD) and is relatively equal at distance and near fixation. Full hyperopic correction eliminates the esodeviation. Amblyopia is common at presentation.\n- Nonrefractive accommodative esotropia (high AC/A ratio): The measured angle of esodeviation is greater at near fixation than at distance fixation. The refractive error may range from normal for age (slight hyperopia) to high hyperopia (may be seen in conjunction with refractive-type accommodative esotropia) or even myopia. Amblyopia is common.\n"}, {"id": "8.7", "chapter_num": "8", "chapter": "Pediatrics", "name": "Exodeviations", "raw": "8.7 Exodeviations\n\nSigns\n\n(See Figure 8.7.1.)\n\nFigure 8.7.1 Exotropia. \n\nCritical. Either eye is constantly or intermittently turned outward. On the cover–uncover test, the uncovered eye moves from the outward position to the midline to fixate when the previously fixating eye is covered (see [Appendix 3](app1.xhtml#app3), Cover/Uncover and Alternate Cover Tests).\n\nOther. Amblyopia, “A” pattern deviation (an increased deviation in downgaze compared to upgaze), “V” pattern deviation (an increased deviation in upgaze compared to downgaze), and dissociated vertical deviations.\n\nDifferential Diagnosis\n\nPseudoexotropia: The patient appears to have an exodeviation, but no movement is noted on cover–uncover testing despite good vision in each eye. A wide interpupillary distance, a naturally large angle k (angle between the pupil center and the visual axis), or temporal dragging of the macula (e.g., from ROP, FEVR, toxocariasis, or other retinal disorders) may be responsible.\n\nTypes\n\n- Exophoria: A latent exodeviation controlled by fusion under conditions of binocular vision. Usually asymptomatic, but prolonged strenuous visual activity may cause asthenopia.\n- Intermittent exotropia: A manifest deviation in which one eye demonstrates exodeviation part of the time. The most common type of exodeviation in children. Onset is usually before age 5. Frequency often increases over time. Amblyopia is rare. Usually occurs when the patient is fatigued, sick, or not attentive. Patient often closes one eye or squints in bright sunlight. This is likely due to dissociation and breakdown of their binocular alignment.\n- Clinical evaluation: - The examination should include the following in order: stereopsis, exodeviation control, duction and version, alignment angle, and visual acuity.\n- Exodeviation control can be described as follows:\n- Good control: One eye turns out only after cover testing and the patient is able to regain fusion quickly without blinking or refixating when the cover is removed.\n- Fair control: One eye turns out after cover testing and the patient can only regain fusion with blinking or refixating.\n- Poor control: One eye turns out spontaneously and remains manifest for an extended period of time.\n\n- Good, fair, or poor control can be seen in all four types of intermittent exotropia:\n- Basic: Exodeviation is approximately the same with distance and near fixation.\n- True divergence excess: Exodeviation that remains greater at distance than near after a period of monocular occlusion (rule out high AC/A ratio).\n- Simulated divergence excess: Exodeviation that is initially greater with distance fixation than near that becomes approximately the same after an interval of monocular occlusion.\n- Convergence insufficiency: Exodeviation is greater at near than at distance. Distinct from isolated convergence insufficiency. See [13.5](c13.xhtml#s13-5), Convergence Insufficiency.\n- Constant exotropia: There are four types:\n- Congenital (infantile) exotropia: Presents before age 6 months with a large angle deviation. Uncommon in otherwise healthy infants and may be associated with a CNS or craniofacial disorder.\n- Sensory-deprivation exotropia: An eye that does not see well for any reason may turn outward.\n- Decompensated intermittent exotropia: A patient with long-standing intermittent exotropia that has decompensated.\n- Consecutive exotropia: Follows a diagnosis of esotropia, most commonly after previous surgery for esotropia.\n- Duane syndrome, type 2:"}, {"id": "8.8", "chapter_num": "8", "chapter": "Pediatrics", "name": "Strabismus Syndromes", "raw": "8.8 Strabismus Syndromes\n\nMotility disorders that demonstrate typical features of a particular syndrome.\n\nCongenital Cranial Dysinnervation Disorders with Ocular Motility Abnormalities\n\n- Duane syndrome: A congenital motility disorder, usually unilateral (85%), characterized by limited abduction, limited adduction, or both. The globe retracts and the eyelid fissure narrows on adduction. An upshoot or downshoot may also be seen on attempted adduction, due to vertical slippage of the lateral rectus. In unilateral cases, the strabismus will be incomitant and the patient will often adopt a face turn to allow them to use both eyes together. Sporadic cases may be associated with skeletal, auricular, and neural deficits. Classified into three types:\n- Type 1 (most common): Limited abduction. Primary position frequently esotropia. In unilateral cases, nearly always with face turn toward affected side.\n- Type 2 (least common): Limited adduction. Primary position usually exotropia. In unilateral cases, often with face turn away from affected side.\n- Type 3: Limited abduction and adduction. Esotropia, exotropia, or no primary position deviation. Significant globe retraction.\n- Synergistic divergence: A rare motility disorder often categorized as a type of Duane syndrome with poor/palsied adduction. On attempted adduction, the involved eye abducts even further increasing the exotropia. Associated with COL25A1 mutations.\n- Brown syndrome: A motility disorder characterized by limitation of elevation in adduction. Elevation in abduction is normal. Typically, eyes are aligned in primary gaze, although a vertical diplopia with chin-up head position or face turn can be present. Usually congenital, but may be idiopathic or acquired secondary to trauma, surgery, orbital tumors, or inflammation in the area of the trochlea. Bilateral in 10% of patients.\n- Monocular elevation deficiency (double elevator palsy): Congenital. Unilateral limitation of elevation in all fields of gaze secondary to restriction of the inferior rectus or paresis of the inferior oblique and/or superior rectus. There may be hypotropia of the involved eye that increases in upgaze. Ptosis or pseudoptosis may be present in primary gaze. The patient may assume a chin-up position to maintain fusion if a hypotropia in primary gaze is present.\n- Möbius syndrome: Rare congenital condition associated with both sixth and seventh cranial nerve palsies. Esotropia is usually present. Limitation of abduction and/or adduction. A unilateral or bilateral facial nerve palsy is either partial or complete. Other cranial nerve palsies as well as deformities of the limbs, chest, and tongue may occur.\n- Congenital fibrosis syndrome: Congenital group of disorders with restriction and fibrous replacement of the extraocular muscles. Usually involves all of the extraocular muscles with total external ophthalmoplegia and ptosis. Most commonly, both eyes are directed downward, so the patient assumes a chin-up position to see. Genetic testing is recommended in patients with suspected congenital fibrosis syndrome.\nWorkup\n\n- History: Age of onset? History of trauma? Family history? History of other ocular or systemic diseases?\n- Complete ophthalmic examination, including alignment in all fields of gaze. Note head position. Look for retraction of globe and narrowing of interpalpebral fissure in adduction (common in Duane syndrome).\n- Pertinent physical examination, including cranial nerve evaluation.\n- Radiologic studi"}, {"id": "8.9", "chapter_num": "8", "chapter": "Pediatrics", "name": "Ophthalmia Neonatorum (Newborn Conjunctivitis)", "raw": "8.9 Ophthalmia Neonatorum (Newborn Conjunctivitis)\n\nSigns\n\nCritical. Purulent, mucopurulent, or mucoid discharge from one or both eyes in the first month of life with diffuse conjunctival injection.\n\nOther. Eyelid edema and chemosis.\n\nDifferential Diagnosis\n\n- Dacryocystitis: Swelling and erythema just below the inner canthus. See [6.11](c06.xhtml#s6-11), Dacryocystitis/Inflammation of the Lacrimal Sac.\n- Nasolacrimal duct obstruction: See [8.10](c08.xhtml#s8-10), Congenital Nasolacrimal Duct Obstruction.\n- Congenital glaucoma: See [8.13](c08.xhtml#s8-13), Congenital/Infantile Glaucoma.\nEtiology\n\n- Chemical: Seen within a few hours of instilling a prophylactic agent (e.g., silver nitrate). Lasts no more than 24 to 36 hours. Rarely seen now that erythromycin is used routinely. Topical gentamicin should be avoided since it is associated with a toxic reaction.\n- Neisseria gonorrhoeae: Usually seen within 3 to 4 days after birth. May present with mild conjunctival hyperemia to severe chemosis, copious discharge, rapid corneal ulceration, or corneal perforation. Gram-negative intracellular diplococci seen on Gram stain.\n- Chlamydia trachomatis: Usually seen within 1 to 2 weeks after birth. Presents with mild swelling, hyperemia, tearing, and primarily mucoid discharge. Can progress resulting in increased eyelid swelling and discharge. May form pseudomembranes with bloody discharge. Giemsa stain may show basophilic intracytoplasmic inclusion bodies in conjunctival epithelial cells, polymorphonuclear leukocytes, or lymphocytes. Diagnosis usually made with various molecular tests including immunoassay (e.g., ELISA, enzyme immunoassay, direct antibody tests), polymerase chain reaction (PCR), or DNA hybridization probe.\n- Bacteria: Staphylococci (including methicillin-resistant Staphylococcus aureus), streptococci, and gram-negative species (e.g., Pseudomonas aeruginosa) may be seen on Gram stain.\n- Herpes simplex virus: Initially asymptomatic. May present with a cloudy cornea, conjunctival injection, and tearing. Classic herpetic vesicles on the eyelid margins are not always seen. A corneal dendrite which rapidly progresses to a geographic ulcer may occur. Can see multinucleated giant cells on Giemsa stain.\nWorkup\n\n- History: Ocular medication administration? Previous or concurrent venereal disease in the mother? Were cervical cultures performed during pregnancy?\n- Ocular examination with use of fluorescein staining to look for corneal involvement.\n- Conjunctival scrapings for two slides: Gram and Giemsa stain.\n- Technique: Irrigate the discharge out of the fornices and place a drop of topical anesthetic (e.g., proparacaine) in the eye. Scrape the palpebral conjunctiva of the lower eyelid with a flame-sterilized spatula (once cooled) or with a fresh calcium alginate swab (dry or can be moistened with liquid broth media). Place scrapings on slide (or culture media).\n- Conjunctival cultures with blood and chocolate agars. Technique as described above.\n- Scrape the conjunctiva for the chlamydial immunofluorescent antibody test or PCR, if available.\n- Viral culture: Moisten the applicator and roll it along the palpebral conjunctiva. Place the end of the applicator directly into the viral transport medium and mix vigorously to achieve inoculation.\n- Systemic evaluation by primary care provider.\nTreatment\n\nInitial therapy is based on the results of the Gram and Giemsa stains if immediately available. Therapy is then modified according to the culture r"}, {"id": "8.10", "chapter_num": "8", "chapter": "Pediatrics", "name": "Congenital Nasolacrimal Duct Obstruction", "raw": "8.10 Congenital Nasolacrimal Duct Obstruction\n\nSigns\n\nCritical. Wet-looking eye or tears flowing over the eyelid, moist or dried mucopurulent material on the eyelashes (predominantly medially), and reflux of mucoid or mucopurulent material from the punctum when pressure is applied over the lacrimal sac (where the lower eyelid abuts the nose). The eye is otherwise white. Symptoms usually appear in the first 3 months of life.\n\nOther. Most often unilateral, although can be bilateral ∼20% of the time. Erythema of the surrounding skin, redness and swelling of the medial canthus, and increased size of tear meniscus. May become infected and occasionally spread from the nasolacrimal duct, resulting in conjunctivitis (possibly recurrent). Preseptal cellulitis or dacryocystitis may rarely develop.\n\nDifferential Diagnosis\n\n- Conjunctivitis: See [5.1](c05.xhtml#s5-1), Acute Conjunctivitis.\n- Congenital anomalies of the upper lacrimal drainage system: Atresia of the lacrimal puncta or canaliculus.\n- Dacryocele: Bluish, cystic, firm mass located just below the medial canthal angle. Caused by both distal and proximal obstruction of the nasolacrimal apparatus. Most often presents within the first week of life. Dacryoceles in the first month of life require urgent management as they can lead to serious complications (e.g., sepsis, meningitis).\n- Congenital glaucoma: Classic findings are tearing, blepharospasm, corneal clouding, and a large eye (buphthalmos). See [8.13](c08.xhtml#s8-13), Congenital/Infantile Glaucoma.\n- Other causes of tearing: Entropion/trichiasis, corneal defects, foreign body under the upper eyelid.\nEtiology\n\nUsually the result of a congenitally imperforate membrane at the distal end of the nasolacrimal duct over the valve of Hasner. Notably, there is a higher prevalence in infants born prematurely.\n\nWorkup\n\n- Exclude other causes of tearing, particularly congenital glaucoma. See [8.13](c08.xhtml#s8-13), Congenital/Infantile Glaucoma.\n- Palpate over the lacrimal sac; reflux of mucoid or mucopurulent discharge from the punctum confirms the diagnosis. May also use the dye disappearance test. Place fluorescein in both eyes. Check in 10 minutes; fluorescein can be noted in the nose in a normal eye and will remain pooling in the eye with congenital nasolacrimal duct obstruction.\nTreatment\n\n- Digital pressure to lacrimal sac q.i.d. The parent is taught to place his or her index finger over the child’s common canaliculus (inner corner of the eye) and apply pressure in an inward and downward fashion.\n- Topical antibiotic (e.g., polymyxin/trimethoprim q.i.d.) as needed to control mucopurulent discharge or if conjunctivitis is present.\n- In the presence of acute dacryocystitis (red, swollen lacrimal sac), a systemic antibiotic is needed. See [6.11](c06.xhtml#s6-11), Dacryocystitis/Inflammation of the Lacrimal Sac.\n- Most cases open spontaneously with this regimen by 6 months to 1 year of age. Probing should be considered if the nasolacrimal duct obstruction persists beyond a year of age. Probe earlier if recurrent or persistent infections of the lacrimal system develop. Most obstructions are corrected after the initial probing. If primary probing fails, use of balloon dacryoplasty or silicone tubing placement into the nasolacrimal duct (left in place for weeks to months) may be necessary. Consider dacryocystorhinostomy as a last resort.\nFollow-Up\n\nRoutine follow-up unless surgery is indicated, sooner if the situation worsens or acute dacryocyst"}, {"id": "8.11", "chapter_num": "8", "chapter": "Pediatrics", "name": "Congenital Ptosis", "raw": "8.11 Congenital Ptosis\n\nSigns\n\nCritical. Droopy eyelid(s).\n\nOther. Amblyopia, strabismus, astigmatism, and telecanthus. In unilateral ptosis, the involved eye may not open for the first several days of life.\n\nDifferential Diagnosis\n\n- Simple congenital ptosis: Either unilateral or bilateral. Present at birth and stable throughout life. May have indistinct or absent upper eyelid crease. The levator muscle is fibrotic resulting in reduced levator function (excursion), less ptosis in downgaze, and often lagophthalmos. May have compensatory brow elevation with furrowing, or chin-up head position. Coexisting motility abnormality if from a third cranial nerve palsy.\n- Blepharophimosis syndrome: Blepharophimosis, telecanthus, epicanthal folds, and ptosis. Bilateral and severe. Autosomal dominant with high penetrance (see Figure 8.11.1).\nFigure 8.11.1 Blepharophimosis. \n\n- Marcus Gunn jaw winking: Usually unilateral. Upper eyelid movement with contraction of muscles of mastication, resulting in “winking” while chewing. Upper eyelid crease intact. The ptosis may range from none to severe, but with mastication the levator may lift the eyelid several millimeters above the limbus.\n- Acquired ptosis: See [6.1](c06.xhtml#s6-1), Ptosis.\n- Horner syndrome: Usually unilateral. Typically 2 to 3 mm of ptosis, associated with anisocoria and lower eyelid reverse ptosis (see [10.2](c10.xhtml#s10-2), Horner Syndrome). May be congenital (associated with iris heterochromia) or acquired. Acquired forms in children may be related to birth trauma, chest/neck trauma, or metastatic neuroblastoma.\n- Pseudoptosis: Dermatochalasis, contralateral proptosis, enophthalmos, hypotropia. See [6.1](c06.xhtml#s6-1), Ptosis.\nEtiology\n\nDefective function of either the levator or Müller neuromuscular complexes.\n\nWorkup\n\n- History: Age of onset? Duration? Family history? History of trauma or prior surgery? Any crossing of eyes?\n- Visual acuity for each eye separately, with best correction, to evaluate for amblyopia.\n- Cycloplegic refraction checking for anisometropia and astigmatism which is the most common cause for amblyopia with ptosis.\n- Pupillary examination, including size in bright versus dim light.\n- Ocular motility examination with assessment of head position as well as brow position and action.\n- Measure interpalpebral fissure distance, distance between corneal light reflex and upper eyelid margin, levator function (while manually fixing eyebrow), position and depth of upper eyelid crease. Check for Bell phenomenon and eyelid lag.\n- Exophthalmometry: assess for relative proptosis or enophthalmos.\n- Slit-lamp examination; look for signs of corneal exposure.\n- Dilated fundus examination.\n- If Horner syndrome is suspected, please refer to section [10.2](c10.xhtml#s10-2), Horner Syndrome and work with a pediatrician for proper systemic evaluation and workup.\n- Serial external photographs may be obtained to monitor progression.\nTreatment\n\n- Observation if degree of ptosis is mild, no evidence of amblyopia, and no abnormal head positioning.\n- Primary indications for surgery include amblyopia and ocular torticollis (abnormal head positioning).\n- Simple congenital ptosis: If levator function is poor, consider a frontalis suspension. If levator function is moderate or normal, consider a levator resection.\n- Blepharophimosis syndrome: Ptosis must be repaired by frontalis suspension because of poor levator function. Telecanthus often gets better with time as the head grows and the "}, {"id": "8.12", "chapter_num": "8", "chapter": "Pediatrics", "name": "Pediatric Cataract", "raw": "8.12 Pediatric Cataract\n\nSigns\n\n(See Figure 8.12.1.)\n\nFigure 8.12.1 Pediatric nuclear cataract. \n\nCritical. Opacity of the lens at birth.\n\nOther. A white fundus reflex (leukocoria), absent or asymmetric red pupillary reflex, abnormal eye movements (nystagmus) in one or both eyes, and strabismus. Often appears asymptomatic in infants, delaying diagnosis. Infants with bilateral cataracts may be noted to be visually inattentive. In patients with a monocular cataract, the involved eye may be smaller. A cataract alone does not cause a relative afferent pupillary defect.\n\nDifferential Diagnosis\n\nSee [8.1](c08.xhtml#s8-1), Leukocoria.\n\nEtiology\n\n- Idiopathic (most common)\n- Congenital\n- Familial: Can be autosomal dominant (most common), autosomal recessive, or rarely part of an X-linked recessive Nance–Horan syndrome. Phenotype varies in terms of cataract morphology and timing of clinical onset.\n- Metabolic disease:\n- Galactosemia: Cataract may be the sole manifestation when galactokinase deficiency is responsible. A deficiency of galactose-1-phosphate uridyl transferase may produce intellectual disability and symptomatic cirrhosis along with cataracts. The typical oil droplet opacity may or may not be seen. Incidence and onset of cataract may vary according to type of galactosemia (i.e., mutation of uridyl transferase, galactokinase, or epimerase). Cataract may be reversible with appropriate dietary modifications.\n- PFV: Usually unilateral, very rarely bilateral. The involved eye is usually slightly smaller than the normal fellow eye. Examination after pupil dilatation may reveal a plaque of fibrovascular tissue behind the lens with elongated ciliary processes extending to it. Progression of the lens opacity often leads to angle-closure glaucoma. If bilateral, 90% are associated with systemic abnormalities and require further workup.\n- Rubella: “Pearly white” nuclear cataract, “salt-and-pepper” chorioretinitis, microphthalmos, corneal clouding, and poorly dilating pupils. Glaucoma may occur with congenital rubella but usually does not occur in the presence of a rubella cataract. Associated hearing defects and heart abnormalities are common.\n- Renal syndromes:\n- Lowe syndrome (oculocerebrorenal syndrome): Opaque lens, congenital glaucoma, renal disease, and intellectual disability. X-linked recessive. Patients’ mothers may have small cataracts.\n- Alport syndrome: Glomerulonephritis, hearing loss, eye abnormalities including cataract, anterior lenticonus, and keratoconus. Most commonly X-linked or autosomal recessive.\n- Others: Intrauterine infection, chromosomal disorders, aniridia, systemic syndromes, metabolic abnormalities, craniofacial syndromes, musculoskeletal disorders, and anterior segment dysgenesis.\n- Acquired: Trauma, drugs, uveitis, metabolic/endocrine abnormalities, radiation.\nTypes\n\n- Zonular (lamellar): Most common type of congenital cataract. White opacities that surround the nucleus with alternating clear and white cortical lamella resembling an onion skin.\n- Polar: Small opacities of the lens capsule and adjacent cortex on the anterior or posterior pole of the lens. Anterior polar cataracts usually are small and tend to grow very little over time. They may be associated with anisometropia and anisometropic amblyopia. Posterior polar cataracts are variable and may grow significantly, causing decreased vision.\n- Nuclear: Opacity within the embryonic/fetal nucleus.\n- Posterior lenticonus: A posterior protrusion, usually opacifie"}, {"id": "8.13", "chapter_num": "8", "chapter": "Pediatrics", "name": "Congenital/Infantile Glaucoma", "raw": "8.13 Congenital/Infantile Glaucoma\n\nSigns\n\n(See Figure 8.13.1.)\n\nFigure 8.13.1 Buphthalmos of right eye in congenital glaucoma. \n\nCritical. Enlarged globe and corneal diameter (horizontal corneal diameter >12 mm before age 1 year is suggestive), corneal edema, Haab striae (curvilinear tears in Descemet membrane of the cornea, with scalloped edges with or without associated stromal haze), increased cup/disc ratio, high intraocular pressure (IOP), axial myopia, commonly bilateral (80%). Classic findings are tearing, photophobia, blepharospasm, corneal clouding, and a large eye (buphthalmos).\n\nOther. Corneal stromal scarring or opacification; high iris insertion on gonioscopy; other signs of iris dysgenesis, including heterochromia, may exist.\n\nDifferential Diagnosis\n\n- Megalocornea: Bilateral horizontal corneal diameter usually >13 mm, with normal corneal thickness and endothelium, IOP, and cup/disc ratio. Ratio of anterior chamber depth to axial length >0.19. Iris transillumination defects may be seen. Often X-linked recessive mutation in CHRDL1 and may be associated with developmental delay (Neuhauser syndrome, autosomal recessive).\n- Trauma from forceps during delivery: May produce tears in the Descemet membrane and localized corneal edema; tears are typically vertical or oblique. Corneal diameter is normal. Usually unilateral. High risk for amblyopia.\n- Congenital hereditary endothelial dystrophy: Bilateral full-thickness corneal edema at birth with a normal corneal diameter and axial length. IOP may be falsely elevated by increased corneal thickness and hysteresis but true associated infantile glaucoma has been reported. Autosomal recessive. See [4.26](c04.xhtml#s4-26), Corneal Dystrophies.\n- Posterior polymorphous corneal dystrophy: Rarely presents in infancy; bilateral but asymmetric cloudy edematous corneas with characteristic endothelial abnormalities. Normal corneal diameter, axial length, and IOP, but carries lifetime glaucoma risk. Autosomal dominant. See [4.26](c04.xhtml#s4-26), Corneal Dystrophies.\n- Mucopolysaccharidoses and cystinosis: Some inborn errors of metabolism produce cloudy corneas in infancy or early childhood, usually not at birth. The corneal diameter and axial length are normal. IOP is rarely elevated and, if so, usually later in childhood. Always bilateral.\n- Nasolacrimal duct obstruction: No photophobia, clear, normal corneal size and axial length, and normal IOP. See [8.10](c08.xhtml#s8-10), Congenital Nasolacrimal Duct Obstruction.\n- Large eye without other signs of glaucoma can be seen in overgrowth syndromes (e.g., hemihypertrophy) and phakomatoses (e.g., neurofibromatosis, Sturge–Weber) in the absence of glaucoma (although these diagnoses carry a high risk of glaucoma). May also be autosomal dominant variant without glaucoma.\nEtiology\n\nCommon\n\n- Primary childhood glaucoma: Not associated with other ocular or systemic disorders. Diagnosed after other causes of glaucoma have been ruled out. CYP1B1 mutation may be present. Caused by incomplete differentiation of the trabecular meshwork during embryogenesis (e.g., goniodysgenesis).\n- Secondary childhood glaucoma: Associated with acquired or nonacquired, ocular or systemic conditions, or following pediatric cataract surgery. All children undergoing cataract surgery are at lifelong risk.\nSome Common Systemic and Infectious Etiologies\n\n- Other anterior segment dysgeneses: Axenfeld–Rieger spectrum, Peters anomaly, aniridia, and some phakomatoses such as Sturge–"}, {"id": "8.14", "chapter_num": "8", "chapter": "Pediatrics", "name": "Developmental Anterior Segment and Lens", "raw": "8.14 Developmental Anterior Segment and Lens Anomalies/Dysgenesis\n\nUnilateral or bilateral congenital abnormalities of the cornea, iris, anterior chamber angle, and lens.\n\nMost Common Entities\n\n- Microcornea: Horizontal corneal diameter small for age (<10 mm at age 2 years). May be isolated or associated with microphthalmia, cataract, or nanophthalmos.\n- Posterior embryotoxon: A prominent, anteriorly displaced Schwalbe line. Higher risk for the development of early-onset glaucoma. May be normal or seen in association with Axenfeld–Rieger and Alagille syndromes.\n- Axenfeld–Rieger spectrum: Ranges from posterior embryotoxon and iris strands inserting onto Schwalbe line or the cornea to more severe iris malformations including polycoria and corectopia. Glaucoma develops in 50% of patients. Heterozygous mutations in PITX2 and FOXC1 are most common. May be associated with abnormal teeth (e.g., microdontia, conical teeth, hypodontia), skeletal, cardiac valve and pituitary abnormalities, redundancy of the periumbilical skin, deafness, and intellectual disability (see Figure 8.14.1).\nFigure 8.14.1 Axenfeld–Rieger spectrum. \n\n- Peters anomaly: Central posterior corneal defect with opacity of overlying sclera, may have iris strands to defect (Peters type 1) or adherence of cataractous lens to defect (Peters type 2). Associated with many gene mutations including PAX6, CYP1B1. One-third with systemic abnormalities which warrants a full pediatric workup. “Peters plus” syndrome is characterized by an associated skeletal dysplasia with short stature and intellectual disability (see Figure 8.14.2).\nFigure 8.14.2 Peters anomaly. \n\n- Microspherophakia: The lens is small and spherical in configuration. It can subluxate into the anterior chamber, causing a secondary glaucoma. Can be isolated or seen in association with Weill–Marchesani syndrome (see Figure 8.14.3).\nFigure 8.14.3 Microspherophakia. \n\n- Anterior and posterior lenticonus: An anterior or posterior ectasia of the lens surface, posterior occurring more commonly than anterior. Often associated with cataract. Unilateral or bilateral. Anterior lenticonus is associated with Alport syndrome. Posterior lenticonus is usually isolated but may be autosomal dominant, can also be seen with Lowe syndrome.\n- Ectopia lentis: See [13.2](c13.xhtml#s13-2), Subluxed or Dislocated Crystalline Lens.\n- Ectopia lentis et pupillae: Lens displacement associated with pupillary displacement in the opposite direction. Usually not associated with glaucoma.\n- Aniridia: Bilateral, near-total absence of the iris. Glaucoma, macular hypoplasia, nystagmus, refractive error, and corneal pannus are common. Aniridia is autosomal dominant in two-thirds of patients, with small missense or nonsense mutations in PAX6. Especially in sporadic cases, if PAX6 is deleted as part of a larger chromosomal deletion, it is called WAGR syndrome (Wilms tumor, aniridia, genital abnormalities, intellectual disability). Children with sporadic aniridia have about a 30% chance of Wilms tumor development and require genetic screening as well as renal US.\n- Iris coloboma: failure of embryonic fissure closure. Typically present as inferonasal gap in the iris, but also can involve ciliary body, choroid, retina, and optic nerve.\n- Sclerocornea: Descriptive term applied to nonprogressive, congenital, partially or totally opaque cornea. Unilateral or bilateral. May be mild and peripheral or severe and diffuse. Associated with severe anterior segment dysgenesi"}, {"id": "9.1", "chapter_num": "9", "chapter": "Glaucoma", "name": "Primary Open-Angle Glaucoma", "raw": "9.1 Primary Open-Angle Glaucoma\n\nSymptoms\n\nUsually asymptomatic until the later stages. Symptoms may include visual field defects. Usually bilateral, but can present asymmetrically. Severe field damage and loss of central fixation typically do not occur until late in the disease.\n\nSigns\n\n- Intraocular pressure (IOP): Although many patients will have an elevated IOP (normal range of 10 to 21 mm Hg), nearly half have an IOP of 21 mm Hg or lower at any one screening.\n- Gonioscopy: Anterior chamber angle open to scleral spur. No peripheral anterior synechiae (PAS).\n- Optic nerve: See Figure 9.1.1. Characteristic appearance includes loss of rim tissue (includes notching; increased and/or progressive thinning most commonly inferiorly followed by superiorly, more rarely nasally or temporally), cupping, nerve fiber layer (NFL) defect, splinter or NFL hemorrhage that crosses the disc margin (Drance hemorrhage), acquired pit, cup/disc (C/D) asymmetry >0.2 in the absence of a cause (e.g., anisometropia, different nerve sizes), bayoneting (sharp angulation of the blood vessels at the cupped border), enlarged C/D ratio (>0.6; less specific), progressive enlargement of the cup, and greater disc damage likelihood scale (DDLS) score (see Figure 9.1.2).\nFigure 9.1.1 Primary open-angle glaucoma with advanced optic nerve cupping. \n\nFigure 9.1.2 Disc damage likelihood scale (DDLS). \n\n- Visual fields: Characteristic visual field loss patterns include nasal step, paracentral scotoma, arcuate scotoma extending from the blind spot nasally (defects usually respect the horizontal midline or are greater in one hemifield than the other), altitudinal defect, generalized depression, or temporal wedge (rare) (see Figure 9.1.3).\nFigure 9.1.3 Humphrey visual field showing a superior arcuate defect or scotoma of the left eye. \n\nOther. Large fluctuations in IOP, inter-eye IOP asymmetry >5 mm Hg, β-zone peripapillary atrophy, absence of microcystic corneal edema, and absence of secondary features (e.g., pseudoexfoliation, inflammation, pigment dispersion).\n\nDifferential Diagnosis\n\nIf anterior chamber angle is open on gonioscopy:\n\n- Ocular hypertension: Normal optic nerve and visual field. See [9.3](c09.xhtml#s9-3), Ocular Hypertension.\n- Physiologic optic nerve cupping: Static enlarged C/D ratio without rim notching, NFL thinning or visual field loss. Usually, normal IOP and large optic nerve (>about 2 mm). Often familial.\n- Secondary open-angle glaucoma: Identifiable cause for open-angle glaucoma including inflammatory, exfoliative, pigmentary, steroid-induced, angle recession, traumatic (as a result of direct injury, blood, or debris), and glaucoma related to increased episcleral venous pressure (e.g., Sturge–Weber syndrome, carotid–cavernous fistula), intraocular tumors, degenerated red blood cells (ghost cell glaucoma), lens-induced, degenerated photoreceptor outer segments following chronic rhegmatogenous retinal detachment (Schwartz–Matsuo syndrome), or developmental anterior segment abnormalities.\n- Low-tension glaucoma: Same as primary open-angle glaucoma (POAG) except normal IOP. See [9.2](c09.xhtml#s9-2), Low-Tension Primary Open-Angle Glaucoma (Normal Pressure Glaucoma).\n- Previous glaucomatous damage (e.g., from steroids, uveitis, glaucomatocyclitic crisis, trauma) in which the inciting agent has been removed. Nerve appearance now static.\n- Optic atrophy: Characterized by disproportionally more optic nerve pallor than cupping. IOP usually normal unless a secon"}, {"id": "9.2", "chapter_num": "9", "chapter": "Glaucoma", "name": "Low-Tension Primary Open-Angle Glaucoma (Normal Pressure Glaucoma)", "raw": "9.2 Low-Tension Primary Open-Angle Glaucoma (Normal Pressure Glaucoma)\n\nDefinition\n\nPOAG occurring in patients without IOP elevation.\n\nSymptoms\n\nSee [9.1](c09.xhtml#s9-1), Primary Open-Angle Glaucoma.\n\nSigns\n\nCritical. See Signs in [9.1](c09.xhtml#s9-1), Primary Open-Angle Glaucoma, except IOP is consistently below 22 mm Hg. There is a greater likelihood of optic disc hemorrhages. Visual field defects are denser, more localized, and closer to fixation. A dense nasal paracentral defect is typical.\n\nDifferential Diagnosis\n\nNOTE: If optic nerve changes and atrophy are unrelated to IOP, it is imperative to investigate potential etiologies of an optic neuropathy other than glaucoma.\n\n- POAG: IOP may be underestimated secondary to large diurnal fluctuations or thin corneas. See [9.1](c09.xhtml#s9-1), Primary Open-Angle Glaucoma.\n- Shock-related optic neuropathy from previous episode of systemic hypotension (e.g., acute blood loss, myocardial infarction, coronary artery bypass surgery, arrhythmia). Visual field loss should not progress.\n- Intermittent IOP elevation (e.g., angle-closure glaucoma, glaucomatocyclitic crisis).\n- Previous glaucomatous insult with severe IOP elevation that has subsequently resolved. Nonprogressive (e.g., traumatic glaucoma, steroid-induced glaucoma).\n- Nonglaucomatous optic neuropathy and others. See Differential Diagnosis in [9.1](c09.xhtml#s9-1), Primary Open-Angle Glaucoma.\nEtiology\n\nControversial. Most investigators believe that IOP plays an important role in low-tension POAG. Other IOP-independent proposed etiologies include vascular dysregulation (e.g., systemic or nocturnal hypotension, vasospasm, or loss of autoregulation), microischemic disease, accelerated apoptosis, and autoimmune disease.\n\nWorkup\n\nSee Workup in [9.1](c09.xhtml#s9-1), Primary Open-Angle Glaucoma. Also consider:\n\n- History: Evidence of vasospasm (history of migraine or Raynaud phenomenon)? History of hypotensive crisis (recent surgery), anemia, or heart disease? Prior corticosteroid use by any route? Prior ocular trauma or uveitis? Has the vision loss been acute or chronic? GCA symptoms? Additional cardiovascular risk factors such as elevated cholesterol, hypertension, and systemic hypotension (including nocturnal “dippers” in the early morning hours)?\n- Check color plates to rule out optic neuropathy.\n- Check gonioscopy to rule out angle closure, angle recession, or PAS.\n- Consider obtaining a diurnal measurement of IOP to help confirm the diagnosis.\n- Consider carotid Dopplers to evaluate ocular blood flow. Check blood pressure (consider 24-hour automated blood pressure home monitor).\n- Consider CT or MRI to rule out compressive lesions of the optic nerve or chiasm especially in cases of decreased visual acuity, color plates, optic nerve pallor out of proportion to degree of cupping, asymmetric or unilateral disease, visual fields suggestive of nonglaucomatous process, or age <50 years.\nTreatment\n\n- The Collaborative Normal Tension Glaucoma Study (CNTGS) established treatment guidelines for this entity. IOP lowering by at least 30% reduced the 5-year risk of visual field progression from 35% to 12%, thus target IOPs are at least 30% lower than the level at which progressive damage was occurring. Therapies are those for POAG. See [9.1](c09.xhtml#s9-1), Primary Open-Angle Glaucoma, for a more in-depth discussion of these therapies. There is evidence that initial therapy with brimonidine 0.2% b.i.d. may be superior to timolol 0.5% b.i.d. in"}, {"id": "9.3", "chapter_num": "9", "chapter": "Glaucoma", "name": "Ocular Hypertension", "raw": "9.3 Ocular Hypertension\n\nSigns\n\nCritical. Generally defined as IOP >21 mm Hg on two or more visits. Open anterior chamber angle with normal anatomy on gonioscopy. Apparently normal optic nerve, retinal NFL, and visual field.\n\nDifferential Diagnosis\n\n- POAG. See [9.1](c09.xhtml#s9-1), Primary Open-Angle Glaucoma.\n- Secondary open-angle glaucoma. See [9.1](c09.xhtml#s9-1), Primary Open-Angle Glaucoma.\n- CACG: PAS or iridotrabecular contact are present on gonioscopy with glaucomatous optic nerve and visual field changes. See [9.5](c09.xhtml#s9-5), Chronic Angle Closure Glaucoma.\nWorkup\n\n- See [9.1](c09.xhtml#s9-1), Primary Open-Angle Glaucoma.\n- If any abnormalities are present on formal visual field testing, consider repeat testing in 2 to 4 weeks to exclude the possibility of learning curve artifacts. If the defects are judged to be real, the diagnosis is glaucoma or ocular hypertension along with another pathology accounting for the field loss.\n- OCT and HRT may reveal glaucomatous optic nerve defects. These objective structural tests may show pathology earlier than functional testing (visual fields).\nTreatment\n\n- If there are no suggestive optic nerve or visual field changes and IOP is <24 mm Hg, no treatment other than close observation is usually necessary.\n- Patients with an IOP >24 to 30 mm Hg but with normal examinations are candidates for IOP-lowering therapy (threshold varies per glaucoma specialist). A decision to treat a patient should be based on the patient’s choice to elect therapy and baseline risk factors such as age, CCT, initial IOP, optic nerve appearance, and family history. The results of the Ocular Hypertension Treatment Study showed that treatment reduced the development of visual field loss from 9.5% to 4.4% at 5 years, with a 20% average reduction of IOP. Some clinicians may elect to monitor these patients with close observation. Risk calculators have been developed to approximate the level of risk progression to glaucoma if left untreated. These may help guide clinicians and patients as to whether treatment should be initiated. See [9.1](c09.xhtml#s9-1), Primary Open-Angle Glaucoma.\nFollow-Up\n\nClose follow-up is required for patients being treated and observed. All patients should initially be followed similarly to POAG; see [9.1](c09.xhtml#s9-1), Primary Open-Angle Glaucoma. If there is no progression in the first few years, monitoring frequency can be decreased to every 6 to 12 months. Stopping medication may be considered in patients who have been stable for several years to reassess the need for continued treatment.\n\n"}, {"id": "9.4", "chapter_num": "9", "chapter": "Glaucoma", "name": "Acute Angle Closure Attack", "raw": "9.4 Acute Angle Closure Attack\n\nSymptoms\n\nPain, blurred vision, colored halos around lights, frontal headache, nausea, and vomiting.\n\nSigns\n\n(See Figure 9.4.1.)\n\nFigure 9.4.1 Acute angle closure glaucoma with mid-dilated pupil, shallow anterior chamber, and corneal edema. \n\nCritical. Closed angle in the involved eye, acutely increased IOP, and microcystic corneal edema. Narrow or occludable angle in the fellow eye in cases of primary angle closure.\n\nOther. Conjunctival injection; fixed, mid-dilated pupil.\n\nEtiology of Primary Angle Closure\n\n- Pupillary block: Apposition of the lens and the posterior iris at the pupil leads to blockage of aqueous humor flow from the posterior chamber to the anterior chamber. This mechanism leads to increased posterior chamber pressure, forward movement of the peripheral iris, and subsequent obstruction of the TM. Predisposed eyes have a narrow anterior chamber angle recess, a short axial length, and thick lens. Risk factors include increased age, East Asian descent, female sex, hyperopia, and family history. May be precipitated by topical mydriatics or, rarely, miotics; systemic anticholinergics (e.g., antihistamines and antidepressants); accommodation (e.g., reading); or dim illumination. Fellow eye has similar anatomy.\n- Angle crowding as a result of an abnormal iris configuration including high peripheral iris roll or plateau iris syndrome angle closure. See [9.12](c09.xhtml#s9-12), Plateau Iris.\nEtiology of Secondary Angle Closure\n\n- PAS pulling the angle closed: Causes include uveitis, inflammation, and LT. See [9.5](c09.xhtml#s9-5), Chronic Angle Closure Glaucoma.\n- Neovascular or fibrovascular membrane pulling the angle closed: See [9.13](c09.xhtml#s9-13), Neovascular Glaucoma.\n- Membrane obstructing the angle: Causes include endothelial membrane in iridocorneal endothelial syndrome (ICE) and posterior polymorphous corneal dystrophy (PPCD), epithelial membrane in epithelial downgrowth, and fibrous ingrowth (may follow penetrating trauma). See [9.14](c09.xhtml#s9-14), Iridocorneal Endothelial Syndrome.\n- Lens-induced narrow angles: Iris–TM contact as a result of a large lens (phacomorphic), small lens with anterior prolapse (e.g., microspherophakia), small eye (nanophthalmos), or zonular loss/weakness (e.g., trauma, advanced pseudoexfoliation, Marfan syndrome).\n- Aphakic or pseudophakic pupillary block: Iris bombé configuration secondary to occlusion of the pupil by the anterior vitreous or fibrous adhesions. May also occur with anterior chamber intraocular lenses.\n- Topiramate- and sulfonamide-induced angle closure: Usually after increase in dose or within first 2 weeks of starting medication. Usually bilateral angle closure due to supraciliary effusion and ciliary body swelling with subsequent anterior rotation of the lens–iris diaphragm. Myopia is induced secondary to anterior displacement of ciliary body and lens along with lenticular swelling.\n- Choroidal swelling: Following extensive retinal laser surgery, placement of a tight encircling scleral buckle, retinal vein occlusion, and others.\n- Posterior segment tumor: Malignant melanoma, retinoblastoma, ciliary body tumors, and others. See [11.36](c11.xhtml#s11-36), Choroidal Nevus and Malignant Melanoma of the Choroid.\n- Hemorrhagic choroidal detachment: See [11.27](c11.xhtml#s11-27), Choroidal Effusion/Detachment.\n- Aqueous misdirection syndrome. See [9.16](c09.xhtml#s9-16), Aqueous Misdirection Syndrome/Malignant Glaucoma.\n- Developmental abn"}, {"id": "9.5", "chapter_num": "9", "chapter": "Glaucoma", "name": "Chronic Angle Closure Glaucoma", "raw": "9.5 Chronic Angle Closure Glaucoma\n\nSymptoms\n\nUsually asymptomatic, although patients with advanced disease may present with decreased vision or visual field loss. Intermittent eye pain, headaches, and blurry vision may occur.\n\nSigns\n\n(See Figure 9.5.1.)\n\nFigure 9.5.1 Chronic angle closure glaucoma with peripheral anterior synechiae. \n\nCritical. Gonioscopy reveals broad bands of PAS in the angle in most patients. In some patients there is no PAS, despite having iridotrabecular contact on indentation gonioscopy. The PAS block visualization of the underlying angle structures. Glaucomatous optic nerve and visual field defects.\n\nOther. Elevated IOP.\n\nEtiology\n\nGradual narrowing of the angle with prolonged appositional closure.\n\nProlonged acute angle-closure glaucoma or multiple episodes of subclinical attacks of acute angle closure.\n\nPrevious flat anterior chamber from surgery, trauma, or hypotony that resulted in the development of PAS.\n\nPAS secondary to the chronic uveitis, regressed neovascular glaucoma.\n\nNOTE: While acute angle closure is less common in those of African descent, chronic angle closure is more common in these patients.\n\nWorkup\n\n- History: Presence of symptoms of previous episodes of acute angle closure? History of proliferative diabetic retinopathy, retinal vascular occlusion, or ocular ischemic syndrome? History of prior trauma, hypotony, uveitis, or intraocular surgery?\n- Complete baseline glaucoma evaluation. See [9.1](c09.xhtml#s9-1), Primary Open-Angle Glaucoma.\nTreatment\n\nSee [9.1](c09.xhtml#s9-1), Primary Open-Angle Glaucoma.\n\n- LT is contraindicated in CACG and can induce greater scarring of the angle.\n- Laser iridotomy is indicated to relieve any component of pupillary block and to prevent ongoing development of PAS if closure is not already 360 degrees. Beware of post-laser IOP spikes in these patients whose TM function may be limited.\n- Laser iridoplasty may be performed (and repeated) to decrease the formation of new PAS in those without 360 degrees of PAS. This may not be entirely effective and may serve only as a temporizing measure. If iridoplasty fails and other medical therapy has been maximized, the patient may need surgical intervention. Endoscopic cyclophotocoagulation (ECP) may be attempted in cases with early glaucoma, but trabeculectomy or tube shunt is usually indicated in more advanced cases in addition to removing the cataract. MIGS is usually contraindicated due to closed angle. If intraoperative gonioscopy after cataract extraction shows an open angle, some MIGS such as goniotomy could be considered in mild to moderate cases.\nFollow-Up\n\nSee [9.1](c09.xhtml#s9-1), Primary Open-Angle Glaucoma.\n\n"}, {"id": "9.6", "chapter_num": "9", "chapter": "Glaucoma", "name": "Angle Recession Glaucoma", "raw": "9.6 Angle Recession Glaucoma\n\nSymptoms\n\nUsually asymptomatic. Late stages have visual field or acuity loss. History of hyphema or trauma to the glaucomatous eye can often be elicited. Glaucoma due to angle recession (not from the inciting trauma) usually takes months to years to develop. Typically, unilateral.\n\nSigns\n\n(See Figure 9.6.1.)\n\nFigure 9.6.1 Angle-recession glaucoma with increased width of the ciliary body band. \n\nCritical. Glaucoma (see [9.1](c09.xhtml#s9-1), Primary Open-Angle Glaucoma) in an eye with characteristic gonioscopic findings: an uneven iris insertion, an area of torn or absent iris processes, and a posteriorly recessed iris, revealing a widened ciliary band. The gonioscopic findings may be focal or extend for 360 degrees. Comparison with the contralateral eye can help identify recessed areas.\n\nOther. The scleral spur may appear abnormally white on gonioscopy because of the recessed angle; other signs of previous trauma may be present (e.g., cataract, iris sphincter tears).\n\nDifferential Diagnosis\n\nSee [9.1](c09.xhtml#s9-1), Primary Open-Angle Glaucoma.\n\nWorkup\n\n- History: Trauma? Steroid use? Prior ocular surgery? Family history of glaucoma?\n- Complete baseline glaucoma evaluation. See [9.1](c09.xhtml#s9-1), Primary Open-Angle Glaucoma.\nTreatment\n\nSee [9.1](c09.xhtml#s9-1), Primary Open-Angle Glaucoma. However, miotics (e.g., pilocarpine) may be ineffective or even cause increased IOP by reduction of uveoscleral outflow. ALT and SLT are rarely effective in this condition. Filtering surgery may be necessary if IOP is uncontrolled with medications.\n\nFollow-Up\n\nBoth eyes are monitored closely because of high incidence (∼50%) of delayed open-angle glaucoma in the contralateral eye. Patients with angle recession without glaucoma are examined yearly. Those with glaucoma are examined as detailed in [9.1](c09.xhtml#s9-1), Primary Open-Angle Glaucoma.\n\n"}, {"id": "9.7", "chapter_num": "9", "chapter": "Glaucoma", "name": "Uveitic Glaucoma", "raw": "9.7 Uveitic Glaucoma\n\nSymptoms\n\nPain, photophobia, and decreased vision; symptoms may be minimal.\n\nSigns\n\nCritical. Elevated IOP with uveitis; open angle or PAS on gonioscopy; white blood cells, macrophages, and proteins cause outflow blockage and trabeculitis resulting in elevated IOP. Characteristic glaucomatous optic nerve changes occur late in the disease course. Due to the NFL edema in the acute phase, early on the NFL OCT may look normal despite having glaucomatous optic neuropathy and visual field defect.\n\nOther. Miotic pupil, KP, conjunctival injection, ciliary flush, posterior synechiae, and increased TM pigmentation, especially inferiorly. Angle-closure glaucoma may occur from progressive PAS formation which generally start from inferior angle.\n\nNOTE: Acute IOP increase from any etiology is distinguished from chronic IOP increase by the presence of corneal edema, pain, and visual symptoms.\n\nDifferential Diagnosis\n\n- Steroid-response glaucoma: Open angle. Patient on steroids (including for uveitis). Can be difficult to differentiate from uveitis-induced IOP elevation. If significant inflammation is present, IOP elevation should be assumed inflammatory in nature and goal should be to quiet the eye with steroids. See [9.8](c09.xhtml#s9-8), Steroid-Response Glaucoma.\n- Pigmentary glaucoma: Open angle. Acute increase in IOP, often after exercise or pupillary dilation; pigmented cells in the anterior chamber; 3+ to 4+ TM pigmentation, pigment on the endothelium (Krukenberg spindle) and on the posterior zonules attachment line to lens (Scheie or Zentmayer line), radial iris TIDs. See [9.9](c09.xhtml#s9-9), Pigment Dispersion Syndrome/Pigmentary Glaucoma.\n- Neovascular glaucoma. Nonradial, misdirected blood vessels along the pupillary margin, the TM, or high PAS in regressed NV. See [9.13](c09.xhtml#s9-13), Neovascular Glaucoma.\n- Pseudoexfoliation: Open or closed angle. Grayish-white flaky material deposited throughout anterior segment structures. Classically, European descent, but not always. Occasionally exfoliative material on cornea can be mistaken for KP. Deposits are more angular, less round than inflammatory KP. See [9.10](c09.xhtml#s9-10), Pseudoexfoliation Syndrome/Exfoliative Glaucoma.\n- Fuchs heterochromic iridocyclitis: Unilateral, more common in middle-aged women. Low-grade inflammation with loss of iris pigmented epithelium causing heterochromia (affected eye typically lighter). Fine bridging vessels in the angle are present and may bleed (Amsler sign). Not neovascular. No PAS. See [12.1](c12.xhtml#s12-1), Anterior Uveitis (Iritis/Iridocyclitis).\nEtiology\n\n- Uveitis: Anterior, intermediate, posterior, or panuveitis.\n- Keratouveitis: Herpetic infections are classically associated with unilateral elevated IOP in the setting of early/acute inflammation, whereas other etiologies may cause low IOP from ciliary body shutdown and hyposecretion.\n- Glaucomatocyclitic crisis/Posner–Schlossman syndrome: A rare subtype of inflammatory open-angle glaucoma possibly associated with a viral etiology (e.g., cytomegalovirus), although the mechanism is unknown. Presents as recurrent episodes, typically unilateral, in young to middle-aged patients. IOP is markedly increased (usually 40 to 60 mm Hg) with minimal conjunctival injection, very mild anterior chamber reaction, and an open angle without PAS.\n- After trauma or intraocular surgery.\nWorkup\n\n- History: Previous attacks? Systemic disease (e.g., juvenile idiopathic arthritis, ankylosin"}, {"id": "9.8", "chapter_num": "9", "chapter": "Glaucoma", "name": "Steroid-Response Glaucoma", "raw": "9.8 Steroid-Response Glaucoma\n\nSigns\n\nCritical. Increased IOP with corticosteroid use. Onset typically 2 to 4 weeks after starting ocular (e.g., topical, intravitreal) steroids, though rarely an acute IOP rise can occur within hours in association with systemic use of steroid or adrenocorticotropic hormone.\n\nOther. Signs of POAG may develop. See [9.1](c09.xhtml#s9-1), Primary Open-Angle Glaucoma.\n\nNOTE: Patients with POAG or a predisposition to development of glaucoma (e.g., family history, ocular trauma, diabetes, African descent, high myopia, rheumatologic disease) are more likely to experience a steroid-response and subsequent glaucoma.\n\nDifferential Diagnosis\n\n- POAG. See [9.1](c09.xhtml#s9-1), Primary Open-Angle Glaucoma.\n- Exfoliative glaucoma. See [9.10](c09.xhtml#s9-10), Pseudoexfoliation Syndrome/Exfoliative Glaucoma.\n- Uveitic glaucoma: Because steroids are used to treat ocular inflammation, it may be difficult to determine the cause of increased IOP. See [9.7](c09.xhtml#s9-7), Uveitic Glaucoma.\nEtiology\n\nMost commonly seen with ophthalmic topical, periocular, or intravitreal steroid therapy. However, elevated IOP can occur with all forms of administration (e.g., oral, intravenous, inhalational, nasal, injected, or dermatologic topical formulations), especially with prolonged use. More potent topical steroids (e.g., dexamethasone, difluprednate) more often cause significant IOP elevations compared to those that are less potent (e.g., fluorometholone, loteprednol). IOP typically decreases to pretreatment levels after stopping steroids. The rate of decrease relates to duration of use and severity of the pressure increase. IOP increase is due to reduced outflow facility of the pigmented TM, and when this is severe, the IOP may remain increased for months after steroids are stopped. IOP increase may also be seen with increased inflammation associated with reduction of the steroid medication.\n\nWorkup\n\n- History: Duration of steroid use? Ask about nasal sprays and dermatologic topical medications. Previous intraocular surgery (possible periocular injection)? Previous steroid use or an eye problem from steroid use? Glaucoma or family history of glaucoma? Herpetic keratouveitis? Diabetes? Myopia? Ocular trauma?\n- Complete ocular examination: Look for active or prior inflammation and evaluate the iris and angle (by gonioscopy) to determine the presence NV, pigment suggestive of pigment dispersion syndrome or pseudoexfoliation, blood in Schlemm canal, PAS, etc. Assess the optic nerve.\n- Complete baseline glaucoma evaluation. See [9.1](c09.xhtml#s9-1), Primary Open-Angle Glaucoma.\nTreatment\n\nAny or all of the following may be necessary to reduce IOP:\n\n- Determine if steroid use (in any form) is truly needed. If not needed, stop or taper steroids.\n- Reduce the concentration or dosage of steroid.\n- Change to a steroid with less propensity for IOP elevation (e.g., fluorometholone, loteprednol, or rimexolone).\n- Switch to a topical nonsteroidal anti-inflammatory drug (NSAID) (e.g., ketorolac, flurbiprofen, or diclofenac q.i.d., bromfenac b.i.d., or nepafenac daily).\n- Start antiglaucoma therapy. See [9.7](c09.xhtml#s9-7), Uveitic Glaucoma, for medical therapy options.\n- Consider anterior chamber paracentesis for rapid control when the IOP is determined to be dangerously high for the involved optic nerve (see [Appendix 13](app1.xhtml#app13), Anterior Chamber Paracentesis).\n- LT (e.g., SLT) may be effective in treating select patients.\n- For s"}, {"id": "9.9", "chapter_num": "9", "chapter": "Glaucoma", "name": "Pigment Dispersion Syndrome/Pigmentary", "raw": "9.9 Pigment Dispersion Syndrome/Pigmentary Glaucoma\n\nDefinition\n\nPigment dispersion refers to the release of pigment granules into the anterior chamber. It results from backward bowing of the peripheral iris (reverse pupillary block) with friction between the iris pigment epithelium and the zonular fibers. Pigment is released into the aqueous and deposits in TM, leading to increased IOP and secondary open-angle glaucoma.\n\nSymptoms\n\nMostly asymptomatic but may have blurred vision, eye pain, and colored halos around lights after exercise or pupillary dilation. More common in young adult, myopic men (age 20 to 45 years). Usually bilateral, but asymmetric. May have lattice degeneration and increased risk of a retinal detachment.\n\nSigns\n\n(See Figures 9.9.1 and 9.9.2.)\n\nFigure 9.9.1 Pigment dispersion syndrome with spoke-like iris transillumination defects. \n\nFigure 9.9.2 Pigment dispersion syndrome with a vertical band of endothelial pigment (Krukenberg spindle). \n\nCritical. Midperipheral, spoke-like iris TIDs corresponding to iridozonular contact; open angle with dense pigmentation of the TM for 360 degrees (seen on gonioscopy) in the absence of signs of trauma or inflammation.\n\nOther. A vertical pigment band on the corneal endothelium typically just inferior to the visual axis (Krukenberg spindle); pigment deposition on the posterior zonular-lens attachment line (Zentmayer line or Scheie line), on the anterior hyaloid face, slightly anterior to Schwalbe line (Sampaolesi line), and sometimes on the anterior surface of the iris (which can produce iris heterochromia). The angle often shows a wide ciliary body band with 3+ to 4+ pigmentation of the posterior TM, homogenous for 360 degrees. Pigmentary glaucoma is characterized by pigment dispersion syndrome plus glaucomatous optic neuropathy. Typically, large fluctuations in IOP can occur, during which pigment cells may be seen floating in the anterior chamber.\n\nDifferential Diagnosis\n\n- Exfoliative glaucoma: Iris TIDs may be present but are near the pupillary margin and are not radial. White, flaky material may be seen on the pupillary border, anterior lens capsule, and corneal endothelium. TM is highly pigmented but in a “splotchy” pattern, often with pigment anterior to Schwalbe line (also seen in PDS). See [9.10](c09.xhtml#s9-10), Pseudoexfoliation Syndrome/Exfoliative Glaucoma.\n- Uveitic glaucoma: White blood cells and flare in the anterior chamber; no radial iris TIDs; often PAS on gonioscopy. TM pigment concentrated inferiorly. See [9.7](c09.xhtml#s9-7), Uveitic Glaucoma.\n- Iris melanoma: Pigmentation of the angular structures accompanied by either a raised, pigmented lesion on the iris or a diffusely darkened iris. No iris TIDs. See [5.14](c05.xhtml#s5-14), Malignant Melanoma of the Iris.\n- Irradiation: Induces atrophy and depigmentation of the ciliary processes with increased TM pigment deposition.\n- Postoperative pigment liberation after posterior chamber intraocular lens implantation.\n- Siderosis.\n- Iris chafe with sulcus intraocular lens (IOL): Iris TIDs outlining the haptics may be seen.\n- Bilateral acute depigmentation of the iris: Acute-onset bilateral iris depigmentation, pigment dispersion in the anterior chamber, and heavy pigmentation of the TM. Occurs after a flu-like illness, upper respiratory tract infection, and after the use of oral moxifloxacin. Usually symmetric (pigment dispersion syndrome is typically asymmetric).\nWorkup\n\n- History: Previous episodes of decreased vis"}, {"id": "9.10", "chapter_num": "9", "chapter": "Glaucoma", "name": "Pseudoexfoliation Syndrome/Exfoliative", "raw": "9.10 Pseudoexfoliation Syndrome/Exfoliative Glaucoma\n\nDefinition\n\nA systemic disorder in which grayish-white exfoliation material, along with pigment released from the iris sphincter region, block the TM and raise the IOP. Up to 44% of patients with pseudoexfoliation syndrome may require glaucoma treatment over time. Pseudoexfoliation is the most common secondary glaucoma in those of European descent, but can be seen in nearly all ethnic groups.\n\nSymptoms\n\nUsually asymptomatic in its early stages. Unlike POAG, more often asymmetric at presentation.\n\nSigns\n\n(See Figures 9.10.1 and 9.10.2.)\n\nFigure 9.10.1 Pseudoexfoliation syndrome with white material on pupillary margin. \n\nFigure 9.10.2 Pseudoexfoliation syndrome with white material on anterior lens capsule. \n\nCritical. White, flaky material on the pupillary margin; anterior lens capsular changes (central zone of exfoliation material, often with rolled-up edges, middle clear zone, and a peripheral cloudy zone); peripupillary iris TIDs; and glaucomatous optic neuropathy. Bilateral, but often asymmetric.\n\nOther. Irregular dark pigment deposition on the TM more marked inferiorly than superiorly; black scalloped deposition of pigment anterior to Schwalbe line (Sampaolesi line) seen on gonioscopy, especially inferiorly. White, flaky material may be seen on the corneal endothelium, which may have a lower-than-normal endothelial cell density; can look like angular, irregular KP. Iris atrophy. Poor pupillary response to dilation (with more advanced cases, believed to be secondary to iris dilator muscle atrophy). Incidence increases with age. Zonular laxity can lead to anterior lens dislocation, angle narrowing, and secondary angle closure.\n\nDifferential Diagnosis\n\n- Inflammatory glaucoma: Corneal endothelial deposits can be present in both exfoliative and uveitic glaucoma. Typically, IOP is highly volatile in both. The ragged volcano-like PAS of some inflammatory glaucomas are not seen in the exfoliation syndrome, but angle closure due to zonular instability can occur. Photophobia is common with uveitis. See [9.7](c09.xhtml#s9-7), Uveitic Glaucoma.\n- Pigmentary glaucoma: Midperipheral iris TIDs. Pigment on corneal endothelium and posterior equatorial lens surface. Deep anterior chamber angle. Myopia. See [9.9](c09.xhtml#s9-9), Pigment Dispersion Syndrome/Pigmentary Glaucoma.\n- Capsular delamination (true exfoliation): Trauma, exposure to intense heat (e.g., glass blower), or severe uveitis can cause a thin membrane to peel off the anterior lens capsule. Glaucoma uncommon.\n- Primary amyloidosis: Amyloid material can deposit along the pupillary margin or anterior lens capsule. Glaucoma can occur.\n- Uveitis/glaucoma/hyphema (UGH) syndrome: Prior surgery. See [9.15.3](c09.xhtml#s9-15-3), Uveitis, Glaucoma, Hyphema Syndrome.\nWorkup\n\n- History: Family history.\n- Slit-lamp examination. Look for white, flaky material along the pupillary margin, peripapillary TIDs; often need to dilate the pupil to see anterior lens capsular changes.\n- Perform baseline glaucoma evaluation. See [9.1](c09.xhtml#s9-1), Primary Open-Angle Glaucoma.\nTreatment\n\n- For medical and surgical therapy, see [9.1](c09.xhtml#s9-1), Primary Open-Angle Glaucoma. LT can be particularly effective, pseudoexfoliation glaucoma patients may have increased risk of post-laser IOP elevation.\n- The course of exfoliative glaucoma is nonlinear. Early, the condition may be benign. However, pseudoexfoliation is associated with highly volatile IOP. Onc"}, {"id": "9.11", "chapter_num": "9", "chapter": "Glaucoma", "name": "Lens-Related Glaucoma", "raw": "9.11 Lens-Related Glaucoma\n\n9.11.1 PHACOLYTIC GLAUCOMA\n\nDefinition\n\nLeakage of lens material through an intact lens capsule obstructs outflow channels (typically in the presence of a hypermature cataract).\n\nSymptoms\n\nPain, decreased vision (despite poor vision from cataract, increased blurring may be noticeable), tearing, red eye, and photophobia.\n\nSigns\n\nCritical. Markedly increased IOP, accompanied by iridescent particles and white material in the anterior chamber or on anterior surface of lens capsule. No KP. A mature or hypermature (liquefied, Morgagnian) cataract is typical. May occur less commonly in presence of an immature cataract with liquefaction of the posterior cortex. Pain is usually severe.\n\nOther. Microcystic corneal edema, anterior chamber cell and flare (cells may be larger than typical uveitic white blood cells), pseudohypopyon, and severe conjunctival injection. Gonioscopy reveals open anterior chamber angles. Clumps of macrophages may be seen in the inferior angle.\n\nDifferential Diagnosis\n\nAll of the following can produce an acute increase in IOP to high levels, but none display iridescent particles in the anterior chamber:\n\n- Inflammatory glaucoma. See [9.7](c09.xhtml#s9-7), Uveitic Glaucoma.\n- Acute angle-closure glaucoma. See [9.4](c09.xhtml#s9-4), Acute Angle Closure Attack.\n- Lens particle glaucoma. See [9.11.2](c09.xhtml#s9-11-2), Lens Particle Glaucoma.\n- Infectious endophthalmitis. See [12.14](c12.xhtml#s12-14), Acute Postoperative Endophthalmitis and [12.15](c12.xhtml#s12-15) Subacute and Chronic Postoperative Endophthalmitis.\n- Glaucoma secondary to intraocular tumor: May have unilateral cataract.\n- Others: Traumatic glaucoma, ghost cell glaucoma, phacomorphic glaucoma, phacoantigenic (formerly phacoanaphylaxis) glaucoma, neovascular glaucoma, and others.\nWorkup\n\n- History: Longstanding poor vision (chronic/mature cataract)? Recent trauma or ocular surgery? Recurrent episodes? Prior uveitis?\n- Slit-lamp examination: Look for iridescent or white particles as well as cell and flare in the anterior chamber. Measure IOP. Evaluate the cataract and lens capsule. Look for signs of trauma. Note, the lens capsule is intact in this diagnosis.\n- Gonioscopy of the anterior chamber angles of both eyes. Topical glycerin may be placed on the cornea, after topical anesthesia, to temporarily clear any edema.\n- Retinal and optic disc examination if possible. Otherwise, B-scan US before cataract extraction to rule out intraocular tumor or retinal detachment.\n- If the diagnosis is in doubt, an anterior chamber paracentesis can be performed to detect macrophages bloated with lens material on microscopic examination (see [Appendix 13](app1.xhtml#app13), Anterior Chamber Paracentesis).\nTreatment\n\nThe immediate goal of therapy is to reduce the IOP and inflammation. The cataract should be removed promptly (within several days).\n\n- Medical therapy options include:\n- Topical β-blocker (e.g., timolol 0.5% daily or b.i.d.), α2 agonist (e.g., brimonidine 0.1% to 0.2% b.i.d. to t.i.d.), and/or topical CAI (e.g., dorzolamide 2% t.i.d.).\n- Systemic CAI (e.g., acetazolamide 500 mg sequel p.o. b.i.d.). Benefit of maintaining topical CAI in addition to a systemic agent is controversial.\n- Topical cycloplegic (e.g., cyclopentolate 1% t.i.d.).\n- Topical steroid (e.g., prednisolone acetate 1% every 15 minutes for four doses then q1h).\n- Hyperosmotic agent if necessary and no contraindications are present (e.g., mannitol, 1 to 2 g/kg i.v. over 45"}, {"id": "9.12", "chapter_num": "9", "chapter": "Glaucoma", "name": "Plateau Iris", "raw": "9.12 Plateau Iris\n\nSymptoms\n\nUsually asymptomatic, unless acute angle-closure glaucoma develops. See [9.4](c09.xhtml#s9-4), Acute Angle Closure Attack.\n\nSigns\n\nCritical. Persistent appositional angle after laser iridotomy (see [9.4](c09.xhtml#s9-4), Acute Angle Closure Attack).\n\nDifferential Diagnosis\n\n- Acute angle-closure glaucoma associated with pupillary block: The central anterior chamber depth is decreased, but more pronounced peripheral shallowing with iris bombé, giving the iris a convex appearance. See [9.4](c09.xhtml#s9-4), Acute Angle Closure Attack.\n- Aqueous misdirection syndrome: Marked diffuse shallowing of the anterior chamber both centrally and peripherally, often after cataract extraction or glaucoma surgery. See [9.16](c09.xhtml#s9-16), Aqueous Misdirection Syndrome/Malignant Glaucoma.\n- For other disorders, see [9.4](c09.xhtml#s9-4), Acute Angle Closure Attack.\nTypes\n\n- Plateau iris configuration: Because of the anatomic configuration of the angle, acute angle-closure glaucoma can develop from only a mild degree of pupillary block. These angle closure attacks may be treated with a laser PI to break any component of pupillary block but this is not curative.\n- Plateau iris syndrome: The peripheral iris can bunch up in the anterior chamber angle and obstruct aqueous outflow without any element of pupillary block. The plateau iris syndrome is present when the angle closes and the IOP rises after dilation, despite a patent PI, and in the absence of phacomorphic glaucoma. UBM findings are characterized by an anteriorly rotated ciliary body. See Figure 9.12.1.\nFigure 9.12.1 Ultrasound biomicroscopy of a plateau iris. \n\nWorkup\n\n- Slit-lamp examination: Specifically check for the presence of a patent PI and the critical signs listed previously.\n- Measure IOP.\n- Gonioscopy of both anterior chamber angles. “Double hump sign” on indentation gonioscopy is critical where the iris drapes over the lens more centrally near the pupil, then falls back over the zonular area, and is again forward and appositional in the angle.\n- Undilated optic nerve evaluation.\n- Can be assessed by UBM.\nNOTE: If dilation must be performed in a patient suspected of having a plateau iris, warn the patient that this may provoke an acute angle closure attack. The preferred agent is 0.5% tropicamide. Recheck the IOP every few hours until the pupil returns to normal size. Have the patient notify you immediately if symptoms of acute angle closure develop.\n\nTreatment\n\nIf acute angle closure is present:\n\n- Treat medically. See [9.4](c09.xhtml#s9-4), Acute Angle Closure Attack.\n- A laser PI is performed within 1 to 3 days if the angle closure attack can be broken medically. If the attack cannot be controlled, a laser or surgical PI may need to be done as an emergency procedure. Consider a laser iridoplasty to break an acute attack not responsive to medical treatment and PI.\n- One week after the laser PI, gonioscopy should be repeated prior to dilating the eye with a weak mydriatic (e.g., tropicamide 0.5%). If the IOP increases or a spontaneous angle closure episode occurs, plateau iris syndrome is diagnosed and can be treated with an iridoplasty. Second-line therapy includes chronic instillation of a weak miotic agent (e.g., pilocarpine 0.5% to 1% t.i.d. to q.i.d.).\n- If the patient’s IOP does respond to a laser PI (e.g., plateau iris configuration), then a prophylactic laser PI may be indicated in the contralateral eye within 1 to 2 weeks.\nIf acute angle closure"}, {"id": "9.13", "chapter_num": "9", "chapter": "Glaucoma", "name": "Neovascular Glaucoma", "raw": "9.13 Neovascular Glaucoma\n\nDefinition\n\nGlaucoma caused by a fibrovascular membrane overgrowing the anterior chamber angle structures. Initially, despite an open appearance on gonioscopy, the angle may be blocked by the membrane. The fibrovascular membrane eventually contracts, causing PAS formation and secondary angle-closure glaucoma. Rarely, it may have NV of the angle without NV of the iris (NVI) at the pupillary margin. Ischemia-driven vascular endothelial growth factor (VEGF) released from a variety of causes results in the formation of the fibrovascular membrane.\n\nSymptoms\n\nMay be asymptomatic or include pain, redness, photophobia, and decreased vision.\n\nSigns\n\n(See Figures 9.13.1 and 9.13.2.)\n\nFigure 9.13.1 Iris neovascularization. \n\nFigure 9.13.2 Neovascularization of the angle. \n\nCritical\n\n- Stage 1: Nonradial, misdirected blood vessels along the pupillary margin, the TM, or both. No signs of glaucoma. Normal iris blood vessels run radially and are typically symmetric.\n- Stage 2: Stage 1 plus increased IOP (open-angle neovascular glaucoma).\n- Stage 3: Partial or complete angle-closure glaucoma caused by a fibrovascular membrane pulling the iris well anterior to the TM (usually at the level of Schwalbe line). NVI is common.\nOther. Mild anterior chamber cell and flare, conjunctival injection, corneal edema with acute IOP increase, hyphema, eversion of pupillary margin allowing visualization of iris pigment epithelium (ectropion uveae), optic nerve cupping, and visual field loss.\n\nDifferential Diagnosis\n\n- Inflammatory glaucoma: Anterior chamber cell and flare, dilated normal iris blood vessels may be seen. Open angle with no NV. See [9.7](c09.xhtml#s9-7), Uveitic Glaucoma.\n- Primary acute angle-closure glaucoma. See [9.4](c09.xhtml#s9-4), Acute Angle Closure Attack.\nEtiology\n\n- Diabetic retinopathy with retinal ischemia. See [11.12](c11.xhtml#s11-12), Diabetic Retinopathy.\n- Central retinal vein occlusion, particularly the ischemic type. See [11.8](c11.xhtml#s11-8), Central Retinal Vein Occlusion.\n- Central retinal artery occlusion. See [11.6](c11.xhtml#s11-6), Central Retinal Artery Occlusion.\n- Ocular ischemic syndrome (carotid occlusive disease). See [11.11](c11.xhtml#s11-11), Ocular Ischemic Syndrome/Carotid Occlusive Disease.\n- Others: Branch retinal vein occlusion, branch retinal artery occlusion, chronic uveitis, chronic retinal detachment, intraocular tumors, trauma, other ocular vascular disorders, radiation therapy, and chronic long-standing increased IOP (e.g., neglected angle-closure glaucoma). See specific sections.\nWorkup\n\n- History: Determine underlying etiology.\n- Complete ocular examination, including IOP measurement and gonioscopy to evaluate degree of angle closure, if any. A dilated retinal examination is essential in determining the etiology and for disc evaluation.\n- Fluorescein angiography as needed to identify an underlying retinal abnormality or in preparation for panretinal photocoagulation (PRP).\n- Carotid Doppler studies to rule out stenosis when no retinal etiology is identified.\n- B-scan US or UBM as indicated when the retina cannot be visualized to rule out an intraocular tumor or retinal detachment.\nTreatment\n\n- Reduce inflammation and pain: Topical steroid (e.g., prednisolone acetate 1% q1–6h) and a cycloplegic (e.g., atropine 1% t.i.d.).\n- Reduce the IOP if it is increased (markedly high IOP is not uncommon). Where visual potential is good and cupping advanced, a lower target IOP may be appropria"}, {"id": "9.14", "chapter_num": "9", "chapter": "Glaucoma", "name": "Iridocorneal Endothelial Syndrome", "raw": "9.14 Iridocorneal Endothelial Syndrome\n\nDefinition\n\nThree overlapping syndromes—essential iris atrophy, Chandler, and iris nevus (Cogan–Reese)—that share an abnormal corneal endothelial cell layer, which can grow across the anterior chamber angle. Secondary angle closure can result from contraction of this membrane.\n\nSymptoms\n\nAsymptomatic early. Later, the patient may note an irregular pupil or iris appearance, blurred vision, monocular diplopia, or pain if IOP increases or corneal edema develops. Usually unilateral and most common in patients 20 to 50 years of age. More common in women. Sporadic in presentation.\n\nSigns\n\n(See Figure 9.14.1.)\n\nFigure 9.14.1 Essential iris atrophy. \n\nCritical. Corneal endothelial changes (fine, beaten-bronze appearance); microcystic corneal edema; localized, irregular, high PAS that often extend anterior to Schwalbe line; deep central anterior chamber; iris alterations as follows:\n\n- Essential iris atrophy: Marked iris thinning leading to iris holes with displacement and distortion of the pupil (corectopia). Usually good prognosis.\n- Chandler syndrome: Mild iris thinning and corectopia. The corneal and angle changes are most marked in this variant. Degree of findings is highly variable. Patients often have corneal edema even at normal IOP. Accounts for about 50% of ICE syndrome cases. Variable prognosis.\n- Iris nevus/Cogan–Reese syndrome: Pigmented nodules (not true nevi) on the iris surface, variable iris atrophy. Similar changes may be seen in Chandler syndrome and essential iris atrophy, resulting from contraction of the membrane over the iris, constricting around small islands of iris tissue. Usually poor prognosis.\nOther. Corneal edema, elevated IOP, optic nerve cupping, or visual field loss. Glaucoma is nearly always unilateral; occasional mild corneal changes may be seen in the fellow eye.\n\nDifferential Diagnosis\n\n- Axenfeld–Rieger spectrum: Bilateral. Prominent, anteriorly displaced Schwalbe line (posterior embryotoxon); peripheral iris strands extending to (but not anterior to) Schwalbe line; iris thinning with atrophic holes. See [8.14](c08.xhtml#s8-14), Developmental Anterior Segment and Lens Anomalies/Dysgenesis.\n- PPCD: Bilateral. Endothelial vesicles or band-like lesions, occasionally associated with iridocorneal adhesions, corneal edema, and glaucoma. No PAS. Autosomal dominant. See [4.26](c04.xhtml#s4-26), Corneal Dystrophies.\n- Fuchs endothelial dystrophy: Bilateral corneal edema and endothelial guttae. Normal iris and angle. See [4.27](c04.xhtml#s4-27), Fuchs Endothelial Dystrophy.\n- Prior uveitis with pigmented KP and posterior synechiae.\n- Iridoschisis: Usually bilateral separation of iris into an anterior and posterior layer.\nWorkup\n\n- Family history: ICE syndrome is not inherited, Axenfeld–Rieger spectrum and PPCD are usually autosomal dominant.\n- Perform baseline glaucoma evaluation. See [9.1](c09.xhtml#s9-1), Primary Open-Angle Glaucoma. Careful attention should be given to cornea and iris evaluation.\n- Corneal endothelial specular microscopy can help confirm the diagnosis. Specular microscopy may demonstrate endothelial cell loss, pleomorphism, rounded shape, and large size with central bright spot “light-dark reversal” (“ICE-cells”).\n- Consider UBM to evaluate anterior chamber angle structures, particularl
