g topical epinephrine, dipivefrin, or prostaglandin analogs?\n- Complete ocular examination, including gonioscopy to rule out the presence of retained lens fragments following cataract surgery and haptic malposition of implanted anterior chamber intraocular lens. Thorough peripheral fundus evaluation (scleral depression inferiorly may help to detect pars planitis). Macular examination is best performed with a slit lamp and a handheld lens.\n- IVFA shows early leakage of perifoveal capillaries and late macular staining, classically in a petaloid or spoke-wheel pattern. Optic nerve head leakage is sometimes observed (particularly in inflammatory conditions such as Irvine–Gass syndrome). Fluorescein leakage does not occur in select cases of pseudo-CME (see above).\n- OCT will confirm the presence of CME, quantify the degree of edema and help guid"}, {"id": "11.15", "chapter_num": "11", "chapter": "Retina", "name": "Central Serous Chorioretinopathy", "raw": "11.15 Central Serous Chorioretinopathy\n\nSymptoms\n\nCentral scotoma, blurred or dim vision, objects may appear distorted (metamorphopsia) and miniaturized (micropsia), colors may appear faded. Usually unilateral, but can be bilateral (more likely in older patients, may not be symptomatic at the same time). May be asymptomatic.\n\nSigns\n\n(See Figure 11.15.1.)\n\nFigure 11.15.1 Central serous chorioretinopathy. \n\nCritical. Localized serous detachment of the neurosensory retina in the macula without subretinal blood or lipid exudates. The margins of the detachment are sloping and merge gradually into the attached retina.\n\nOther. Visual acuity usually ranges from 20/20 to 20/200. Amsler grid testing reveals relative scotoma and distortion of straight lines. May have a small serous RPE detachment or subretinal fibrin. Focal RPE changes may indicate sites of previous episodes. (Neither blood or lipid should be present. If so, CNV should be ruled out.)\n\nDifferential Diagnosis\n\nThese entities may produce a serous detachment of the neurosensory retina in the macula.\n\n- AMD: Patient usually ≥50 years old, drusen, pigment epithelial alterations, may have choroidal (subretinal) neovascularization, often bilateral. See [11.16](c11.xhtml#s11-16), Nonexudative (Dry) Age-Related Macular Degeneration and [11.17](c11.xhtml#s11-17), Neovascular or Exudative (Wet) Age-Related Macular Degeneration.\n- Optic pit: The optic disc has a small defect (a pit) in the nerve tissue. A serous RD may be present, contiguous with the optic disc. See [11.34](c11.xhtml#s11-34), Optic Pit.\n- Macular detachment as a result of an RRD or macular hole: In RRD, a hole in the retina can be found. See [11.3](c11.xhtml#s11-3), Retinal Detachment and [11.25](c11.xhtml#s11-25), Vitreomacular Adhesion/Vitreomacular Traction/Macular Hole.\n- Choroidal tumor, particularly choroidal hemangioma: See [11.36](c11.xhtml#s11-36), Choroidal Nevus and Malignant Melanoma of the Choroid.\n- HTN: See [11.10](c11.xhtml#s11-10), Hypertensive Retinopathy.\n- Pigment epithelial detachment (PED): The margins of a PED are more distinct than those of CSCR, and the RPE is elevated. Occasionally, PED may accompany CSCR or AMD.\n- Others: Idiopathic choroidal effusion, inflammatory choroidal disorders, and chronic renal failure.\nEtiology\n\n- Idiopathic: Most common in young adult to middle-aged men. In women, CSCR has an association with pregnancy. Increased incidence in patients with lupus.\n- Increased endogenous cortisol: This might explain a possible association with psychological or physiologic stress (type A personality). Rare cases exist with cortisol producing adrenal adenomas or Cushing syndrome.\n- Exogenous cortisol: Corticosteroid use, including nasal corticosteroid sprays and topical creams.\nWorkup\n\n- Amsler grid test to document the area of field involved. See [Appendix 4](app1.xhtml#app4), Amsler Grid.\n- Slit-lamp examination of the macula with a handheld lens to rule out concomitant CNV. In addition, search for an optic pit of the disc.\n- Dilated fundus examination with indirect ophthalmoscopy to rule out a choroidal tumor or RRD.\n- OCT is helpful in demonstrating SRF or PEDs and for monitoring purposes. Enhanced-depth imaging OCT often demonstrates choroidal thickening and may be a useful adjunct in diagnosis (see Figures 11.15.2 and 11.15.3).\n- IVFA and ICGA if the diagnosis is uncertain or presentation atypical, CNV is suspected, or laser treatment is to be considered. IVFA shows the nearly pathognomo"}, {"id": "11.16", "chapter_num": "11", "chapter": "Retina", "name": "Nonexudative (Dry) Age-Related Macular", "raw": "11.16 Nonexudative (Dry) Age-Related Macular Degeneration\n\nSymptoms\n\nGradual loss of central vision, metamorphopsia, Amsler grid changes; may be asymptomatic.\n\nSigns\n\n(See Figures 11.16.1 and 11.16.2.)\n\nFigure 11.16.1 Dry AMD with fine drusen. \n\nFigure 11.16.2 Dry AMD with soft drusen. \n\nCritical. Macular drusen, clumps of pigment in the outer retina, and RPE atrophy, almost always in both eyes.\n\nOther. Confluent retinal and choriocapillaris atrophy (e.g., geographic atrophy [GA]), dystrophic calcification.\n\nDifferential Diagnosis\n\n- Peripheral/extramacular drusen: Drusen only located outside of the macular area. Benign, of no visual significance.\n- Myopic degeneration: Characteristic peripapillary changes and macular changes without drusen. See [11.22](c11.xhtml#s11-22), Pathologic/Degenerative Myopia.\n- CSCR: Serous retinal elevation, RPE detachments, and mottled RPE, without drusen, hemorrhage, or exudate, usually in patients <50 years of age. See [11.15](c11.xhtml#s11-15), Central Serous Chorioretinopathy.\n- Inherited central retinal dystrophies: Stargardt disease, pattern dystrophy, Best disease, others. Variable macular pigmentary changes, atrophy, or accumulation of lipofuscin or a combination of these. Usually <50 years of age, without drusen, familial occurrence. See specific entities.\n- Toxic retinopathies (e.g., chloroquine toxicity): Mottled hypopigmentation with ring of hyperpigmentation (bull’s eye maculopathy) without drusen. Possible history of drug ingestion or exposure.\n- Crystalline retinopathies: A group of heterogenous disorders (e.g. iatrogenic, inflammatory, genetic, toxic, degenerative) associated with crystalline deposits in any layer of the retina. See [11.33](c11.xhtml#s11-33), Crystalline Retinopathy.\n- Inflammatory maculopathies: Multifocal choroiditis, rubella, serpiginous choroidopathy, and others. Variable chorioretinal atrophy, often with vitreous cells and without drusen. See specific entities.\nWorkup\n\n- History: Presence of risk factors (e.g., family history, smoking)? See risk factors for loss of vision, [11.17](c11.xhtml#s11-17), Neovascular or Exudative (Wet) Age-Related Macular Degeneration.\n- Amsler grid or preferential hyperacuity perimetry (PHP) testing at home to detect central or paracentral scotoma potentially indicative of neovascular transformation. See [Appendix 4](app1.xhtml#app4), Amsler Grid.\n- Macular examination with a handheld lens: Look for risk factors for conversion to the exudative form, such as soft drusen or pigment clumping. On OCT, look for reticular pseudodrusen (subretinal drusenoid deposits) as this has been shown to increase risk of conversion to advanced AMD, both neovascular and GA. Look for GA. Look for signs of exudation including edema, SRF, lipid exudation, or hemorrhage (disappearance of drusen may herald the development of CNV).\n- Baseline and periodic FAF may be useful to monitor for progression of GA.\n- IVFA or OCT can be useful adjuncts to determine stage of dry AMD and when exudative AMD is suspected based on subjective or objective change in vision or examination findings. Drusen and RPE atrophy are often more visible on IVFA and FAF. OCTA is also a potentially useful diagnostic test as a noninvasive substitute for IVFA or if IVFA is inconclusive, especially with masquerade conditions such as pattern dystrophy or CSCR.\nTreatment\n\n- Patients with intermediate dry AMD (one large druse [125 microns] and/or ≥20 medium drusen [63 to 125 microns]), or GA or exudati"}, {"id": "11.17", "chapter_num": "11", "chapter": "Retina", "name": "Neovascular or Exudative (Wet) Age-Related Macular Degeneration", "raw": "11.17 Neovascular or Exudative (Wet) Age-Related Macular Degeneration\n\nSymptoms\n\nVariable onset of central visual loss, central or paracentral scotoma, metamorphopsia, photopsias in the central visual field.\n\nSigns\n\n(See Figures 11.17.1 and 11.17.2.)\n\nFigure 11.17.1 Exudative AMD. \n\nFigure 11.17.2 Intravenous fluorescein angiography of exudative AMD. \n\nCritical. Drusen and SRF, ME or RPE detachment associated with CNV.\n\nOther\n\n- Subretinal or intraretinal blood. Retinal exudates, subretinal fibrosis (disciform scar). Retinal angiomatous proliferation (RAP) is an intraretinal variant of neovascular AMD and is characterized by focal telangiectatic retinal vessels with an adjacent superficial retinal hemorrhage and associated intraretinal edema and RPE detachment. Some neovascular AMD patients may present with VH.\n- Idiopathic polypoidal choroidal vasculopathy (IPCV): Multiple serosanguineous macular and RPE detachments. ICGA highlights characteristic choroidal polyp-like aneurysmal dilations most often located in the peripapillary region. This is considered a variant of neovascular AMD and is more common in those of Asian and African descent. See [11.18](c11.xhtml#s11-18), Idiopathic Polypoidal Choroidal Vasculopathy.\nRisk Factors for Loss of Vision\n\nAdvanced age, hyperopia, light-colored iris, family history, soft (large) drusen, focal subretinal pigment clumping, RPE detachments, systemic HTN, and smoking. Note that patients with wet AMD in one eye have a 10% to 12% risk per year of developing CNV in the fellow eye. The risk increases for eyes with multiple or confluent soft drusen with RPE clumping.\n\nDifferential Diagnosis\n\n- Ocular histoplasmosis syndrome: Small white–yellow chorioretinal scars and peripapillary atrophy. May also present with CNV. See [11.24](c11.xhtml#s11-24), Ocular Histoplasmosis.\n- Angioid streaks: Bilateral subretinal red-brown or gray irregular bands often radiating from the optic disc. See [11.23](c11.xhtml#s11-23), Angioid Streaks.\n- High myopia: Significant myopic refractive error, lacquer cracks, tilted disc. See [11.22](c11.xhtml#s11-22), Pathologic/Degenerative Myopia.\n- Other CNV-predisposing conditions include drusen of the optic nerve, choroidal rupture, choroidal tumors, photocoagulation scars, inflammatory focal chorioretinal spots, and idiopathic causes.\nTypes of Neovascular AMD Lesions\n\n- Occult CNV (Type 1): Ill-defined, stippled, flat, or elevated subtle late leakage on IVFA and located in the sub-RPE location by OCT.\n- Classic CNV (Type 2): Early-phase IVFA demonstrates a well-delineated area of lacy hyperfluorescence with prominent leakage in later phases and located in the subneurosensory retinal location by OCT.\n- RAP (Type 3): Focal intraretinal hyperfluorescence on IVFA and ICGA. High-speed ICGA is particularly sensitive and may show characteristic “hair pin loop” with retinal feeder and draining vessels. OCTA shows this focal form of neovascularization to be intraretinal.\nWorkup\n\n- Slit-lamp biomicroscopy with a handheld lens to detect CNV and associated exudation.\n- Perform IVFA or OCTA if CNV is suspected. IVFA is useful to confirm neovascular AMD size, type, and location. OCTA is useful as a noninvasive alternative to IVFA or when IVFA is inconclusive such as in pattern dystrophy or central CSCR. OCTA is also useful if there is an allergy to fluorescein dye or in pregnancy when it is best to avoid dye use.\n- OCT is helpful in determining retinal thickness, presence of CNV, CNV thickness,"}, {"id": "11.18", "chapter_num": "11", "chapter": "Retina", "name": "Idiopathic Polypoidal Choroidal Vasculopathy", "raw": "11.18 Idiopathic Polypoidal Choroidal Vasculopathy\n\nSymptoms\n\nDecreased central vision; may be sudden or gradual. Central or paracentral scotomas.\n\nSigns\n\nCritical. Subretinal red-orange, polyp-like lesions of the choroidal vasculature. Can be macular (more symptomatic) or peripapillary (see Figure 11.18.1).\n\nFigure 11.18.1 Polypoidal choroidal vasculopathy. \n\nOther. Bilateral subretinal and/or sub-RPE blood, VH, circinate subretinal exudates, subretinal fibrosis (disciform scar), SRF, atypical CNV, and multiple serous PEDs.\n\nRisk Factors\n\nMore common in females, individuals of African or Asian descent, and in patients with HTN. Can occur at a younger age compared to neovascular AMD, but usually without significant drusen or GA.\n\nDifferential Diagnosis\n\n- Neovascular AMD: See [11.17](c11.xhtml#s11-17), Neovascular or Exudative (Wet) Age-Related Macular Degeneration.\n- Retinal arterial macroaneurysm (RAM): See [11.19](c11.xhtml#s11-19), Retinal Arterial Macroaneurysm.\n- Peripheral exudative hemorrhagic chorioretinopathy (PEHCR [peripheral CNV]): Occurs in the peripheral retina and presents with SRF, subretinal blood, exudation, RPE detachment, and/or subretinal fibrosis.\n- CSCR: See [11.15](c11.xhtml#s11-15), Central Serous Chorioretinopathy\nWorkup\n\n- Slit-lamp biomicroscopy with a handheld lens to detect signs of exudation.\n- ICGA is the gold standard for diagnosis. ICGA is used to confirm the presence of a branching network of vessels arising from the inner choroidal circulation with terminal aneurysmal dilations (popcorn lesions). Unlike occult CNV, the IPCV lesions do not stain late unless active leakage is present.\n- With IVFA, often a notch may be seen at the margin of a PED, suggesting the location of a polyp. This study is primarily performed to evaluate for other causes of CNV.\n- OCT is used to assess for ME, SRF, and PEDs and can detect polyps in some eyes.\nTreatment\n\nAsymptomatic lesions may be observed and may resolve spontaneously. IPCV with exudation and/or hemorrhagic complications has been treated with anti-VEGF monotherapy with or without PDT. The EVEREST-II and PLANET studies demonstrated level I evidence that anti-VEGF monotherapy as well as combination therapy give excellent functional visual outcomes in patients presenting with symptomatic IPCV. Pars plana vitrectomy (PPV) can be considered for VH.\n\nFollow-Up\n\nThe prognosis of IPCV is generally better than for neovascular AMD. Symptomatic or macular IPCV is followed every 1 to 2 months with periodic OCT, IVFA, and ICGA as needed for disease progression. Consider treatment, or retreatment, if symptomatic, persistent, or new leakage occurs.\n\nREFERENCES\n\nCheung CMG, Lai TYY, Ruamviboonsuk P, et al. Polypoidal choroidal vasculopathy: definition, pathogenesis, diagnosis, and management. Ophthalmology. 2018;125(5):708–724.\n\nKoh A, Lai TYY, Takahashi K, et al; EVEREST II Study Group. Efficacy and safety of ranibizumab with or without verteporfin photodynamic therapy for polypoidal choroidal vasculopathy: a randomized clinical trial. JAMA Ophthalmol. 2017;135:1206–1213.\n\nLee WK, Iida T, Ogura Y, et al; PLANET Investigators. Efficacy and safety of intravitreal aflibercept for polypoidal choroidal vasculopathy in the PLANET study: A randomized clinical trial. JAMA Ophthalmol. 2018;136(7):786–793.\n\nLim TH, Lai TYY, Takahashi K, et al; EVEREST II Study Group. Comparison of ranibizumab with or without verteporfin photodynamic therapy for polypoidal choroidal vasculopathy: The EVE"}, {"id": "11.19", "chapter_num": "11", "chapter": "Retina", "name": "Retinal Arterial Macroaneurysm", "raw": "11.19 Retinal Arterial Macroaneurysm\n\nSymptoms\n\nDecreased vision; history of systemic HTN. Usually unilateral, but 10% bilateral.\n\nSigns\n\n(See Figures 11.19.1 and 11.19.2.)\n\nFigure 11.19.1 Retinal artery macroaneurysm on presentation. \n\nFigure 11.19.2 Intravenous fluorescein angiography of a retinal artery macroaneurysm. \n\nCritical. Acute hemorrhages in multiple layers of the retina (subretinal, intraretinal, preretinal) possibly with VH; often with a white or yellow spot in the middle of the RAM. Chronic leakage may cause a ring of hard exudates and retinal edema around the aneurysm resulting in decreased vision if the macula is involved.\n\nOther. ME, arteriolar emboli, capillary telangiectasia, arterial or venous occlusions distal to macroaneurysm.\n\nDifferential Diagnosis\n\n- Coats disease: Unilateral retinal vascular telangiectasias. Extensive yellow intraretinal and subretinal exudates. Hemorrhages not typical. See [8.1](c08.xhtml#s8-1), Leukocoria.\n- Idiopathic retinal vasculitis, aneurysms, and neuroretinitis: A syndrome characterized by retinal vasculitis, multiple arterial macroaneurysms, neuroretinitis, and peripheral capillary nonperfusion.\n- Diabetic retinopathy: Hemorrhages are not subretinal. See [11.12](c11.xhtml#s11-12), Diabetic Retinopathy.\n- Valsalva retinopathy: No associated hard exudates. See [11.21](c11.xhtml#s11-21), Valsalva Retinopathy.\n- Retinal telangiectasias: Juxtafoveal or parafoveal retinal telangiectasias can cause hard exudates in a circinate pattern usually temporal to macula. Association with diabetes.\n- Others: Retinal capillary hemangioma (hemangioblastoma), retinal cavernous hemangioma, choroidal melanoma, hemorrhagic RPE detachment seen in AMD, IPCV, etc.\nEtiology\n\nAcquired vascular dilation of retinal artery or arteriole usually at the site of arteriolar bifurcation or arteriovenous crossing. Usually related to systemic HTN and general atherosclerotic disease.\n\nWorkup\n\n- History: Systemic disease, particularly HTN or diabetes?\n- Complete ocular examination with dilated fundus examination with a handheld lens and indirect ophthalmoscopy. Look for concurrent retinal venous obstruction (present in one-third of cases) and signs of hypertensive retinopathy (visible in fellow eye as well).\n- Check blood pressure.\n- Consider checking lipid panel as well as fasting or random blood sugar and HbA1c.\n- IVFA may demonstrate early hyperfluorescence if there is no blockage from hemorrhage. Late frames may show leakage or staining of vessel wall.\n- OCT is helpful in demonstrating and following any ME.\nTreatment\n\nConsider laser treatment if edema and/or exudate threatens central vision. Caution must be taken when treating arterioles that supply the central macula since distal thrombosis and obstruction with resultant ischemia can occur. Laser can also cause aneurysmal rupture resulting in retinal and VH. Anti-VEGF agents may be beneficial in patients with macroaneurysm-associated ME. Dense or nonclearing VH, sub–internal limiting membrane (ILM) hemorrhage, or thick submacular hemorrhage may benefit from vitrectomy (see Figure 11.19.3).\n\nFigure 11.19.3 Retinal artery macroaneurysm with distal branch retinal artery occlusion. \n\nFollow-Up\n\nFrequency based on the amount and location of exudate and hemorrhage.\n\n"}, {"id": "11.20", "chapter_num": "11", "chapter": "Retina", "name": "Sickle Cell Retinopathy (Including Sickle Cell Disease, Anemia, and Trait)", "raw": "11.20 Sickle Cell Retinopathy (Including Sickle Cell Disease, Anemia, and Trait)\n\nSymptoms\n\nUsually without ocular symptoms. Floaters, flashing lights, or loss of vision with advanced disease. Systemically, patients often have painful crises with severe abdominal or musculoskeletal pain. Patients are typically of African or Mediterranean descent.\n\nSigns\n\n(See Figure 11.20.1.)\n\nFigure 11.20.1 Sickle cell retinopathy neovascular sea fan with associated vitreous hemorrhage. \n\nCritical. Peripheral retinal neovascularization in the shape of a fan (“sea fan sign”), sclerosed peripheral retinal vessels, or a dull gray peripheral fundus background color as a result of peripheral arteriolar occlusions and ischemia.\n\nOther. Venous tortuosity, midperipheral fundus pigmented lesions with spiculated borders (black sunbursts), superficial intraretinal hemorrhages (salmon patch), refractile (iridescent) intraretinal deposits following hemorrhage resorption, angioid streaks, comma-shaped capillaries of the conjunctiva (especially along the inferior fornix). VH and traction bands, RD, CRAO, macular arteriolar occlusions, and enlargement of the foveal avascular zone occasionally develop.\n\nStaging\n\n- Stage 1: Peripheral arteriolar occlusions.\n- Stage 2: Peripheral arteriovenous anastomoses (hairpin loop).\n- Stage 3: Neovascular proliferation (sea fan).\n- Stage 4: VH.\n- Stage 5: RD.\nDifferential Diagnosis of Peripheral Retinal Neovascularization\n\n- Sarcoidosis: Peripheral sea fan neovascularization often associated with uveitis. Increased frequency in young patients of African descent.\n- Diabetic retinopathy: Posterior pathology more prominent. Associated dot-blot hemorrhages. See [11.12](c11.xhtml#s11-12), Diabetic Retinopathy.\n- Embolic (e.g., talc) retinopathy: History of intravenous drug abuse. May see refractile talc particles in macular arterioles. See [11.33](c11.xhtml#s11-33), Crystalline Retinopathy.\n- Eales disease: Peripheral retinal vascular occlusion of unknown etiology; diagnosis of exclusion.\n- Others: Retinopathy of prematurity, FEVR, chronic myelogenous leukemia, radiation retinopathy, pars planitis, carotid–cavernous fistula, OIS, collagen vascular disease, hypercoagulable state. See specific sections.\nWorkup\n\n- Medical history and family history: Sickle cell disease, diabetes, or known medical problems? Intravenous drug abuse?\n- Dilated fundus examination using indirect ophthalmoscopy.\n- Sickledex, sickle cell preparation, and hemoglobin electrophoresis.\nNOTE: Patients with sickle cell trait (i.e., HbSC), as well as hemoglobin C disease, may have a negative Sickledex preparation. Retinopathy is most common with HbSC (most severe) and HbS-Thal and less common with HbSS (sickle cell disease).\n\nConsider ultra widefield IVFA to assess retinal perfusion and neovascularization, especially in the periphery. OCTA can identify vascular density loss corresponding to areas of retinal thinning.\n\nTreatment\n\n- Scatter laser photocoagulation of ischemic retina for proliferative sickle retinopathy (PSR).\n- Consider anti-VEGF in PSR.\n- PPV for nonclearing VH.\n- FDA approved medications: L-glutamine, crizanlizumab-tmca, voxelotor.\n- Gene therapy and stem cell transplantation are curative and prevent retinopathy. Clinical trials are currently underway.\nFollow-Up\n\n- No retinopathy: Annual dilated fundus examinations.\n- Retinopathy present: Repeat dilated fundus examination every 3 to 6 months, depending on severity.\n"}, {"id": "11.21", "chapter_num": "11", "chapter": "Retina", "name": "Valsalva Retinopathy", "raw": "11.21 Valsalva Retinopathy\n\nSymptoms\n\nDecreased vision or asymptomatic. History of Valsalva maneuver (forceful exhalation against a closed glottis), which may occur during heavy lifting, coughing, vomiting, or straining during bowel movement. Sometimes, no history of Valsalva can be elicited.\n\nSigns\n\n(See Figure 11.21.1.)\n\nFigure 11.21.1 Valsalva retinopathy. \n\nCritical. Single or multiple hemorrhages under the ILM in the area of the macula. Can be unilateral or bilateral. Blood may turn yellow after a few days.\n\nOther. Vitreous, intraretinal, subretinal, and subconjunctival hemorrhage can occur.\n\nDifferential Diagnosis\n\n- PVD: Can cause VH acutely as well as peripheral retinal and disc margin hemorrhages. However, sub-ILM hemorrhage is rare. See [11.1](c11.xhtml#s11-1), Posterior Vitreous Detachment.\n- RAM: Hemorrhages in multiple layers of the retina and vitreous. Can also have a circinate ring of hard exudates around a macroaneurysm. See [11.19](c11.xhtml#s11-19), Retinal Arterial Macroaneurysm.\n- Diabetic retinopathy: Microaneurysms, dot-blot hemorrhages, and hard exudates bilaterally. No isolated sub-ILM hemorrhage. Can also cause VH. See [11.12](c11.xhtml#s11-12), Diabetic Retinopathy.\n- CRVO or BRVO: Unilateral, multiple intraretinal hemorrhages, venous dilation, and tortuosity. See [11.8](c11.xhtml#s11-8), Central Retinal Vein Occlusion and [11.9](c11.xhtml#s11-9), Branch Retinal Vein Occlusion.\n- Anemia or leukemia: May have multiple, bilateral flame and dot-blot hemorrhages as well as CWSs. Can also present with sub-ILM hemorrhage.\n- RT: Can be surrounded by hemorrhage obscuring the tear. Tears rarely occur in the macula.\nEtiology\n\nValsalva causes sudden increase in intraocular venous pressure leading to rupture of superficial capillaries in macula or elsewhere in the retina. May be associated with anticoagulant therapy.\n\nWorkup\n\n- History: History of Valsalva including any recent heavy lifting, straining during bowel movement, coughing, sneezing, vomiting, etc.? The patient may not remember the incident.\n- Complete ocular examination, including dilated fundus examination with a slit lamp and a handheld lens, and indirect ophthalmoscopy. Look for findings suggestive of a different etiology including microaneurysms, dot-blot hemorrhages, CWSs, RT, PVD.\n- If dense VH is present, perform a B-scan US to rule out RT or RD.\n- IVFA may be helpful to rule out other causes including RAM or diabetic retinopathy.\nTreatment\n\nPrognosis is excellent. Most patients are observed, as sub-ILM hemorrhage usually resolves after a few days to weeks. Occasionally laser is used to permit the blood to drain into the vitreous cavity, thereby uncovering the macula. Vitrectomy rarely needed, typically only for nonclearing VH.\n\nFollow-Up\n\nMay follow up every 2 weeks for the initial visits to monitor for resolution, then follow up routinely.\n\n"}, {"id": "11.22", "chapter_num": "11", "chapter": "Retina", "name": "Pathologic/Degenerative Myopia", "raw": "11.22 Pathologic/Degenerative Myopia\n\nSymptoms\n\nDecreased vision. Usually asymptomatic until middle adulthood.\n\nSigns\n\n(See Figure 11.22.1.)\n\nFigure 11.22.1 High myopia with macular hemorrhage. \n\nCritical. Myopic crescent (a crescent-shaped area of white sclera or choroidal vessels adjacent to the disc, separated from the normal-appearing fundus by a hyperpigmented line); an oblique (tilted) insertion of the optic disc, with or without vertical elongation. Macular pigmentary abnormalities; hyperpigmented spots in the macula (Fuchs spots). Typically, a refractive correction of more than −6.00 diopters, axial length ≥26.5 mm.\n\nOther. Increased risk for CNV or RRD. Temporal optic disc pallor, posterior staphyloma, entrance of the retinal vessels into the nasal part of the optic cup. The retina and choroid may be seen to extend over the nasal border of the optic disc. Well-circumscribed areas of atrophy, spots of subretinal hemorrhage, choroidal sclerosis, yellow subretinal streaks (lacquer cracks), peripheral retinal thinning, and lattice degeneration may occur. Visual field defects may be present.\n\nDifferential Diagnosis\n\n- AMD: May develop CNV and a similar macular appearance, but typically drusen are present, and myopic disc features are absent. See [11.16](c11.xhtml#s11-16), Nonexudative (Dry) Age-Related Macular Degeneration and [11.17](c11.xhtml#s11-17), Neovascular or Exudative (Wet) Age-Related Macular Degeneration.\n- Ocular histoplasmosis: Peripapillary atrophy with risk for CNV. A pigmented ring may separate the disc from the peripapillary atrophy, as opposed to a pigmented ring separating the atrophic area from the adjacent retina. Round choroidal scars (punched-out lesions) are scattered throughout the fundus. See [11.24](c11.xhtml#s11-24), Ocular Histoplasmosis.\n- Tilted discs: Anomalous discs with a scleral crescent, most often inferonasally, an irregular vascular pattern as the vessels emerge from the disc (situs inversus), and an area of fundus ectasia in the direction of the tilt (inferonasally). Many patients have myopia and astigmatism but no chorioretinal degeneration or lacquer cracks. Visual field defects corresponding to the areas of fundus ectasia are often seen. Most cases are bilateral.\n- Gyrate atrophy: Rare. Multiple, well-demarcated areas of chorioretinal atrophy that in childhood start in the midperiphery and then coalesce to involve a large portion of the fundus. Increased blood levels of ornithine. Patients are often highly myopic. See [11.28](c11.xhtml#s11-28), Retinitis Pigmentosa and Inherited Chorioretinal Dystrophies.\n- Toxoplasmosis: Well-circumscribed chorioretinal scar that does not typically develop CNV. Active disease shows retinitis and vitritis. See [12.9](c12.xhtml#s12-9), Toxoplasmosis.\nWorkup\n\n- Manifest and/or cycloplegic refraction.\n- IOP measurement by applanation tonometry (handheld tonometry may underestimate IOP in highly myopic eyes).\n- Dilated fundus examination with indirect ophthalmoscopy to search for retinal breaks or detachment. Scleral depression may be helpful but should be performed with care over a staphyloma.\n- Slit-lamp biomicroscopy with a handheld lens to examine macula and search for CNV (gray or green lesion beneath the retina, subretinal blood or exudate, or SRF).\n- IVFA for suspected CNV.\n- OCT can reveal CNV as well as macular detachment over a staphyloma. Additionally, OCT can be useful in identifying foveal schisis, a possible cause of vision loss in patients with h"}, {"id": "11.23", "chapter_num": "11", "chapter": "Retina", "name": "Angioid Streaks", "raw": "11.23 Angioid Streaks\n\nSymptoms\n\nUsually asymptomatic. Decreased vision may result from CNV.\n\nSigns\n\n(See Figure 11.23.1.)\n\nFigure 11.23.1 Angioid streaks. \n\nCritical. Bilateral reddish-brown or gray bands located deep to the retina, due to breaks within Bruch membrane, usually radiating in an irregular or spoke-like pattern from the optic disc. CNV may occur.\n\nOther. Mottled fundus appearance with an orange hue (peau d’orange), most common in the temporal midperiphery. Subretinal hemorrhages after mild blunt trauma. Reticular pigmentary changes in the macula; small, white, pinpoint chorioretinal scars (histo-like spots) in the midperiphery; crystalline bodies within the macula. Drusen of the optic disc (especially with pseudoxanthoma elasticum [PXE]). Granular pattern of hyperfluorescent lines on IVFA. Widespread RPE damage is more evident on FAF compared to fundus ophthalmoscopy or IVFA.\n\nDifferential Diagnosis\n\n- Lacquer cracks of myopic chorioretinal degeneration: High myopia present. See [11.22](c11.xhtml#s11-22), Pathologic/Degenerative Myopia.\n- Choroidal rupture: Subretinal streaks are usually concentric to the optic disc, yellow-white in color. See [3.14](c03.xhtml#s3-14), Traumatic Choroidal Rupture.\nEtiology\n\nFifty percent of cases are associated with systemic diseases; the rest are idiopathic.\n\n- PXE: Most common. Loose skin folds in the neck, axillae, and on flexor aspects of joints; cardiovascular complications; increased risk of gastrointestinal bleeds.\n- Ehlers–Danlos syndrome: Hyperelasticity of skin, loose joints.\n- Paget disease of bone: Enlarged skull, bone pain, history of bone fractures, hearing loss, possible cardiovascular complications. May be asymptomatic but may develop visual loss due to optic nerve compression by enlarging bone. Increased serum alkaline phosphatase and urine calcium. Ten percent develop late angioid streaks.\n- Sickle cell disease: May be asymptomatic or have decreased vision from fundus abnormalities. May have a history of recurrent infections and painless or painful crises. See [11.20](c11.xhtml#s11-20), Sickle Cell retinopathy (Including Sickle Cell disease, Anemia, Sickle and Trait).\n- Less common: Thalassemia, acromegaly, senile elastosis, lead poisoning, Marfan syndrome, hemolytic anemia, and others.\nWorkup\n\n- History: Any known systemic disorders? Previous ocular trauma?\n- Complete ocular examination: Look carefully at the macula with a slit lamp using a handheld lens to detect CNV.\n- FAF if diagnosis uncertain or IVFA or OCTA if CNV suspected.\n- Physical examination: Look for clinical signs of etiologic diseases.\n- Serum alkaline phosphatase and urine calcium levels if Paget disease of bone is suspected.\n- Sickle cell preparation and hemoglobin electrophoresis in patients of African descent.\n- Skin or scar biopsy if PXE is suspected.\n- CBC if hematologic etiology suspected.\nTreatment\n\n- Anti-VEGF therapy is now used for angioid streak-associated CNV, as focal laser photocoagulation and PDT have discouraging outcomes. See [11.17](c11.xhtml#s11-17), Neovascular or Exudative (Wet) Age-Related Macular Degeneration.\n- Management of any underlying systemic disease by an internist.\n- Recommend wearing one-piece polycarbonate safety glasses for sports due to an increased risk of subretinal hemorrhage and choroidal rupture from minor trauma.\nFollow-Up\n\n- Fundus examination every 6 months, monitoring for CNV.\n- Instruct patient to check Amsler grid daily and return immediately if changes are no"}, {"id": "11.24", "chapter_num": "11", "chapter": "Retina", "name": "Ocular Histoplasmosis", "raw": "11.24 Ocular Histoplasmosis\n\nSymptoms\n\nMost often asymptomatic; can present with decreased or distorted vision, especially when CNV develops. Patients often have lived in or visited the Ohio–Mississippi River Valley or areas where histoplasmosis is endemic. Usually in the 20- to 50-year age range.\n\nSigns\n\n(See Figure 11.24.1.)\n\nFigure 11.24.1 A, B: Ocular histoplasmosis. \n\nCritical. Classic triad. Need two of the three to make the diagnosis:\n\n- Yellow-white, punched-out round spots, chorioretinal scars, usually <1 mm in diameter in any fundus location (histo-spots). Pigment clumps in or at the margin of the spots may be seen.\n- A macular CNV appearing as a gray-green patch beneath the retina, associated with retinal edema, SRF, subretinal blood or exudate, or a pigment ring evolving into a disciform scar.\n- Peripapillary atrophy or scarring, sometimes with nodules or hemorrhage. There may be a rim of pigment separating the disc from the area of atrophy or scarring.\nOther. Curvilinear rows of small histo-spots in the peripheral fundus. No vitreous or aqueous cells.\n\nDifferential Diagnosis\n\n- Multifocal choroiditis with panuveitis: Similar clinical findings, except anterior or vitreous inflammatory cells or both, are also present. See [12.3](c12.xhtml#s12-3), Posterior Uveitis.\n- High myopia: May have atrophic spots in the posterior pole and a myopic crescent on the temporal side of the disc with a rim of pigment on the outer (not inner) edge, separating the crescent from the retina. Atrophic spots are whiter than histo-spots. See [11.22](c11.xhtml#s11-22), Pathologic/Degenerative Myopia.\n- AMD: Macular changes may appear similar, but typically there are macular drusen and patients are ≥50 years of age. RPE more diffusely abnormal. There are no atrophic round spots similar to histoplasmosis and no scarring or atrophy around the disc. See [11.16](c11.xhtml#s11-16), Nonexudative (Dry) Age-Related Macular Degeneration and [11.17](c11.xhtml#s11-17), Neovascular or Exudative (Wet) Age-Related Macular Degeneration.\n- Old toxoplasmosis: Pigmented chorioretinal lesion with fibrosis and overlying vitreous condensations. See [12.9](c12.xhtml#s12-9), Toxoplasmosis.\n- Angioid streaks: Histo-like spots in the mid-periphery and macular degeneration may occur. Jagged red, brown, or gray lines deep to the retinal vessels and radiating from the optic disc. See [11.23](c11.xhtml#s11-23), Angioid Streaks.\nEtiology\n\nFungal infection caused by Histoplasma capsulatum. Once acquired by inhalation, the organisms can pass to the choroid through the bloodstream. Importantly, ocular histoplasmosis is not thought to represent active infection and antifungal therapy is not indicated.\n\nWorkup\n\n- History: Time spent in the Ohio–Mississippi River Valley or endemic area? Prior exposure to fowl?\n- Amsler grid test (see [Appendix 4](app1.xhtml#app4), Amsler Grid) to evaluate the central visual field of each eye.\n- Slit-lamp examination: Anterior chamber or vitreous cells and flare should not be present.\n- Dilated fundus examination: Concentrate on the macular area with a slit lamp and a handheld lens. Look for signs of CNV and vitreous cells.\n- IVFA and OCT to help detect CNV and monitor response to treatment.\nTreatment\n\n- Antifungal treatment is not helpful.\n- Intravitreal anti-VEGF therapy for CNV is the mainstay of treatment. PDT for subfoveal CNV and focal laser photocoagulation for extrafoveal CNV may rarely be used as well.\nFollow-Up\n\n- Instruct all patients to use a"}, {"id": "11.25", "chapter_num": "11", "chapter": "Retina", "name": "Vitreomacular Adhesion/Vitreomacular Traction/Macular Hole", "raw": "11.25 Vitreomacular Adhesion/Vitreomacular Traction/Macular Hole\n\nSymptoms\n\nVariable decreased vision (typically around 20/200 level for a full-thickness hole, better for a partial-thickness hole), metamorphopsia, or central scotoma. Three times more likely in women; usually occurs in sixth to eighth decade. Ten percent bilateral.\n\nSigns\n\n(See Figures 11.25.1 and 11.25.2.)\n\nFigure 11.25.1 Macular hole. \n\nFigure 11.25.2 Optical coherence tomography of macular hole. \n\nCritical. A full-thickness macular hole appears as a round, red spot in the center of the macula, usually from one-third to two-thirds of a disc diameter in size; may be surrounded by a gray halo/cuff of SRF. VMT demonstrates loss of the normal foveolar depression and often a yellow spot or ring in the center of the macula.\n\nOther. Small, yellow precipitates deep to the retina in the hole or surrounding retina; retinal cysts at the margin of the hole or a small operculum above the hole, anterior to the retina (Gass stage 3 or 4); or both.\n\nGass Classification of Macular Hole\n\n- Stage 1: An impending (non–full-thickness) hole, yellow spot, or ring in fovea.\n- Stage 2: Small full-thickness hole (<400 µm diameter), rim of elevated retina, no PVD.\n- Stage 3: Full-thickness hole (≥400 µm diameter), rim of elevated retina, with or without localized operculum over hole, no PVD.\n- Stage 4: Full-thickness hole (≥400 µm diameter), with complete PVD.\nNOTE: A new classification system using OCT has been developed. It is based on size of the full-thickness hole, presence of VMT, and underlying etiology (e.g., primary VMT vs. secondary trauma).\n\nDifferential Diagnosis\n\nMay be difficult to distinguish a macular hole from a pseudohole (no loss of foveal tissue) or a lamellar macular hole (partial thickness).\n\n- Macular pucker with a pseudohole: An ERM (surface-wrinkling) on the surface of the retina may simulate a macular hole. See [11.26](c11.xhtml#s11-26), Epiretinal Membrane (Macular Pucker, Surface-Wrinkling Retinopathy, Cellophane Maculopathy). Look for a sheen from ILM changes or ERM.\n- Lamellar hole: Not as red as a full-thickness hole, and a surrounding gray halo is usually not present.\n- Intraretinal cysts (e.g., chronic CME with prominent central cyst).\n- Solar retinopathy: Small, round, red or yellow lesion at the center of the fovea, with surrounding fine gray pigment in a sun gazer or eclipse watcher. See [11.35](c11.xhtml#s11-35), Solar and Photic Retinopathy.\nEtiology\n\nMay be caused by vitreous or ERM traction on the macula, trauma, or CME. In early stages of vitreomacular adhesion (VMA)/VMT, the vitreous cortex is attached to the fovea but detached from the perifoveal region, exerting anteroposterior traction on the fovea. Increased tractional forces can allow for eventual progression to full-thickness macular hole.\n\nWorkup\n\n- History: Previous trauma? Previous eye surgery? Sun gazer?\n- Complete ocular examination, including a macular examination with a slit lamp and a handheld lens. If a PVD is present, careful examination of the peripheral fundus to rule out peripheral breaks is important.\n- A full-thickness macular hole can be differentiated from a pseudo- or lamellar hole by directing a thin, vertical slit beam across the area in question using a handheld lens with the slit-lamp biomicroscope. The patient with a true hole will report a break in the line (Watzke–Allen test). A pseudohole or lamellar hole may cause distortion of the line, but it should not be broken.\n- OCT"}, {"id": "11.26", "chapter_num": "11", "chapter": "Retina", "name": "Epiretinal Membrane (Macular Pucker, Surface-Wrinkling Retinopathy, Cellophane", "raw": "11.26 Epiretinal Membrane (Macular Pucker, Surface-Wrinkling Retinopathy, Cellophane Maculopathy)\n\nSymptoms\n\nMost are asymptomatic; can have decreased or distorted vision or both. Incidence increases with age. Twenty percent bilateral, though often asymmetric.\n\nSigns\n\n(See Figure 11.26.1.)\n\nFigure 11.26.1 Epiretinal membrane with pseudohole. \n\nCritical. Spectrum ranges from a fine, glistening membrane (cellophane maculopathy) to a thick, gray-white membrane (macular pucker) present on the surface of the retina in the macular area.\n\nOther. Retinal folds radiating out from the membrane; displacement, straightening, or tortuosity of the macular retinal vessels; ME or macular detachment. A ring-shaped condensation of the ERM around the fovea may simulate a macular hole (pseudohole).\n\nDifferential Diagnosis\n\n- Diabetic retinopathy: May produce preretinal fibrovascular tissue, which may displace retinal vessels or detach the macula. ME may be present. See [11.12](c11.xhtml#s11-12), Diabetic Retinopathy.\n- CME. See [11.14](c11.xhtml#s11-14), Cystoid Macular Edema.\nEtiology\n\n- PVD. See [11.1](c11.xhtml#s11-1), Posterior Vitreous Detachment.\n- Retinal break, RRD. A higher risk of ERM for PVD patients who also have a tear or RRD versus PVD alone. See [11.2](c11.xhtml#s11-2), Retinal break and [11.3](c11.xhtml#s11-3), Retinal Detachment.\n- Idiopathic. ERM can occur without obvious cause and has been seen in very young children.\n- After retinal cryotherapy or photocoagulation.\n- After intraocular surgery, trauma, or VH.\n- Uveitis. See [Chapter 12](c12.xhtml), Uveitis.\n- Retinal dystrophies. See [11.28](c11.xhtml#s11-28), Retinitis Pigmentosa and Inherited Chorioretinal Dystrophies.\n- Intraocular tumors.\n- Other retinal vascular disease (diabetic retinopathy, vein occlusion, etc.).\nWorkup\n\n- History: Previous eye surgery or eye disease? Diabetes?\n- Complete ocular examination, particularly a thorough dilated fundus evaluation and careful macula evaluation with a slit lamp and a handheld lens. A careful peripheral examination should be performed to rule out a retinal break.\n- OCT can show a hyperreflective layer over the surface of the retina, loss of foveal depression, and intraretinal cysts (see Figure 11.26.2).\nFigure 11.26.2 Optical coherence tomography of epiretinal membrane. \n\nTreatment\n\n- Treat the underlying disorder.\n- PPV with membrane peel can be considered when it significantly reduces vision.\nFollow-Up\n\nThis is not an emergent condition, and treatment may be instituted at any time. Often does not progress over time. A small percentage of ERMs recur after surgical removal.\n\n"}, {"id": "11.27", "chapter_num": "11", "chapter": "Retina", "name": "Choroidal Effusion/Detachment", "raw": "11.27 Choroidal Effusion/Detachment \n\nSymptoms\n\nDecreased vision or asymptomatic in a serous choroidal detachment. Decreased vision may occur if the choroidal detachments extend posteriorly and involve the macula or induce a refractive change. Moderate-to-severe pain and red eye may also occur with a hemorrhagic choroidal detachment.\n\nSigns\n\n(See Figure 11.27.1.)\n\nFigure 11.27.1 Choroidal detachment. \n\nCritical. Smooth and bullous elevation of the retina and choroid that usually extends 360 degrees around the periphery in a lobular configuration in the case of serous choroidal detachment. The elevation is orange-brown in the case of hemorrhagic choroidal detachment. The ora serrata can be seen without scleral depression in some cases.\n\nOther. Serous choroidal detachment: Low IOP (often <6 mm Hg), shallow anterior chamber with mild cell and flare, positive transillumination.\n\nHemorrhagic choroidal detachment: High IOP (if detachment is large), shallow anterior chamber with mild cell and flare, no transillumination.\n\nDifferential Diagnosis\n\n- Melanoma of the ciliary body: Not typically multilobular or symmetric in each quadrant of the globe. Pigmented melanomas do not transilluminate. B-scan US usually helps to differentiate between the two. See [11.36](c11.xhtml#s11-36), Choroidal Nevus and Malignant Melanoma of the Choroid.\n- RRD: Appears corrugated and undulates with eye movements. A break is always present in the retina and pigment cells are often present in the vitreous. Serous choroidal detachment can occur as the result of chronic RRD. See [11.3](c11.xhtml#s11-3), Retinal Detachment.\nEtiology\n\nSerous\n\n- Intraoperative or postoperative: Wound leak, unrecognized scleral perforation, iritis, cyclodialysis cleft, leakage or excess filtration from a filtering bleb, after RD repair by scleral buckling or vitrectomy, or after laser photocoagulation or cryotherapy.\n- Medications: Sulfa drugs, such as topiramate and diuretics, tetracycline antibiotics, and selective serotonin reuptake inhibitors.\n- Traumatic: Often associated with a ruptured globe.\n- Uveitis: posterior uveitis, scleritis, and drug-induced uveitis with anticancer therapies.\n- Other: Chronic RRD, nanophthalmos, malignant HTN, uveal effusion syndrome, carotid–cavernous fistula, primary or metastatic tumor, etc. See specific sections.\nHemorrhagic\n\n- Intraoperative or postoperative: From anterior displacement of the ocular contents and rupture of the short posterior ciliary arteries.\n- Spontaneous (e.g., after perforation of a corneal ulcer). May have no inciting event, especially if on anticoagulants.\nWorkup\n\n- History: Recent ocular surgery or trauma? Known eye or medical problems? Any new medications?\n- Slit-lamp examination: Check for presence of a filtering bleb and perform Seidel test to rule out a wound leak. See [Appendix 5](app1.xhtml#app5), Seidel Test to Detect a Wound Leak. Seidel test all recent surgical wounds. Assess for cell and flare the anterior chamber.\n- Gonioscopy of the anterior chamber angle: Look for a cyclodialysis cleft.\n- Dilated fundus examination: Assess for vitreous cells. Determine whether there is SRF and a retinal break, indicating a concomitant RRD, and whether an underlying choroidal disease or tumor is present. Examination of the contralateral eye may be helpful in diagnosis.\n- In cases suggestive of melanoma, B-scan US and transillumination of the globe are helpful in making a diagnosis. B-scan US is also useful in distinguishing between sero"}, {"id": "11.28", "chapter_num": "11", "chapter": "Retina", "name": "Retinitis Pigmentosa and Inherited Chorioretinal Dystrophies", "raw": "11.28 Retinitis Pigmentosa and Inherited Chorioretinal Dystrophies\n\nRETINITIS PIGMENTOSA\n\nSymptoms\n\nDecreased night vision (nyctalopia) and loss of peripheral vision in rod–cone dystrophy (RCD) and decreased vision in the light (hemeralopia) with cone–rod dystrophy (CRD) forms of RP. Decrease in central vision can occur early or late in the disease process depending on whether rod or cone involvement is predominant. The same is true for color vision.\n\nSigns\n\n(See Figure 11.28.1.)\n\nFigure 11.28.1 Retinitis pigmentosa. \n\nCritical. Clumps of pigment dispersed throughout the peripheral retina in a perivascular pattern, often assuming a “bone spicule” arrangement (though bone spicules may be absent), areas of RPE depigmentation or atrophy, arteriolar narrowing; later, waxy optic disc pallor. Patients often have mild vitreous cells. Progressive visual field loss, usually a ring scotoma, which progresses to a small central field. ERG usually moderately to markedly reduced.\n\nOther. Focal or sectoral pigment clumping, CME, ERM, posterior subcapsular cataract, optic disc drusen.\n\nInheritance Patterns\n\n- Autosomal recessive (most common): Diminished vision (severe) and night blindness occur early in life. Asking about family history, including consanguinity, is important.\n- Autosomal dominant (least severe): More gradual onset of RP, typically in adult life, variable penetrance, late onset of cataract. Visual loss less severe. Can have sectoral RP especially in the inferior retina.\n- X-linked recessive (rarest and most severe): Onset similar to autosomal recessive. Female carriers often have salt-and-pepper fundus. Visual loss is severe.\n- Sporadic.\nTreatment\n\nSome evidence supports that diets high in vitamin A (15,000 IU/d) and lutein (12 mg/d) may help slow midperipheral visual field loss in nonsmokers with RP, but the literature remains inconclusive. Recent evidence suggests that high-dose vitamin A is not helpful. Both epiretinal and subretinal microchip implants have been used with some success to improve vision in patients with very advanced RP but are presently not commercially available. Clinical trials are ongoing with a variety of designs to determine the safety and efficacy of retinal implant technology. In addition, gene therapy has been approved for RPE65 form of RP and other gene therapy trials are ongoing for RCD and CRD.\n\nSYSTEMIC DISEASES ASSOCIATED WITH HEREDITARY RETINAL DEGENERATION\n\nIt is important to ask all patients with suspected inherited retinal dystrophies about possible systemic associations. The most common are genitourinary abnormalities, polydactyly, supernumerary digits, and hearing loss. Other important organ systems that can be associated with inherited retinal disorders are cardiac and central nervous system.\n\nRefsum Disease (Phytanoyl-CoA Hydroxylase Deficiency)\n\nAutosomal recessive RP (often without bone spicules) with increased serum phytanic acid level. May have cerebellar ataxia, peripheral neuropathy, deafness, dry skin, anosmia, liver disease, and cardiac abnormalities. Treat with low-phytanic acid, low-phytol diet (minimize the amount of milk products, animal fats, and green leafy vegetables). Check serum phytanic acid levels every 6 months.\n\nHereditary Abetalipoproteinemia (Bassen–Kornzweig Syndrome)\n\nAutosomal recessive RP (usually without bone spicules) with fat intolerance, diarrhea, crenated erythrocytes (acanthocytes), ataxia, progressive restriction of ocular motility, and other neurologic symptoms"}, {"id": "11.29", "chapter_num": "11", "chapter": "Retina", "name": "Cone Dystrophies", "raw": "11.29 Cone Dystrophies\n\nThere are two categories of disease of the cone system, stationary diseases, and progressive dystrophies.\n\nSymptoms\n\nSlowly progressive visual loss, photophobia, and poor color vision, with onset during the first 3 decades of life. Vision is worse in bright than dim light.\n\nSigns\n\nCritical\n\n- Early: Essentially normal fundus examination, even with poor visual acuity. Abnormal cone function on ERG (e.g., a reduced single-flash photopic response and a reduced flicker response). OCT can show absence of the ellipsoid zone but the external limiting membrane might still be present in the fovea.\n- Late: Bull’s eye macular appearance or central GA of the RPE and choriocapillaris.\nOther. Nystagmus, temporal pallor of the optic disc, spotty pigment clumping in the macular area, tapetal-like retinal sheen. Rarely rod degeneration may ensue, leading to an RP-like picture (e.g., a cone–rod degeneration, which may have an autosomal dominant inheritance pattern).\n\nInheritance\n\nUsually sporadic. Hereditary forms are usually autosomal dominant or less often X-linked.\n\nDifferential Diagnosis\n\n- Stargardt disease: Especially in early stage when yellowish lesions are absent and ERG is usually normal. See [11.30](c11.xhtml#s11-30), Stargardt Disease (Fundus Flavimaculatus).\n- Chloroquine/hydroxychloroquine maculopathy: May produce a bull’s eye macular appearance and poor color vision. History of medication use, no family history of cone degeneration, no nystagmus. See [11.32](c11.xhtml#s11-32), Chloroquine/Hydroxychloroquine Toxicity.\n- Central areolar choroidal dystrophy: GA of the RPE with normal photopic ERG.\n- AMD: Can have GA of the RPE, but with normal color vision and photopic ERG. See [11.16](c11.xhtml#s11-16), Nonexudative (Dry) Age-Related Macular Degeneration and [11.17](c11.xhtml#s11-17), Neovascular or Exudative (Wet) Age-Related Macular Degeneration.\n- Congenital color deficiency: Normal visual acuity, onset at birth, not progressive.\n- RP: Night blindness and peripheral visual field loss. Often with peripheral retinal bone spicules. Can be distinguished by dark-adaptation testing and ERG. See [11.28](c11.xhtml#s11-28), Retinitis Pigmentosa and Inherited Chorioretinal Dystrophies.\n- Optic neuropathy or atrophy: Decreased acuity, impaired color vision, temporal or diffuse optic disc pallor, or both. See [10.17](c10.xhtml#s10-17), Arteritic Ischemic Optic Neuropathy (Giant Cell Arteritis), [10.18](c10.xhtml#s10-18), Nonarteritic Ischemic Optic Neuropathy, and [10.20](c10.xhtml#s10-20), Miscellaneous Optic Neuropathies.\n- Nonphysiologic visual loss: Normal results on ophthalmoscopic examination, IVFA, OCT, ERG, and electrooculogram (EOG). Patients can often be tricked into seeing better by special testing. See [10.25](c10.xhtml#s10-25), Nonphysiologic Visual Loss.\nWorkup\n\n- Family history and genetic testing (see ncbi.nlm.nih.gov/gtr/tests for full list).\n- Complete ophthalmic examination, including formal assessment for dyschromatopsia (e.g., Farnsworth–Munsell 100-hue test).\n- Formal visual field test.\n- Full-field ERG: abnormal photopic response with normal rod-isolated response.\n- OCT can show disruption of outer retinal layers but may be normal even in patients with electrophysical abnormalities.\n- FAF can be useful in the diagnosis (particularly sensitive to disturbances in the RPE), as well as for monitoring these diseases.\nTreatment\n\nThere is no proven cure for cone dystrophy. The following measures may be palliati"}, {"id": "11.30", "chapter_num": "11", "chapter": "Retina", "name": "Stargardt Disease (Fundus Flavimaculatus)", "raw": "11.30 Stargardt Disease (Fundus Flavimaculatus)\n\nSymptoms\n\nDecreased vision in childhood or young adulthood. Early in the disease, the decrease in vision is often out of proportion to the clinical ophthalmoscopic appearance; therefore, care must be taken not to label the child a malingerer.\n\nSigns\n\n(See Figures 11.30.1 to 11.30.3.)\n\nFigure 11.30.1 Stargardt disease. \n\nFigure 11.30.2 Intravenous fluorescein angiography of Stargardt disease exhibiting silent choroid. \n\nFigure 11.30.3 Fundus autofluorescence in Stargardt disease. \n\nCritical. Any of the following may be present.\n\n- A relatively normal-appearing fundus except for slight granularity in the foveola.\n- Yellow or yellow-white, fleck-like deposits at the level of the RPE, often in a pisciform (fish-tail) configuration.\n- Atrophic macular degeneration: May have a bull’s eye appearance as a result of atrophy of the RPE around a normal central core of RPE, a “beaten-metal” appearance, pigment clumping, or marked GA.\nNOTE: In early stages, vision declines before visible macular changes develop.\n\nOther. Vermilion or light-brown fundus with obscuration of choroidal vasculature. Atrophy of the RPE just outside of the macula or in the midperipheral fundus, normal peripheral visual fields in most cases, and rarely an accompanying cone or rod dystrophy. Peripapillary sparing best seen by FAF. The ERG is typically normal in the early stages but may become abnormal late in the disease. The EOG can be subnormal.\n\nInheritance\n\nUsually autosomal recessive, but occasionally autosomal dominant (dominant cases may be asymptomatic into middle age).\n\nDifferential Diagnosis\n\n- Pattern dystrophy: Has peripapillary sparing similar to Stargardt. Autosomal dominant. See 11.31, Best Disease (Vitelliform Macular Dystrophy).\n- Fundus albipunctatus: Diffuse, small, white, discrete dots, most prominent in the midperipheral fundus and rarely present in the fovea; congenital stationary night blindness variant; no atrophic macular degeneration or pigmentary changes. Visual acuity and visual fields remain normal. Prolonged dark-adaptation time with normal ERG.\n- Retinitis punctata albescens: Similar clinical appearance to fundus albipunctatus, but visual acuity, visual field, and night blindness progressively worsen. A markedly abnormal ERG develops. Variant of RP.\n- Drusen: Small, yellow-white spots deep to the retina, sometimes calcified, usually developing later in life. IVFA may be helpful (all drusen exhibit hyperfluorescence, whereas fundus flavimaculatus lesions show variable hyperfluorescence and some areas without flecks show hyperfluorescence).\n- Cone dystrophy or CRD: May have normal fundus in early stages. May have bull’s eye maculopathy, but have significant color vision deficit and a characteristic ERG. See [11.29](c11.xhtml#s11-29), Cone Dystrophies.\n- Batten disease and Spielmeyer–Vogt syndrome: Autosomal recessive lysosomal storage disease characterized by progressive dementia and seizures. May have bull’s eye maculopathy, variable degree of optic atrophy, attenuation of retinal vasculature, and peripheral RPE changes. Shows characteristic curvilinear or fingerprint inclusions on electron microscopy of peripheral blood or conjunctival biopsy. Variants of RP.\n- Chloroquine/hydroxychloroquine maculopathy: History of medication use. See [11.32](c11.xhtml#s11-32), Chloroquine/Hydroxychloroquine Toxicity.\n- Pentosan polysulfate toxicity: Medication used to treat the symptoms of interstitial nephritis."}, {"id": "11.31", "chapter_num": "11", "chapter": "Retina", "name": "Best Disease (Vitelliform Macular Dystrophy)", "raw": "11.31 Best Disease (Vitelliform Macular Dystrophy)\n\nSymptoms\n\nDecreased vision, scotoma, metamorphopsia, or asymptomatic.\n\nSigns\n\n(See Figure 11.31.1.)\n\nFigure 11.31.1 Best disease. \n\nCritical. Yellow, round, subretinal lesion(s) likened to an egg yolk (lipofuscin) or in some cases to a pseudohypopyon. Typically bilateral and located in the fovea, measuring approximately one to two disc areas in size. Likely present at birth, though may not be detected until examination is performed. Ten percent of lesions are multiple and extrafoveal. ERG is typically normal, while EOG is abnormal, showing severe loss of the light response.\n\nOther. The lesions may degenerate, and patients may develop macular CNV (20% of patients), hemorrhage, and atrophic scarring. In the scar stage, it may be indistinguishable from AMD. Hyperopia is common due to shortened axial length along with angle-closure glaucoma; may also have esophoria or esotropia.\n\nInheritance\n\nAutosomal dominant with variable penetrance and expression. Due to a mutation of the BEST1 gene. An autosomal recessive form with many small vitelliform lesions is also occasionally seen and diagnosed earlier in age than the autosomal dominant form.\n\nDifferential Diagnosis\n\n- Pattern dystrophy: A type of pattern dystrophy, adult-onset foveomacular dystrophy, can mimic Best disease or Stargardt disease. There is peripapillary sparing. The egg yolk lesions are usually smaller, appearing from ages 30 to 50 years. The condition is dominantly inherited, and the EOG may or may not be abnormal, although genetic testing is now more common than EOG testing. Typically due to mutation of the PRPH2 gene, rather than BEST1. Visual acuity is usually normal or slightly decreased until the sixth decade of life, when central vision may be compromised by GA. There is no effective treatment for this entity, unless CNV develops and thus anti-VEGF injections may be used to treat CNV.\n- AMD: See above and [11.16](c11.xhtml#s11-16), Nonexudative (Dry) Age-Related Macular Degeneration.\nWorkup\n\n- Family history. It is often helpful to examine family members.\n- Complete ocular examination, including a dilated fundus examination, carefully inspecting the macula with a slit lamp and a handheld lens.\n- EOG is highly specific and can be used to confirm the diagnosis or to detect the carrier state of the disease. Carriers may have normal fundi but an abnormal EOG, though EOG is used less in the era of genetic testing.\n- Genetic testing to confirm mutation of BEST1 gene.\n- Consider IVFA or OCTA and OCT to detect the presence of or to delineate CNV.\nTreatment\n\nThere is no effective treatment for the underlying disease. Treatment for CNV is controversial because it may heal without devastating visual loss. In the era of intravitreal anti-VEGF agents, these are now typically first-line agents for CNV, but PDT and focal laser may also play a potential role. Additionally, due to development of subretinal hemorrhage with mild trauma, polycarbonate lenses are recommended at all times and especially while playing sports. See [11.17](c11.xhtml#s11-17), Neovascular or Exudative (Wet) Age-Related Macular Degeneration, for detailed treatment options for CNV.\n\nFollow-Up\n\nPatients with CNV should be treated promptly. Otherwise, there is no urgency in seeing patients with this disease. Patients are given an Amsler grid (see [Appendix 4](app1.xhtml#app4), Amsler Grid), instructed on its use, and told to return immediately if a change is noted.\n\n"}, {"id": "11.32", "chapter_num": "11", "chapter": "Retina", "name": "Chloroquine/Hydroxychloroquine Toxicity", "raw": "11.32 Chloroquine/Hydroxychloroquine Toxicity\n\nSymptoms\n\nOften asymptomatic early, then decreased vision, abnormal color vision, reduced dark adaptation.\n\nSigns\n\nCritical. Bull’s eye macula (ring of depigmentation surrounded by a ring of increased pigmentation), loss of foveal reflex.\n\nOther. Increased pigmentation in the macula, arteriolar narrowing, vascular sheathing, peripheral pigmentation, decreased color vision, CME, visual field abnormalities (central, paracentral, or peripheral scotoma), and abnormal dark adaptation. Whorl-like corneal changes may also be observed.\n\nMajor Risk Factors\n\n- Chloroquine daily dosage: >2.3 mg/kg real weight\n- Hydroxychloroquine daily dosage: >5.0 mg/kg real weight\n- Duration of use: >5 years, assuming no other risk factors\n- Renal disease, tamoxifen use, comorbid macular disease\nDifferential Diagnosis of Bull’s Eye Maculopathy\n\n- Cone dystrophy: Family history, usually <30 years of age, severe photophobia, abnormal to nonrecordable photopic ERG. See [11.29](c11.xhtml#s11-29), Cone Dystrophies.\n- Stargardt disease: Family history, usually <25 years of age, may have white-yellow flecks in the posterior pole and midperiphery. See [11.30](c11.xhtml#s11-30), Stargardt Disease (Fundus Flavimaculatus).\n- AMD: Drusen; pigment clumping, atrophy, and exudative changes in the neovascular form. See [11.16](c11.xhtml#s11-16), Nonexudative (Dry) Age-Related Macular Degeneration and [11.17](c11.xhtml#s11-17), Neovascular or Exudative (Wet) Age-Related Macular Degeneration.\n- Batten disease and Spielmeyer–Vogt syndrome: Pigmentary retinopathy, seizures, ataxia, and progressive dementia. See [11.30](c11.xhtml#s11-30), Stargardt Disease (Fundus Flavimaculatus).\nTreatment\n\nDiscontinue the medication in conjunction with the prescribing physician if signs of toxicity develop.\n\nBaseline Workup\n\nBaseline evaluation should be performed within the first year of starting the medication.\n\n- Best corrected visual acuity.\n- Ophthalmoscopic examination, including dilated fundus examination with particular attention to any pigmentary alterations.\n- Consider posterior pole fundus photographs.\n- Consider visual fields and OCT if maculopathy is present.\nFollow-Up\n\nAfter 5 years of medication use (sooner in presence of major risk factors), begin annual screening:\n\n- Automated visual fields: Preferably white SITA testing and 10–2 pattern for non-Asians. 24–2 or 30–2 pattern recommended for Asian patients in whom toxicity often manifests in the more peripheral macula.\n- Spectral domain OCT: Parafoveal photoreceptor layer thinning and/or disruption of outer retinal layers (“flying saucer sign”), RPE atrophy, loss of foveal contour. Consider wide-angle scans including vascular arcades in Asian patients.\n- Additional tools that may be used as available or in suspect cases include multifocal ERG and FAF (see Figure 11.32.1).\nFigure 11.32.1 Fundus autofluorescence of hydroxychloroquine toxicity. \n\nNOTE: Once ocular toxicity develops, it usually does not regress even if the drug is withdrawn. In fact, new toxic effects may develop, and old ones may progress even after the chloroquine/hydroxychloroquine has been discontinued.\n\nREFERENCE\n\nMarmor MF, Kellner U, Lai TY, et al; American Academy of Ophthalmology. Recommendations on screening for chloroquine and hydroxychloroquine retinopathy (2016 Revision). Ophthalmology. 2016;123(6):1386–1394.\n\n"}, {"id": "11.33", "chapter_num": "11", "chapter": "Retina", "name": "Crystalline Retinopathy", "raw": "11.33 Crystalline Retinopathy\n\nSymptoms\n\nDecreased vision or asymptomatic.\n\nSigns\n\nCritical. Intraretinal refractile deposits.\n\nOther. If crystals are intravascular and cause capillary nonperfusion, peripheral neovascularization as well as neovascularization of the optic nerve can develop (most commonly with talc). ME, macular pucker, and VH may also occur. Dermatologic examination may reveal evidence of intravenous drug abuse.\n\nDifferential Diagnosis\n\n- Hard exudates: Intraretinal lipid exudates as can be seen in multiple conditions (e.g., diabetic retinopathy, CRVO/BRVO, Coats disease, retinal telangiectasia, RAM). Hard exudates are not seen within retinal vessels.\n- Calcific drusen: Seen in dry AMD. Drusen are subretinal, not intravascular.\nEtiology\n\n- Canthaxanthin toxicity: Oral tanning agent causing ring-shaped deposits in the superficial retina. Generally asymptomatic and usually resolves over many years when the drug is stopped. Usually requires a total of 19 g over 2 years. Crystals appear more prominent in eyes with pre-existing retinal disease and patients taking beta-carotene.\n- Tamoxifen: Used in patients with hormone receptor-positive breast cancer. Toxicity usually requires 7.7 g total. Crystals appear in the inner retina usually around the macula and may cause ME. Vision may improve with discontinuation of drug, but crystals remain. Asymptomatic patients taking tamoxifen do not need to be screened. Consider medication change if evidence of toxicity in consultation with patient’s oncologist.\n- Retinal arterial emboli: Seen within vessel. See [11.6](c11.xhtml#s11-6), Central Retinal Artery Occlusion and [11.7](c11.xhtml#s11-7), Branch Retinal Artery Occlusion.\n- Talc: Red-yellow refractile particles seen intravascularly in intravenous drug users. Usually requires chronic IV drug use over several months to years before retinopathy develops.\n- Methoxyflurane: An inhalational anesthetic agent. Calcium oxalate crystals deposited throughout the body can lead to irreversible renal failure. Crystals seen in both the RPE and inner retina.\n- Bietti crystalline dystrophy: Crystals of unknown composition in the peripheral corneal stroma and in the retina at different layers. See [11.28](c11.xhtml#s11-28), Retinitis Pigmentosa and Inherited Chorioretinal Dystrophies.\n- Idiopathic juxtafoveal/parafoveal telangiectasis: Telangiectasis of juxtafoveal or parafoveal retinal capillaries leading to exudation and deposition of crystals on the ILM. The temporal perifoveal area may exhibit grayish discoloration. Patients can develop ME and/or CNV. Disease progression can lead to cystic retinal changes or even macular hole.\n- Other: Nitrofurantoin toxicity, Sjögren–Larsson syndrome, West-African crystalline maculopathy, chronic RD, among others.\nWorkup\n\n- Complete past medical and medication history: Intravenous drug use? Cardiovascular risk factors such as HTN, elevated cholesterol? Breast cancer? Use of oral tanning agents? History of anesthesia in patient with renal failure?\n- Complete ocular examination, including dilated fundus evaluation using a slit lamp and a handheld lens along with indirect ophthalmoscopy. Carefully assess the location, depth, color, and morphology of crystals as well as the potential presence of ME, neovascularization of the disc and peripheral retina, or retinal infarction. Examine the cornea for crystals.\n- Consider carotid Doppler US and echocardiography in older patients and those with cardiovascular risk factors."}, {"id": "11.34", "chapter_num": "11", "chapter": "Retina", "name": "Optic Pit", "raw": "11.34 Optic Pit\n\nSymptoms\n\nAsymptomatic if isolated. May notice distortion of straight lines or edges, blurred vision, a blind spot, or micropsia if subretinal/submacular fluid develops.\n\nSigns\n\n(See Figure 11.34.1.)\n\nFigure 11.34.1 Optic pit with associated serous macular detachment. \n\nCritical. Small, round depression (usually gray, yellow, or black in appearance) in the nerve tissue of the optic disc. Most are temporal, approximately one-third are central, but may be present anywhere on the nerve head.\n\nOther. Peripapillary atrophy, white or gray membrane overlying pit, rarely RAPD, various visual field defects. May develop localized detachment of the sensory retina and/or retinoschisis extending from the disc to the macula, usually unilateral.\n\nDifferential Diagnosis\n\n- Acquired pit (pseudo pit): Sometimes seen in patients with advanced open-angle glaucoma. See [9.1](c09.xhtml#s9-1), Primary Open-Angle Glaucoma.\n- Other causes of cyst, fluid, or hole in the macula. OCT is key. See [11.15](c11.xhtml#s11-15), Central Serous Chorioretinopathy.\nWorkup\n\n- Complete ophthalmologic examination including slit-lamp examination of the optic nerve and macula with a handheld lens to evaluate for macular fluid.\n- Measure IOP.\n- Obtain baseline automated visual field testing (e.g., Octopus, Humphrey).\n- If macular fluid is present, consider OCT to characterize precisely and IVFA to rule out CSCR or CNV.\nTreatment\n\n- Isolated optic pit: No treatment required.\n- Optic pit with serous detachment causing vision loss: Watchful waiting or vitrectomy, ILM peel, and intravitreal gas are most commonly used. Laser photocoagulation to the temporal margin of the optic disc and macular buckling have also been described.\nFollow-Up\n\n- Isolated optic pits: Yearly examination including IOP check, dilated fundus examination, and visual field testing if indicated; sooner if symptomatic. Patients should be given an Amsler grid. See [Appendix 4](app1.xhtml#app4), Amsler Grid. Monitor for and treat amblyopia if present.\n- Optic pits with serous macular detachment or retinoschisis: Refer for retinal evaluation.\n"}, {"id": "11.35", "chapter_num": "11", "chapter": "Retina", "name": "Solar or Photic Retinopathy", "raw": "11.35 Solar or Photic Retinopathy\n\nSymptoms\n\nDecreased visual acuity, central/paracentral scotomata, dyschromatopsia, metamorphopsia. Typically bilateral.\n\nSigns\n\n(See Figure 11.35.1.)\n\nFigure 11.35.1 Solar retinopathy. \n\nCritical. Acute findings include a yellow-white spot in the fovea with or without surrounding granular gray pigmentation. Classic late finding is a red, sharply demarcated lesion in the fovea.\n\nOther. Visual acuity usually ranges from 20/25 to 20/100. Amsler grid testing may reveal central or paracentral scotoma. Resolution of acute findings within several weeks may leave a variable appearance to the fovea (e.g., pigmentary disturbance, lamellar hole, normal appearance). Eyes with better initial visual acuities are more likely to have unremarkable fundoscopic examinations at follow-up.\n\nDifferential Diagnosis\n\n- Macular hole or vitreomacular traction: See [11.25](c11.xhtml#s11-25), Vitreomacular Adhesion/Vitreomacular Traction/Macular Hole.\n- Idiopathic macular telangiectasia type 2: May have OCT findings similar to those seen in chronic solar retinopathy, although on IVFA juxtafoveal capillary telangiectasis is seen with leakage. May be complicated by CNV.\n- Intraretinal cysts, as for example in chronic CME, but this can be differentiated by OCT.\n- Pattern dystrophy: Adult-onset foveomacular dystrophy. See [11.31](c11.xhtml#s11-31), Best Disease (Vitelliform Macular Dystrophy).\nEtiology\n\nUnprotected solar eclipse viewing, sungazing (e.g., related to religious rituals, psychiatric illnesses, hallucinogenic drugs), sunbathing, vocational exposure (e.g., aviation, military service, astronomy, arc welding).\n\nWorkup\n\n- History: Eclipse viewing or sungazing? Work exposure? Photosensitizing medications?\n- Complete ocular examination, including a dilated fundus examination and careful inspection of the macula with a slit lamp using a handheld lens.\n- Amsler grid testing may identify central or paracentral scotomata.\n- IVFA typically shows a window defect late in the disease course.\n- OCT findings in the acute setting include hyporeflectivity at the level of the RPE and occasional hyperreflectivity of the injured neurosensory retina. In the chronic stage, a central hyporeflective defect at the level of the photoreceptor inner segment–outer segment junction is seen (see Figure 11.35.2).\nFigure 11.35.2 Optical coherence tomography of solar retinopathy. \n\nTreatment\n\n- Observation. Eyes with better visual acuities on initial examination tend to recover more vision. Long-term significant reduction in visual acuity is rare. However, central or paracentral scotomata may persist despite improvement in visual acuity.\n"}, {"id": "11.36", "chapter_num": "11", "chapter": "Retina", "name": "Choroidal Nevus and Malignant Melanoma of the Choroid", "raw": "11.36 Choroidal Nevus and Malignant Melanoma of the Choroid\n\nCHOROIDAL NEVUS\n\nSymptoms\n\nUsually asymptomatic. Rare symptoms include flashes of light (if SRF present) or decreased visual acuity (if directly subfoveal).\n\nSigns\n\n(See Figure 11.36.1.)\n\nFigure 11.36.1 Choroidal nevus. \n\nCritical. Flat or minimally elevated pigmented or nonpigmented choroidal lesion.\n\nOther. Usually <2 mm thick with gradual elevation from the choroid. Overlying drusen become more prominent with age and can appear as hard cuticular drusen or soft drusen. RPE atrophy, hyperplasia, and detachment can occur. Rarely, overlying orange pigment (lipofuscin) or SRF is detected. Minimal growth of <1 mm over many years can be found. If >1 mm growth is observed over shorter period (1 year), transformation into melanoma should be considered.\n\nRisk Factors for Malignant Transformation\n\nThese are remembered by the mnemonic “to find small ocular melanoma doing imaging” whereby the first letter of each word (TFSOM-DIM) represents a risk factor found using multimodal imaging.\n\n- T: Thickness >2 mm (US).\n- F: Fluid subretinal (OCT).\n- S: Symptoms (vision loss, <20/50 on Snellen visual acuity).\n- O: Orange pigment hyperautofluorescence (autofluorescence).\n- M: Melanoma hollow (US).\n- DIM: Diameter >5 mm (photography).\nNOTE: If four or more factors are present, the lesion has a >50% chance to show growth and is likely to be a small choroidal melanoma, and if only one risk factor is present the risk is 11%, although the presence of orange pigment along portends a 37% risk of melanoma.\n\nDifferential Diagnosis\n\nSee below for differential diagnosis of pigmented/nonpigmented choroidal lesions.\n\nWorkup\n\n- Complete ophthalmologic examination including dilated fundus examination with evaluation of the lesion using a 20-diopter lens.\n- Detailed clinical drawing of the lesion with careful attention to location and size.\n- Baseline color photos of the lesion to assist in diameter assessment and in documenting growth.\n- OCT to document the overlying retinal features, SRF, and the lesion itself using enhanced-depth imaging.\n- Autofluorescence to document the presence of lipofuscin or RPE disturbance.\n- US for tumor thickness measurement and internal acoustic qualities.\nTreatment\n\nObservation. First examination should be in 3 to 4 months to confirm stability and then one to two times yearly to document stability.\n\nFollow-Up\n\nLow-risk lesions can be followed with annual dilated fundus examination. High-risk lesions should be followed every 3 to 6 months.\n\nMALIGNANT MELANOMA OF THE CHOROID\n\nSymptoms\n\nDecreased vision, visual field defect, floaters, light flashes, rarely pain; often asymptomatic.\n\nSigns\n\n(See Figure 11.36.2.)\n\nFigure 11.36.2 Choroidal melanoma. \n\nCritical. Gray-green or brown (melanotic) or yellow (amelanotic) choroidal mass that exhibits one or more of the following:\n\n- Presence of SRF.\n- Thickness ≥2 mm, especially with an abrupt elevation from the choroid.\n- Ill-defined, large areas of geographic orange pigment over the lesion.\n- A dome, mushroom, or plateau shape with congested blood vessels in the apex of the tumor.\n- Break in Bruch membrane with subretinal hemorrhage.\n- Growth.\nNOTE: A diffuse choroidal melanoma can appear as a minimally thickened dark choroidal lesion without a prominently elevated mass and can simulate a nevus.\n\nOther. Overlying cystoid retinal degeneration, VH or vitreous pigmented cells, drusen on the tumor surface, CNV, proptosis (from orbital invasion"}, {"id": "12.1", "chapter_num": "12", "chapter": "Uveitis", "name": "Anterior Uveitis (Iritis/Iridocyclitis)", "raw": "12.1 Anterior Uveitis (Iritis/Iridocyclitis)\n\nSymptoms\n\n- Acute: Pain, redness, photophobia, consensual photophobia (pain in the affected eye when a light is shone in the fellow eye), excessive tearing, and decreased vision.\n- Chronic: Decreased vision (from cataract, vitreous debris, CME, epiretinal membrane [ERM]), and/or floaters. May have periods of exacerbations and remissions with few acute symptoms (e.g., juvenile idiopathic arthritis [JIA]–associated uveitis).\nSigns\n\nCritical\n\n- Cells and flare in the AC (see Tables 12.1.1 and 12.1.2) and ciliary flush.\nTABLE 12.1.1 Grading of Anterior Chamber Cells\n\n| Grade | Cells in 1 × 1 mm Field |\n| --- | --- |\n| 0 | <1 |\n| 0.5+ | 1–5 |\n| 1+ | 6–15 |\n| 2+ | 16–25 |\n| 3+ | 26–50 |\n| 4+ | >50 |\n\nTABLE 12.1.2 Grading of Anterior Chamber Flare\n\n| Grade | Description |\n| --- | --- |\n| 0 | None |\n| 1+ | Faint |\n| 2+ | Moderate (iris/lens details clear) |\n| 3+ | Marked (iris/lens details hazy) |\n| 4+ | Intense (fibrin/plastic aqueous) |\n\nKeratic Precipitates (KP)\n\n- Stellate KP—small KP with multiple fine projections from their core, appearing “star-shaped.”\n- Herpes simplex virus (HSV), varicella-zoster virus (VZV), cytomegalovirus (CMV), Fuchs heterochromic iridocyclitis (FHIC).\n- Nongranulomatous KP (NGKP)—small round KP.\n- HLA-B27–associated, trauma, syphilis, masquerade syndromes, JIA-associated uveitis, Posner–Schlossman syndrome (glaucomatocyclitic crisis), drug induced. Granulomatous uveitides such as sarcoidosis can present with NGKP; the reverse rarely occurs.\n- Granulomatous KP—large KP with a greasy or “mutton fat” appearance.\n- Sarcoidosis, syphilis, toxoplasmosis, tuberculosis (TB), JIA-associated uveitis, sympathetic ophthalmia, lens-induced uveitis, Vogt–Koyanagi–Harada (VKH) syndrome, and others.\nHypopyon\n\n- Layering of white blood cells in the AC.\n- Differential for hypopyon uveitis includes HLA-B27, sarcoidosis, phacogenic anaphylaxis, endophthalmitis, syphilis, TB, Behçet disease, herpetic, rifabutin, and the pseudohypopyon of lymphoma, leukemia, retinoblastoma, or triamcinolone.\n- A bloody hypopyon is suggestive of herpetic uveitis.\n- A shifting hypopyon (moves with head position) suggests Behçet disease, lymphoma, or pseudohypopyon from prior triamcinolone injection.\nOther. Low intraocular pressure (IOP) (more common, secondary to ciliary body hyposecretion), elevated IOP (e.g., herpetic, lens induced, FHIC, Posner–Schlossman syndrome), fibrin (e.g., HLA-B27, endophthalmitis), i
