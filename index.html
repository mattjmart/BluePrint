he eye with the lighter-colored iris, usually unilateral. Often associated with a cataract or glaucoma. See [12.1](c12.xhtml#s12-1), Anterior Uveitis (Iritis/Iridocyclitis).\n- Iris nevus syndrome: Corneal edema, peripheral anterior synechiae, iris atrophy, or an irregular pupil can be present along with multiple iris nodules and glaucoma.\n- Pigment dispersion: Usually bilateral. The iris is rarely heavily pigmented (although the trabecular meshwork can be), and iris transillumination defects are often present. See [9.9](c09.xhtml#s9-9), Pigment Dispersion Syndrome/Pigmentary Glaucoma.\n- Hemosiderosis: A dark iris can result after iron breakdown products from old blood deposits on the iris surface. Patients have a history of a traumatic hyphema or vitreous hemorrhage.\n- Siderosis from a retained metallic foreign body.\nWorkup\n\n- History: Previous cancer, ocular surgery, or trauma? Weight loss? Anore"}, {"id": "6.1", "chapter_num": "6", "chapter": "Oculoplastics", "name": "Ptosis", "raw": "6.1 Ptosis\n\nSymptoms\n\nDrooping upper eyelid, superior visual field compromise. Peripheral visual compromise which often gets worse with reading and at night. Concerning associated symptoms include variability, diplopia, headache, and neck pain.\n\nSigns\n\n(See Figure 6.1.1.)\n\nFigure 6.1.1 Ptosis. \n\nCritical. Drooping upper eyelid.\n\nOther. Concerning associated signs include anisocoria, proptosis, and ocular motility deficits. See individual entities.\n\nEtiology\n\nNOTE: Although the majority of ptosis is aponeurotic and of benign etiology, certain entities must be ruled out by careful examination.\n\n- Horner syndrome.\n- Third cranial nerve (CN) palsy (complete, partial, or aberrant CN III regeneration).\n- Myasthenia gravis.\n- Orbital tumor.\n- Eyelid/conjunctival tumor.\n- Chronic progressive external ophthalmoplegia (CPEO) (particularly Kearns–Sayre syndrome, see [10.12](c10.xhtml#s10-12), Chronic Progressive External Ophthalmoplegia).\n- Myotonic dystrophy.\n- Oculopharyngeal muscular dystrophy.\nCategories\n\n- Myogenic: True myogenic ptosis is most commonly congenital. It is present at birth and is caused by localized dysgenesis of the levator palpebrae superioris. It results in poor levator function (<10 mm of excursion) and poor or absent eyelid crease. A poor Bell phenomenon (palpebral oculogyric reflex), lagophthalmos in downgaze, and upgaze limitation may indicate a double elevator palsy. Acquired myogenic ptosis is uncommon and may be seen with myotonic dystrophy, oculopharyngeal muscular dystrophy, and CPEO, or secondary to trauma.\n- Aponeurotic: The most common cause of ptosis. Occurs secondary to levator dehiscence and is characterized by an elevated eyelid crease, and preserved levator function (10 to 15 mm). Often worse in downgaze. Levator dehiscence is typically the result of involutional aging changes, but can be seen with repetitive eye rubbing, use of rigid contact lenses (pulling on the eyelids to put in or take out), trauma, or previous intraocular surgery (speculum-related muscle damage).\n- Neurogenic: Third CN palsy (often complete ptosis with pupillary and motility abnormalities; congenital, compressive, or vasculopathic, see [10.5](c10.xhtml#s10-5), Isolated Third Nerve Palsy); Horner syndrome (mild, ∼2-mm upper and lower eyelid ptosis, see [10.2](c10.xhtml#s10-2), Horner Syndrome); myasthenia gravis (variable degree, duration, and laterality, worsens with fatigue, see [10.11](c10.xhtml#s10-11), Myasthenia Gravis); Marcus Gunn jaw-winking syndrome (ptotic eyelid elevates with jaw movement); ophthalmoplegic migraine; and multiple sclerosis.\n- Mechanical: Foreign-body or retained contact lens in upper fornix; upper eyelid or forniceal inflammation (chalazion, giant papillary conjunctivitis, posttraumatic or postsurgical edema); and neoplasm.\n- Traumatic: Eyelid laceration with levator involvement, levator contusion, tethering or ischemia within an orbital roof fracture, late dehiscence, or cicatricial changes.\n- Pseudoptosis: Contralateral eyelid retraction or proptosis, ipsilateral enophthalmos or hypertropia, microphthalmia, phthisis bulbi, dermatochalasis, brow ptosis, eyelid tumor, edema, blepharospasm, or Duane syndrome.\nWorkup\n\n- History: Onset and duration? Present since birth? Old photographs (e.g., driver’s license) and family members’ opinions are useful adjuncts to the history. Prior surgery in either eye? Trauma? Fluctuation throughout the day? Associated diplopia, headache, or neck pain? Trouble breathing or swall"}, {"id": "6.2", "chapter_num": "6", "chapter": "Oculoplastics", "name": "Ectropion", "raw": "6.2 Ectropion\n\nSymptoms\n\nTearing, irritation, redness, and mucous discharge. May be asymptomatic.\n\nSigns\n\n(See Figure 6.2.1.)\n\nFigure 6.2.1 Ectropion. \n\nCritical. Outward turning of the eyelid margin, which can lead to significant corneal exposure. In extreme cases, an exposed cornea can develop erosion, ulceration, perforation and permanent vision loss.\n\nOther. Superficial punctate keratopathy (SPK) from corneal exposure; conjunctival injection and thickening and eventual keratinization from chronic dryness. Eyelid scarring may be seen in cicatricial cases. Facial hemiparesis and lagophthalmos may be seen in paralytic cases.\n\nEtiology\n\n- Involutional: Horizontal eyelid laxity, most common etiology.\n- Paralytic: CN VII palsy, traumatic or postsurgical orbicularis paralysis.\n- Cicatricial: Anterior lamellar shortening from burn injury, prior surgery or trauma, actinic damage, chronic inflammation, skin diseases (e.g., eczema and ichthyosis), and others.\n- Mechanical: Excess weight on lower eyelid may be due to herniated orbital fat, eyelid tumor, and others.\n- Allergic: Contact dermatitis.\n- Congenital: Facial dysmorphic syndromes (e.g., Treacher Collins syndrome), Down syndrome, blepharophimosis syndrome, or isolated abnormality.\nWorkup\n\n- History: Previous surgery, trauma, chemical burn, or CN VII palsy?\n- External examination: Check orbicularis oculi function and assess horizontal eyelid laxity and punctal location. Look for an eyelid tumor, scarring, herniated orbital fat, etc. If there is concomitant CN VII palsy and CN VIII deficit (hearing loss), consider CT or MRI brain to rule out acoustic neuroma. Consider imaging for isolated CNVII palsy if it has not been worked up or etiology other than Bell palsy is suspected.\n- Slit-lamp examination: Evaluate for exposure keratopathy and conjunctival inflammation.\nTreatment\n\n- Treat exposure keratopathy with lubricating agents. See [4.5](c04.xhtml#s4-5), Exposure Keratopathy.\n- Treat an inflamed, exposed eyelid margin with warm compresses and antibiotic ointment (e.g., bacitracin or erythromycin q.i.d.). A short course of combination antibiotic–steroid ointment (e.g., neomycin/polymyxin B/dexamethasone) may be helpful if close follow-up is ensured.\n- Taping the eyelids into position may be a temporizing measure.\n- Definitive treatment may require surgery. Surgical options should address the underlying etiology for ectropion:\n- Involutional ectropion: Lateral tarsal strip involves horizontally shortening the lower eyelid and resecuring to the periosteum. Other options include the modified-Bick, Bick, and lateral canthoplasty.\n- Punctal or medial ectropion: Medial spindle procedure, medial canthoplasty.\n- Paralytic ectropion: Lateral tarsal strip coupled with cheek lift. A temporary tarsorrhaphy can be used to protect ocular surface if nerve recovery is anticipated.\n- Mechanical ectropion: Address etiologic source and proceed with appropriate reconstruction of the eyelid.\n- Cicatricial ectropion: Release of cicatricial tethering, lengthening the lower eyelid with either anterior or posterior lamellar grafts. In some cases, cheek or midface lift can offer further vertical support of the lower eyelid. Medical management of any present underlying dermatologic condition is essential to prevent recurrence.\n- Surgery may be delayed for 3 to 6 months in patients with idiopathic CN VII palsy (Bell palsy) because the ectropion may resolve spontaneously with nerve recovery (see [10.9](c10.xhtml#s10-9)"}, {"id": "6.3", "chapter_num": "6", "chapter": "Oculoplastics", "name": "Entropion", "raw": "6.3 Entropion\n\nSymptoms\n\nIrritation, foreign-body sensation, tearing, and redness.\n\nSigns\n\n(See Figure 6.3.1.)\n\nFigure 6.3.1 Entropion. \n\nCritical. Inward turning of the eyelid margin that pushes otherwise normal lashes onto the globe.\n\nOther. SPK from eyelashes contacting the cornea, conjunctival injection. Corneal epithelial defect, thinning, and/or ulceration in severe cases.\n\nEtiology\n\n- Involutional: Age-induced horizontal eyelid laxity, retractor disinsertion, and orbicularis override.\n- Cicatricial: Conjunctival scarring in mucous membrane pemphigoid, Stevens–Johnson syndrome, posterior lamellar malignancies, chemical burns, trauma, trachoma, and others.\n- Spastic: Sustained orbicularis contraction due to surgical trauma, ocular irritation, or blepharospasm.\n- Congenital\nWorkup\n\n- History: Previous surgery, trauma, chemical burn, or infection (trachoma, herpes simplex, varicella zoster)?\n- Slit-lamp examination: Check for corneal involvement and conjunctival or eyelid scarring.\nTreatment\n\nIf blepharospasm is present, see [6.6](c06.xhtml#s6-6), Benign Essential Blepharospasm.\n\n- Aggressive lubrication and antibiotic ointment (e.g., erythromycin or bacitracin q.i.d.).\n- Everting the eyelid margin away from the globe and taping it in place with lateral traction may be a temporizing measure.\n- A Quickert suture placed at the bedside or in the office can temporarily resolve the eyelid malposition by tightening the lower eyelid retractors and rotating the eyelid margin anteriorly. Neurotoxin therapy can also help temporize spastic entropion.\n- Surgery is often required for permanent correction. Surgical options should address the underlying etiology for entropion:\n- Involutional entropion: Horizontal laxity can be addressed with a lateral tarsal strip or similar procedure. This can be paired with retractor reinsertion. In some cases, judicious orbicularis myectomy or orbicular debulking can improve override of the orbicularis.\n- Cicatricial entropion: Should include medical control of the underlying condition if present. Lengthening of the posterior lamella with scar release and graft placement may be necessary. Graft options include hard palate, buccal mucosal membrane, or allografts.\n- Spastic entropion: Chemodenervation with botulinum toxin helps weaken the orbicularis muscle. Quickert sutures can help rotate the eyelid margin into the appropriate position.\n- Congenital entropion: Lubrication to limit mechanical trauma, taping of the lower eyelid, and chemodenervation with low-dose botulinum toxin can be considered. Surgical options are similar to the above for definitive treatment.\nFollow-Up\n\nIf the cornea is uninvolved, the condition does not require urgent attention or follow-up. If the cornea is significantly damaged, aggressive treatment is indicated (see [4.1](c04.xhtml#s4-1), Superficial Punctate Keratopathy). Follow-up is determined by the severity of corneal involvement.\n\n"}, {"id": "6.4", "chapter_num": "6", "chapter": "Oculoplastics", "name": "Trichiasis", "raw": "6.4 Trichiasis\n\nSymptoms\n\nIrritation, foreign-body sensation, tearing, redness, and photophobia.\n\nSigns\n\nCritical. Misdirected eyelashes rubbing against the globe.\n\nOther. Conjunctival injection; SPK; corneal epithelial defect, infiltrate, or scarring.\n\nEtiology\n\n- Entropion: Inward turning of eyelid pushing normal lashes onto the cornea. See [6.3](c06.xhtml#s6-3), Entropion.\n- Epiblepharon: Congenital or familial condition in which redundant lower eyelid anterior lamella redirects lashes into a vertical position, where they may contact the globe. Most common in Asian individuals, especially children.\n- Distichiasis: An aberrant second row of lashes arising from meibomian gland orifices. Most commonly acquired in the setting of trauma or chronic inflammation (e.g., blepharitis, mucous membrane pemphigoid). Congenital distichiasis is a rare, sometimes hereditary, condition in which the meibomian glands are replaced by an extra row of eyelashes.\n- Idiopathic.\n- Chronic blepharitis: Inflamed eyelid margin. See [5.8](c05.xhtml#s5-8), Blepharitis/Meibomitis.\n- Cicatricial: Eyelid scarring from trauma, surgery, mucous membrane pemphigoid (see [5.10](c05.xhtml#s5-10), Mucous Membrane Pemphigoid [Ocular Cicatricial Pemphigoid]), herpes zoster ophthalmicus (see [4.17](c04.xhtml#s4-17), Herpes Zoster Ophthalmicus/Varicella Zoster Virus), trachoma, Stevens–Johnson syndrome, chemical and thermal burns, medications, and others.\n- Medication-induced: Systemic and topical (e.g., prostaglandin analogs).\n- Malignancy: Some cases of malignancy causing margin distortion or metaplasia may lead to focal trichiasis. See 6.8 Malignant Tumors of the Eyelid.\nWorkup\n\n- History: Recurrent episodes? Prior severe systemic illness or allergic reaction? Prior facial trauma or surgery?\n- Slit-lamp examination: Evert the eyelids and inspect the palpebral conjunctiva for scarring and symblepharon. Assess eyelid position for inward rotation statically and dynamically. Check the cornea for epithelial defects, infiltrates, and scarring.\nTreatment\n\n- Remove the misdirected lashes.\n- A few misdirected lashes: Perform epilation/removal at the slit lamp with fine forceps. Recurrence is common without follicular destruction.\n- Diffuse, severe, or recurrent trichiasis: Definitive therapy usually requires electrolysis, cryotherapy, radiofrequency epilation, argon laser, or eyelid surgery.\n- Treat SPK with antibiotic ointment (e.g., erythromycin or bacitracin b.i.d. to q.i.d.).\n- Treat any underlying blepharitis. See [5.8](c05.xhtml#s5-8), Blepharitis/Meibomitis.\n- Address eyelid malposition if present. See 6.3, Entropion.\nFollow-Up\n\nAs needed based on symptom severity and corneal integrity. Closer follow-up is needed if there is evidence of SPK or corneal epithelial defect.\n\n"}, {"id": "6.5", "chapter_num": "6", "chapter": "Oculoplastics", "name": "Floppy Eyelid Syndrome", "raw": "6.5 Floppy Eyelid Syndrome\n\nSymptoms\n\nChronically red, irritated eye(s) with mild mucous discharge, often worse upon awakening due to eyelid eversion during sleep. Usually bilateral, but often asymmetric. Typically seen in obese patients due to the strong association with sleep apnea, with a slight male predilection.\n\nSigns\n\nCritical. Upper eyelids are easily everted without an accessory finger or cotton-tipped applicator exerting counterpressure.\n\nOther. Rubbery, atrophic superior tarsal plate with conjunctival injection and chronic papillary conjunctivitis, SPK, ptosis with lash ptosis, and/or lower eyelid laxity. Associations include obstructive sleep apnea, obesity, keratoconus, and Down syndrome.\n\nDifferential Diagnosis\n\nThe key differentiating factor is increased horizontal laxity and spontaneous eversion of the upper eyelids.\n\n- Vernal conjunctivitis: Seasonal, itching, and giant papillary reaction. See [5.2](c05.xhtml#s5-2), Chronic Conjunctivitis.\n- Giant papillary conjunctivitis: Often related to contact lens wear or an exposed suture. See [4.22](c04.xhtml#s4-22), Contact Lens–Induced Giant Papillary Conjunctivitis.\n- Superior limbic keratoconjunctivitis: Hyperemia, thickening, and inflammation of the superior bulbar conjunctiva, limbus, and cornea. Often associated with thyroid dysfunction, keratoconjunctivitis sicca, and rarely, rheumatoid arthritis. See [5.4](c05.xhtml#s5-4), Superior Limbic Keratoconjunctivitis.\n- Toxic keratoconjunctivitis: Papillae or follicles are typically more pronounced inferiorly in patients using eye drops. See [5.2](c05.xhtml#s5-2), Chronic Conjunctivitis.\n- Blepharitis: Inflammation of eyelid with associated eyelid and conjunctival irritation, but without eyelid laxity or nocturnal eyelid eversion. See [5.8](c05.xhtml#s5-8), Blepharitis/Meibomitis.\n- Ectropion: Outward turning of the eyelid margin, often leading to tearing, irritation, and eyelid thickening. See [6.2](c06.xhtml#s6-2), Ectropion.\nEtiology\n\nThe underlying etiology is not definitively known. Studies have suggested genetic predispositions and locally elevated matrix metalloproteinase (MMP) levels along with elastin loss. Symptoms are thought to result from spontaneous eversion of the upper eyelid during sleep, allowing the superior palpebral conjunctiva to rub against pillows or sheets. Unilateral or asymmetric symptoms occur in those who tend to sleep prone on the affected side.\n\nWorkup\n\n- Pull the upper eyelid toward the patient’s forehead to determine if it spontaneously everts or is abnormally lax.\n- Conduct slit-lamp examination of the cornea and conjunctiva with fluorescein staining, looking for superior palpebral conjunctival papillae and SPK.\n- Ask about history of snoring and obstructive sleep apnea.\nTreatment\n\n- Topical antibiotic ointment for any mild corneal or conjunctival abnormality (e.g., erythromycin ointment b.i.d. to q.i.d.). May change to artificial tear ointment when lesions resolve.\n- The eyelids may be taped closed during sleep, or a shield may be worn to protect the eyelid from rubbing against the pillow or bed. Patients are asked to refrain from sleeping face down. Asking patients to sleep on their contralateral side may be therapeutic as well as diagnostic.\n- Patients with concomitant obstructive sleep apnea may have improvement of ocular symptoms with adherence to continuous positive airway pressure (CPAP) therapy.\n- Surgical horizontal tightening of the eyelid with lateral tarsal strip or wedge resection i"}, {"id": "6.6", "chapter_num": "6", "chapter": "Oculoplastics", "name": "Benign Essential Blepharospasm", "raw": "6.6 Benign Essential Blepharospasm\n\nSymptoms\n\nUncontrolled blinking, twitching, or closure of the eyelids. Always bilateral, but may briefly be unilateral at the first onset. Many patients also experience eye irritation and photophobia. Occasionally may have mid to lower face and/or neck spasms. Can also be associated with oromandibular dystonia that results in spasms in the jaw and tongue, as well as laryngeal and cervical dystonia, a condition referred to as Meige syndrome.\n\nSigns\n\nCritical. Bilateral, episodic, and involuntary contractions of the orbicularis oculi muscles. Typically progressive over time.\n\nOther. Disappears during sleep.\n\nDifferential Diagnosis\n\n- Hemifacial spasm: Unilateral contractures of the entire side of the face that do not disappear during sleep. Usually idiopathic but may be related to prior CN VII palsy, injury at the level of the brainstem, or compression of CN VII by a blood vessel or tumor. MRI of the cerebellopontine angle should be obtained in all patients to rule out tumors. Treatment options include observation, botulinum toxin injections, or neurosurgical decompression of CN VII.\n- Ocular irritation–induced blepharospasm (e.g., corneal or conjunctival foreign body, trichiasis, blepharitis, iritis, and dry eye).\n- Eyelid myokymia: Subtle eyelid twitch felt by the patient but difficult to observe, commonly brought on by stress, caffeine, alcohol, or ocular irritation. Usually unilateral lower eyelid involvement. Typically self-limited. Treat by avoiding precipitating factors and/or administering small doses of botulinum toxin.\n- Tourette syndrome: Multiple compulsive muscle spasms associated with utterances of bizarre sounds or obscenities.\n- Tic douloureux (trigeminal neuralgia): Acute episodes of pain in the CN V distribution, often causing a wince or tic.\n- Tardive dyskinesia: Orofacial dyskinesia, often with dystonic movements of the trunk and limbs, typically from long-term use of antipsychotic medications.\n- Apraxia of eyelid opening. Usually associated with Parkinson disease. Unlike blepharospasm, apraxia of eyelid opening does not feature spasms. Instead, apraxic patients simply cannot open their eyelids voluntarily.\nEtiology\n\n- Idiopathic and likely multifactorial, possibly involving dopaminergic pathways within the basal ganglia. Studies demonstrate a genetic predisposition in some patients.\nWorkup\n\n- History: Unilateral or bilateral? Does the episode involve the eyelids alone or is the lower face also involved? Are limb muscles involved? Medications?\n- Slit-lamp examination: Examination for dry eye, blepharitis, or foreign body.\n- Neuroophthalmic examination to rule out other accompanying abnormalities.\n- Typical benign essential blepharospasm does not require central nervous system imaging as part of the workup. MRI of the brain with attention to the posterior fossa and path of CN VII is reserved for atypical cases or other diagnoses (e.g., hemifacial spasm).\nTreatment\n\n- Treat any underlying eye disorder causing ocular irritation. See [4.3](c04.xhtml#s4-3), Dry Eye Syndrome and [5.8](c05.xhtml#s5-8), Blepharitis/Meibomitis.\n- Consider botulinum toxin (onabotulinumtoxinA, incobotulinumtoxinA, and abobotulinumtoxinA) injections into the orbicularis muscles around the eyelids. Can also be used to treat orofacial dyskinesia.\n- In rare instances of severe cases refractory to medical management, may consider surgical excision of the orbicularis muscle (myectomy) from the upper and lower eyelids"}, {"id": "6.7", "chapter_num": "6", "chapter": "Oculoplastics", "name": "Chalazion/Hordeolum", "raw": "6.7 Chalazion/Hordeolum\n\nSymptoms\n\nAcute or chronic eyelid lump and swelling that may or may not be tender.\n\nSigns\n\n(See Figure 6.7.1.)\n\nFigure 6.7.1 Chalazion. \n\nCritical. Visible or palpable, well-defined, subcutaneous nodule in the eyelid. In some cases, a nodule cannot be identified.\n\nOther. Blocked meibomian gland orifice, eyelid swelling and erythema, focal tenderness. Associated with blepharitis, seborrheic dermatitis, and acne rosacea. May also note lesion coming to a head or draining mucopurulent material.\n\nDefinitions\n\nChalazion: Focal, tender, or nontender granulomatous inflammation within the eyelid secondary to obstruction of a meibomian gland or gland of Zeis. Typically not due to infection. May be acute, subacute, or chronic.\n\nHordeolum (i.e., stye): Acute, tender infection; can be external (abscess of a gland of Zeis or Moll on eyelid margin) or internal (abscess of the meibomian gland). Usually involves Staphylococcus species and occasionally evolves into preseptal cellulitis.\n\nDifferential Diagnosis\n\n- Preseptal cellulitis: Eyelid and periocular erythema, edema, and warmth. See [6.9](c06.xhtml#s6-9), Preseptal Cellulitis.\n- Forniceal foreign body: Eyelid swelling, particularly in soft contact lens wearers or those with a history of trauma. See [3.4](c03.xhtml#s3-4), Corneal and Conjunctival Foreign Bodies.\n- Basal cell carcinoma: Slow-growing eyelid mass, typically painless, that may appear as pearly nodule or with ulceration. See [6.8](c06.xhtml#s6-8), Malignant Tumors of the Eyelid.\n- Sebaceous carcinoma: Suspect in older patients with recurrent chalazia, eyelid thickening, madarosis, or chronic unilateral blepharitis. See [6.8](c06.xhtml#s6-8), Malignant Tumors of the Eyelid.\n- Pyogenic granuloma: Benign, deep-red, pedunculated conjunctival lesion often associated with chalazia, hordeola, trauma, or surgery. May be excised or treated with a topical antibiotic–steroid combination such as neomycin/polymyxin B/dexamethasone q.i.d. for no more than 1 to 2 weeks. Intraocular pressure must be monitored if topical steroids are used.\nWorkup\n\n- History: Previous ocular surgery or trauma? Previous chalazia or eyelid lesions?\n- External examination: Palpate involved eyelid for a nodule. Look for rosacea.\n- Slit-lamp examination: Evaluate meibomian glands for inspissation and evert the eyelid. Assess for madarosis, poliosis, and ulceration to rule out other etiologies.\nTreatment\n\n- Warm compresses for at least 10 minutes q.i.d. with gentle massage over the lesion.\n- Consider a short course of a topical antibiotic for hordeolum (e.g., bacitracin, tobramycin, or erythromycin ointment b.i.d. for 1 to 2 weeks) or a short course of topical antibiotic/steroid for chalazion (e.g., neomycin/polymyxin B/dexamethasone ointment b.i.d. for 1 to 2 weeks). Consider chronic low-dose doxycycline 20 to 50 mg p.o. daily to b.i.d. for its anti-inflammatory properties (e.g., for multiple or recurrent chalazia and/or ocular rosacea).\n- If a hordeolum worsens, consider incision and drainage and management as per preseptal cellulitis (see [6.9](c06.xhtml#s6-9), Preseptal Cellulitis).\n- If the chalazion fails to resolve after 3 to 4 weeks of medical therapy and the patient desires surgical intervention, incision and curettage may be performed. Alternatively, an intralesional steroid injection may be performed. Options include 0.2 to 1.0 mL of dexamethasone sodium phosphate 4 mg/mL or betamethasone sodium phosphate/betamethasone acetate 6 mg/mL that ma"}, {"id": "6.8", "chapter_num": "6", "chapter": "Oculoplastics", "name": "Malignant Tumors of the Eyelid", "raw": "6.8 Malignant Tumors of the Eyelid\n\nSymptoms\n\nAsymptomatic or mildly irritating eyelid lump.\n\nSigns\n\nSkin ulceration and inflammation with distortion of normal eyelid anatomy. Abnormal color, texture, or persistent bleeding. Loss of eyelashes (madarosis) or whitening of eyelashes (poliosis) over the lesion. Sentinel vessels may be seen. Diplopia or external ophthalmoplegia are ominous signs of a possible orbital invasion.\n\nDifferential Diagnosis of Benign Eyelid Tumors\n\n- Seborrheic keratosis: Middle-aged or elderly patients. Brown-black, well-circumscribed, crust-like lesion, usually slightly elevated, with or without surrounding inflammation. May be monitored or excised.\n- Chalazion/hordeolum: Acute, erythematous, tender, well-circumscribed lesion. See [6.7](c06.xhtml#s6-7), Chalazion/Hordeolum.\n- Cysts: Well-circumscribed white, yellow, or clear/skin-colored lesions on the eyelid margin or underneath the skin. Epidermal inclusion cysts, sebaceous cysts, and eccrine or apocrine hidrocystomas, may be excised.\n- Molluscum contagiosum: A viral infection of the epidermis, typically seen in children. Multiple small papules characterized by central umbilication. Can be severe in HIV-positive patients. May produce a chronic follicular conjunctivitis. Treatment is by unroofing and curettage. While some recommend curettage until bleeding occurs, there is no clear evidence that this is more effective. A variety of other therapies (e.g., cryotherapy, cautery, chemical peel, and laser) are used for lesions found elsewhere on the body but are typically not necessary for periocular regions and may cause injury to the ocular surface. See [5.2](c05.xhtml#s5-2), Chronic Conjunctivitis.\n- Nevus: Benign melanocytic neoplasm, which may involve the dermis, the dermis–epidermis junction, or both. Congenital nevi may be present at, or shortly after, birth; however, most nevi appear during childhood and may enlarge during puberty. Nevi are well-circumscribed lesions, usually round or oval, with uniform pigmentation. Melanomas may develop within preexisting nevi and may manifest as a changing pigmented lesion and/or as a pigmented lesion with asymmetry of shape, irregular borders, color variegation, and possibly pruritus or bleeding. Suspicious lesions should be biopsied, preferably with the removal of the entire lesion to the subcutaneous fat.\n- Xanthelasma: Multiple, often bilateral, soft yellow plaques of lipid-laden macrophages in the medial upper and sometimes lower eyelids. Patients 40 years and younger should have a serum cholesterol and lipid profile evaluation to rule out hypercholesterolemia. Surgical excision can be performed for cosmesis; however, recurrence is possible.\n- Squamous papilloma: Soft, skin-colored lesions that may be smooth, rounded, or pedunculated. May enlarge or multiply over time. Often spontaneously regress. Occasionally squamous carcinomas can appear papillomatous. Therefore, excisional biopsy should be performed for suspicious lesions.\n- Actinic keratosis: Round, erythematous, premalignant lesion with a scaly surface. Found in sun-exposed areas of skin. Treated by excisional biopsy.\n- Inflammatory conditions: Blepharitis and blepharoconjunctivitis.\n- Allergic conditions: Chronic contact dermatitis can appear unilateral, cause cilia loss, and simulate malignancy.\n- Others: Verrucae from human papillomavirus, benign tumors of hair follicles, or sweat glands (e.g., syringoma), inverted follicular keratosis, neurofibroma, neurilem"}, {"id": "6.9", "chapter_num": "6", "chapter": "Oculoplastics", "name": "Preseptal Cellulitis", "raw": "6.9 Preseptal Cellulitis\n\nSymptoms\n\nTenderness, redness, warmth, and swelling of the eyelid and periorbital area. Often there is a history of local skin abrasions, penetrating injury/trauma, hordeolum, or insect bites. Can be associated with sinusitis, which can indicate increased risk for orbital abscess formation and postseptal inflammation. May complain of fever or chills.\n\nSigns\n\n(See Figures 6.9.1 and 6.9.2.)\n\nFigure 6.9.1 Preseptal cellulitis. \n\nFigure 6.9.2 CT of preseptal cellulitis. \n\nCritical. Eyelid erythema, tense edema, warmth, and tenderness. No proptosis, no optic neuropathy, no extraocular motility restriction, usually little to no conjunctival injection, and no pain with eye movement (unlike orbital cellulitis). The patient may not be able to open the eye because of eyelid edema. Visual changes such as blurred vision or monocular diplopia attributed to swollen eyelids.\n\nOther. Tightness of eyelid skin or fluctuant eyelid edema. The eye itself may be slightly injected but is relatively uninvolved.\n\nDifferential Diagnosis\n\n- Orbital cellulitis: Proptosis, pain with eye movement, restricted motility, and possible visual compromise. See [7.3.1](c07.xhtml#s7-3-1), Orbital Cellulitis.\n- Chalazion: Focal inflammatory eyelid nodule. See [6.7](c06.xhtml#s6-7), Chalazion/Hordeolum.\n- Allergic: Sudden onset, nontender, itchy, and swollen eyelids. See [5.12](c05.xhtml#s5-12), Contact Dermatitis.\n- Erysipelas: Rapidly advancing streptococcal cellulitis, often with a clear demarcation line, high fever, and chills.\n- Necrotizing fasciitis: Severe bacterial infection involving subcutaneous soft tissue and deep fascia. CT may disclose characteristic involvement of fascial planes. Typically due to group A beta-hemolytic streptococci and Staphylococcus. aureus. Gray to purple skin discoloration with local hypesthesia is characteristic. Patients are often septic and may rapidly deteriorate. This potentially fatal condition requires emergent surgical debridement with i.v. antibiotic treatment, often including clindamycin for exotoxin control. Aggressive fluid resuscitation may be necessary for patients in septic shock, and nonsteroidal anti-inflammatory medications should be avoided as they can precipitate renal failure. If there is a clinical question of necrotizing fasciitis, immediate bedside biopsy with emergent histologic review to detect necrosis is indicated. These patients require extremely close monitoring for orbital progression from an ophthalmic standpoint as well as airway compromise, and require multidisciplinary care often with otolaryngology and infectious disease.\n- Viral conjunctivitis with secondary eyelid swelling: Follicular conjunctivitis is present. See [5.1](c05.xhtml#s5-1), Acute Conjunctivitis.\n- Cavernous sinus thrombosis: Proptosis with multiple cranial neuropathies. See [10.10](c10.xhtml#s10-10), Cavernous Sinus and Associated Syndromes (Multiple Ocular Motor Nerve Palsies).\n- Varicella zoster virus: Vesicular rash that respects midline. See [4.17](c04.xhtml#s4-17), Herpes Zoster Ophthalmicus/Varicella Zoster Virus.\n- Herpes simplex virus: Vesicular rash, typically unilateral, but does not respect midline/dermatomes. May be associated with ipsilateral follicular conjunctivitis. See [4.16](c04.xhtml#s4-16), Herpes Simplex Virus.\n- Other orbital disorders: Proptosis, globe displacement, or restricted ocular motility. See [7.1](c07.xhtml#s7-1), Orbital Disease.\n- Others: Insect bite, angioedema, trauma, maxillary o"}, {"id": "6.10", "chapter_num": "6", "chapter": "Oculoplastics", "name": "Canaliculitis", "raw": "6.10 Canaliculitis\n\nSymptoms\n\nPredominantly unilateral tearing or discharge, red eye, and mild tenderness over the nasal aspect of the lower or upper eyelid.\n\nSigns\n\n(See Figure 6.10.1.)\n\nFigure 6.10.1 Canaliculitis. \n\nCritical. Erythematous “pouting” of the punctum (turned outward) and erythema of the surrounding skin. Expression of mucopurulent discharge or concretions from the punctum is diagnostic.\n\nOther. Recurrent conjunctivitis confined to the nasal aspect of the eye, gritty sensation on probing of the canaliculus, and focal injection of the nasal conjunctiva.\n\nDifferential Diagnosis\n\n- Dacryocystitis: Infection of the lacrimal sac with more lacrimal sac swelling, tenderness, and pain than canaliculitis. See [6.11](c06.xhtml#s6-11), Dacryocystitis/Inflammation of the Lacrimal Sac.\n- Chalazion: Focal inflammatory eyelid nodule without discharge from punctum. See [6.7](c06.xhtml#s6-7), Chalazion/Hordeolum.\n- Nasolacrimal duct obstruction: Tearing, minimal-to-no erythema or tenderness around the punctum. See [8.10](c08.xhtml#s8-10), Congenital Nasolacrimal Duct Obstruction.\n- Conjunctivitis: Often bilateral, depending on the etiology. Does not present with focal tenderness; rather diffuse injection, tearing or discharge. See [5.1](c05.xhtml#s5-1), Acute Conjunctivitis and [5.2](c05.xhtml#s5-2), Chronic Conjunctivitis.\nEtiology\n\n- Actinomyces israelii (streptothrix): Most common. Anaerobic gram-positive rod with fine, branching filaments. Produces sulfur-rich stones.\n- Other bacteria (e.g., Fusobacterium and Nocardia species).\n- Fungal (e.g., Candida, Fusarium, and Aspergillus species).\n- Viral (e.g., herpes simplex and varicella zoster).\n- Retained punctal plug or foreign body.\nWorkup\n\n- Apply gentle pressure over the lacrimal sac and canaliculus with a cotton-tipped swab and roll it toward the punctum while observing for mucopurulent discharge or concretions.\n- Smears and cultures of the material expressed from the punctum, including slides for Gram stain and Giemsa stain. Consider thioglycolate and Sabouraud cultures.\n- Ask about a history of punctal plugs.\nTreatment\n\n- Apply warm compresses to the punctal area for 5 to 10 minutes q.i.d.\n- Remove obstructing concretions or retained plug. Concretions may be expressed through the punctum at the slit lamp. A canaliculotomy is usually required for complete removal or in the setting of a retained punctal plug. If necessary, marsupialize the horizontal canaliculus from a conjunctival approach and allow the incision to heal by secondary intention. Consider placing a temporary silicone stent to prevent postoperative canalicular scarring.\n- If concretions are removed, consider irrigating the canaliculus with an antibiotic solution (e.g., trimethoprim sulfate/polymyxin B, moxifloxacin, penicillin G solution 100,000 units/mL, iodine 1% solution). The patient is irrigated while in the upright position, so the solution drains out of the nose and not into the nasopharynx.\n- Treat the patient with antibiotic drops (e.g., trimethoprim sulfate/polymyxin B or moxifloxacin q.i.d.) and oral antibiotics for 1 to 2 weeks (e.g., doxycycline 100 mg b.i.d.).\n- If a fungus is found on smears and cultures, nystatin 1:20,000 drops t.i.d. and nystatin 1:20,000 solution irrigation several times per week may be effective.\nFollow-Up\n\nOne to 2 weeks depending on severity. This is usually not an urgent condition.\n\n"}, {"id": "6.11", "chapter_num": "6", "chapter": "Oculoplastics", "name": "Dacryocystitis/Inflammation of the Lacrimal Sac", "raw": "6.11 Dacryocystitis/Inflammation of the Lacrimal Sac\n\nSymptoms\n\nPain, redness, and swelling over the lacrimal sac at the innermost aspect of the lower eyelid. Tearing, discharge, fever, or chills may also be present. Symptoms may be recurrent.\n\nSigns\n\n(See Figure 6.11.1.)\n\nFigure 6.11.1 Dacryocystitis. \n\nCritical. Erythematous, tender, tense swelling over the nasal aspect of the lower eyelid and extending around the periorbital area. Mucoid or purulent discharge may be expressed from the punctum when pressure is applied over the lacrimal sac, although this is not necessary nor sufficient for diagnosis.\n\nNOTE: Swelling in dacryocystitis is below the medial canthal tendon. Suspect lacrimal sac tumor (rare) if the mass is above the medial canthal tendon.\n\nOther. Fistula formation may occur between the skin and the lacrimal sac. A lacrimal sac cyst or mucocele can occur in chronic cases. Progression to a lacrimal sac abscess, and rarely, orbital or facial cellulitis may occur.\n\nDifferential Diagnosis\n\n- Facial cellulitis involving the medial canthal area: The lacrimal drainage system is patent on irrigation. See [6.9](c06.xhtml#s6-9), Preseptal Cellulitis.\n- Canaliculitis: Swelling and pain are limited to the canalicular and punctal region, typically does not extend over the lacrimal sac. Nasolacrimal duct is patent when lavaging through unaffected canaliculus. See [6.10](c06.xhtml#s6-10), Canaliculitis.\n- Dacryocystocele: Mild enlargement of noninflamed lacrimal sac in an infant. Present at birth, but may not be detected until later. Caused by nasolacrimal duct obstruction or entrapment of mucus or amniotic fluid in the lacrimal sac and usually unilateral. If bilateral, assess breathing to rule out nasal obstruction. May also be acquired from chronic obstruction in adulthood. Conservative therapy with digital massage, antibiotic ointment, and warm compresses is usually sufficient for nonobstructive cases. Unless there is associated dacryocystitis, a dacryocystocele is nontender and nonerythematous.\n- Acute ethmoid sinusitis: Pain, tenderness, nasal obstruction, and erythema over the nasal bone, just medial to the inner canthus. Patients may be febrile. Imaging is diagnostic.\n- Frontal sinus mucocele/mucopyocele: Swelling typically occurs well above the medial canthal tendon. Proptosis, downward and lateral displacement of the globe, and external ophthalmoplegia are often present. Imaging is diagnostic.\nEtiology\n\n- Almost always related to nasolacrimal duct obstruction.\n- Uncommon causes include lacrimal sac diverticula, dacryoliths, nasal or sinus surgery, trauma, and rarely lacrimal sac tumors.\n- Gram-positive bacteria (S. aureus and S. pneumoniae) are the most common pathogens; gram-negative and atypical organisms are seen more commonly in diabetics, immunocompromised, and nursing home patients.\nWorkup\n\n- History: Distinguish reflex tearing from epiphora. Previous episodes? Concomitant ear, nose, or throat infection? Underlying sinus disease? Prior trauma or surgery?\n- External examination: Apply gentle pressure to the lacrimal sac in the nasal corner of the lower eyelid with a cotton-tipped swab. Discharge, if present, may be expressed from the punctum. Perform bilaterally to uncover subtle contralateral dacryocystitis.\n- Evaluation for orbital signs: Assess pupillary response, extraocular motility, globe position for proptosis, and other evidence of potentially concurrent orbital cellulitis.\n- Obtain Gram stain and blood agar culture ("}, {"id": "7.1", "chapter_num": "7", "chapter": "Orbit", "name": "Orbital Disease", "raw": "7.1 Orbital Disease\n\nThis section provides a framework to evaluate a variety of orbital disorders.\n\nSymptoms\n\nEyelid swelling, bulging eye(s), and double vision are common. Pain, decreased visual acuity, decreased color vision, and changes in facial sensation can occur.\n\nSigns\n\nCritical. Globe dystopia (e.g., proptosis/exophthalmos, hypoglobus, and hyperglobus) and restriction of ocular motility, which can be confirmed by forced duction testing (see [Appendix 6](app1.xhtml#app6), Forced Duction Test and Active Force Generation Test). Resistance to retropulsion of the globe is common.\n\nDifferential Diagnosis of Proptosis\n\n- Mass effect (e.g., infiltration or displacement of soft tissues by inflammatory, neoplastic, vascular, or infectious etiologies) either within the orbit or from structures surrounding the orbit (e.g., paranasal sinus, brain).\n- Enlarged globe (e.g., myopia). Large, myopic eyes frequently have tilted discs and peripapillary crescents, and A-scan ultrasound (US) reveals a long axial length. Asymmetric myopia may result in unilateral pseudoproptosis.\n- Enophthalmos of the fellow eye (e.g., after an orbital floor fracture).\n- Asymmetric eyelid position: Unilateral upper and/or lower eyelid retraction, or contralateral upper eyelid ptosis.\n- Physiologically shallow orbits.\nEtiology\n\nSpecific signs of orbital disease may not be diagnostic. Orbital disease can be grouped into six broad categories to help tailor the necessary workup:\n\n- Inflammatory: Thyroid eye disease (TED), idiopathic orbital inflammatory syndrome (IOIS), sarcoidosis, granulomatosis with polyangiitis (GPA, formerly Wegener granulomatosis), reactive inflammation from paranasal sinusitis, IgG4-related disease, etc.\n- Infectious: Orbital cellulitis, subperiosteal abscess (SPA), mucormycosis, etc.\n- Neoplastic (discrete, infiltrative, or hematologic): Typically categorized as primary (e.g., solitary fibrous tumor [SFT]), secondary (e.g., extension of sinus mucocele or intracranial meningioma, etc.), or metastatic. May be benign or malignant.\n- Trauma: Orbital fracture, retrobulbar hemorrhage, orbital foreign body with or without secondary infection, carotid–cavernous fistula (CCF), etc.\n- Malformation: Skeletal abnormalities, congenital/genetic syndromes, etc.\n- Vascular: Usually either congenital or acquired and categorized as primary arterial (e.g., CCF) or venous (e.g., varix). Venolymphatic malformations (e.g., lymphangioma) may also cause proptosis from intralesional hemorrhage.\nNOTE: As a general rule, any patient with a history of cancer and a new orbital process should be assumed to have metastatic disease unless proven otherwise.\n\nWorkup\n\n- History: Rapid or slow onset? Pain? Ocular bruit and/or pulsation? Fever, chills, systemic symptoms, skin rash, weight change? History of malignancy, diabetes, pulmonary disease, or renal disease? Trauma? History of sinonasal congestion, epistaxis? Smoking? Up to date with health maintenance and age-appropriate screenings (e.g., mammography, prostate gland examination/screening)? Presence of systemic symptoms—weight loss/gain, fever, chills, night sweats, change in bowel habits, heat/cold intolerance?\n- Examination: - Review vital signs, particularly temperature.\n- Check visual acuity, size and reactivity of pupils, visual fields, color vision, and intraocular pressure. Check for excessive pulsatility of semicircles on Goldmann tonometry.\n- Check extraocular movements. Measure any ocular misalignment ([prisms or Ma"}, {"id": "7.2", "chapter_num": "7", "chapter": "Orbit", "name": "Inflammatory Orbital Disease", "raw": "7.2 Inflammatory Orbital Disease\n\n7.2.1 THYROID EYE DISEASE\n\nSYNONYMS: THYROID-RELATED ORBITOPATHY, GRAVES DISEASE\n\nOcular Symptoms\n\nEarly: Nonspecific complaints including foreign-body sensation, redness, tearing, photophobia, and morning puffiness of the eyelids. Early symptoms are often nonspecific and may mimic allergy, blepharoconjunctivitis, chronic conjunctivitis, etc. Upper eyelid retraction tends to develop early.\n\nLate: Additional eyelid and orbital symptoms including lateral flare, prominent eyes, persistent eyelid swelling, chemosis, double vision, “pressure” behind the eyes, and decreased vision.\n\nSigns\n\n(See Figure 7.2.1.1.)\n\nFigure 7.2.1.1 Thyroid-related orbitopathy with eyelid retraction and proptosis of the right eye. \n\nCritical. Retraction of the upper eyelids with lateral flare (highly specific) and eyelid lag on downward gaze (von Graefe sign), lagophthalmos. Lower eyelid retraction is a very nonspecific sign and often presents as a normal finding. Unilateral or bilateral axial proptosis with variable resistance to retropulsion. When extraocular muscles (EOMs) are involved, elevation and abduction are commonly restricted and there is resistance on forced duction testing. Although often bilateral, unilateral or asymmetric TED is also frequently seen. Thickening of the EOMs (inferior, medial, superior, and lateral, in order of frequency) without the involvement of the associated tendons may be noted on orbital imaging. Isolated enlargement of lateral rectus muscles is highly atypical of TED and requires further workup and possibly a biopsy. Isolated enlargement of the superior rectus/levator complex can occur in TED, but should be followed carefully for alternative causes, especially when upper eyelid retraction is not present.\n\nOther. Reduced blink rate, significantly elevated intraocular pressure (IOP) (especially in upgaze), injection of the blood vessels over the insertion sites of horizontal rectus muscles, superior limbic keratoconjunctivitis, superficial punctate keratopathy, or infiltrate or ulceration from exposure keratopathy, afferent pupillary defect, dyschromatopsia, optic nerve swelling/pallor, and rarely choroidal folds.\n\nNOTE: Thickening of the EOMs at the orbital apex can result in optic nerve compression and manifest in afferent pupillary defect, reduced color vision, visual field, and visual acuity loss. Compressive optic neuropathy occurs in a minority of patients (5% to 7%) with TED, but must be ruled out in every patient at every visit. The optic neuropathy of TED typically occurs in the setting of restrictive strabismus and increased resistance to retropulsion. Of note, in typical cases of compressive optic neuropathy from TED, axial proptosis is usually either absent or mild.\n\nSystemic Signs\n\nHyperthyroidism is common (at least 80% of patients with TED). Symptoms include a rapid pulse, hot and dry skin, diffusely enlarged thyroid gland (goiter), weight loss, muscle wasting with proximal muscle weakness, hand tremor, pretibial dermopathy or myxedema, cardiac arrhythmias, and change in bowel habits. Some patients are hypothyroid (5% to 10%) or euthyroid (5% to 10%). Euthyroid patients should undergo thyroid function testing (TFT) every 6 to 12 months; a significant proportion will develop thyroid abnormalities within 2 years. TED does not necessarily follow the associated thyroid dysfunction and may occur months to years before or after the thyroid dysfunction. The clinical progression of TED als"}, {"id": "7.3", "chapter_num": "7", "chapter": "Orbit", "name": "Infectious Orbital Disease", "raw": "7.3 Infectious Orbital Disease\n\n7.3.1 ORBITAL CELLULITIS\n\nSymptoms\n\nRed eye, pain, blurred vision, double vision, eyelid and/or periorbital swelling, nasal congestion/discharge, sinus headache/pressure/congestion, tooth pain, infra- and/or supraorbital pain, or hypesthesia.\n\nSigns\n\n(See Figures 7.3.1.1 and 7.3.1.2.)\n\nCritical. Eyelid edema, erythema, warmth, and tenderness. Conjunctival chemosis and injection, proptosis, and restricted extraocular motility with pain on attempted eye movement are usually present. Signs of optic neuropathy (e.g., afferent pupillary defect and dyschromatopsia) may be present in severe cases.\n\nFigure 7.3.1.1 Orbital cellulitis. \n\nFigure 7.3.1.2 CT of right orbital cellulitis showing fat stranding and right ethmoiditis. \n\nOther. Decreased vision, retinal venous congestion, optic disc edema, purulent discharge, decreased periorbital sensation, and fever. CT scan usually shows adjacent sinusitis (typically at least an ethmoid sinusitis) and possibly a subperiosteal orbital collection.\n\nDifferential Diagnosis\n\nSee [7.1](c07.xhtml#s7-1), Orbital Disease.\n\nEtiology\n\n- Direct extension from a paranasal sinus infection (especially ethmoiditis), focal periorbital infection (e.g., infected hordeolum, dacryoadenitis, dacryocystitis, and panophthalmitis), or dental infection.\n- Sequela of orbital trauma (e.g., orbital fracture, penetrating trauma, and retained intraorbital foreign body).\n- Sequela of eyelid, orbital, or paranasal sinus surgery.\n- Sequela of other ocular surgery or intraocular infection (e.g., panophthalmitis) (less common).\n- Vascular extension (e.g., seeding from a systemic bacteremia or locally from facial cellulitis via venous anastomoses).\n- Extension from a septic cavernous sinus thrombosis.\nNOTE: In cases of unsuspected retained foreign body, cellulitis may develop months after injury (see [3.22](c03.xhtml#s3-22), Intraorbital Foreign Body).\n\nMost Common Organisms\n\n- Adult: Staphylococcus species, Streptococcus species, and Bacteroides species.\n- Children: Haemophilus influenzae (rare in vaccinated children).\n- Following trauma: Gram-negative rods.\n- Dental abscess: Mixed, aggressive aerobes and anaerobes.\n- Immunocompromised patients (diabetes, chemotherapy, and HIV infection): Fungi including those that produce zygomycosis infections (e.g., Mucor) and Aspergillus.\nWorkup\n\nSee [7.1](c07.xhtml#s7-1), Orbital Disease, for a nonspecific orbital workup.\n\n- History: Trauma or surgery? Ear, nose, throat, or systemic infection? Tooth pain or recent dental abscess? Stiff neck or mental status changes? Diabetes or an immunosuppressive illness? Use of immunosuppressive agents?\n- Complete ophthalmic examination to evaluate for orbital signs including afferent pupillary defect, restriction or pain with ocular motility, proptosis, increased resistance to retropulsion, elevated IOP, decreased color vision, decreased skin sensation, or an optic nerve or fundus abnormality.\n- Check vital signs, mental status, and neck flexibility. Check for preauricular or cervical lymphadenopathy. Evaluate nasal passages for signs of eschar/fungal involvement in diabetic, acidotic, or immunocompromised patients.\n- Imaging: CT scan of the orbits and paranasal sinuses (axial, coronal, and parasagittal views, with contrast if possible) to confirm the diagnosis and to rule out a retained foreign body, orbital or SPA, paranasal sinus disease, cavernous sinus thrombosis, or intracranial extension. If superior ophthalmic vein or cave"}, {"id": "7.4", "chapter_num": "7", "chapter": "Orbit", "name": "Orbital Tumors", "raw": "7.4 Orbital Tumors\n\n7.4.1 ORBITAL TUMORS IN CHILDREN\n\nSigns\n\nCritical. Proptosis or globe displacement.\n\nOther. See the specific etiologies for additional presenting signs. See Tables 7.4.1.1 and 7.4.1.2 for imaging characteristics.\n\nTABLE 7.4.1.1 Childhood Orbital Lesions\n\n| Well circumscribed | Dermoid cyst, rhabdomyosarcoma, optic nerve glioma, plexiform neurofibroma, and hemangioma of infancy |\n| --- | --- |\n| Diffuse and/or infiltrating | Lymphangioma, leukemia, IOIS, hemangioma of infancy, rhabdomyosarcoma, neuroblastoma, teratoma, and Langerhans cell histiocytosis |\n\nTABLE 7.4.1.2 CT and MRI Characteristics of Pediatric Orbital Lesions\n\n| Lesion | CT Characteristics | MRI Features |\n| --- | --- | --- |\n| T1 Sequence | T2 Sequence |\n| Dermoid or epidermoid cyst | A well-defined lesion that may mold to the bone of the orbital walls. On occasion, bony erosion is noted with the extension of the lesion intracranially or into the temporalis fossa (“dumbbell dermoid”). | Hypointense to fat, but usually hyperintense to vitreous. Only capsule enhances with gadolinium. Signal may increase if a large amount of viscous mucus (high protein-to-water ratio) is present within the lesion—an uncommon finding for most orbital masses and helpful in distinguishing this lesion from others | Iso- or hypointense to fat |\n| Hemangioma of infancy | Irregular, contrast enhancing | Well defined, hypointense to fat, hyperintense to muscle | Hyperintense to fat and muscle |\n| Rhabdomyosarcoma | An irregular, well-defined lesion with possible bone destruction | Isointense to muscle | Hyperintense to muscle |\n| Metastatic neuroblastoma | Poorly defined mass with bony destruction | — | — |\n| Lymphangioma | Nonencapsulated irregular mass, “crabgrass of the orbit” | Cystic, possibly multiloculated, heterogeneous mass. Hypointense to fat, hyperintense to muscle, diffuse enhancement. May show signal of either acute or subacute hemorrhage (hyperintensity on T1) | Markedly hyperintense to fat and muscle |\n| Optic nerve glioma | Fusiform enlargement of the optic nerve | Tubular or fusiform mass, hypointense to gray matter | Homogeneous hyperintensity |\n| Plexiform neurofibroma | Diffuse, irregular soft tissue mass, possible defect in orbital roof | Iso- or slightly hyperintense to muscle | Hyperintense to fat and muscle |\n| Leukemia (granulocytic sarcoma) | Irregular mass with occasional bony erosion | — | — |\n| Langerhans cell histiocytosis | Lytic defect, most commonly in superotemporal orbit or sphenoid wing | Isointense to muscle, good enhancement | — |\n\nDifferential Diagnosis\n\n- Orbital cellulitis from adjacent ethmoiditis: Most common cause of proptosis in children. It is of paramount importance to quickly rule out this etiology. See [7.3.1](c07.xhtml#s7-3-1), Orbital Cellulitis.\n- Dermoid and epidermoid cysts: Manifest clinically from birth to young adulthood and enlarge slowly. Preseptal dermoid cysts may become symptomatic in childhood and are most commonly found in the temporal upper eyelid or brow, and less often in the medial upper eyelid. The palpable, smooth mass may be mobile or fixed to the periosteum. Posterior dermoids typically become symptomatic in adulthood and may cause proptosis or globe displacement. Dermoid cyst rupture may mimic orbital cellulitis. The B-scan US, when used, reveals a cystic lesion with good transmission of echoes. Because of the cystic configuration and specific signal properties, CT and MRI are usually diagnostic. See [14.3]("}, {"id": "7.5", "chapter_num": "7", "chapter": "Orbit", "name": "Traumatic Orbital Disease", "raw": "7.5 Traumatic Orbital Disease\n\nORBITAL BLOWOUT FRACTURE\n\n(See [3.19](c03.xhtml#s3-19), Orbital Blowout Fracture.)\n\nTRAUMATIC RETROBULBAR HEMORRHAGE (ORBITAL HEMORRHAGE)\n\n(See [3.20](c03.xhtml#s3-20), Traumatic Retrobulbar Hemorrhage [Orbital Hemorrhage].)\n\n"}, {"id": "7.6", "chapter_num": "7", "chapter": "Orbit", "name": "Lacrimal Gland Mass/Chronic Dacryoadenitis", "raw": "7.6 Lacrimal Gland Mass/Chronic Dacryoadenitis\n\nSymptoms\n\nPersistent or progressive swelling of the outer one-third of the upper eyelid. Pain or double vision may be present.\n\nSigns\n\nCritical. Chronic eyelid swelling, predominantly in the outer one-third of the upper eyelid, with or without proptosis and displacement of the globe inferiorly and medially. Pain may be present, especially in cases of acute IOIS of the lacrimal gland. Erythema is less common. A dull, aching pain over the forehead or along the temple is an ominous sign, suggestive of malignancy.\n\nOther. A palpable mass may be present in the outer one-third of the upper eyelid. Extraocular motility may be restricted. May have conjunctival injection.\n\nEtiology\n\n- Sarcoidosis: May be bilateral. Typically painless. May have concomitant lung, skin, or renal disease. Lymphadenopathy, parotid gland enlargement, or seventh cranial nerve palsy may be present. Of note, intraocular involvement is uncommon in patients with adnexal sarcoidal inflammation, and vice versa. More common in Americans of African descent, West Africans, and Northern Europeans.\n- IOIS: See [7.2.2](c07.xhtml#s7-2-2), Idiopathic Orbital Inflammatory Syndrome. Chronic, painless lacrimal gland enlargement is possible, but atypical for IOIS.\n- IgG4-related dacryoadenitis. See Note in [7.2.2](c07.xhtml#s7-2-2), Idiopathic Orbital Inflammatory Syndrome.\n- Infectious: Enlarged palpebral lobe with surrounding conjunctival injection. Purulent discharge with bacterial dacryoadenitis, which is much less common than noninfectious dacryoadenitis. Bilateral lacrimal gland enlargement may be seen in patients with viral illnesses. CT scan may show fat stranding, abscess.\n- Benign mixed tumor (pleomorphic adenoma): Slowly progressive, painless proptosis or inferomedial displacement of the globe in middle-aged adults. Usually involves the orbital lobe of the lacrimal gland. CT may show a well-circumscribed mass with pressure-induced remodeling and enlargement of the lacrimal gland fossa. No true bony erosion occurs (Figure 7.6.1A). Figure 7.6.1 CT and MRI of lesions involving or near the lacrimal gland. A: Pleomorphic adenoma with smooth, pressure induced changes in the lacrimal gland fossa (arrows). B: Adenoid cystic carcinoma with bone destruction (arrows) and intralesional calcifications. C: Lymphoma involving the lacrimal gland with molding to the globe. D: Dermoid cyst arising from the frontoethmoidal suture. \n\n- Lymphoproliferative tumor: Slowly progressive proptosis and globe displacement in an adult. May have a pink “salmon-patch” area of subconjunctival extension. CT usually shows a lacrimal gland lesion that conforms to the native anatomy and is well circumscribed. Indolent forms spare the bone, but bony erosion may be seen in aggressive histopathology (e.g., diffuse large B-cell and mantle cell lymphoma) (Figure 7.6.1C).\n- ACC: Subacute onset of pain over 1 to 3 months, proptosis, and diplopia, with variable progression. Globe displacement, ptosis, and a motility disturbance are common. This malignant lesion often exhibits perineural invasion, resulting in pain along the temple or forehead and intracranial extension. CT shows an irregular mass, often with bony erosion (Figure 7.6.1B).\n- Malignant mixed epithelial tumor (pleomorphic adenocarcinoma): Occurs primarily in elderly patients, acutely producing pain and progressing rapidly. May develop primarily or secondarily within a long-standing benign mixed epithelial tumo"}, {"id": "7.7", "chapter_num": "7", "chapter": "Orbit", "name": "Miscellaneous Orbital Diseases", "raw": "7.7 Miscellaneous Orbital Diseases\n\n- Intracranial disease. Extension of intracranial tumors, usually frontal lobe or sphenoid wing meningiomas, may present with proptosis in addition to cranial neuropathy and decreased vision. Imaging, preferably with MRI, is indicated.\n- Cavernous sinus arteriovenous fistula (AVF) (e.g., carotid–cavernous or dural sinus fistula): AVF is either spontaneous, indirect (usually in older patients, Barrow type B–D) or posttraumatic, direct (in younger patients, Barrow type A). A bruit is sometimes heard by the patient and may be detected if ocular auscultation is performed. Pulsating proptosis, arterialized “corkscrew” conjunctival vessels, increased IOP, retinal venous congestion, and chemosis may be present. May mimic an orbital disease, including TED and IOIS. In the early stages, often misdiagnosed as conjunctivitis, asymmetric glaucoma, etc. CT scan reveals enlarged superior ophthalmic vein(s), sometimes accompanied by enlarged EOMs. An orbital color Doppler US shows reversed, arterialized flow in the superior ophthalmic vein(s). Magnetic resonance angiography (MRA) or computed tomography angiography (CTA) may reveal AVF but a negative study does not definitively rule it out; a definitive diagnosis usually requires cerebral arteriography. Evidence of posterior cortical venous outflow on arteriography increases the risk of hemorrhagic stroke. Of note, posterior cortical venous outflow is more common in patients with bilateral orbital signs, but is seen in 10% of patients with unilateral presentation. Also remember that arteriography must be performed on both cerebral hemispheres and include the internal carotid, external carotid, and basilar arteries (“six vessel angio”). The cavernous sinuses are connected by the circular sinus and, on occasion, a CCF manifests clinically in the contralateral orbit.\n- Septic cavernous sinus thrombosis: Orbital cellulitis signs, plus dilated and sluggish pupils as well as palsies of the third, fourth, fifth, and/or sixth cranial nerves out of proportion to the degree of orbital edema. Decreasing level of consciousness, nausea, vomiting, and fevers can occur. May be bilateral with rapid progression. See [7.3.1](c07.xhtml#s7-3-1), Orbital Cellulitis.\n- Orbital vasculitis (e.g., GPA and polyarteritis nodosa): Systemic signs and symptoms of vasculitis (especially sinus, renal, pulmonary, and skin disease), fever, markedly increased ESR, and positive cANCA or pANCA. Of note, cANCA may be normal in two-thirds of patients with the limited sino-orbital variant of GPA.\n- Venous malformation (varix): A large, dilated vein in the orbit that produces proptosis when it fills and dilates (e.g., during a Valsalva maneuver or with the head in a dependent position). When the vein is not engorged, the proptosis disappears. CT demonstrates the dilated vein if an enhanced scan is performed during a Valsalva maneuver. Calcification may be seen in long-standing lesions.\n- Poorly understood processes: - Tolosa–Hunt syndrome (THS): NOT equivalent to orbital apical IOIS. Histopathologically, a granulomatous inflammation of the orbital apex and/or carotid siphon within the cavernous sinus. Presents with acute pain, cranial neuropathy, and sometimes proptosis. A diagnosis of exclusion. Difficult to diagnose with CT. MRI shows isolated, ipsilateral enlargement of the cavernous sinus. Usually sensitive to corticosteroid therapy, but pain typically responds much more quickly than external ophthalmop"}, {"id": "8.1", "chapter_num": "8", "chapter": "Pediatrics", "name": "Leukocoria", "raw": "8.1 Leukocoria\n\nDefinition\n\nA white pupillary reflex (see Figure 8.1.1).\n\nFigure 8.1.1 Leukocoria. \n\nEtiology\n\n- Retinoblastoma: A malignant tumor of the retina that appears as a white, nodular mass that breaks through the internal limiting membrane into the vitreous (endophytic), as a subretinal mass lesion often underlying a serous retinal detachment (exophytic), or as a diffusely spreading lesion simulating uveitis (diffuse infiltrating). Iris neovascularization is common with large tumors. Aqueous and vitreous seeding may occur. Cataract is uncommon, and the eye is normal in size. May be bilateral, unilateral, or multifocal. Diagnosis is usually made in patients under 5 years of age, with a mean age of 18 months. A family history may be elicited in about 10% of cases.\n- Toxocariasis: A nematode infection that may appear as a localized, white, elevated granuloma in the retina or as a diffuse endophthalmitis. Associated with localized inflammation of ocular structures, vitreous traction bands and related macular dragging, traction retinal detachment, and cataract. It is rarely bilateral and is usually diagnosed between 6 months and 10 years of age but may present in adults as well. Paracentesis of the anterior chamber may reveal eosinophils; serum enzyme-linked immunosorbent assay (ELISA) test for Toxocara organisms is positive. The patient may have a history of contact with puppies or of eating dirt. Toxocariasis may also be acquired prenatally and present as a congenital infection.\n- Coats disease (see Figure 8.1.2): A retinal vascular abnormality resulting in microaneurysms and macroaneurysms of the retinal vessels, usually in the inferotemporal periphery. Xanthocoria may develop secondary to an exudative, often bullous retinal detachment associated with yellow-colored, lipid-rich subretinal fluid or to extensive, yellow intraretinal and subretinal exudate. Usually develops in boys during the first decade of life; more severe cases occur in early childhood. Coats disease is rarely bilateral. No family history.\nFigure 8.1.2 Coats disease. \n\n- Persistent fetal vasculature (PFV) (previously known as persistent hyperplastic primary vitreous): A developmental ocular abnormality with failure of regression of the fetal hyaloid complex, often with a fibrovascular stalk from the optic nerve to lens and anterior segment. May only present with anterior or posterior findings. Usually associated with a small eye. Typically there is a membrane behind the lens that places inward traction on elongated ciliary processes. A cataract is noted at birth or early in life. The membrane and lens may rotate anteriorly, shallowing the anterior chamber and resulting in secondary glaucoma. Traction retinal detachment can occur. Usually unilateral. No family history or other risk factors.\n- Pediatric cataract: Opacity of the lens present at birth or in first months of life; may be unilateral or bilateral. There may be a family history or an associated systemic disorder. See [8.12](c08.xhtml#s8-12), Pediatric Cataract.\n- Retinal astrocytoma: A sessile to slightly elevated, yellow-white retinal mass that may be calcified and is often associated with tuberous sclerosis complex and rarely neurofibromatosis. May occur on the optic nerve head (giant drusen) in patients with tuberous sclerosis.\n- Retinopathy of prematurity (ROP): Predominantly occurs in premature children. Leukocoria is usually the result of a retinal detachment. See [8.2](c08.xhtml#s8-2), Retinopath"}, {"id": "8.2", "chapter_num": "8", "chapter": "Pediatrics", "name": "Retinopathy of Prematurity", "raw": "8.2 Retinopathy of Prematurity\n\nRisk Factors\n\n- Prematurity, especially ≤30 weeks of gestation.\n- Birth weight ≤1,500 g (3 lb, 5 oz).\n- Use of supplemental oxygen, neonatal sepsis, hypoxemia, hypercarbia, failure to thrive, coexisting illness, Caucasian race, and male sex.\n- Risk factors mentioned above, when present concurrently, have an additive effect on the risk for development of ROP.\nSigns\n\nCritical. Avascular peripheral retina. Demarcation line between vascular and avascular retina.\n\nOther. Extraretinal fibrovascular proliferation, vitreous hemorrhage, retinal detachment, or leukocoria. Commonly bilateral. Association of “plus disease” in more severe cases includes engorgement and tortuosity of the vessels in the posterior pole and/or iris. Poor pupillary dilation despite mydriatic drops. In older children and adults, risk for decreased visual acuity, amblyopia, myopia, strabismus, macular dragging, lattice-like vitreoretinal degeneration, and retinal detachment.\n\nDifferential Diagnosis\n\n- FEVR: Can appear similar to ROP, except FEVR is hereditary (although family members may be asymptomatic, and de novo mutations frequently occur) and more often asymmetric; asymptomatic family members often show peripheral retinal vascular abnormalities. There usually is no history of prematurity or oxygen therapy. See [8.3](c08.xhtml#s8-3), Familial Exudative Vitreoretinopathy.\n- Incontinentia pigmenti: X-linked dominant condition that usually occurs in girls. Often lethal in males. Characterized by skin changes including erythematous maculopapular lesions, vesicles, hypopigmented patches, and alopecia. Associated with eosinophilia. Central nervous system (CNS) and dental abnormalities also seen.\n- See [8.1](c08.xhtml#s8-1), Leukocoria, for additional differential diagnoses.\nClassification\n\nLocation\n\n- Zone I: Posterior pole: Twice the disc–fovea distance, centered around the disc (poorest prognosis).\nNOTE: With the nasal edge of the optic disc at one edge of the field of view with a 28D lens, the limit of zone I is at the temporal field of view.\n\n- Zone II: From zone I to the nasal ora serrata; temporally equidistant from the disc.\n- Posterior Zone II: The first two disc diameters of Zone II beyond Zone I; noted to be a higher-risk area of Zone II.\nNOTE: ROP should not be considered zone III until one is sure the nasal side is vascularized to the ora serrata.\n\n- Zone III: The remaining temporal periphery.\nExtent\n\n- Number of clock hours (30-degree sectors) involved. Of note, the number of clock hours of neovascularization was important in older treatment criteria, but it is not used in the most updated treatment guidelines.\nSeverity\n\n- Stage 1: Flat demarcation line separating the vascular posterior retina from the avascular peripheral retina (see Figure 8.2.1).\n- Stage 2: Ridged demarcation line.\n- Stage 3: Ridged demarcation line with fibrovascular proliferation or neovascularization extending from the ridge (see Figure 8.2.2).\n- Stage 4A: Extrafoveal partial retinal detachment.\n- Stage 4B: Fovea-involving partial retinal detachment.\n- Stage 5: Total retinal detachment.\nFigure 8.2.1 Retinopathy of prematurity: Stage 1. \n\nFigure 8.2.2 Retinopathy of prematurity: Stage 3. \n\nNOTE: Overall stage is determined by the most severe manifestation; however, it is recommended to define each stage and extent.\n\n“Plus” Disease\n\nPosterior pole engorgement and tortuosity of veins and arteries; iris vascular engorgement, poor pupil dilatation, and vitreous h"}, {"id": "8.3", "chapter_num": "8", "chapter": "Pediatrics", "name": "Familial Exudative Vitreoretinopathy", "raw": "8.3 Familial Exudative Vitreoretinopathy\n\nSymptoms\n\nMany are asymptomatic, but patients may report decreased vision depending on the stage.\n\nSigns\n\n(See Figure 8.3.1.)\n\nFigure 8.3.1 Familial exudative vitreoretinopathy with a falciform fold. \n\nCritical. Vascular dragging and peripheral retinal nonperfusion, most prominently temporally, although can extend 360 degrees. Bilateral but often asymmetric. Peripheral retinal vessels have a fimbriated border. Present at birth.\n\nOther. Peripheral neovascularization and/or fibrovascular proliferation at the border of vascular and avascular retina; temporal dragging of macula through contraction of fibrovascular tissue; radial retinal folds; vitreous hemorrhage; epiretinal membranes; tractional, exudative, and/or rhegmatogenous retinal detachment; peripheral intraretinal and subretinal lipid exudation. May present with strabismus or leukocoria in childhood. Cataract, band keratopathy, neovascular glaucoma, or phthisis possible.\n\nDifferential Diagnosis\n\n- ROP: Appears similar to FEVR, but there is lack of family history, and there should be a history of prematurity. See [8.2](c08.xhtml#s8-2), Retinopathy of Prematurity.\n- See [8.1](c08.xhtml#s8-1), Leukocoria, for additional diagnoses in the differential including retinoblastoma, Coats disease, PFV, incontinentia pigmenti, Norrie disease, X-linked retinoschisis, toxocariasis, and peripheral retinal nonperfusion. Positive family history and bilaterality can help distinguish from others.\nEtiology\n\nDue to defects in the Wnt signaling pathway. Often autosomal dominant, but can be autosomal recessive or X-linked. Usually no history of prematurity or oxygen therapy (differentiates it from ROP).\n\nWorkup\n\n- History: Positive family history? History of prematurity or oxygen therapy?\n- Complete ocular examination, including dilated retinal examination looking for supernumerary vessels, vascular dragging, macular dragging, neovascularization, and tractional retinal detachment. Fluorescein angiography of both eyes (under general anesthesia if necessary) has become vital for evaluation of diagnosis of anomalous vasculature, retinal nonperfusion, and neovascularization in peripheral retina, which can lead to tractional retinal detachment and result in decreased visual outcomes.\n- All family members suspected of carrying the gene should also have dilated retinal examinations and fluorescein angiography. This may be essential to preventing family members from experiencing permanent vision loss, as this disease is typically asymptomatic.\n- Genetic testing: Commonly affected genes include FZD4, LRP5, TSPAN12, and NDP. LRP5 mutation has been associated with early-onset osteoporosis. Many others are included now in genetic panels.\nTreatment\n\nLaser of peripheral avascular retina is performed if there is neovascularization and/or exudation. Scleral buckling or vitrectomy can be considered for retinal detachments. Anti-VEGF treatment may be effective in cases with neovascularization, though further long-term studies are needed. Treat amblyopia as needed. Genetic testing and examination of family members recommended.\n\nFollow-Up\n\nFEVR is a lifelong disease. All patients should be followed throughout life to monitor for progression.\n\n"}, {"id": "8.4", "chapter_num": "8", "chapter": "Pediatrics", "name": "The Bilaterally Blind Infant", "raw": "8.4 The Bilaterally Blind Infant\n\nSigns\n\nSearching, roving movements of the eyes starting at about 4 to 8 weeks of age. Poor pupillary constriction to light in infants ≥31 weeks gestation is a key finding. Inability to fix or follow large, bright objects after 4 months of corrected age.\n\nEtiologies with an Abnormal Ocular Examination\n\n- Severe ocular disease or malformation.\n- Retinoblastoma: up to 40% of cases may have bilateral tumors. See [8.1](c08.xhtml#s8-1), Leukocoria.\n- ROP. See [8.2](c08.xhtml#s8-2), Retinopathy of Prematurity.\n- Dense bilateral cataracts in children >8 weeks of age. See [8.12](c08.xhtml#s8-12), Pediatric Cataract.\n- Aniridia and other severe anterior segment dysgenesis. See [8.14](c08.xhtml#s8-14), Developmental Anterior Segment and Lens Anomalies/Dysgenesis.\n- Albinism: Iris transillumination defects and foveal hypoplasia. See [13.8](c13.xhtml#s13-8), Albinism.\nNOTE: Ocular abnormalities in patients with albinism and aniridia may be subtle and difficult to assess during an office evaluation.\n\n- Optic nerve hypoplasia: Small optic discs can be difficult to detect when bilateral. When present, a “double-ring” sign (a pigmented ring at the inner and outer edge of a peripapillary scleral ring) is diagnostic. If unilateral, may be seen with strabismus, a relative afferent pupillary defect, and unilateral poor fixation instead of searching nystagmus. Usually idiopathic.\nNOTE: Bilateral optic nerve hypoplasia is occasionally associated with septo-optic dysplasia (formerly known as de Morsier syndrome). In contrast, unilateral optic nerve hypoplasia is only rarely associated with this syndrome. Septo-optic dysplasia includes midline abnormalities of the brain as well as growth, thyroid, and other trophic hormone deficiencies. Growth retardation, seizures as a result of hypoglycemia, and diabetes insipidus may develop. If bilateral optic nerve hypoplasia is present, obtain an MRI with attention to the hypothalamic–pituitary area. If unilateral optic nerve hypoplasia is present, imaging studies may be considered as clinically relevant.\n\n- Congenital optic atrophy: Rare. Pale, normal-sized optic disc, often associated with intellectual disability or cerebral palsy. Normal electroretinogram (ERG). Autosomal recessive or sporadic.\n- Shaken baby syndrome: Multilayered retinal hemorrhages secondary to trauma, often associated with subdural/subarachnoid hemorrhage. See [3.17](c03.xhtml#s3-17), Abusive Head Trauma/Shaken Baby Syndrome.\n- Extreme refractive error: Diagnosed on cycloplegic refraction.\n- Congenital motor nystagmus: Patients with this condition usually have a mild visual deficit (20/60 or better). Binocular conjugate horizontal nystagmus. More than one type of nystagmus may be present, including jerk, pendular, circular, or elliptical. Patients may adopt a face turn to maximize gaze in the direction of the null point. No associated CNS abnormalities exist.\nEtiologies with a Normal Ocular Examination\n\n- Leber congenital amaurosis: Rod–cone disorder. May have a normal-appearing fundus initially, but by childhood ocular examination reveals narrowing of retinal blood vessels, optic disc pallor, and pigmentary changes. ERG is markedly abnormal or flat which establishes the diagnosis. Autosomal recessive.\n- Congenital stationary night blindness: Visual acuity may be close to normal, nystagmus less common, associated with myopia. ERG is abnormal. Autosomal dominant, recessive, and X-linked forms exist. Often have parado"}, {"id": "8.5", "chapter_num": "8", "chapter": "Pediatrics", "name": "Amblyopia", "raw": "8.5 Amblyopia\n\nSymptoms\n\nUsually none. Often discovered when decreased vision is detected via visual acuity testing of each eye individually. A history of patching, strabismus, or muscle surgery as a child may be elicited.\n\nNOTE: Amblyopia is typically unilateral, although can occur bilaterally as a result of bilateral visual deprivation (e.g., congenital cataracts not treated within the earliest months of life).\n\nSigns\n\nCritical. Poorer vision in one eye that is not entirely improved with refraction and not entirely explained by an organic lesion. In anisometropic amblyopia, the involved eye nearly always has a higher refractive error. The decrease in vision develops during the first decade of life. Central vision is primarily affected, while the peripheral visual field usually remains normal.\n\nOther. Individual letters are more easily read than a full line (crowding phenomenon). In reduced illumination, the visual acuity of an amblyopic eye is reduced much less than an organically diseased eye (neutral-density filter effect).\n\nNOTE: Amblyopia, when severe, may cause a trace relative afferent pupillary defect. Care must be taken to be sure that the light is directed along the same axis in each eye, particularly in patients with strabismus. Directing the light off-axis may result in a false-positive result.\n\nEtiology\n\n- Strabismus: Most common form (along with anisometropia). The eyes are misaligned. Vision is worse in the consistently deviating, nonfixating eye. Strabismus can lead to or be the result of amblyopia.\n- Anisometropia: Most common form (along with strabismus). A large difference in refractive error (usually ≥1.50 diopters [D]) between the two eyes. Can be seen in cases of eyelid mass or congenital ptosis–inducing astigmatism.\n- Isoametropia: Bilateral, large refractive errors leading to amblyopia in both eyes. Risk factors include hyperopia (>4.00–5.00 D at age >1 year), myopia (>5.00–6.00 D at any age), or astigmatism (>2.00–3.00 D at any age).\n- Visual deprivation: Due to obstruction of the visual axis in one eye, leading to a preference for the other eye. This can be attributed to blepharoptosis, cataract, corneal opacification, PFV, or vitreous hemorrhage.\n- Occlusion: A subtype of visual deprivation amblyopia that occurs in the fellow eye as a result of excessive patching or atropine. Prevented by examining at appropriate intervals (1 week per year of age), patching part-time, or using the full cycloplegic refraction when using atropine.\nWorkup\n\n- History: Eye problem in childhood such as misaligned eyes, patching, or muscle surgery?\n- Ocular examination to rule out an organic cause for the reduced vision.\n- Cover–uncover or corneal-light reflex tests to evaluate eye alignment. See [Appendix 3](app1.xhtml#app3), Cover/Uncover and Alternate Cover Tests.\n- Cycloplegic refraction of both eyes.\nTreatment\n\n- Patients younger than 12 years:\n- Appropriate spectacle correction (full cycloplegic refraction or reduce the hyperopia in both eyes symmetrically ≥1.50 D). If vision remains reduced after period of refractive adaptation (6 to 15 weeks), begin patching or penalization of fellow eye.\n- Patching: Patch the eye with better corrected vision 2 to 6 h/d (intensifying treatment if vision stops improving). Follow-up visits should be scheduled for 1 week per year of age (e.g., 3 weeks for a 3-year-old). Adhesive patches placed directly over the eye are most effective. Patches worn over glasses are not ideal due to the risk of c"}, {"id": "8.6", "chapter_num": "8", "chapter": "Pediatrics", "name": "Esodeviations", "raw": "8.6 Esodeviations\n\nSigns\n\n(See Figure 8.6.1.)\n\nFigure 8.6.1 Esotropia. \n\nCritical. One eye is turned inward off target of fixation. The nonfixating eye turns outward to fixate when examin
