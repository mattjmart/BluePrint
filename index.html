<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EyeKnow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #090c10;
  --surf:    #0f1318;
  --surf2:   #161b22;
  --surf3:   #1c222b;
  --border:  #1e2530;
  --border2: #27323f;
  --accent:  #00b4d8;
  --green:   #06d6a0;
  --amber:   #ffb703;
  --red:     #ef233c;
  --purple:  #7b2fbe;
  --text:    #e2e8f0;
  --text2:   #8fa3b8;
  --text3:   #4d6070;
  --mono:    'Space Mono', monospace;
  --sans:    'Space Grotesk', sans-serif;
}
*{ box-sizing:border-box; margin:0; padding:0; }
body{
  background:var(--bg); color:var(--text);
  font-family:var(--sans); font-size:14px; line-height:1.6;
  height:100vh; overflow:hidden; display:flex; flex-direction:column;
}

/* ── NAV ─────────────────────────────────────────────────────────────────── */
.topnav{
  display:flex; align-items:center; gap:0;
  background:var(--surf); border-bottom:1px solid var(--border);
  flex-shrink:0; padding:0 20px;
}
.brand{
  font-family:var(--mono); font-size:13px; color:var(--accent);
  letter-spacing:.15em; text-transform:uppercase; padding:14px 20px 14px 0;
  border-right:1px solid var(--border); margin-right:16px; white-space:nowrap;
}
.brand em{ color:var(--text3); font-style:normal; }
.nav-tabs{ display:flex; gap:0; flex:1; }
.nav-tab{
  padding:14px 20px; font-family:var(--mono); font-size:10px; letter-spacing:.1em;
  text-transform:uppercase; color:var(--text3); cursor:pointer;
  border-bottom:2px solid transparent; transition:all .15s; white-space:nowrap;
  background:none; border-top:none; border-left:none; border-right:none;
}
.nav-tab:hover{ color:var(--text2); }
.nav-tab.active{ color:var(--accent); border-bottom-color:var(--accent); }
.search-wrap{ position:relative; margin-left:auto; }
.search-wrap input{
  background:var(--bg); border:1px solid var(--border2); border-radius:6px;
  padding:7px 12px 7px 34px; color:var(--text); font-family:var(--sans);
  font-size:12px; outline:none; width:220px; transition:border-color .15s;
}
.search-wrap input:focus{ border-color:var(--accent); }
.search-wrap input::placeholder{ color:var(--text3); }
.search-icon{
  position:absolute; left:10px; top:50%; transform:translateY(-50%);
  color:var(--text3); font-size:13px; pointer-events:none;
}

/* ── FILTER BAR ──────────────────────────────────────────────────────────── */
.filter-bar{
  padding:8px 20px; background:var(--surf); border-bottom:1px solid var(--border);
  display:flex; gap:6px; flex-wrap:wrap; flex-shrink:0;
}
.chip{
  padding:3px 10px; border-radius:4px; border:1px solid var(--border2);
  background:transparent; color:var(--text2); font-family:var(--mono); font-size:9px;
  letter-spacing:.06em; cursor:pointer; transition:all .12s; white-space:nowrap;
}
.chip:hover{ border-color:var(--accent); color:var(--accent); }
.chip.active{ background:var(--accent); border-color:var(--accent); color:#000; font-weight:700; }

/* ── MAIN LAYOUT ─────────────────────────────────────────────────────────── */
.main{ display:flex; flex:1; overflow:hidden; }

/* ── LIST PANEL ──────────────────────────────────────────────────────────── */
.list-panel{
  width:280px; min-width:200px; border-right:1px solid var(--border);
  overflow-y:auto; flex-shrink:0;
}
.list-panel::-webkit-scrollbar{ width:3px; }
.list-panel::-webkit-scrollbar-thumb{ background:var(--border2); border-radius:2px; }
.list-item{
  padding:10px 14px; border-bottom:1px solid var(--border);
  cursor:pointer; transition:background .1s;
}
.list-item:hover{ background:var(--surf2); }
.list-item.active{ background:var(--surf2); border-left:2px solid var(--accent); padding-left:12px; }
.li-top{ display:flex; justify-content:space-between; align-items:flex-start; }
.li-id{ font-family:var(--mono); font-size:9px; color:var(--text3); letter-spacing:.08em; }
.li-dot{ width:6px; height:6px; border-radius:50%; background:var(--border2); flex-shrink:0; margin-top:3px; }
.li-dot.done{ background:var(--green); }
.li-name{ font-size:12px; font-weight:500; color:var(--text); line-height:1.3; margin:2px 0; }
.li-sub{ font-size:10px; color:var(--text3); }
.no-results{ padding:32px 16px; text-align:center; color:var(--text3); font-size:11px; font-family:var(--mono); }

/* ── DETAIL PANEL ────────────────────────────────────────────────────────── */
.detail-panel{ flex:1; overflow-y:auto; }
.detail-panel::-webkit-scrollbar{ width:3px; }
.detail-panel::-webkit-scrollbar-thumb{ background:var(--border2); border-radius:2px; }
.dp-inner{ padding:28px 36px; }

/* empty state */
.empty-state{
  height:100%; display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:14px;
}
.empty-icon{ font-size:40px; opacity:.2; }
.empty-title{ font-family:var(--mono); font-size:12px; color:var(--text2); letter-spacing:.1em; }
.empty-sub{ font-size:12px; color:var(--text3); text-align:center; max-width:260px; line-height:1.7; }

/* condition card */
.cond-header{ margin-bottom:20px; }
.cond-id{ font-family:var(--mono); font-size:9px; color:var(--accent); letter-spacing:.15em; text-transform:uppercase; margin-bottom:4px; }
.cond-name{ font-size:24px; font-weight:700; line-height:1.2; margin-bottom:6px; }
.chapter-tag{
  display:inline-block; padding:2px 8px; border-radius:3px;
  background:var(--surf2); border:1px solid var(--border2);
  font-family:var(--mono); font-size:9px; color:var(--text3); letter-spacing:.08em; text-transform:uppercase;
}

/* photo strip */
.photo-strip{ display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
.photo-frame{
  width:170px; border-radius:6px; overflow:hidden;
  border:1px solid var(--border2); background:var(--surf2); flex-shrink:0;
}
.photo-frame img{ width:100%; height:120px; object-fit:cover; display:block; }
.photo-cap{ padding:5px 8px; font-size:9px; color:var(--text3); font-family:var(--mono); line-height:1.3; border-top:1px solid var(--border); }
.photo-skeleton{
  width:170px; height:145px; border-radius:6px;
  background:var(--surf2); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
}

/* info cards grid */
.cards-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.card{
  background:var(--surf); border:1px solid var(--border);
  border-radius:7px; padding:16px;
}
.card.fw{ grid-column:1/-1; }
.card-label{
  font-family:var(--mono); font-size:8px; letter-spacing:.15em; text-transform:uppercase;
  margin-bottom:10px; display:flex; align-items:center; gap:8px;
}
.card-label::after{ content:''; flex:1; height:1px; background:var(--border); }
.card.def .card-label{ color:var(--accent); }
.card.mech .card-label{ color:var(--green); }
.card.rel .card-label{ color:var(--amber); }
.card.res .card-label{ color:var(--red); }
.card-text{ font-size:13px; color:var(--text); line-height:1.7; }
.card-list{ list-style:none; display:flex; flex-direction:column; gap:7px; }
.card-list li{ display:flex; gap:9px; font-size:12px; color:var(--text); line-height:1.5; }
.card-list li::before{ content:'→'; color:var(--text3); flex-shrink:0; }
.card.rel .card-list li::before{ color:var(--amber); }
.card.res .card-list li::before{ color:var(--red); }

/* loading */
.loading-wrap{
  grid-column:1/-1; background:var(--surf); border:1px solid var(--border);
  border-radius:7px; padding:36px; display:flex; flex-direction:column;
  align-items:center; gap:14px;
}
.spinner{
  width:28px; height:28px; border:2px solid var(--border2);
  border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite;
}
.loading-txt{ font-family:var(--mono); font-size:10px; color:var(--text3); letter-spacing:.1em; }
.err-card{
  grid-column:1/-1; background:var(--surf); border:1px solid #3d1422;
  border-radius:7px; padding:20px; color:var(--red); font-size:12px;
}

/* ── PHARM SECTION ───────────────────────────────────────────────────────── */
.pharm-wrap{ padding:24px 32px; }
.section-title{
  font-family:var(--mono); font-size:10px; letter-spacing:.15em; text-transform:uppercase;
  color:var(--text3); margin-bottom:20px; border-bottom:1px solid var(--border); padding-bottom:10px;
}
.drug-class-card{
  background:var(--surf); border:1px solid var(--border); border-radius:8px;
  overflow:hidden; margin-bottom:16px;
}
.dc-header{
  padding:14px 18px; display:flex; align-items:center; gap:12px; cursor:pointer;
  user-select:none; transition:background .12s;
}
.dc-header:hover{ background:var(--surf2); }
.dc-icon{ font-size:18px; }
.dc-name{ font-size:15px; font-weight:600; flex:1; }
.dc-count{ font-family:var(--mono); font-size:9px; color:var(--text3); }
.dc-chevron{ color:var(--text3); font-size:12px; transition:transform .2s; }
.dc-chevron.open{ transform:rotate(180deg); }
.dc-body{ display:none; border-top:1px solid var(--border); }
.dc-body.open{ display:block; }
.dc-clinical{
  padding:14px 18px; background:var(--surf2); font-size:12px; color:var(--text2);
  line-height:1.7; border-bottom:1px solid var(--border);
}
.dc-warnings{
  padding:12px 18px; background:#1a0810; border-bottom:1px solid #2d1520;
}
.dc-warnings-title{ font-family:var(--mono); font-size:8px; color:var(--red); letter-spacing:.12em; text-transform:uppercase; margin-bottom:8px; }
.dc-warnings ul{ list-style:none; display:flex; flex-direction:column; gap:5px; }
.dc-warnings ul li{ font-size:11px; color:#ffb3be; display:flex; gap:8px; line-height:1.4; }
.dc-warnings ul li::before{ content:'⚠'; flex-shrink:0; font-size:10px; }
.drug-table{ width:100%; border-collapse:collapse; }
.drug-table th{
  text-align:left; padding:8px 14px; font-family:var(--mono); font-size:8px;
  letter-spacing:.1em; text-transform:uppercase; color:var(--text3);
  border-bottom:1px solid var(--border); background:var(--surf2);
}
.drug-table td{ padding:9px 14px; border-bottom:1px solid var(--border); font-size:12px; vertical-align:top; }
.drug-table tr:last-child td{ border-bottom:none; }
.drug-table tr:hover td{ background:var(--surf2); }
.drug-brand{ font-weight:600; color:var(--text); }
.drug-generic{ color:var(--text2); font-size:11px; }
.drug-mech{ font-size:10px; color:var(--text3); font-family:var(--mono); }
.preg-a{ color:var(--green); }
.preg-b{ color:var(--green); opacity:.7; }
.preg-c{ color:var(--amber); }
.preg-d{ color:var(--red); }
.drug-notes{ font-size:11px; color:var(--text2); line-height:1.5; }

/* ── CONTACT LENS SECTION ────────────────────────────────────────────────── */
.cl-wrap{ padding:24px 32px; }
.cl-tabs{ display:flex; gap:8px; margin-bottom:20px; }
.cl-tab{
  padding:7px 16px; border-radius:5px; border:1px solid var(--border2);
  background:transparent; color:var(--text2); font-family:var(--mono); font-size:10px;
  letter-spacing:.08em; cursor:pointer; transition:all .12s;
}
.cl-tab:hover{ border-color:var(--accent); color:var(--accent); }
.cl-tab.active{ background:var(--accent); border-color:var(--accent); color:#000; font-weight:700; }
.cl-section{ display:none; }
.cl-section.active{ display:block; }

/* modality cards */
.modality-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:20px; }
.mod-card{
  background:var(--surf); border:1px solid var(--border); border-radius:7px; padding:16px;
  cursor:pointer; transition:border-color .15s;
}
.mod-card:hover, .mod-card.active{ border-color:var(--accent); }
.mod-name{ font-size:13px; font-weight:600; margin-bottom:6px; }
.mod-sum{ font-size:11px; color:var(--text3); line-height:1.6; }
.mod-detail{ display:none; }
.mod-detail.open{ display:block; }

/* guide tables */
.guide-table{ width:100%; border-collapse:collapse; margin-bottom:20px; }
.guide-table th{ text-align:left; padding:8px 14px; font-family:var(--mono); font-size:8px; letter-spacing:.1em; text-transform:uppercase; color:var(--text3); background:var(--surf2); border-bottom:1px solid var(--border); }
.guide-table td{ padding:9px 14px; border-bottom:1px solid var(--border); font-size:12px; }
.guide-table tr:last-child td{ border-bottom:none; }
.guide-table tr:hover td{ background:var(--surf2); }

/* lens table */
.lens-table{ width:100%; border-collapse:collapse; font-size:11px; }
.lens-table th{ text-align:left; padding:7px 12px; font-family:var(--mono); font-size:8px; letter-spacing:.1em; text-transform:uppercase; color:var(--text3); background:var(--surf2); border-bottom:1px solid var(--border); }
.lens-table td{ padding:8px 12px; border-bottom:1px solid var(--border); vertical-align:top; }
.lens-table tr:last-child td{ border-bottom:none; }
.lens-table tr:hover td{ background:var(--surf2); }
.dk-badge{
  display:inline-block; padding:1px 5px; border-radius:3px;
  font-family:var(--mono); font-size:9px; font-weight:700;
}
.dk-hi{ background:#0d2d1a; color:var(--green); }
.dk-mid{ background:#1a2000; color:var(--amber); }
.dk-lo{ background:#1a1218; color:var(--text3); }

.info-block{ background:var(--surf); border:1px solid var(--border); border-radius:7px; padding:16px; margin-bottom:12px; }
.info-block h3{ font-size:13px; font-weight:600; margin-bottom:8px; color:var(--text); }
.info-block p{ font-size:12px; color:var(--text2); line-height:1.7; }
.concept-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.concept-card{ background:var(--surf); border:1px solid var(--border); border-radius:6px; padding:13px; }
.concept-term{ font-family:var(--mono); font-size:10px; color:var(--accent); font-weight:700; margin-bottom:5px; }
.concept-def{ font-size:11px; color:var(--text2); line-height:1.6; }

.subsec-label{ font-family:var(--mono); font-size:8px; letter-spacing:.12em; text-transform:uppercase; color:var(--text3); margin:16px 0 8px; }
.tag-list{ display:flex; flex-wrap:wrap; gap:5px; margin-bottom:12px; }
.tag{ padding:3px 9px; border-radius:4px; background:var(--surf2); border:1px solid var(--border2); font-size:11px; color:var(--text2); }

@keyframes spin{ to{ transform:rotate(360deg); } }
@keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:.4} }
</style>
</head>
<body>

<div class="topnav">
  <div class="brand">Eye<em>Know</em></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('conditions',this)">◉ Conditions</button>
    <button class="nav-tab" onclick="switchTab('pharm',this)">💊 Pharm</button>
    <button class="nav-tab" onclick="switchTab('contacts',this)">🔵 Contact Lenses</button>
  </div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="search-input" placeholder="Search..." autocomplete="off">
  </div>
</div>

<div class="filter-bar" id="filter-bar">
  <button class="chip active" data-f="ALL">All</button>
</div>

<div class="main">
  <!-- ── SIDEBAR ── -->
  <div class="list-panel" id="list-panel"></div>

  <!-- ── DETAIL ── -->
  <div class="detail-panel" id="detail-panel">
    <div class="dp-inner">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">◉</div>
        <div class="empty-title">EyeKnow</div>
        <div class="empty-sub">225 conditions · full pharmacology · contact lens reference<br>Select anything from the left to begin.</div>
      </div>
      <!-- PHARM VIEW -->
      <div id="pharm-view" style="display:none"></div>
      <!-- CL VIEW -->
      <div id="cl-view" style="display:none"></div>
    </div>
  </div>
</div>

<script>
// ─── DATA ──────────────────────────────────────────────────────────────────
const CONDITIONS = [{"id": "3.1", "chapter_num": "3", "chapter": "Trauma", "name": "Chemical Burn", "raw": "3.1 Chemical Burn\n\nTreatment should be instituted IMMEDIATELY, even before testing vision, unless an open globe is suspected.\n\nNOTE: This includes alkali (e.g., lye, cements, plasters, airbag powder, bleach, ammonia), acids (e.g., battery acid, pool cleaner, vinegar), solvents, detergents, and irritants (e.g., mace).\n\nEmergency Treatment\n\n- After exclusion of an open globe injury, copious but gentle irrigation should be initiated using saline or lactated Ringer solution. Tap water can be used in the absence of these solutions and may be more efficacious in inhibiting elevated intracameral pH than normal saline for alkali burns. NEVER use acidic solutions to neutralize alkalis or vice versa as acid–base reactions themselves can generate harmful substrates and cause secondary thermal injuries. An eyelid speculum and topical anesthetic (e.g., proparacaine) may be placed prior to irrigation. Upper and lower fornices must be everted and irrigated. After exclusion of open globe injury, particulate matter should be flushed or manually removed. Manual use of intravenous tubing (or a Morgan Lens) connected to an irrigation solution may facilitate the irrigation process.\n- Wait 5 to 10 minutes after irrigation is stopped to allow the dilutant to be absorbed; then check the pH in the fornices using litmus paper. Irrigation is continued until neutral pH is achieved (i.e., 7.0 to 7.4). The pH should be read before the litmus paper dries.\n- Conjunctival fornices should be swept with a moistened cotton-tipped applicator to remove any sequestered particles of caustic material and necrotic conjunctiva, especially in the case of a persistently abnormal pH. If there is concern for retained material, double eversion of the eyelids with Desmarres eyelid retractors may be performed to identify and remove particles in the deep fornix.\n- Acidic or basic foreign bodies embedded in the conjunctiva, cornea, sclera, or surrounding tissues may require surgical excision.\nNOTE: The volume of irrigation fluid required to reach neutral pH varies with the chemical and with the duration of the chemical exposure. The volume required may range from a few liters to many liters (over 10 L).\n\nMILD-TO-MODERATE BURNS\n\nSigns\n\nCritical. Corneal epithelial defects range from scattered superficial punctate keratopathy (SPK), to focal epithelial loss, to sloughing of the entire corneal epithelium. No significant areas of perilimbal ischemia are seen (i.e., no blanching of the conjunctival or episcleral vessels).\n\nOther. Focal areas of conjunctival epithelial defect, chemosis, hyperemia, hemorrhages, or a combination of these; mild eyelid edema; mild anterior chamber (AC) reaction; first- and second-degree burns of the periocular skin with or without lash loss.\n\nNOTE: If you suspect a corneal epithelial defect but do not see one with fluorescein staining, repeat the fluorescein application to the eye. Sometimes the defect is slow to take up the dye. If the entire epithelium sloughs off, only Bowman membrane remains, which may take up fluorescein poorly.\n\nWorkup\n\n- History: Time of injury? Specific type of chemical? Time from exposure until irrigation started? Duration, amount, and type of irrigation prior to arrival? Eye protection? Sample of agent, package/label, or material safety data sheets are helpful in identifying and treating the exposing agent.\n- Slit-lamp examination with fluorescein staining: Eyelid eversion to search for foreign bodies. Evaluate for and diagram conjunctiv"}, {"id": "3.2", "chapter_num": "3", "chapter": "Trauma", "name": "Thermal Injuries", "raw": "3.2 Thermal Injuries\n\nMILD-TO-MODERATE BURNS\n\nSigns\n\nCorneal epithelial defects can range from scattered SPK, to focal epithelial loss, to sloughing of the entire corneal epithelium. Stromal opacities or edema are possible. Focal areas of conjunctival epithelial defect, chemosis, hyperemia, and hemorrhage are possible.\n\nEtiology\n\nThis includes causes of thermal direct contact with the ocular surface (e.g., hot water, cooking oil, curling irons, flames/explosions).\n\nNOTE: Eyelid and facial burns are typically more common than ocular surface burns, due to reflexive protective instincts. Skin involvement should be treated with classifications from first-degree to fourth-degree burns and treated accordingly.\n\nWorkup\n\n- History: Time and mechanism of injury? Time of exposure?\n- Rule out an open globe injury. If there is any concern for intraocular foreign body (IOFB), send for CT (or cranial x-ray if CT is not timely or not available).\n- Slit-lamp examination with fluorescein staining. Evaluation also for eyelid burns, eyelid defects, and lagophthalmos. Eyelid eversion to search for foreign bodies. Evaluate and diagram conjunctival and corneal epithelial defects, ulcerations, and stromal opacities/melts. Quantify the extent of thinning as a percentage of corneal thickness. Check the IOP. In the presence of a distorted cornea, IOP may be most accurately measured with a Tono-Pen, pneumotonometer, or rebound tonometer.\nTreatment\n\n- Topical antibiotic drop or ointment depending on presence and size of corneal and/or conjunctival epithelial defects. See “Treatment” in [3.3](c03.xhtml#s3-3), Corneal Abrasion.\n- Consider cycloplegic if significant photophobia, pain, or AC inflammation (e.g., cyclopentolate 1% or 2% b.i.d., atropine 0.5% or 1% daily to b.i.d.).\n- Frequent use of preservative-free artificial tear drops as needed.\n- Cautious use of topical steroids in the presence of epithelial defects or stromal melt.\nFollow-Up\n\nInitially daily, then every few days until corneal epithelial defect is healed. Monitor for corneal epithelial breakdown, stromal thinning, and infection.\n\nSEVERE BURNS\n\nSigns (in addition to the above)\n\nStromal opacity/scarring, melting/perforation, and edema are all possible, especially in cases of extended contact with thermal source.\n\nWorkup\n\nSame as for mild-to-moderate burns.\n\nTreatment\n\n- Hospital admission may be needed for close monitoring of IOP and corneal healing, or in the presence of severe facial/skin burns.\n- Debride necrotic tissue containing foreign matter, if present.\n- Topical antibiotic (e.g., trimethoprim/polymyxin B or fluoroquinolone drops q.i.d.; erythromycin or bacitracin ointment q.i.d. to q2h while awake). Caution with ciprofloxacin and large epithelial defects as it can precipitate in the cornea.\n- Consider cycloplegic as with mild-to-moderate burns as above.\n- Cautious use of topical steroids in the presence of epithelial defects or stromal melt.\n- Frequent (e.g., q1h while awake) use of preservative-free artificial tears or gel if not using frequent ointments.\n- Oral tetracyclines and vitamin C may also reduce collagenolysis and stromal melting (e.g., doxycycline 100 mg p.o. b.i.d. and vitamin C 1,000 mg p.o. daily).\n- Severe cases with large area of epithelial defects or concern for conjunctival adhesions may warrant the use of an amniotic membrane ring (e.g., Prokera) or suturing of a large amniotic membrane over the corneal and conjunctival epithelial defects.\n- Other considerations:\n- For th"}, {"id": "3.3", "chapter_num": "3", "chapter": "Trauma", "name": "Corneal Abrasion", "raw": "3.3 Corneal Abrasion\n\nSymptoms\n\nSharp pain, photophobia, foreign body sensation, tearing, discomfort with blinking or eye movement, redness, blurred vision, and history of scratching or hitting the eye.\n\nSigns\n\n(See Figure 3.3.1.)\n\nFigure 3.3.1 Corneal abrasion with fluorescein staining. \n\nCritical. Epithelial defect that stains with fluorescein; absence of underlying corneal opacification (presence of which indicates infection or inflammation).\n\nOther. Conjunctival injection, swollen eyelid, and mild AC reaction.\n\nDifferential Diagnosis\n\n- Recurrent erosion (see [4.2](c04.xhtml#s4-2), Recurrent Corneal Erosion).\n- Herpes simplex keratitis (see [4.16](c04.xhtml#s4-16), Herpes Simplex Virus).\n- Confluent SPK (see [4.1](c04.xhtml#s4-1), Superficial Punctate Keratopathy).\n- Ultraviolet keratopathy (see [4.7](c04.xhtml#s4-7), Ultraviolet Keratopathy).\n- Exposure keratopathy (see [4.5](c04.xhtml#s4-5), Exposure Keratopathy).\n- Neurotrophic keratopathy (see [4.6](c04.xhtml#s4-6), Neurotrophic Keratopathy).\n- Chemical burn (see [3.1](c03.xhtml#s3-1), Chemical Burn).\n- Thermal injury (see [3.2](c03.xhtml#s3-2), Thermal Injuries).\nWorkup\n\n- Slit-lamp examination: Use fluorescein dye, measure the size (e.g., height and width) of the abrasion, and diagram its location. Evaluate for foreign body, infiltrate (underlying corneal opacification), AC reaction, hyphema, corneal laceration, and penetrating trauma.\n- Evert the eyelids to ensure that no foreign body is present, especially in the presence of vertical or linear abrasions.\nTreatment\n\n- Antibiotic\n- Noncontact lens wearer: Antibiotic ointment (e.g., erythromycin, bacitracin, or bacitracin/polymyxin B q2–4h while awake) or antibiotic drops (e.g., polymyxin B/trimethoprim or a fluoroquinolone q.i.d.). Abrasions secondary to fingernails or vegetable matter should be covered with a fluoroquinolone drop (e.g., ofloxacin, moxifloxacin, besifloxacin) or ointment (e.g., ciprofloxacin) at least q.i.d.\n- Contact lens wearer: Must have antipseudomonal coverage (e.g., fluoroquinolone). Should use antibiotic ointment or antibiotic drops at least q.i.d.\n- Cycloplegic agent (e.g., cyclopentolate 1% to 2% b.i.d. or t.i.d.) for traumatic iritis, which may develop 24 to 72 hours after trauma. Avoid steroid use for iritis with epithelial defects because it may impede epithelial healing and increase infection risk. Avoid use of long-acting cycloplegics for small abrasions to allow for faster visual recovery.\n- Patching is rarely necessary and can cause a serious abrasion if not applied properly. Patching should be avoided in all contact lens–related corneal abrasions due to higher risk of infection.\n- Consider a short course of topical nonsteroidal anti-inflammatory drug (NSAID) drops (e.g., ketorolac 0.4% to 0.5% q.i.d. for 3 days) for pain control. Avoid in patients with other ocular surface diseases. Oral acetaminophen, NSAIDs, or narcotics (in severe cases) can also be used for pain control.\n- Debride loose or hanging epithelium because it may inhibit healing. A cotton-tipped applicator soaked in topical anesthetic (e.g., proparacaine) or sterile jeweler’s forceps (used with caution) may be utilized.\n- Bandage contact lenses may be used to improve comfort and protect the epithelium during healing. Contact lenses are rarely used in the emergency room setting out of concern for patient compliance and follow-up. If a bandage contact lens is placed, patients should use prophylactic topical antibiotics (e.g., polym"}, {"id": "3.4", "chapter_num": "3", "chapter": "Trauma", "name": "Corneal and Conjunctival Foreign Bodies", "raw": "3.4 Corneal and Conjunctival Foreign Bodies\n\nSymptoms\n\nForeign body sensation, tearing, pain, and redness.\n\nSigns\n\n(See Figure 3.4.1.)\n\nFigure 3.4.1 Corneal rust ring. \n\nCritical. Conjunctival or corneal foreign body with or without a rust ring.\n\nOther. Conjunctival injection, eyelid edema, mild AC reaction, and SPK. A small infiltrate may surround a corneal foreign body; it is usually reactive and sterile. Vertically oriented linear corneal abrasions or SPK may indicate a foreign body under the upper eyelid.\n\nWorkup\n\n- History: Determine the mechanism of injury (e.g., metal striking metal, power tools or weed-whackers, direct pathway with no safety glasses, distance of the patient from the instrument of injury, etc.). Attempt to determine the size, shape, velocity, force, and composition of the object. Always keep in mind the possibility of an IOFB and determine the tetanus status of the patient.\n- Document visual acuity before any procedure is performed. One or two drops of topical anesthetic may be necessary to facilitate the examination.\n- Slit-lamp examination: Locate and assess the depth of the foreign body. Examine closely for possible entry sites (rule out self-sealing lacerations), pupil irregularities, iris tears and transillumination defects (TIDs), lens capsular perforations, lens opacities, hyphema, AC shallowing (or deepening in scleral perforations), and asymmetrically low IOP in the involved eye.\n- Dilate the eye and examine the posterior segment for possible IOFB (see [3.11](c03.xhtml#s3-11), Intraocular Foreign Body).\n- Consider B-scan ultrasound (US), computed tomography (CT) scan of the orbit (axial, coronal, and parasagittal views, 1-mm sections), or ultrasound biomicroscopy (UBM) to exclude an intraocular or intraorbital foreign body. While we prefer a CT scan, a plain film x-ray can also be used to rule out radiodense foreign bodies (x-ray will not reliably detect radiolucent foreign bodies such as wood or glass). Avoid magnetic resonance imaging (MRI) if there is a history of possible metallic foreign body.\nNOTE: There may be multiple foreign bodies with injuries due to power equipment or explosive debris.\n\nIf there is no evidence of perforation, evert the eyelids and inspect the fornices for additional foreign bodies. Double everting the upper eyelid with a Desmarres eyelid retractor may be necessary. Carefully inspect conjunctival lacerations to rule out an underlying scleral laceration or perforation. Measure and diagram the dimensions of any corneal or scleral infiltrate and the degree of any AC reaction for monitoring therapy response and progression of possible infection.\n\nNOTE: An infiltrate accompanied by a significant AC reaction, purulent discharge, or extreme conjunctival injection and pain should be cultured to rule out infection, treated aggressively with antibiotics, and followed closely (see [4.12](c04.xhtml#s4-12), Bacterial Keratitis).\n\nTreatment\n\nCorneal Foreign Body (Superficial or Partial Thickness)\n\n- Apply topical anesthetic (e.g., proparacaine). Remove the corneal foreign body with a foreign body spud or fine forceps such as jeweler’s forceps at a slit lamp. Multiple superficial foreign bodies may be more easily removed by irrigation.\n- Remove the rust ring as completely as possible on the first visit. This may require an ophthalmic burr (see Figure 3.4.2). It is sometimes safer to leave a deep, central rust ring to allow time for the rust to migrate to the corneal surface, at which point i"}, {"id": "3.5", "chapter_num": "3", "chapter": "Trauma", "name": "Conjunctival Laceration", "raw": "3.5 Conjunctival Laceration\n\nSymptoms\n\nPain, redness, and/or foreign body sensation, with a history of trauma.\n\nSigns\n\nFluorescein staining of the conjunctiva. The conjunctiva may be torn and rolled up on itself. Exposed white sclera may be noted. Conjunctival and subconjunctival hemorrhages are often present.\n\nWorkup\n\n- History: Determine the nature of the trauma and whether a ruptured globe or intraocular or intraorbital foreign body may be present. Evaluate the mechanism for possible foreign body involvement, including size, shape, and velocity of object. Determine the tetanus status of the patient.\n- Complete ocular examination, including careful exploration of the sclera (after topical anesthesia, e.g., proparacaine or viscous lidocaine) in the region of the conjunctival laceration to rule out scleral laceration or subconjunctival foreign body. The entire area of sclera under the conjunctival laceration must be inspected. Since the conjunctiva is mobile, inspect a wide area of the sclera under the laceration. Use a proparacaine-soaked, sterile cotton-tipped applicator to manipulate the conjunctiva. Irrigation with saline may be helpful in removing scattered debris. A Seidel test may be helpful (see Appendix 5, Seidel Test to Detect a Wound Leak). Cellulose surgical spears may be helpful for detecting vitreous through a wound. Dilated fundus examination, especially evaluating the area underlying the conjunctival injury, must be carefully performed with indirect ophthalmoscopy.\n- Consider a CT scan of the orbit without contrast (axial, coronal, and parasagittal views, 1-mm sections) to exclude an intraocular or intraorbital foreign body. B-scan US or UBM may be helpful.\n- Exploration of the site in the operating room under general anesthesia may be necessary when a ruptured globe is suspected, especially in children.\nTreatment\n\nIn case of a ruptured globe or penetrating ocular injury, see [3.10](c03.xhtml#s3-10), Ruptured Globe and Penetrating Ocular Injury. Otherwise,\n\n- Antibiotic ointment (e.g., erythromycin, bacitracin, or bacitracin/polymyxin B q.i.d.). A pressure patch may rarely be used for the first 24 hours for comfort.\n- Most lacerations will heal without surgical repair. Some large lacerations (≥1 to 1.5 cm) may be sutured with 8-0 polyglactin 910 (e.g., Vicryl) or 6-0 plain gut. When suturing, take care not to bury folds of conjunctiva or incorporate Tenon capsule into the wound. Avoid suturing the plica semilunaris or caruncle to the conjunctiva.\nFollow-Up\n\nIf there is no concomitant ocular damage, patients with large conjunctival lacerations are reexamined within 1 week. Patients with small injuries are seen at longer intervals and instructed to return immediately if symptoms worsen.\n\n"}, {"id": "3.6", "chapter_num": "3", "chapter": "Trauma", "name": "Traumatic Iritis", "raw": "3.6 Traumatic Iritis\n\nSymptoms\n\nDull, aching, or throbbing pain, photophobia, tearing, redness, blurry vision, occasionally floaters, and onset of symptoms usually within 1 to 3 days of trauma.\n\nSigns\n\nCritical. White blood cells (WBCs) and flare in the AC (seen under high-power magnification by focusing into the AC with a small, bright, tangential beam from the slit lamp).\n\nOther. Pain in the traumatized eye when light enters either eye (consensual photophobia); lower (due to ciliary body shock/shutdown) or higher (due to inflammatory debris and/or trabeculitis) IOP than fellow eye; smaller, poorly dilating pupil or larger pupil (often due to iris sphincter tears) in the traumatized eye; perilimbal conjunctival injection; keratic precipitates (diffuse or inferior cornea); Vossius ring (ring-shaped iris pigment deposits on the anterior lens capsule surface due to blunt trauma driving the iris posteriorly); decreased vision.\n\nDifferential Diagnosis\n\n- Nongranulomatous anterior uveitis: No history of trauma, or the degree of trauma is not consistent with the level of inflammation. See [12.1](c12.xhtml#s12-1), Anterior Uveitis (Iritis/Iridocyclitis).\n- Traumatic microhyphema or hyphema: Red blood cells (RBCs) in the AC. See [3.7](c03.xhtml#s3-7), Hyphema and Microhyphema.\n- Traumatic corneal abrasion: May have an accompanying sterile AC reaction. See [3.3](c03.xhtml#s3-3), Corneal Abrasion.\n- Traumatic retinal detachment: May produce an AC reaction or demonstrate pigment in the anterior vitreous. See [11.3](c11.xhtml#s11-3), Retinal Detachment.\nWorkup\n\nComplete ophthalmic examination, including IOP measurement and dilated fundus examination.\n\nTreatment\n\nCycloplegic agent (e.g., cyclopentolate 1% or 2% b.i.d. to t.i.d.). May use a steroid drop (e.g., prednisolone acetate 0.125% to 1% q.i.d.). Cautious use of topical steroids if an epithelial defect is present. A topical beta-blocker (e.g., timolol or levobunolol 0.5% b.i.d.) may be considered if the IOP is elevated.\n\nFollow-Up\n\n- Recheck in 5 to 7 days.\n- If resolved, discontinue the cycloplegic agent and taper steroid drops if using.\n- Around 1 month after trauma, perform gonioscopy to look for angle recession and indirect ophthalmoscopy with scleral depression to detect retinal breaks or detachment.\n"}, {"id": "3.7", "chapter_num": "3", "chapter": "Trauma", "name": "Hyphema and Microhyphema", "raw": "3.7 Hyphema and Microhyphema\n\nTRAUMATIC HYPHEMA\n\nSymptoms\n\nPain, blurred vision, and history of blunt or penetrating trauma.\n\nSigns\n\n(See Figure 3.7.1.)\n\nFigure 3.7.1 Hyphema. \n\nClotted or unclotted blood in the AC, usually visible without a slit lamp. A total (100%) hyphema may be black or red. When black, it is called an “8-ball” or “blackball” hyphema, indicating deoxygenated blood; when red, the circulating blood cells may settle with time to become less than a 100% hyphema. Blackball hyphemas carry a greater risk of developing pupillary block and secondary angle closure.\n\nWorkup\n\n- History: Mechanism (including force, velocity, type, and direction) of injury? Protective eyewear? Time of injury? Recent intraocular surgery? Time and extent of visual loss? Maximal visual compromise usually occurs at the time of injury; decreasing vision over time suggests a rebleed or continued bleed (which may cause an IOP rise). Use of anticoagulant medications (e.g., aspirin, NSAIDs, warfarin, or clopidogrel)? Personal or family history of sickle cell disease or trait? Coagulopathy symptoms (e.g., bloody nose blowing, bleeding gums with tooth brushing, easy bruising, bloody stool)?\n- Ocular examination: First rule out a ruptured globe (see [3.10](c03.xhtml#s3-10), Ruptured Globe and Penetrating Ocular Injury). Evaluate for other traumatic injuries. Document the extent (e.g., measure hyphema height) and location of any clot and blood. Measure the IOP. Perform a dilated retinal evaluation without scleral depression. Consider gentle B-scan US if the fundus view is poor. Avoid gonioscopy unless intractable increased IOP develops, but if necessary, perform gently. If the view is poor, consider UBM to better evaluate the anterior segment and look for possible lens capsule rupture, IOFB, or other anterior-segment abnormalities.\n- Consider a CT scan of the orbits and brain (axial, coronal, and parasagittal views, 1-mm sections through the orbits) when indicated (e.g., suspected orbital fracture or IOFB, loss of consciousness).\n- Patients should be screened for sickle cell trait or disease (order Sickledex screen; if necessary, may check hemoglobin electrophoresis) as clinically appropriate.\nTreatment\n\nMany aspects remain controversial, including whether hospitalization and absolute bed rest are necessary, but an atraumatic upright environment is essential. Consider hospitalization for noncompliant patients, patients with bleeding diathesis or blood dyscrasia, other severe ocular or orbital injuries, and/or concomitant significant IOP elevation and sickle cell trait or disease. Additionally, consider hospitalization and aggressive treatment for children, especially those at risk for amblyopia (e.g., those younger than 7 to 10 years), when a thorough clinical examination is difficult, or when child abuse is suspected.\n\n- Confine either to bed rest with bathroom privileges or to limited activity. Elevate the head of the bed to allow blood to settle. Discourage strenuous activity, bending, or heavy lifting.\n- Place a rigid shield (metal or clear plastic) over the involved eye at all times. Do not patch because this prevents recognition of sudden visual change in the event of a rebleed.\n- Cycloplege the affected eye (e.g., cyclopentolate 1% or 2% b.i.d. to t.i.d., homatropine 5% b.i.d. to t.i.d., or atropine 1% daily to b.i.d.).\n- Avoid antiplatelet/anticoagulant medications (i.e., aspirin-containing products and NSAIDs) unless otherwise medically necessary. Do"}, {"id": "3.8", "chapter_num": "3", "chapter": "Trauma", "name": "Iridodialysis/Cyclodialysis", "raw": "3.8 Iridodialysis/Cyclodialysis\n\nDefinitions\n\nIridodialysis: Disinsertion of the iris from the scleral spur. Elevated IOP can result from trabecular meshwork damage and/or formation of peripheral anterior synechiae.\n\nCyclodialysis: Disinsertion of the ciliary body from the scleral spur. Increased uveoscleral outflow occurs initially resulting in hypotony. IOP elevation can later result from closure of a cyclodialysis cleft, leading to glaucoma.\n\nSymptoms\n\nUsually asymptomatic unless glaucoma or hypotony/hypotony maculopathy develops. Large iridodialyses may be associated with monocular diplopia, glare, and photophobia. Both are associated with blunt trauma or penetrating globe injuries. Typically, unilateral.\n\nSigns\n\n(See Figure 3.8.1.)\n\nFigure 3.8.1 Iridodialysis. \n\nCritical. Characteristic gonioscopic findings as described above.\n\nOther. Decreased or elevated IOP, glaucomatous optic nerve changes (see [9.1](c09.xhtml#s9-1), Primary Open-Angle Glaucoma), angle recession, and hypotony syndrome (see [9.19](c09.xhtml#s9-19), Hypotony Syndrome). Other signs of trauma include hyphema, cataract, and pupillary irregularities.\n\nDifferential Diagnosis\n\nIn setting of glaucoma, see [9.1](c09.xhtml#s9-1), Primary Open-angle Glaucoma.\n\nWorkup\n\nSee [9.6](c09.xhtml#s9-6), Angle Recession Glaucoma.\n\nTreatment\n\n- Sunglasses, contact lenses with an artificial pupil, or surgical correction if the iridodialysis is large and the patient is symptomatic.\n- If glaucoma develops, treatment is similar to that for primary open-angle glaucoma (see [9.1](c09.xhtml#s9-1), Primary Open-Angle Glaucoma). Aqueous suppressants are usually first-line therapy. Miotics are generally avoided because they may reopen cyclodialysis clefts, causing hypotony. Strong mydriatics may close clefts, resulting in pressure spikes. Often these spikes are transient and easily controlled with topical therapy, as the meshwork resumes aqueous filtration after several hours.\n- If hypotony syndrome develops due to cyclodialysis clefts, first-line treatment is usually atropine b.i.d. to reapproximate the ciliary body to the sclera and steroids to decrease inflammation. Further surgical treatment is described in Section [9.19](c09.xhtml#s9-19), Hypotony Syndrome.\nFollow-Up\n\n- See [9.1](c09.xhtml#s9-1), Primary Open-Angle Glaucoma.\n- Carefully monitor both eyes due to the high incidence of delayed open-angle and steroid-response glaucoma in the traumatized eye and an approximately 50% risk of open-angle glaucoma in the uninvolved eye.\n- Long-term follow-up is required, as the onset of elevated IOP is variable and may occur years after the initial trauma.\n"}, {"id": "3.9", "chapter_num": "3", "chapter": "Trauma", "name": "Corneal Laceration", "raw": "3.9 Corneal Laceration\n\nPARTIAL-THICKNESS LACERATION\n\nSigns\n\n(See Figure 3.9.1.)\n\nFigure 3.9.1 Corneal laceration. \n\nThe AC is not entered, and therefore, the cornea is not perforated.\n\nWorkup\n\n- Careful slit-lamp examination should be performed to exclude ocular penetration. Carefully evaluate the conjunctiva, sclera, and cornea, checking for extension beyond the limbus in cases involving the corneal periphery. Evaluate AC depth and compare with the fellow eye. A shallow AC indicates an actively leaking wound or a self-sealed leak (see Full-Thickness Corneal Laceration below). Check for iris TIDs and evaluate the lens for a cataract or a foreign body tract (must have a high level of suspicion with projectile objects). The presence of TIDs and lens abnormalities indicates a ruptured globe.\n- Seidel test (see Appendix 5, Seidel Test to Detect a Wound Leak). If the Seidel test is positive, a full-thickness laceration is present (see Full-Thickness Corneal Laceration below). A negative Seidel test indicates either a partial-thickness laceration or a self-sealed full-thickness laceration.\n- Avoid IOP measurement if the Seidel test is positive. Measure IOP with caution if the Seidel test is negative to avoid opening a previously self-sealed full-thickness laceration.\nTreatment\n\n- A cycloplegic (e.g., cyclopentolate 1% to 2%) and frequent application of an antibiotic (e.g., polymyxin B/bacitracin ointment or fluoroquinolone drops).\n- A bandage soft contact lens is occasionally helpful, depending on the location and nature of the wound.\n- When a moderate-to-deep corneal laceration is accompanied by wound gape, it is often best to suture the wound closed in the operating room to provide structural stability and to avoid excessive scarring with corneal irregularity, especially when in the visual axis.\n- If corneal foreign bodies are present and superficial, treat per Sections [3.4](c03.xhtml#s3-4), Corneal and Conjunctival Foreign Bodies. If foreign bodies are in the deeper cornea, there are no signs of infection or inflammation, and are well tolerated (see [3.11](c03.xhtml#s3-11), Intraocular Foreign Body, for inert foreign bodies), they may be left and watched closely. If the patient is symptomatic or if signs of infection/inflammation occur, deeper corneal foreign bodies should be removed in the operating room.\n- Tetanus toxoid as needed (see Appendix 2, Tetanus Prophylaxis).\nFollow-Up\n\nReevaluate daily until the epithelium heals.\n\nFULL-THICKNESS CORNEAL LACERATION\n\n(See Figure 3.9.2.)\n\nFigure 3.9.2 Full-thickness corneal laceration with positive Seidel test. \n\nSee [3.10](c03.xhtml#s3-10), Ruptured Globe and Penetrating Ocular Injury. Note that small, self-sealing, or slow-leaking lacerations with formed ACs may be treated with aqueous suppressants, bandage soft contact lenses, fluoroquinolone drops q.i.d., and precautions as listed in Section [3.10](c03.xhtml#s3-10), Ruptured Globe and Penetrating Ocular Injury. Cyanoacrylate corneal glue can also be considered but works best when there is missing tissue. See Video: Cyanoacrylate Corneal Glue. Avoid topical steroids. If an IOFB is present, see [3.11](c03.xhtml#s3-11), Intraocular Foreign Body.\n\n3.10 Ruptured Globe and Penetrating Ocular Injury \n\nSymptoms\n\nPain, decreased vision, and loss of fluid from eye. History of trauma, fall, or sharp object entering globe.\n\nSigns\n\n(See Figure 3.10.1.)\n\nFigure 3.10.1 Ruptured globe showing flat anterior chamber (AC), iris prolapse, and peaked pupil. \n\nC"}, {"id": "3.11", "chapter_num": "3", "chapter": "Trauma", "name": "Intraocular Foreign Body", "raw": "3.11 Intraocular Foreign Body\n\nSymptoms\n\nEye pain, decreased vision, or may be asymptomatic; often suggestive history (e.g., hammering metal or sharp object entering globe).\n\nSigns\n\n(See Figure 3.11.1.)\n\nFigure 3.11.1 Intraocular foreign body. \n\nCritical. May have a clinically detectable corneal or scleral perforation site, hole in the iris, focal lens opacity, or an IOFB. IOFBs are often seen on CT scan (thin cuts), B-scan US, and/or UBM.\n\nOther. See [3.10](c03.xhtml#s3-10), Ruptured Globe and Penetrating Ocular Injury. Also, microcystic (epithelial) edema of the peripheral cornea (a clue that a foreign body may be hidden in the AC angle in the same sector of the eye). Long-standing iron-containing IOFBs may cause siderosis, manifesting as anisocoria, heterochromia, corneal endothelial and epithelial deposits, anterior subcapsular cataracts, lens dislocation, retinopathy, and optic atrophy.\n\nTypes of Foreign Bodies\n\n- Frequently produce severe inflammatory reactions and may encapsulate within 24 hours if on the retina. Magnetic: Iron, steel, and tin.\n\nNonmagnetic: Copper and vegetable matter (may be severe or mild).\n\n- Typically produce mild inflammatory reactions. Magnetic: Nickel.\n\nNonmagnetic: Aluminum, mercury, zinc, and vegetable matter (may be severe or mild).\n\n- Inert foreign bodies: Carbon, gold, coal, glass, lead, gypsum plaster, platinum, porcelain, rubber, silver, and stone. Brass, an alloy of copper and zinc, is also relatively nontoxic. However, even inert foreign bodies can be toxic because of a coating or chemical additive. Most ball bearings (BBs) and gunshot pellets are made of 80% to 90% lead and 10% to 20% iron.\nWorkup\n\n- History: Mechanism of trauma? Use of protective eyewear? Composition of foreign body? Time of last meal?\n- Perform ocular examination, including visual acuity and careful evaluation of globe integrity. If there is an obvious perforation site, the remainder of the examination may be deferred until surgery. If there does not appear to be a risk of extrusion of intraocular contents, the globe is inspected gently to localize the perforation site and to detect the foreign body.\n- Slit-lamp examination; search the AC and iris for a foreign body and look for an iris TID. Examine the lens for disruption, cataract, or embedded foreign body. Check IOP.\n- Consider careful gonioscopy of the AC angle if no wound leak can be detected and the globe appears intact.\n- Dilated retinal examination using indirect ophthalmoscopy.\n- Obtain a CT scan of the orbits and brain (coronal, axial, and parasagittal views with no larger than 1-mm sections through the orbits). MRI is contraindicated in the presence of a metallic foreign body. It may be difficult to visualize wood, glass, or plastic on a CT scan, especially acutely. Suspicion of a nonmetallic IOFB should specifically be mentioned to the reading radiologist.\n- Gentle B-scan US of the globe and orbit. Intraocular air can mimic a foreign body. Consider UBM to inspect the AC if IOFB is not visible on clinical examination (e.g., foreign body in the AC angle or sulcus). These steps should be deferred in patients with a definitive or suspected anterior rupture given the risk for extrusion of intraocular contents.\n- Culture the wound site if it appears infected.\n- Determine whether the foreign body is magnetic (e.g., examine material from which the foreign body came).\nTreatment\n\n- Hospitalization with no food or drink (NPO) until repair.\n- Place a protective rigid shield ov"}, {"id": "3.12", "chapter_num": "3", "chapter": "Trauma", "name": "Firework or Shrapnel/Bullet-Related Injuries", "raw": "3.12 Firework or Shrapnel/Bullet-Related Injuries\n\nSymptoms\n\nOcular pain, decreased vision, foreign body sensation, tearing, redness, and photophobia; history of trauma with firework, weapons of warfare, or devices that result in high-velocity impact and shrapnel/particulate fragmentation (e.g., firecracker, sparkler, firearm, explosive, grenade).\n\nSigns\n\nCritical. Foreign bodies, usually irregular in shape and fragmented in nature, embedded in ocular or orbital tissues. Periocular damage secondary to associated surrounding high-energy release. Can result in open- or closed-globe injuries.\n\nOther. Conjunctival injection, eyelid edema, corneal/conjunctival epithelial defects or lacerations, thermal and/or chemical burns of ocular tissues (e.g., eyelid, conjunctiva, cornea), AC reaction, hyphema, iridodialysis, angle recession, VH, and retina or optic nerve injury. Ocular motility deficits and globe malposition may exist if the foreign body is embedded in or around the orbit.\n\nWorkup\n\n- History: Mechanism of injury (e.g., detonation of an explosive, missile, or firearm; distance of patient from the instrument of injury, etc.)? Size, weight, velocity, force, shape, and composition of the object? Use of protective eyewear? Concurrent tinnitus or hearing loss (often associated with explosions/firearms)?\n- Document visual acuity before any procedure is performed. Topical anesthetic may be necessary to facilitate examination, but be careful not to cause expulsion of ocular tissue if open globe exists. Also, evaluate optic nerve function by examining pupillary response and testing color plates.\n- Examine for orbital signs by evaluating motility, globe malposition, and sectoral chemosis/inflammation, as this might help localize the landing site of shrapnel or bullet material that has entered without exit.\n- Look for periocular tissue burns or lacerations, which may warrant evaluation by internal medicine or dermatology.\n- Check the forniceal pH if an associated chemical injury is suspected. See [3.1](c03.xhtml#s3-1), Chemical Burn.\n- Slit-lamp examination: Locate and assess the depth of any foreign body. Examine closely for possible entry sites (rule out self-sealing lacerations), pupil irregularities, iris tears and TIDs, capsular perforations, lens opacities, corneal defects and edema, hyphema, AC shallowing (or deepening in scleral perforations) and inflammatory reaction, and asymmetrically low IOP in the involved eye. Assess for any damage to the lacrimal apparatus.\n- Perform a dilated fundus examination to exclude possible IOFB, unless there is a risk of extrusion of intraocular contents (see [3.11](c03.xhtml#s3-11), Intraocular Foreign Body). Dilation should typically be deferred if there is a foreign body lodged in the iris. In cases of chemical injury, dilate with cycloplegics only and avoid alpha-agonist drops (e.g., phenylephrine), which may exacerbate limbal ischemia.\n- Consider gentle B-scan US, CT scan of the orbit (axial, coronal, and parasagittal views, 1-mm sections), or UBM to exclude an intraocular or intraorbital foreign body. Avoid MRI if history concerns possible metallic foreign body.\nTreatment and Follow-Up\n\n- Depends on the specific injuries present. Refer to appropriate sections as needed. Depending on the number or extent of injuries, consider exploration in the OR.\n- Tetanus toxoid as needed (see Appendix 2, Tetanus Prophylaxis).\n- If evidence of penetrating or perforating trauma, see [3.9](c03.xhtml#s3-9), Corneal Lac"}, {"id": "3.13", "chapter_num": "3", "chapter": "Trauma", "name": "Commotio Retinae", "raw": "3.13 Commotio Retinae  \n\nSymptoms\n\nDecreased vision, visual field defect, or asymptomatic; history of recent ocular trauma.\n\nSigns\n\n(See Figure 3.13.1.)\n\nFigure 3.13.1 Commotio retinae. \n\nCritical. Confluent area of retinal whitening in the periphery or posterior pole. A cherry-red spot may be present. The retinal blood vessels are undisturbed in the area of retinal whitening.\n\nOther. Additional signs of ocular trauma, such as retinal hemorrhages, may be noted.\n\nNOTE: Visual acuity does not always correlate with the degree of retinal whitening.\n\nEtiology\n\nBlunt trauma to the globe causes shock waves which disrupt the photoreceptors. Retinal whitening is due to fragmentation of the photoreceptor outer segments (light scattering) and damage to the retinal pigment epithelium (RPE). The inner retinal layers may also be involved depending on the force of injury.\n\nDifferential Diagnosis\n\n- Retinal detachment: Retina elevated associated with retinal break or dialysis. See [11.3](c11.xhtml#s11-3), Retinal Detachment.\n- Retinal artery occlusion: Retinal whitening along the distribution of an artery. See [11.6](c11.xhtml#s11-6), Central Retinal Artery Occlusion and [11.7](c11.xhtml#s11-7), Branch Retinal Artery Occlusion.\n- White without pressure: Common benign peripheral retinal finding. May be associated with a prominent vitreous base.\n- Myelinated nerve fiber layer: Develops postnatally (see [Figure 11.5.2](c11.xhtml#ff11-5-2)).\n- Chorioretinitis sclopetaria: Bare sclera visible through retinal and choroidal rupture on dilated examination. See [3.15](c03.xhtml#s3-15), Chorioretinitis Sclopetaria.\nWorkup\n\nComplete ophthalmic evaluation, including dilated fundus examination. See Video: Smartphone Video Indirect Ophthalmoscopy Guide. Scleral depression is performed except when a ruptured globe, hyphema, microhyphema, or iritis is present. See Video: Scleral Depression Tutorial. Optical coherence tomography (OCT) shows ellipsoid zone disruption.\n\nTreatment\n\nNo treatment is required because this condition is self-limited. Some patients with foveal involvement may be left with chronic visual impairment and RPE atrophy or hyperpigmentation.\n\nFollow-Up\n\nDilated fundus examination is repeated in 1 to 2 weeks. Patients are instructed to return sooner if retinal detachment symptoms are experienced (see [11.3](c11.xhtml#s11-3), Retinal Detachment).\n\n"}, {"id": "3.14", "chapter_num": "3", "chapter": "Trauma", "name": "Traumatic Choroidal Rupture", "raw": "3.14 Traumatic Choroidal Rupture\n\nSymptoms\n\nDecreased vision or asymptomatic. History of ocular trauma.\n\nSigns\n\n(See Figures 3.14.1 and 3.14.2.)\n\nFigure 3.14.1 Choroidal rupture. \n\nFigure 3.14.2 Acute choroidal rupture. \n\nCritical. A yellow or white crescent-shaped subretinal streak, usually concentric to the optic disc (indirect injury) or in the peripheral fundus (direct injury). May be single or multiple. Often obscured for several days to weeks after inciting trauma due to overlying subretinal blood.\n\nOther. Rarely, the rupture may be radially oriented. Choroidal neovascularization (CNV) may develop later. Traumatic optic neuropathy (TON) may be present.\n\nDifferential Diagnosis\n\n- Lacquer cracks of high myopia: Often bilateral. A tilted disc, a scleral crescent adjacent to the disc, and a posterior staphyloma may also be seen. CNV may also develop in this condition. See [11.22](c11.xhtml#s11-22), Pathologic/Degenerative Myopia.\n- Angioid streaks: Bilateral subretinal streaks radiating from the optic disc, sometimes associated with CNV. See [11.23](c11.xhtml#s11-23), Angioid Streaks.\nWorkup\n\n- Complete ocular evaluation, including dilated fundus examination to rule out retinal breaks and to detect CNV.\n- Consider OCT and autofluorescence to characterize a choroidal rupture and evaluate potential CNV.\n- Consider fluorescein angiography to confirm the presence and location of CNV if the injury is old.\nTreatment\n\n- Observation. There are no medical or surgical treatment options in the acute setting. Consider recommending safety eyewear. An Amsler grid may be provided, and the patient is instructed to return if any change in the appearance of the grid is noted (see Appendix 4, Amsler Grid).\n- Anti–vascular endothelial growth factor (VEGF) therapy may be used if CNV develops. See [11.17](c11.xhtml#s11-17), Neovascular or Exudative (Wet) Age-Related Macular Degeneration, for more information on CNV treatment.\nFollow-Up\n\nAfter ocular trauma, patients with hemorrhage obscuring the underlying choroid are reevaluated every 1 to 2 weeks until the choroid can be well visualized. Although CNV is rare overall, ruptures that are particularly long or closer to the fovea are at greater risk for CNV development. Fundus examinations may be performed every 6 to 12 months depending on the severity and risk of progression to CNV. Patients treated for CNV must be followed closely after treatment to watch for persistent or new CNV (see [11.17](c11.xhtml#s11-17), Neovascular or Exudative (Wet) Age-Related Macular Degeneration, for further follow-up guidelines).\n\n"}, {"id": "3.15", "chapter_num": "3", "chapter": "Trauma", "name": "Chorioretinitis Sclopetaria", "raw": "3.15 Chorioretinitis Sclopetaria\n\nSymptoms\n\nVisual loss; severity depends on the region of involvement. History of high-velocity missile injury to orbit (e.g., a BB, bullet, or shrapnel).\n\nSigns\n\n(See Figure 3.15.1.)\n\nFigure 3.15.1 Chorioretinitis sclopetaria. \n\nCritical. Full-thickness rupture of the choroid and retina leaving bare sclera visible on fundus examination, typically demonstrating a “claw-like” configuration of fundus atrophy and pigmentation. The globe remains intact.\n\nOther. Subretinal, intraretinal, preretinal, and VH often involving the macula. Eventually blood is resorbed and the resultant defects are replaced by fibrous tissue. Intraorbital foreign body. Can have associated avulsion of vitreous base, which can cause peripheral retinal dialysis.\n\nEtiology\n\nCaused by a high-velocity missile passing through the orbit without perforating the globe. Resultant shock waves lead to chorioretinal rupture from the sclera.\n\nDifferential Diagnosis\n\n- Ruptured globe: Severe subconjunctival hemorrhage and chemosis, often with deep or shallow AC; low IOP; and peaked, irregular pupil. See [3.10](c03.xhtml#s3-10), Ruptured Globe and Penetrating Ocular Injury.\n- Choroidal rupture: White or yellow crescent-shaped subretinal streak usually concentric to the optic nerve. No retinal break is present. Initially, retinal hemorrhage in the posterior pole may obscure a choroidal rupture, which subsequently becomes apparent as the blood clears. See [3.14](c03.xhtml#s3-14), Traumatic Choroidal Rupture.\n- Optic nerve avulsion: Decreased vision with a RAPD on examination and hemorrhagic depression or excavation of the optic disc if partial, or retraction of entire nerve if complete. Often associated with VH. No treatment is available, and visual prognosis depends on extent of injury. See [3.21](c03.xhtml#s3-21), Traumatic Optic Neuropathy.\nWorkup\n\n- History: Known injury with a projectile?\n- Complete ocular evaluation including dilated fundus examination. Look for areas of retinal and choroidal rupture with underlying bare sclera. Carefully examine the conjunctiva and sclera to rule out ruptured globe. Rule out IOFB. Carefully examine the retinal periphery for retinal tears or dialysis.\n- Protect the eye with a rigid shield.\n- CT scan of the orbit (axial, coronal, and parasagittal views, 1-mm sections) to check for intrascleral, intraocular, or intraorbital foreign bodies. Gentle B-scan US or UBM may be helpful to rule out intraocular or intraorbital foreign bodies.\nTreatment\n\nObservation, as there is no effective treatment. Complications, including retinal dialysis and detachment, are treated appropriately. Surgery can be considered for nonclearing VH.\n\nFollow-Up\n\nSequential examinations are required every 2 to 4 weeks initially looking for signs of retinal detachment as blood clears. Patients should be followed until an atrophic “claw-like” scar replaces areas of hemorrhage.\n\n"}, {"id": "3.16", "chapter_num": "3", "chapter": "Trauma", "name": "Purtscher Retinopathy", "raw": "3.16 Purtscher Retinopathy\n\nSymptoms\n\nDecreased vision, often sudden; can be severe. History of compression injury to the head, chest, or lower extremities (e.g., long bone fractures). Not from a direct ocular injury.\n\nSigns\n\n(See Figure 3.16.1.)\n\nFigure 3.16.1 Purtscher retinopathy. \n\nCritical. Multiple cotton-wool spots and/or intraretinal hemorrhages in the posterior pole; can also have polygonal areas of retinal whitening which spare the perivascular space (Purtscher flecken). Changes are typically bilateral but may be asymmetric or unilateral.\n\nOther. Serous macular detachment, dilated tortuous vessels, hard exudates, optic disc edema (though the disc usually appears normal), macular pseudo–cherry-red spot, RAPD, and optic atrophy when chronic.\n\nDifferential Diagnosis\n\n- Purtscher-like retinopathy: Several entities with the same or similar presentation but not associated with trauma (Purtscher retinopathy by definition occurs with nonocular trauma), including acute pancreatitis, malignant hypertension, preeclampsia, thrombotic thrombocytopenic purpura (TTP), hemolytic uremic syndrome (HUS), collagen vascular diseases (e.g., systemic lupus erythematosus, scleroderma, dermatomyositis, Sjögren syndrome), chronic renal failure, amniotic fluid embolism, retrobulbar anesthesia, orbital steroid injection, and alcohol use, among others.\n- Central retinal vein occlusion: Unilateral, multiple hemorrhages and cotton-wool spots diffusely throughout the retina. See [11.8](c11.xhtml#s11-8), Central Retinal Vein Occlusion.\n- Central retinal artery occlusion: Unilateral retinal whitening with a cherry-red spot; see [11.6](c11.xhtml#s11-6), Central Retinal Artery Occlusion.\n- Commotio retinae: confluent area of retinal whitening after ocular trauma. See [3.13](c03.xhtml#s3-13), Commotio Retinae.\nEtiology\n\nIt is felt that the findings are due to occlusion of small arterioles in the peripapillary retina by different emboli depending on the associated systemic condition: complement activation, fibrin clots, platelet–leukocyte aggregates, or fat emboli.\n\nWorkup\n\n- History: Compression injury to the head or chest? Long bone fracture? If no trauma, any symptoms associated with causes of Purtscher-like retinopathy (see above, e.g., renal failure, rheumatologic disease)?\n- Complete ocular evaluation including dilated fundus examination. Rule out direct globe injury.\n- CT of the head, chest, or long bones as indicated.\n- If characteristic findings occur in association with severe head or chest trauma, then the diagnosis is established and no further workup is required. Without trauma, the patient needs a systemic workup to investigate other causes (e.g., blood pressure measurement, basic metabolic panel [BMP], CBC, amylase, lipase, rheumatologic evaluation).\n- Fluorescein angiography: Shows patchy capillary nonperfusion in regions of retinal whitening.\nTreatment\n\nNo ocular treatment available. Must treat the underlying condition if possible to prevent further damage.\n\nFollow-Up\n\nRepeat dilated fundus examination in 2 to 4 weeks. Retinal lesions resolve over a few weeks to months. Visual acuity may remain reduced but can return to baseline in 50% of cases.\n\n"}, {"id": "3.17", "chapter_num": "3", "chapter": "Trauma", "name": "Abusive Head Trauma/Shaken Baby Syndrome", "raw": "3.17 Abusive Head Trauma/Shaken Baby Syndrome\n\nDefinition\n\nForm of nonaccidental trauma in young children characterized by intracranial hemorrhage, brain injury, multifocal fractures, bruising, and/or retinal hemorrhages due to repeated acceleration–deceleration and/or rotational forces with or without blunt head impact. External signs of head trauma are often absent.\n\nSymptoms\n\nChange in mental status, new-onset seizures, poor feeding, and irritability. Child is usually <1 year of age but rarely >3 years of age. Symptoms and signs are often inconsistent with history, including caregiver reports of falls from low heights (e.g., fall from a bed).\n\nSigns\n\nCritical. Retinal hemorrhages are present in ∼85% of cases. Two-thirds are too numerous to count and multilayered (pre-, intra-, and subretinal), extending throughout the retina to the ora serrata. Markedly asymmetric hemorrhages in up to 20% of cases, unilateral in ∼2%. Macular retinoschisis (hemorrhagic macular cysts, most often subinternal limiting membrane) may be seen with or without surrounding paramacular retinal folds. Most commonly associated brain lesions are subarachnoid and subdural hemorrhages. Characteristic fractures include the ribs and/or long bone epiphyses. Cerebral edema and death occur in ∼20% to 30% of cases.\n\nOther. Subretinal and VH may also occur. Retinal detachment, papilledema, late optic atrophy, and optic nerve avulsion are infrequent. Postmortem findings include orbital, optic nerve sheath, optic nerve sheath intradural, and posterior intrascleral hemorrhage.\n\nDifferential Diagnosis\n\n- Severe accidental injury: Accompanied by other external injuries consistent with the history. Even in the most severe accidental injuries (e.g., motor vehicle accidents [MVA]), retinal hemorrhages are uncommon. In the usual trauma of childhood, retinal hemorrhages are typically mild and do not extend to the ora serrata. Severe retinal hemorrhages similar to abusive head trauma have only been reported in fatal head crush, fatal MVA, and an 11-m fall onto concrete.\n- Birth trauma: Retinal hemorrhages can be extensive, but nerve fiber layer hemorrhages are gone by 2 weeks, and dot/blot hemorrhages typically disappear by 4 to 6 weeks. Foveal, preretinal, and VH may persist longer. No retinoschisis or retinal folds. Clinical history must be consistent. Most common cause of retinal hemorrhage in neonates.\n- Coagulopathies, leukemia, and other blood dyscrasias. Rare, but should be ruled out. Other than leukemia, in which infiltrates are usually present, these entities do not cause extensive retinal hemorrhages. Retinal hemorrhages associated with severe leukemias are generally few, limited to the posterior pole, and not multilayered.\n- Hyperacute elevation of intracranial pressure (e.g., ruptured aneurysm) may cause extensive retinal hemorrhage. Easily differentiated by neuroimaging. Otherwise, increased intracranial pressure in children does NOT result in extensive retinal hemorrhage beyond the peripapillary area.\n- Hypoxia, immunizations, cardiopulmonary resuscitation (CPR), meningitis, sepsis, and cortical vein thrombosis are often offered as alternate explanations in the courtroom for retinal hemorrhages, but these are not usually supported by available clinical and research evidence. Type, distribution, and number of hemorrhages are helpful in ascertaining causality.\nWorkup\n\n- History from caregiver(s) is best obtained by a child abuse pediatrician or a representative team. Be a"}, {"id": "3.18", "chapter_num": "3", "chapter": "Trauma", "name": "Eyelid Laceration", "raw": "3.18 Eyelid Laceration \n\nSymptoms\n\nPeriorbital pain, tearing, bleeding, and history of facial trauma.\n\nSigns\n\n(See Figure 3.18.1.)\n\nFigure 3.18.1 Marginal eyelid laceration. \n\nPartial- or full-thickness eyelid defect involving the skin and subcutaneous tissues. Superficial lacerations/abrasions may mask a deep laceration, foreign body, or penetrating/perforating injury to the lacrimal drainage system (e.g., punctum, canaliculus, common canaliculus, lacrimal sac), globe, orbit, or cranial vault.\n\nWorkup\n\n- History: Determine the mechanism and timing of injury: bite, foreign body potential, etc.\n- Complete ocular evaluation, including bilateral dilated fundus examination. Ensure there is no injury to the globe, orbital soft tissue (including the optic nerve), or intracranial compartment before attempting eyelid repair.\n- Carefully evert the eyelids and use toothed forceps or cotton-tipped applicators to gently pull open one edge of the wound to determine the depth of penetration. (If foreign body is suspected, get imaging described below before extensive wound exploration.)\n- CT scan of brain, orbits, and midface (axial, coronal, and parasagittal views, 1-mm sections) should be obtained with any history suggestive of penetrating injury or severe blunt trauma to rule out fracture, retained foreign body, ruptured globe, or intracranial injury. If there is any suspicion of deeper injury, obtain imaging before eyelid laceration repair. Loss of consciousness mandates a CT of the brain. Depending on the mechanism of injury, the cervical spine may need to be cleared.\n- If laceration is nasal to the punctum, even if not obviously through the canalicular system, punctal dilation and probing with irrigation of the canalicular system should be considered to exclude canalicular involvement (see Figures 3.18.2 and 3.18.3; Appendix 7, Technique for Diagnostic Probing and Irrigation of the Lacrimal System). High suspicion should be maintained for unnoticed canalicular lacerations in the pediatric population, particularly with dog bite injuries.\nFigure 3.18.2 Canalicular laceration. \n\nFigure 3.18.3 Canalicular laceration showing exposed tip after probing the punctum. \n\n- Be suspicious in glancing blunt trauma to the lateral cheek (zygoma). A lateral glancing mechanism may abruptly stretch the medial canthal anatomy, resulting in avulsion of the medial canthal tendon with concomitant canalicular laceration. Canalicular lacerations are often missed with this mechanism because clinical attention is directed laterally to the zygoma and the medial canthal soft tissues often reappose into a normal position, camouflaging the extent of the injury.\nNOTE: Dog bites are notorious for causing canalicular lacerations and predominantly occur in young children. Probing should be performed in all such cases, even with lacerations that appear to be superficial. Uncooperative patients should undergo conscious sedation or an examination under anesthesia to thoroughly examine the eyelids, lacrimal drainage system, and globes.\n\nTreatment\n\n- Tetanus toxoid as needed (see Appendix 2, Tetanus Prophylaxis, for indications).\n- Consider systemic antibiotics for 7 to 10 days if contamination or foreign body is suspected (e.g., amoxicillin/clavulanate [500/125 mg p.o. b.i.d. to t.i.d. or 875/125 mg p.o. b.i.d.], doxycycline [100 mg p.o. b.i.d.], trimethoprim/sulfamethoxazole [80/400 mg or 160/800 mg p.o. daily to b.i.d.], or cephalexin [250 to 500 mg p.o. q.i.d.] [adults]; 25 to 50 "}, {"id": "3.19", "chapter_num": "3", "chapter": "Trauma", "name": "Orbital Blowout Fracture", "raw": "3.19 Orbital Blowout Fracture\n\nSymptoms\n\nPain with eye movement; local tenderness; eyelid edema; binocular diplopia; crepitus (particularly after nose blowing); and numbness of the cheek, upper lip, and/or teeth. Tearing may indicate nasolacrimal duct obstruction or injury seen with medial buttress, Le Fort II, or nasoethmoidal complex fractures, but this is typically a late complaint. Acute tearing is usually due to ocular irritation (e.g., chemosis, corneal abrasion, iritis).\n\nSigns\n\nCritical. Restricted eye movement (especially in upward gaze, lateral gaze, or both), subcutaneous or conjunctival emphysema, hypesthesia in the distribution of the infraorbital nerve (ipsilateral cheek and upper lip), point tenderness, enophthalmos (may initially be masked by orbital edema and hemorrhage), and hypoglobus.\n\nOther.Epistaxis, periorbital edema, and ecchymosis. Superior rim and orbital roof fractures may manifest hypesthesia in the distribution of the supratrochlear or supraorbital nerve (ipsilateral forehead), ptosis, and step-off deformity along the anterior table of the frontal sinuses (superior orbital rim and glabella). Trismus, malar flattening, and a palpable step-off deformity of the inferior orbital rim are characteristic of tripod (zygomatic complex) fractures. Optic neuropathy may be present secondary to posterior indirect TON or from a direct mechanism (orbital compartment syndrome [OCS] secondary to retrobulbar hemorrhage, foreign body, etc.; see below).\n\nDifferential Diagnosis of Muscle Entrapment in Orbital Fracture\n\n- Orbital edema and hemorrhage with or without a blowout fracture: May have limitation of ocular movement, periorbital swelling, and ecchymosis, but these will markedly improve or completely resolve over 7 to 10 days.\n- Cranial nerve palsy: Limitation of ocular movement, but no restriction on forced duction testing. Will have abnormal results on active force generation testing. In cases of suspected traumatic cranial neuropathy, significant skull base and intracranial injury have occurred and CT imaging should be obtained.\n- Laceration or direct contusion of EOMs: Often the site of penetrating injury is missed, especially if it occurs in the conjunctival cul-de-sacs. Look carefully for evidence of conjunctival laceration or orbital fat prolapse. Complete EOM laceration usually results in a large angle ocular deviation away from the injured muscle with no ocular movement toward the muscle. CT is often helpful in distinguishing EOM contusion from EOM laceration. On occasion, exploration of the EOM may be necessary under anesthesia.\nWorkup\n\n- Complete ophthalmic examination, including visual acuity, motility, IOP, and globe displacement. Check pupils and color vision to rule out TON (see [3.21](c03.xhtml#s3-21), Traumatic Optic Neuropathy). Compare sensation of the affected cheek with that on the contralateral side; palpate the eyelids for crepitus (subcutaneous emphysema); palpate the orbital rim for step-off deformities. Evaluate the globe carefully for an apparent or occult rupture, hyphema or microhyphema, traumatic iritis, and retinal or choroidal damage. A full, dilated examination may be difficult in uncooperative patients with periocular edema but is extremely important in the management of orbital fractures. If eyelid and periocular edema limit the view, special techniques may be necessary (e.g., use of Desmarres eyelid retractors or clean bent paperclips [see Figure 3.19.1], lateral cantholysis, examination"}, {"id": "3.20", "chapter_num": "3", "chapter": "Trauma", "name": "Traumatic Retrobulbar Hemorrhage (Orbital Hemorrhage)", "raw": "3.20 Traumatic Retrobulbar Hemorrhage (Orbital Hemorrhage) \n\nSymptoms\n\nPain, decreased vision, inability to open the eyelids due to severe swelling, recent history of trauma or surgery to the eyelids or orbit, and history of anticoagulation. Because the orbit is a bony compartment with firm anterior soft tissue tethering by the orbital septum, any process (blood, pus, air) that rapidly fills the orbit results in OCS. As pressure builds within the orbit, ischemia to the optic nerve, globe, and retina occur, potentially resulting in devastating, permanent visual loss. OCS is an ophthalmic emergency.\n\nNOTE: Most iatrogenic postoperative orbital hemorrhages evolve within the first 6 hours following surgery.\n\nSigns\n\n(See Figure 3.20.1.)\n\nFigure 3.20.1 Retrobulbar hemorrhage. \n\nCritical. Proptosis with resistance to retropulsion, tense (“rock hard”) eyelids that are difficult to open, vision loss, afferent pupillary defect, dyschromatopsia, and increased IOP.\n\nOther. Eyelid ecchymosis, diffuse subconjunctival hemorrhage, chemosis, congested conjunctival vessels, evidence of disc swelling from compressive optic neuropathy or retinal vascular occlusion, and limited extraocular motility in any or all fields of gaze.\n\nDifferential Diagnosis\n\n- Orbital cellulitis: Fever, proptosis, chemosis, limitation, or pain with eye movement; also may follow trauma, but usually not as acutely. A rapidly expanding orbital abscess may result in OCS, and in such cases, the acute management is the same as that for orbital hemorrhage. See [7.3.1](c07.xhtml#s7-3-1), Orbital Cellulitis.\n- Severe orbital emphysema (“tension pneumo-orbit”): Tight orbit, tight eyelids, crepitus, and decreased extraocular motility; may follow orbital fracture with or without nose blowing. See [3.19](c03.xhtml#s3-19), Orbital Blowout Fracture.\n- Orbital fracture: Limited extraocular motility, enophthalmos, or proptosis may be present. See [3.19](c03.xhtml#s3-19), Orbital Blowout Fracture.\n- Ruptured globe: Subconjunctival edema and hemorrhage may mask a ruptured globe. See [3.10](c03.xhtml#s3-10), Ruptured Globe and Penetrating Ocular Injury.\n- High-flow (direct) carotid–cavernous fistula: May follow trauma either acutely or subacutely; most are spontaneous and nontraumatic. Pulsatile exophthalmos, ocular/brow bruit, corkscrew arterialized conjunctival vessels, chemosis, and increased IOP may be seen. Usually unilateral, although bilateral signs from a unilateral fistula may be seen occasionally. See [10.10](c10.xhtml#s10-10), Cavernous Sinus and Associated Syndromes (Multiple Ocular Motor Nerve Palsies).\n- Varix: Increased proptosis with Valsalva maneuver. Not usually seen acutely after trauma, and in the vast majority of orbital varices, there is no history of trauma or surgery.\n- Lymphangioma: Usually in younger patients. May have acute proptosis, ecchymosis, and external ophthalmoplegia after minimal trauma or upper respiratory tract infection. MRI is usually diagnostic.\n- Spontaneous retrobulbar hemorrhage: Signs and symptoms are identical to those of traumatic or postoperative hemorrhage. May occur in patients who are chronically anticoagulated or with an underlying coagulopathy from other systemic disease (e.g., hemophilia). Occasionally reported following extreme Valsalva or in pregnant women, especially during labor. Typically seen as a subperiosteal hematoma along the orbital roof and may be misdiagnosed as an orbital neoplasm. MRI is helpful in identifying blood-breakdown produ"}, {"id": "3.21", "chapter_num": "3", "chapter": "Trauma", "name": "Traumatic Optic Neuropathy", "raw": "3.21 Traumatic Optic Neuropathy \n\nSymptoms\n\nDecreased visual acuity, dyschromatopsia, or visual field defect after a traumatic injury to the eye or periocular area; other trauma symptoms (e.g., pain, periocular edema).\n\nSigns\n\nCritical. A new afferent pupillary defect in a traumatized orbit that cannot be accounted for by previously existing or concomitant ocular pathology. See Video: Relative Afferent Pupillary Defect.\n\nOther. Decreased color vision in the affec
