ted eye, a visual field defect, and other signs of trauma. Acutely, the optic disc appears normal in most cases of posterior indirect TON. In cases of anterior TON, optic disc avulsion may be obvious on funduscopic examination unless obscured by VH. Extraocular motility may be compromised in these cases because of associated EOM avulsion or contusion. TON may be associated with intracranial injury.\n\nNOTE: Optic disc pallor usually does not appear for weeks after a traumatic optic nerve injury. If pallor is present immediately after trauma, a preexisting optic neuropathy should be suspected.\n\nDifferential Diagnosis of a Traumatic Afferent Pupillary Defect\n\n- Bilateral, asymmetric TON.\n- Severe retinal trauma: Retinal abnormality is evident on examination.\n- Traumatic, diffuse VH: Obscured view of retina, RAPD is mild if present.\n- Intracranial trauma with asymmetric damage to the prechiasmal optic nerves.\nEtiology\n\nTON is typically categorized based on location of injury (anterior or posterior) and mechanism of injury (direct or indirect). Anterior TON is arbitrarily defined as occurring anterior to the entrance of the central retinal artery into the optic nerve. Direct TON is usually due to compression, contusion, and/or laceration of the optic nerve. Indirect TON is typically due to deceleration injury with shearing of the nerve and vascular supply in the optic canal, and much less commonly due to rapid rotation of the globe leading to optic nerve head avulsion.\n\n- Compressive optic neuropathy from orbital hemorrhage: Most common TON. (See [3.20](c03.xhtml#s3-20), Traumatic Retrobulbar Hemorrhage [Orbital Hemorrhage].)\n- Compressive optic neuropathy from orbital foreign body: A subcategory of direct TON. (See [3.22](c03.xhtml#s3-22), Intraorbital Foreign Body.)\n- Bony impingement: A posterior direct TON that results from impingement of the apical or intracanalicular optic nerve from a fracture at the orbital apex and/or optic canal. Mechanisms vary widely. Direct bony impingement on the optic canal may result from a skull base fracture that also involves adjacent structures, including the cavernous sinus, with resultant cranial neuropathy (see Figure 3.21.1).\nFigure 3.21.1 Computed tomography (CT) of bony impingement of the optic nerve. Red circles denote bone fractures impinging on optic nerve. \n\n- Optic nerve sheath hematoma: An extremely rare and difficult-to-diagnose direct or indirect TON. Imaging may show perineural blood in the optic nerve sheath. Often a presumptive diagnosis requiring an abnormal fundus appearance, typically a combination of retinal venous and arterial occlusions (e.g., central retinal artery occlusion, central retinal vein occlusion). Progressive visual loss may occur as the hematoma expands. In most cases, optic nerve sheath hematoma is seen in conjunction with retinal hemorrhages and a subarachnoid intracranial bleed (Terson syndrome).\n- Deceleration injury: The second most common form of TON, specifically known as posterior indirect TON, but often "}, {"id": "3.22", "chapter_num": "3", "chapter": "Trauma", "name": "Intraorbital Foreign Body", "raw": "3.22 Intraorbital Foreign Body\n\nSymptoms\n\nDecreased vision, pain, diplopia, or may be asymptomatic. History of trauma, may be remote.\n\nSigns\n\n(See Figures 3.22.1 and 3.22.2.)\n\nFigure 3.22.1 Intraorbital foreign body. \n\nFigure 3.22.2 Computed tomography (CT) of intraorbital foreign body. \n\nCritical. Orbital foreign body identified by clinical examination, radiograph, CT scan, and/or orbital US.\n\nOther. A palpable orbital mass, limitation of ocular motility, proptosis, eyelid or conjunctival laceration, erythema, edema, or ecchymosis of eyelids. Presence of an afferent pupillary defect may indicate TON.\n\nTypes of Foreign Bodies\n\n- Poorly tolerated (often lead to inflammation or infection): Organic (e.g., wood or vegetable matter; see Figure 3.22.3), chemical (e.g., diesel fuel), and certain retinotoxic metallic foreign bodies (especially copper).\nFigure 3.22.3 Axial and coronal computed tomography (CT) of an orbital wooden foreign body, read initially as orbital emphysema. Note the squared-off scleral edge (arrow) on the axial image and the “stag horn” appearance (arrow) on the coronal image, both suggestive of retained orbital wood. \n\n- Fairly well tolerated (typically produce a chronic low-grade inflammatory reaction): Alloys that are <85% copper (e.g., brass, bronze).\n- Well tolerated (inert materials): Stone, glass, plastic, iron, lead, steel, aluminum, and most other metals and alloys, assuming that they were relatively clean on entry and have a low potential for microbial inoculation.\nWorkup\n\n- History: Determine the nature of the injury and the foreign body. Use of eye protection? Must have a high index of suspicion in all trauma. Remember that children are notoriously poor historians.\n- Complete ocular and periorbital examination with special attention to pupillary reaction, IOP, and posterior segment evaluation. Carefully examine for an entry wound: at least 50% of conjunctival entry wounds are missed on clinical examination. Rule out occult globe rupture. Gentle gonioscopy may be needed.\n- CT scan of the orbit and brain (axial, coronal, and parasagittal views, with no larger than 1-mm sections of the orbit) is the initial study of choice regardless of foreign body material to rule out possible metallic foreign body. CT may miss certain materials (e.g., wood may look like air). If wood or vegetative matter is suspected, it is helpful to inform the radiologist in advance. Any lucency within the orbit can then be measured in Hounsfield units to differentiate wood from air. MRI is never the initial study of suspected foreign body and is contraindicated if a metallic foreign body is suspected or cannot be excluded, but may be a helpful adjunct to CT (especially if a wooden foreign body is suspected) once metallic foreign bodies are ruled out.\n- Based on imaging studies, determine the location of the intraorbital foreign body and rule out optic nerve or central nervous system involvement (frontal lobe, cavernous sinus, carotid artery).\n- Perform orbital B-scan US if a foreign body is suspected, but not detected, by CT scan. B-scan US is only helpful in the anterior orbit.\n- Culture any drainage sites or foreign material as appropriate.\nTreatment\n\n- NEVER remove an intraorbital foreign body at the slit lamp without first obtaining imaging to evaluate the depth and direction of penetration. Premature removal may result in intracranial bleeding, cerebrospinal fluid leakage, worsening of intraocular injury, etc.\n- Surgical exploration, ir"}, {"id": "4.1", "chapter_num": "4", "chapter": "Cornea", "name": "Superficial Punctate Keratopathy", "raw": "4.1 Superficial Punctate Keratopathy\n\nSymptoms\n\nPain, photophobia, red eye, foreign body sensation, and mildly decreased or fluctuating vision.\n\nSigns\n\n(See Figure 4.1.1.)\n\nFigure 4.1.1 Superficial punctate keratopathy stained with fluorescein. \n\nCritical. Pinpoint locations of corneal epithelial cell damage or breakdown that stain with fluorescein. May be confluent if severe. Staining pattern may allude to etiology. Pain is relieved by the instillation of anesthetic drops. Also referred to as punctate epithelial erosions.\n\nNOTE: Relief of pain with the instillation of anesthetic drops (e.g., proparacaine) strongly suggests corneal epithelial disease as the etiology of pain. Although anesthetic drop instillation is an essential part of the ocular examination, patients should NEVER be prescribed topical anesthetic drops, and the clinician should ensure the patient does not take anesthetic drops from the office. When used chronically, these drops inhibit epithelial healing and may cause corneal ulceration.\n\nOther. Conjunctival injection and watery discharge.\n\nEtiology\n\nSuperficial punctate keratopathy (SPK) is nonspecific but is commonly associated with the following disorders, which may be associated with a specific staining pattern:\n\n- Superior staining\n- Contact lens–related disorder (e.g., chemical toxicity, tight lens syndrome, contact lens overwear syndrome, giant papillary conjunctivitis). See [4.21](c04.xhtml#s4-21), Contact Lens–Related Problems.\n- Foreign body under the upper eyelid: Typically, linear SPK or fine epithelial defects arranged vertically.\n- Floppy eyelid syndrome: Extremely loose upper eyelids that evert easily. See [6.5](c06.xhtml#s6-5), Floppy Eyelid Syndrome.\n- Superior limbic keratoconjunctivitis (SLK): Superior bulbar conjunctival inflammation. See [5.4](c05.xhtml#s5-4), Superior Limbic Keratoconjunctivitis.\n- Vernal conjunctivitis: Atopy, large conjunctival papillae under the upper eyelid and/or limbus. See [5.1](c05.xhtml#s5-1), Acute Conjunctivitis.\n- Interpalpebral staining\n- Dry eye syndrome: Poor tear lake, decreased tear break-up time, decreased Schirmer test. See [4.3](c04.xhtml#s4-3), Dry Eye Syndrome.\n- Neurotrophic keratopathy: Decreased corneal sensation. May progress to corneal ulceration. See [4.6](c04.xhtml#s4-6), Neurotrophic Keratopathy.\n- Ultraviolet burn/photokeratopathy: Often in welders or from sunlamps. See [4.7](c04.xhtml#s4-7), Ultraviolet Keratopathy.\n- Inferior staining\n- Blepharitis: Erythema, telangiectasia, or crusting of the eyelid margins, meibomian gland dysfunction. See [5.8](c05.xhtml#s5-8), Blepharitis/Meibomitis.\n- Exposure keratopathy: Poor eyelid closure with failure of eyelids to cover the entire globe. See [4.5](c04.xhtml#s4-5), Exposure Keratopathy.\n- Topical drug toxicity (e.g., neomycin, gentamicin, trifluridine, atropine, as well as any drop with preservatives, including artificial tears, or any frequently used drop).\n- Conjunctivitis: Discharge, conjunctival injection, and eyelids stuck together on awakening. See [5.1](c05.xhtml#s5-1), Acute Conjunctivitis and [5.2](c05.xhtml#s5-2), Chronic Conjunctivitis.\n- Trichiasis/distichiasis: One or more eyelashes rubbing against the cornea (superior SPK if misdirected lashes are from upper eyelid). See [6.4](c06.xhtml#s6-4), Trichiasis.\n- Entropion or ectropion: Eyelid margin turned in or out (superior SPK if there is an upper eyelid abnormality). See [6.2](c06.xhtml#s6-2), Ectropion and [6.3](c06.xhtml#s6-3), Entropion.\n- O"}, {"id": "4.2", "chapter_num": "4", "chapter": "Cornea", "name": "Recurrent Corneal Erosion", "raw": "4.2 Recurrent Corneal Erosion\n\nSymptoms\n\nRecurrent attacks of acute ocular pain, photophobia, foreign body sensation, and tearing. The pain may awaken patients from sleep or occur spontaneously with eye opening. There is often a history of prior corneal abrasion in the affected eye.\n\nSigns\n\nCritical. Localized irregularity with loose corneal epithelium (fluorescein dye may outline the area with negative or positive staining) or a corneal abrasion (see Figure 4.2.1). Epithelial changes may resolve within hours of the onset of symptoms so abnormalities may be subtle or absent when the patient is examined.\n\nFigure 4.2.1 Resolving epithelial defect with paracentral area of negative fluorescein staining in recurrent corneal erosion. \n\nOther. Corneal epithelial dots or microcysts, a fingerprint pattern, or map-like lines may be seen in both eyes if epithelial basement membrane (map–dot–fingerprint) dystrophy is present. These findings may also be seen unilaterally and focally in any eye that has recurrent erosions.\n\nEtiology\n\nDamage to the corneal epithelium or epithelial basement membrane from one of the following:\n\n- Anterior corneal dystrophy: Epithelial basement membrane (most common), Reis–Bücklers, Thiel–Behnke, and Meesmann dystrophies.\n- Previous traumatic corneal abrasion: Injury may have been years before the current presentation.\n- Stromal corneal dystrophy: Lattice, granular, and macular dystrophies.\n- Corneal degeneration: Band keratopathy, Salzmann nodular degeneration.\n- Keratorefractive surgery, corneal transplant surgery, cataract surgery, or any surgery in which the corneal epithelium is removed (either therapeutically or for visualization).\nWorkup\n\n- History: History of a corneal abrasion? Ocular surgery? Family history (corneal dystrophy)?\n- Slit-lamp examination with fluorescein staining of both eyes (visualization of abnormal basement membrane lines may be enhanced by instilling fluorescein and looking for areas of rapid tear break-up, referred to as “negative staining”).\nTreatment\n\n- Acute episode: Cycloplegic drop (e.g., cyclopentolate 1%) b.i.d. and ophthalmic antibiotic ointment (e.g., erythromycin, bacitracin) four to six times daily. Can use 5% sodium chloride ointment q.i.d. in addition to antibiotic ointment. If the epithelial defect is large, a bandage soft contact lens and topical antibiotic drops q.i.d. may be placed. Oral analgesics as needed.\n- Never prescribe topical anesthetic drops.\n- After epithelial healing is complete, artificial tears at least q.i.d. and artificial tear ointment q.h.s. for at least 3 to 6 months, or 5% sodium chloride drops q.i.d. and 5% sodium chloride ointment q.h.s. for at least 3 to 6 months.\n- If the corneal epithelium is loose or heaped and is not healing, consider epithelial debridement. Apply a topical anesthetic (e.g., proparacaine) and use a sterile cotton-tipped applicator or cellulose sponge (e.g., Weck-Cel surgical spear) to gently remove all loose epithelium.\n- For erosions not responsive to the preceding treatment, consider the following:\n- Prophylactic medical treatment with 5% sodium chloride ointment q.h.s.\n- Oral doxycycline (matrix metalloproteinase inhibitor) 50 mg b.i.d. with or without a short course of topical steroid drops (e.g., fluorometholone 0.1% b.i.d. to q.i.d. for 2 to 4 weeks).\n- Topical azithromycin drops q.h.s. with or without a short course of topical steroid drops (e.g., fluorometholone 0.1% b.i.d. to q.i.d. for 2 to 4 weeks).\n- Extended-wear banda"}, {"id": "4.3", "chapter_num": "4", "chapter": "Cornea", "name": "Dry Eye Syndrome", "raw": "4.3 Dry Eye Syndrome\n\nSymptoms\n\nForeign body sensation, burning, dryness, mildly to moderately decreased or fluctuating vision, and tearing. Often exacerbated by smoke, wind, heat, low humidity, or prolonged use of the eye (e.g., when watching television or working on a computer that results in decreased blink rate). Usually bilateral and chronic (although patients sometimes are seen with sudden onset in one eye). Discomfort is often out of proportion to clinical signs.\n\nSigns\n\nCritical\n\n- Scanty or irregular tear meniscus seen at the inferior eyelid margin: The normal meniscus should be at least 0.5 mm in height and have a convex shape.\n- Decreased tear break-up time (measured from a blink to the appearance of a tear film defect, by using fluorescein stain): Less than 10 seconds indicates tear film instability.\nNOTE: Tear film defects must be randomly located, as isolated areas of repeated early tear break-up may indicate a focal corneal surface irregularity.\n\nOther. Punctate corneal or conjunctival fluorescein, rose bengal, or lissamine green staining; usually inferiorly or in the interpalpebral area. Excess mucus or debris in the tear film and filaments on the cornea may be found in severe cases.\n\nDifferential Diagnosis\n\nSee [4.1](c04.xhtml#s4-1), Superficial Punctate Keratopathy.\n\nEtiology\n\n- Idiopathic: Commonly found in menopausal and postmenopausal women.\n- Evaporative: Lipid layer tear deficiency; often associated with blepharitis or meibomian gland dysfunction. Symptoms may be worse in the morning with complaints of visual blurring upon waking.\n- Aqueous deficient: Aqueous layer tear deficiency; aqueous production decreases with age. Symptoms frequently worsen later in the day or after extensive use of the eyes.\n- Combination: Evaporative and aqueous deficiency often occur together. May also include a mucin layer tear deficiency.\n- Lifestyle related: Arid climate, allergen exposure, smoking, extended periods of reading/computer work/television viewing.\n- Connective tissue diseases (e.g., Sjögren syndrome, rheumatoid arthritis, granulomatosis with polyangiitis [GPA, formerly Wegener granulomatosis], systemic lupus erythematosus).\n- Conjunctival scarring (e.g., mucous membrane pemphigoid, Stevens–Johnson syndrome, trachoma, chemical burn).\n- Drugs (e.g., oral contraceptives, anticholinergics, antihistamines, antiarrhythmics, antipsychotics, antispasmodics, tricyclic antidepressants, beta blockers, diuretics, retinoids, selective serotonin reuptake inhibitors, chemotherapy).\n- Infiltration of the lacrimal glands (e.g., sarcoidosis, tumor).\n- Postradiation fibrosis of the lacrimal glands.\n- Vitamin A deficiency: Usually from malnutrition, intestinal malabsorption, or bariatric surgery. See [13.7](c13.xhtml#s13-7), Vitamin A Deficiency/Xerophthalmia.\n- After cataract surgery or corneal refractive surgery such as limbal relaxing incisions, photorefractive keratectomy (PRK), laser in situ keratomileusis (LASIK), and small incision lenticule extraction (SMILE): Likely secondary to disruption of corneal nerves and interference with normal reflex tearing. The size and location of the incision or flap may be correlated to the degree of the patient’s symptoms.\nWorkup\n\n- History and external examination to detect underlying etiology.\n- Slit-lamp examination with fluorescein stain to evaluate the ocular surface and tear break-up time. May also use rose bengal or lissamine green stain to examine the cornea and conjunctiva. Tear meniscus is be"}, {"id": "4.4", "chapter_num": "4", "chapter": "Cornea", "name": "Filamentary Keratopathy", "raw": "4.4 Filamentary Keratopathy\n\nSymptoms\n\nModerate-to-severe pain, red eye, foreign body sensation, tearing, and photophobia.\n\nSigns\n\nCritical. Short fluorescein-staining strands of degenerated epithelial cells surrounding a mucus core adherent to the anterior surface of cornea (see Figure 4.4.1).\n\nFigure 4.4.1 Severe filamentary keratopathy on a conjunctivalized cornea. \n\nOther. Conjunctival injection, poor tear film, and punctate epithelial defects.\n\nEtiology\n\n- Severe ocular dryness: Most common cause. See [4.3](c04.xhtml#s4-3), Dry Eye Syndrome.\n- SLK: Filaments are typically found along the superior cornea, in association with superior conjunctival injection, superior punctate fluorescein staining, and superior corneal pannus. See [5.4](c05.xhtml#s5-4), Superior Limbic Keratoconjunctivitis.\n- Recurrent corneal erosions: Recurrent spontaneous corneal abrasions, often occurring upon waking. See [4.2](c04.xhtml#s4-2), Recurrent Corneal Erosion.\n- Adjacent to irregular corneal surface (e.g., postoperative, near a surgical wound).\n- Patching (e.g., postoperative, after corneal abrasions) or ptosis.\n- Neurotrophic keratopathy: See [4.6](c04.xhtml#s4-6), Neurotrophic Keratopathy.\nWorkup\n\n- History, especially for the previously mentioned conditions.\n- Slit-lamp examination with fluorescein staining.\nTreatment\n\n- Treat the underlying condition.\n- Consider debridement of the filaments. After applying topical anesthetic (e.g., proparacaine), gently remove filaments at their base with fine forceps or a cotton-tipped applicator. This gives temporary relief, but the filaments will recur if the underlying etiology is not treated.\n- Treatment with one or more of the following regimens:\n- Preservative-free artificial tears six to eight times per day and lubricating gel or ointment q.h.s.\n- Punctal occlusion.\n- Acetylcysteine 10% drops q.i.d.\n- If the symptoms are severe or treatment fails, then consider a bandage soft contact lens (unless the patient has severe dry eyes as underlying etiology). Extended-wear bandage soft contact lenses may need to be worn for weeks to months. Concomitant prophylactic or therapeutic topical antibiotics such as fluoroquinolone drops are typically given, especially if associated with a corneal abrasion/epithelial defect. A scleral lens may be helpful in recalcitrant cases.\nNOTE: Acetylcysteine is not commercially available as a drop but can be made by a compounding pharmacy.\n\nFollow-Up\n\nIn 1 to 4 weeks. If the condition is not improved, consider repeating the filament removal or applying a bandage soft contact lens. Long-term lubrication must be maintained if the underlying condition cannot be eliminated.\n\n"}, {"id": "4.5", "chapter_num": "4", "chapter": "Cornea", "name": "Exposure Keratopathy", "raw": "4.5 Exposure Keratopathy\n\nSymptoms\n\nOcular irritation, burning, foreign body sensation, tearing, and redness of one or both eyes. Usually worse in the morning.\n\nSigns\n\nCritical. Inadequate blinking or closure of the eyelids, leading to corneal drying. Punctate epithelial defects are found in the lower one-third of the cornea or as a horizontal band in the region of the palpebral fissure (see Figure 4.5.1).\n\nFigure 4.5.1 Exposure keratopathy stained with fluorescein. \n\nOther. Conjunctival injection and chemosis, corneal erosion, infiltrate or ulcer, eyelid deformity, or abnormal eyelid closure.\n\nEtiology\n\n- Seventh cranial nerve palsy: Orbicularis oculi weakness (e.g., Bell palsy). See [10.9](c10.xhtml#s10-9), Isolated Seventh Nerve Palsy.\n- Sedation or altered mental status.\n- Eyelid deformity (e.g., ectropion or eyelid scarring from trauma, eyelid surgery such as excisional procedure, chemical burn, or herpes zoster ophthalmicus).\n- Nocturnal lagophthalmos: Failure to close the eyes during sleep.\n- Proptosis (e.g., due to an orbital process such as thyroid eye disease). See [7.1](c07.xhtml#s7-1), Orbital Disease.\n- After ptosis repair or blepharoplasty procedures.\n- Floppy eyelid syndrome. See [6.5](c06.xhtml#s6-5), Floppy Eyelid Syndrome.\n- Poor blink (e.g., Parkinson disease, neurotrophic cornea).\nWorkup\n\n- History: Previous Bell palsy or eyelid surgery? Thyroid disease?\n- Evaluate eyelid closure and corneal exposure. Ask the patient to close his or her eyes gently (as if sleeping). Assess Bell phenomenon (the patient is asked to close the eyelids forcefully against resistance; abnormal when the eyes do not rotate upward). Check for eyelid laxity.\n- Check corneal sensation before instillation of anesthetic drops. If sensation is decreased, there is greater risk for corneal complications and the patient may need further management for neurotrophic keratopathy. See [4.6](c04.xhtml#s4-6), Neurotrophic Keratopathy.\n- Slit-lamp examination: Evaluate the tear film and corneal integrity with fluorescein dye. Look for signs of secondary infection (e.g., corneal infiltrate, anterior chamber reaction, severe conjunctival injection).\n- Investigate any underlying disorder (e.g., etiology of seventh cranial nerve palsy).\nTreatment\n\nPrevention is critical. All patients who are sedated or obtunded are at risk for exposure keratopathy and should receive lubrication according to the following recommendations.\n\nIn the presence of secondary corneal infection, see [4.12](c04.xhtml#s4-12), Bacterial Keratitis.\n\n- Correct any underlying disorder.\n- Preservative-free artificial tears q2–6h. Punctal occlusion with plugs may also be considered.\n- Lubricating ointment q.h.s. to q2h.\n- Consider eyelid taping or patching q.h.s. to maintain the eyelids in the closed position. If severe, consider taping the lateral one-third of the eyelids closed (leaving the visual axis open) during the day. Taping is rarely definitive but may be tried when the underlying disorder is thought to be temporary.\n- A potential in-office procedure includes placement of self-retained amniotic membrane tissue (e.g., sterilized, dehydrated amniotic membrane covered by a bandage soft contact lens or frozen, specialized plastic ring–mounted amniotic membrane such as Prokera).\n- When maximal medical therapy fails to prevent progressive corneal deterioration, one of the following surgical procedures may be beneficial:\n- Partial tarsorrhaphy (eyelids sewn or glued together).\n- Eyelid reconstr"}, {"id": "4.6", "chapter_num": "4", "chapter": "Cornea", "name": "Neurotrophic Keratopathy", "raw": "4.6 Neurotrophic Keratopathy\n\nSymptoms\n\nFoggy or blurry vision, red eye, and swollen eyelid. Foreign body sensation or pain is less than expected for the degree of ocular signs.\n\nSigns\n\nCritical. Loss of corneal sensation, interpalpebral SPK, or epithelial defects with fluorescein staining.\n\nOther\n\n- Early: Perilimbal injection and interpalpebral corneal punctate epithelial defects or a frank nonhealing epithelial defect with rolled edges, stromal haze or edema, and Descemet folds. Typically located inferior to the visual axis.\n- Late: Corneal ulcer usually without infectious infiltrate, although concomitant infectious keratitis may occur. The ulcer often has a gray, heaped-up epithelial border, tends to be in the lower one-half of the cornea, and is horizontally oval. Progressive thinning may occur rapidly and lead to a descemetocele (corneal stromal loss down to Descemet membrane) or corneal perforation.\nDifferential Diagnosis\n\nSee [4.1](c04.xhtml#s4-1), Superficial Punctate Keratopathy.\n\nEtiology\n\nOccurs in eyes with diminished or absent corneal sensation. Denervation causes the corneal epithelium and tear film to become abnormal and unstable. May occur with any of the following conditions:\n\n- Postinfection with varicella zoster virus (VZV) or herpes simplex virus (HSV).\n- Following ocular surgery, particularly after corneal incisional or laser surgery (e.g., keratoplasty, LASIK, SMILE, PRK).\n- Tumor (especially an acoustic neuroma, where both the fifth and seventh cranial nerves may be affected) or any neurologic insult/disease of the fifth cranial nerve (e.g., brainstem stroke, trauma, multiple sclerosis, Riley–Day syndrome).\n- Chronic contact lens wear.\n- Diabetic neuropathy.\n- Extensive panretinal photocoagulation: May damage the long ciliary nerves (these patients often have concurrent diabetic neuropathy).\n- Complication of trigeminal nerve or dental surgery.\n- Complication of radiation therapy to the eye or an adnexal structure.\n- Chronic topical medications (e.g., nonsteroidal anti-inflammatory agents, timolol).\n- Topical anesthetic abuse.\n- Crack keratopathy: Often bilateral. Take careful history for crack cocaine smoking or potential exposure. Often helpful to admit patient and remove them from their environment.\n- Chemical injury or exposure to hydrogen sulfide or carbon disulfide (used in manufacturing).\nWorkup\n\n- History: Previous episodes of a red and painful eye? Prior herpes infection, cold sores, or shingles rash around the eye and/or forehead? Diabetes? History of irradiation, stroke, or hearing problem? Previous refractive procedure or other eye surgery? Chemical exposure? Smoking history? Topical medications?\n- Prior to anesthetic instillation, test corneal sensation bilaterally with a sterile cotton wisp.\n- Slit-lamp examination with fluorescein staining of cornea and conjunctiva.\n- Check the skin for herpetic lesions or scars from a previous varicella zoster infection.\n- Look for signs of a corneal exposure problem (e.g., inability to close an eyelid, seventh cranial nerve palsy, absent Bell phenomenon).\n- If suspicious of a central nervous system lesion, obtain a computed tomography (CT) or magnetic resonance imaging (MRI) of the brain.\nTreatment\n\nEyes with neurotrophic keratopathy have impaired healing ability. If not treated in a timely manner, an epithelial defect in an eye with this condition may progress to stromal lysis and possibly perforation.\n\n- Mild-to-moderate punctate epithelial staining: Preservati"}, {"id": "4.7", "chapter_num": "4", "chapter": "Cornea", "name": "Ultraviolet Keratopathy", "raw": "4.7 Ultraviolet Keratopathy\n\nSymptoms\n\nModerate-to-severe ocular pain, foreign body sensation, red eye, tearing, photophobia, and blurred vision; often with a history of welding or using a sunlamp without adequate protective eyewear. Symptoms typically worsen 6 to 12 hours after exposure. Usually bilateral.\n\nSigns\n\nCritical. Dense, confluent punctate epithelial defects in an interpalpebral distribution highlighted with fluorescein staining.\n\nOther. Conjunctival injection, mild-to-moderate eyelid edema, mild-to-no corneal edema, relatively miotic pupils that react sluggishly, and mild anterior chamber reaction.\n\nDifferential Diagnosis\n\n- Toxic epithelial keratopathy from exposure to a chemical (e.g., solvents, alcohol) or drug (e.g., neomycin, gentamicin, antiviral agents, anesthetic drops).\n- Thermal burn/keratopathy: Often from contact with curling iron, boiling fluid, fire ember, or flame. Injury is usually limited to corneal epithelium; may have marked superficial corneal opacification or eschar. Treat with possible debridement of involved area and then as for corneal abrasion. See [3.3](c03.xhtml#s3-3), Corneal Abrasion.\n- See [4.1](c04.xhtml#s4-1), Superficial Punctate Keratopathy.\nWorkup\n\n- History: Welding? Sunlamp use? Ultraviolet light sanitizer use? Topical medications? Chemical exposure? Prior episodes? Use of protective eyewear?\n- Slit-lamp examination: Use fluorescein stain. Evert the eyelids to search for a foreign body.\n- If chemical exposure suspected, check pH of tear lake in upper and lower conjunctival fornices. If not neutral (6.8 to 7.5), treat as chemical burn. See [3.1](c03.xhtml#s3-1), Chemical Burn.\nTreatment\n\n- Cycloplegic drop (e.g., cyclopentolate 1% b.i.d.).\n- Antibiotic ointment (e.g., erythromycin or bacitracin) four to eight times per day.\n- Oral analgesics as needed.\nNOTE: A bandage soft contact lens with prophylactic topical broad-spectrum antibiotic drop may be used in place of frequent antibiotic ointment.\n\nFollow-Up\n\n- If a bandage soft contact lens was placed, the patient is seen in 1 to 2 days.\n- Reliable patients without a bandage soft contact lens are asked to assess their own symptoms after 24 hours.\n- If much improved, the patient continues with topical antibiotics (e.g., erythromycin or bacitracin ointment q.i.d.).\n- If still significantly symptomatic, reevaluate. If significant punctate staining is present, retreat with a cycloplegic, antibiotic as discussed previously.\n- Patients with unreliable follow-up or those with an unclear etiology should not have a bandage soft contact lens placed. Such patients should be reexamined in 1 to 2 days.\n"}, {"id": "4.8", "chapter_num": "4", "chapter": "Cornea", "name": "Thygeson Superficial Punctate Keratitis", "raw": "4.8 Thygeson Superficial Punctate Keratitis\n\nSymptoms\n\nMild-to-moderate foreign body sensation, photophobia, and tearing. No history of red eye. Usually bilateral with a chronic course of exacerbations and remissions, but may not be active in both eyes at the same time.\n\nSigns\n\nCritical. Coarse stellate gray-white corneal epithelial opacities that are often central, slightly elevated, and stain lightly with fluorescein. Underlying subepithelial infiltrates may be present (see Figure 4.8.1).\n\nFigure 4.8.1 Thygeson superficial punctate keratitis. \n\nOther. Minimal-to-no conjunctival injection, corneal edema, anterior chamber reaction, or eyelid abnormalities.\n\nDifferential Diagnosis\n\nSee [4.1](c04.xhtml#s4-1), Superficial Punctate Keratopathy.\n\nTreatment\n\nMild\n\n- Artificial tears, preferably preservative free, four to eight times per day.\n- Artificial tear ointment q.h.s.\nNOTE: Treatment is based more on patient symptoms than corneal appearance.\n\nModerate to Severe\n\n- Mild topical steroid (e.g., fluorometholone 0.1%, fluorometholone acetate 0.1%, or loteprednol 0.2% to 0.5% q.i.d.) for 1 to 4 weeks, followed by a very slow taper. May need prolonged low-dose topical steroid therapy.\n- If no improvement with topical steroids, a bandage soft contact lens can be tried.\n- Cyclosporine 0.05% to 0.1% drops daily to q.i.d. or lifitegrast 5% b.i.d. may be an alternative or adjunctive treatment, especially in patients with side effects from steroids.\nFollow-Up\n\nWeekly during an exacerbation and then every 3 to 6 months. Patients receiving topical steroids require intraocular pressure (IOP) checks every 4 to 12 weeks.\n\n"}, {"id": "4.9", "chapter_num": "4", "chapter": "Cornea", "name": "Pterygium/Pinguecula", "raw": "4.9 Pterygium/Pinguecula\n\nSymptoms\n\nIrritation, redness, and decreased vision (due to associated astigmatism or visual axis obscuration); may be asymptomatic\n\nSigns\n\nCritical. One of the following, almost always located at the 3-o’clock or 9-o’clock perilimbal position.\n\n- Pterygium: Wing-shaped fold of fibrovascular tissue arising from the interpalpebral conjunctiva and extending onto the cornea. There is no associated thinning of the cornea below these lesions. Usually nasal in location (see Figure 4.9.1).\n- Pinguecula: Yellow-white, flat, or slightly raised conjunctival lesion, usually in the interpalpebral fissure adjacent to the limbus, but not involving the cornea.\nFigure 4.9.1 Pterygium. \n\nOther. Either lesion may be highly vascularized and injected or may be associated with SPK or delle (thinning of the adjacent cornea secondary to drying). An iron line (Stocker line) may be seen in the corneal epithelium just beyond the leading edge of a pterygium, indicative of chronicity.\n\nDifferential Diagnosis\n\n- Conjunctival intraepithelial neoplasia (CIN): Unilateral papillomatous jelly-like, velvety, or leukoplakic (white) mass, often elevated and vascularized. May not be in a wing-shaped configuration and not necessarily in the typical 3-o’clock or 9-o’clock location of a pterygium or pinguecula. See [5.13](c05.xhtml#s5-13), Conjunctival Tumors.\n- Limbal dermoid: Congenital rounded white lesion, usually at the inferotemporal limbus. See [5.13](c05.xhtml#s5-13), Conjunctival Tumors.\n- Other conjunctival tumors (e.g., papilloma, nevus, melanoma). See [5.13](c05.xhtml#s5-13), Conjunctival Tumors.\n- Pseudopterygium: Conjunctival tissue adherent to the peripheral cornea. May appear in location of previous trauma, surgery, corneal ulceration, or cicatrizing conjunctivitis. There is often associated underlying corneal thinning.\n- Salzmann nodular degeneration (SND): Single or multiple peripheral (occasionally central) discrete raised creamy-white opaque corneal nodules. See [4.10](c04.xhtml#s4-10), Salzmann Nodular Degeneration.\n- Peripheral hypertrophic subepithelial corneal degeneration: Less common, usually bilateral, more peripheral than SND, occurring mostly in Caucasian women. Elevated peripheral subepithelial opacities with adjacent limbal vascular abnormalities.\n- Pannus: Blood vessels growing into the cornea, often secondary to chronic contact lens wear, blepharitis, ocular rosacea, herpes keratitis, phlyctenular keratitis, atopic disease, trachoma, trauma, and others. Usually at the level of Bowman membrane with minimal to no elevation.\n- Sclerokeratitis: See [5.7](c05.xhtml#s5-7), Scleritis.\nNOTE: Atypical pterygia (e.g., calcifications, leukoplakia, atypical elevation or location, irregular feeder vessels, and rapid growth) require imaging or biopsy to rule out ocular surface squamous neoplasia or melanoma.\n\nEtiology\n\nElastotic degeneration of deep conjunctival layers resulting in fibrovascular tissue proliferation. Related to sunlight/ultraviolet exposure, aging, environmental insults (e.g., dust, wind), and chronic irritation. More common in individuals from equatorial regions.\n\nWorkup\n\nSlit-lamp examination to identify the lesion and evaluate the adjacent corneal integrity and thickness. Check for corneal astigmatism, which is often irregular but may be oriented with the rule.\n\nTreatment\n\n- Protect eyes from sun, dust, and wind (e.g., ultraviolet-blocking sunglasses or goggles if appropriate).\n- Lubrication with artificial tears"}, {"id": "4.10", "chapter_num": "4", "chapter": "Cornea", "name": "Salzmann Nodular Degeneration", "raw": "4.10 Salzmann Nodular Degeneration\n\nSalzmann nodular degeneration is a fairly common, unilateral or bilateral condition characterized by smooth creamy-white elevated lesions of the cornea. Found much more commonly in women.\n\nSymptoms\n\nOften asymptomatic. May affect vision if it involves the paracentral or central cornea. It may cause a foreign-body sensation if the lesions become very elevated.\n\nSigns\n\nCritical. Single or multiple, discrete, white or gray-white or occasionally bluish, smooth, elevated nodules on the surface of the cornea, typically peripheral but can be central (see Figure 4.10.1).\n\nFigure 4.10.1 Salzmann nodular degeneration with an iron line. \n\nOther. Long-standing nodules may have iron pigment deposition in the epithelium at the base of the nodule. Corneal topography can reveal significant central irregular astigmatism from fairly mild and peripheral nodules.\n\nDifferential Diagnosis\n\n- Spheroidal degeneration: Small, globular, yellow-brown granules are found in the superficial corneal stroma.\n- Band keratopathy: White, calcific deposits in the superficial cornea. May have small holes and clefts resulting in a “Swiss cheese” appearance. See [4.11](c04.xhtml#s4-11), Band Keratopathy.\nEtiology\n\nA subepithelial deposition of disorganized extracellular matrix from unknown cause. It is often found in eyes with a history of chronic keratopathy, such as interstitial keratitis (IK), vernal keratoconjunctivitis, dry eye syndrome, phlyctenulosis, and trachoma, and in eyes with a history of chronic contact lens wear, trauma or corneal surgery, but frequently appears in otherwise normal eyes.\n\nWorkup\n\n- History: Chronic eye disease? Previous ocular trauma or surgery? Contact lens wear?\n- Complete ophthalmic examination, including IOP measurement, and fluorescein staining for epithelial defects.\n- Consider corneal topography looking for corneal irregularity.\nTreatment\n\n- Mild cases are observed or treated with lubrication.\n- If the nodules are causing symptoms, they may be treated with superficial keratectomy with a blade or excimer laser PTK. Topical mitomycin C at the time of surgical excision may decrease the rate of recurrence. Rarely, if severe, it may require a lamellar keratoplasty.\nFollow-Up\n\nAsymptomatic patients can be checked every 1 to 2 years. Symptomatic patients should be seen more frequently. Nodules should be measured at follow-up visits to look for progression. Consider checking corneal topography routinely to monitor the degree of irregular astigmatism.\n\n"}, {"id": "4.11", "chapter_num": "4", "chapter": "Cornea", "name": "Band Keratopathy", "raw": "4.11 Band Keratopathy\n\nSymptoms\n\nDecreased vision, foreign body sensation, photophobia, and corneal whitening; may be asymptomatic.\n\nSigns\n\nCritical. Gray-white anterior corneal plaque of calcium at the level of Bowman membrane, typically within the interpalpebral fissure, and separated from the limbus by clear cornea. Lucid spaces may be present in the plaque (due to corneal nerves penetrating through Bowman layer), giving it a Swiss cheese appearance. The plaque usually begins at the 3-o’clock and 9-o’clock positions, adjacent to the limbus (see Figure 4.11.1).\n\nFigure 4.11.1 Band keratopathy. \n\nOther. May have other signs of chronic eye disease.\n\nEtiology\n\nMore Common. Chronic uveitis (e.g., juvenile idiopathic arthritis [JIA]), IK, corneal edema, trauma, phthisis bulbi, long-standing glaucoma, dry eye, ocular surgery (especially retinal detachment repair with silicone oil), and idiopathic.\n\nLess Common. Hypercalcemia (may result from hyperparathyroidism, renal failure, sarcoidosis, multiple myeloma, Paget disease of bone, vitamin D excess, etc.), hyperphosphatemia, gout, sarcoidosis, corneal dystrophy, myotonic dystrophy, long-term exposure to irritants (e.g., mercury fumes), and other causes.\n\nWorkup\n\n- History: Chronic eye disease? Previous ocular surgery? Chronic exposure to environmental irritants or ocular medications? Systemic disease?\n- Slit-lamp examination.\n- If no signs of chronic anterior segment disease or long-standing glaucoma are present, and the band keratopathy cannot be accounted for, then consider the following workup:\n- Serum calcium, albumin, magnesium, phosphate, and parathyroid hormone levels. Blood urea nitrogen and creatinine. Uric acid level if gout is suspected. Angiotensin-converting enzyme (ACE), serum lysozyme levels, and chest X-ray if sarcoidosis is suspected.\nTreatment\n\nMild (e.g., Foreign Body Sensation)\n\nArtificial tears, preferably preservative-free, four to six times per day and artificial tear ointment q.h.s. to q.i.d. as needed, add antibiotic ointment (e.g., bacitracin, bacitracin-polymyxin or erythromycin) if irregular epithelium or epithelial defects over calcium deposition. Consider a bandage soft contact lens for comfort.\n\nSevere (e.g., Obstruction of Vision, Irritation Not Relieved by Lubricants, Cosmetic Problem)\n\nRemoval of the calcium plaque may be performed at the slit lamp or under the operating microscope by chelation using disodium ethylenediamine tetraacetic acid (EDTA):\n\n- Disodium EDTA 3% to 4% is obtained from a compounding pharmacy.\n- Anesthetize the eye with a topical anesthetic (e.g., proparacaine, lidocaine gel) and place an eyelid speculum.\n- Debride the corneal epithelium overlying the calcium with a sterile blade or a sterile cotton-tipped applicator.\n- Apply a cellulose sponge, corneal light shield, or cotton swab saturated with the EDTA solution over the band keratopathy until the calcium clears (which may take 10 to 60 minutes).\n- Irrigate with normal saline, apply an antibiotic drop, a cycloplegic drop (e.g., cyclopentolate 1% to 2%), and place a bandage soft contact lens. Prescribe a topical antibiotic drop (e.g., moxifloxacin, gatifloxacin q.i.d.) until the epithelium has healed.\n- Consider giving the patient a systemic analgesic (e.g., acetaminophen with codeine).\nNOTE: In order to minimize recurrence of band keratopathy after treatment, it is important to also treat or manage the underlying cause to the best extent possible.\n\nFollow-Up\n\n- If surgical removal has "}, {"id": "4.12", "chapter_num": "4", "chapter": "Cornea", "name": "Bacterial Keratit is", "raw": "4.12 Bacterial Keratit is \n\nSymptoms\n\nRed eye, moderate-to-severe ocular pain, photophobia, decreased vision, discharge, and acute contact lens intolerance.\n\nSigns\n\n(See Figure 4.12.1.)\n\nFigure 4.12.1 Bacterial keratitis. \n\nCritical. Focal white opacity (infiltrate) in the corneal stroma associated with an epithelial defect and underlying stromal thinning/tissue loss.\n\nNOTE: An examiner using a slit beam cannot see clearly through an infiltrate or ulcer to the iris, whereas stromal edema or mild anterior stromal scars are more transparent.\n\nOther. Epithelial defect, mucopurulent discharge, stromal edema, folds in Descemet membrane, anterior chamber reaction, endothelial fibrin/cell deposition with or without hypopyon formation (which, in the absence of globe perforation, usually represents sterile inflammation), conjunctival injection, upper eyelid edema. Posterior synechiae, hyphema, and increased IOP may occur in severe cases.\n\nDifferential Diagnosis\n\n- Fungal: Must be considered after any traumatic corneal injury, particularly from vegetable matter (e.g., a tree branch), which may lead to filamentous fungal keratitis. Contact lens wear is another risk factor. Infiltrates commonly have feathery borders and/or may be surrounded by satellite lesions. Candida infections more frequently occur in eyes with preexisting ocular surface disease and may mimic the clinical picture of bacterial ulcers. See [4.13](c04.xhtml#s4-13), Fungal Keratitis.\n- Acanthamoeba: This protozoan classically causes an extremely painful keratitis and/or stromal infiltrate; is associated with perineural invasion. It usually occurs in daily-wear soft contact lens wearers who may or may not practice poor lens hygiene. History of trauma or history of swimming and/or hot tubbing while wearing contact lenses may be elicited. In the early stages, the epithelial abnormality may look more like HSV keratitis than a bacterial ulcer. In the late stages (3 to 8 weeks), the infiltrate often becomes ring shaped. See [4.14](c04.xhtml#s4-14), Acanthamoeba Keratitis.\n- HSV: May have eyelid vesicles or corneal epithelial dendrites. A history of recurrent unilateral eye disease or known ocular herpes is common. If a staining infiltrate develops in a patient with stromal herpetic keratitis, one needs to rule out bacterial superinfection. See [4.16](c04.xhtml#s4-16), Herpes Simplex Virus.\n- Atypical mycobacteria: Usually follows ocular injuries with vegetable matter or ocular surgery, such as cataract extraction, corneal grafts, and refractive surgery (especially LASIK). It has a more indolent course. Culture plates (on Lowenstein–Jensen media) must be kept for 8 weeks. An acid-fast bacillus smear may be very helpful.\n- Sterile corneal thinning and ulcers: Minimal or no discharge, mild iritis, peripheral stromal infiltration with overlying staining and adjacent vascularization, and negative cultures. Corneal melting may be associated with various systemic diseases. See [4.23](c04.xhtml#s4-23), Peripheral Corneal Thinning/Ulceration.\n- Staphylococcal hypersensitivity: Peripheral corneal infiltrates, sometimes with an overlying epithelial defect; usually multiple, often bilateral, with a clear space between the infiltrate and the limbus. Conjunctival injection is localized rather than diffuse, and there is less pain. There is minimal-to-no anterior chamber reaction. Often with coexisting blepharitis/meibomitis. See [4.19](c04.xhtml#s4-19), Staphylococcal Hypersensitivity.\n- Sterile cornea"}, {"id": "4.13", "chapter_num": "4", "chapter": "Cornea", "name": "Fungal Keratitis", "raw": "4.13 Fungal Keratitis\n\nSymptoms\n\nPain, photophobia, redness, tearing, discharge, foreign body sensation. Often history of minor trauma particularly with vegetable matter (e.g., a tree branch), contact lens wear, chronic eye disease, chronic use of topical steroids, and/or a history of poor response to conventional antibacterial therapy. Usually more indolent than bacterial keratitis.\n\nSigns\n\nCritical\n\n- Filamentous fungi: Corneal stromal gray-white opacity (infiltrate) with a feathery border. The epithelium over the infiltrate may be elevated above the remainder of the corneal surface, or there may be an epithelial defect with stromal thinning (ulcer).\n- Nonfilamentous fungi: A gray-white stromal infiltrate similar to a bacterial ulcer.\nOther. Satellite lesions surrounding the primary infiltrate, conjunctival injection, mucopurulent discharge, anterior chamber reaction, hypopyon. The infiltrate is more likely to extend beyond the epithelial defect than in bacterial ulcers.\n\nDifferential Diagnosis\n\nSee [4.12](c04.xhtml#s4-12), Bacterial Keratitis.\n\nEtiology\n\n- Filamentous fungi (e.g., Fusarium or Aspergillus species most commonly): Usually from trauma with vegetable matter in previously healthy eyes or associated with contact lens wear. More frequent in warm, humid regions.\n- Nonfilamentous fungi (e.g., Candida species): Usually in previously diseased eyes (e.g., dry eyes, herpes simplex or varicella zoster keratitis, exposure keratopathy, and chronic use of steroid drops), see Figure 4.13.1.\nFigure 4.13.1 Candida fungal keratitis. \n\nWorkup\n\nSee [4.12](c04.xhtml#s4-12), Bacterial Keratitis for complete workup and culture procedure.\n\n- Whenever smears and cultures are done, include a Gram, Giemsa, acridine orange, calcofluor white, or KOH stain for organisms; periodic acid-Schiff, Gomori methenamine silver, and hematoxylin and eosin (H&E) stains can also be used. Scrape deep into the edge of the ulcer for material. See [Appendix 8](app1.xhtml#app8), Corneal Culture Procedure.\n- DNA PCR of corneal swabs may assist in identifying the organism in culture-negative cases.\n- If an infectious etiology is still suspected despite negative cultures, consider a corneal biopsy to obtain further diagnostic information.\n- In vivo confocal microscopy (IVCM) may identify fungal elements, but diagnostic success is dependent on the skill of the technician and the interpreting physician.\n- Consider cultures and smears of contact lens case and solution.\n- Sometimes all tests are negative, yet the disease continues to progress and therapeutic penetrating keratoplasty (PK) is necessary for diagnosis and treatment.\nTreatment\n\nCorneal infiltrates and ulcers of unknown etiology are treated as bacterial until proven otherwise (see [4.12](c04.xhtml#s4-12), Bacterial Keratitis). If the stains or cultures indicate a fungal keratitis, institute the following measures:\n\n- Natamycin 5% drops (especially for filamentous fungi, particularly Fusarium), amphotericin B 0.15% drops (especially for Candida), and/or topical fortified voriconazole 1% drops (for non-Fusarium species) initially q1–2h around the clock, then taper over the next several weeks based on response to therapy (see [Appendix 9](app1.xhtml#app9), Fortified Topical Antibiotics/Antifungals).\n- Cycloplegic drop (e.g., cyclopentolate 1% t.i.d.; atropine 1% b.i.d. to t.i.d. is recommended if hypopyon, fibrin, or significant anterior chamber reaction is present).\n- No topical steroids. If the patient is currently"}, {"id": "4.14", "chapter_num": "4", "chapter": "Cornea", "name": "Acanthamoeba Keratitis", "raw": "4.14 Acanthamoeba Keratitis\n\nSymptoms\n\nCan vary from foreign body sensation to severe ocular pain (often out of proportion to the early clinical findings), redness, decreased vision, tearing, and photophobia over a period of several weeks.\n\nSigns\n\n(See Figures 4.14.1 and 4.14.2.)\n\nFigure 4.14.1 Acanthamoeba keratitis with radial keratoneuritis. \n\nFigure 4.14.2 Acanthamoeba keratitis with a dense ring infiltrate. \n\nCritical. Early: Epitheliitis with pseudodendrites, whorls, epithelial ridges, and/or diffuse subepithelial microcysts. Gray-white nonsuppurative subepithelial infiltrates (sometimes along corneal nerves, producing a radial keratoneuritis).\n\nLate (3 to 8 weeks): Ring-shaped corneal stromal infiltrate; can become suppurative.\n\nNOTE: Acanthamoeba keratitis should be considered in any patient with a history of contact lens wear, poor contact lens hygiene (e.g., using tap water to clean lenses, infrequent disinfection), and/or history of trauma or exposure to water (swimming, fishing, hot tub use) while wearing contact lenses. Although most patients with Acanthamoeba have a history of contact lens use, some patients do not and these patients often have a delayed diagnosis. Cultures for bacteria are negative (unless superinfection is present). The condition usually does not improve with antibiotic or antiviral medications and commonly follows a chronic, progressive, downhill course. Acanthamoeba is important to consider in patients with seemingly unresponsive HSV keratitis, as HSV keratitis usually responds well to appropriate treatment. The diagnosis of HSV keratitis in a contact lens wearer should always include consideration of Acanthamoeba, as the clinical appearance of these two entities can be similar in the early stages of disease.\n\nOther. Eyelid swelling, conjunctival injection (especially circumcorneal), cells and flare in the anterior chamber. Minimal discharge or corneal vascularization. Coinfection with bacteria or fungi may occur later in the course.\n\nDifferential Diagnosis\n\nHSV keratitis is first in the differential. See [4.12](c04.xhtml#s4-12), Bacterial Keratitis and [4.16](c04.xhtml#s4-16), Herpes Simplex Virus.\n\nWorkup\n\nSee [4.12](c04.xhtml#s4-12), Bacterial Keratitis for a general workup. One or more of the following are obtained when Acanthamoeba is suspected:\n\n- Corneal scrapings for Gram, Giemsa, calcofluor white, and periodic acid-Schiff stains (Giemsa and periodic acid-Schiff stains may show typical cysts). See [Appendix 8](app1.xhtml#app8), Corneal Culture Procedure.\n- Consider a culture on nonnutrient agar with Escherichia coli overlay.\n- Consider a corneal biopsy if the stains and cultures are negative and the condition is not improving on the current regimen.\n- Consider cultures and smears of contact lens and case.\n- IVCM may be helpful if available.\nTreatment\n\nOne or more of the following are usually used in combination, sometimes in the hospital initially:\n\n- Polyhexamethylene biguanide 0.02% (PHMB) drops q1h or chlorhexidine 0.02% drops q1h around the clock.\n- Propamidine isethionate 0.1% drops q1h are typically added in addition to PHMB 0.02% or chlorhexidine 0.02%. Dibromopropamidine isethionate 0.15% ointment is also available. Alternatively, PHMB 0.08% drops q1h can be used as single topical agent.\n- Consider an oral antifungal agent (e.g., itraconazole 400 mg p.o. for one loading dose, then 100 to 200 mg p.o. daily, ketoconazole 200 mg p.o. daily, or voriconazole 200 mg p.o. daily to b.i.d.).\nAll"}, {"id": "4.15", "chapter_num": "4", "chapter": "Cornea", "name": "Crystalline Keratopathy", "raw": "4.15 Crystalline Keratopathy\n\nSymptoms\n\nDecreased vision, photophobia, and decreased corneal sensation may occur. May be asymptomatic.\n\nSigns\n\nCrystals are seen in subepithelial and/or stromal regions of the cornea. May or may not have an overlying epithelial defect. In the presence of a corneal transplant, the crystalline opacities frequently are localized emanating from an existing suture track (see Figure 4.15.1).\n\nFigure 4.15.1 Crystalline keratopathy from an alpha-hemolytic streptococcus species. \n\nEtiology\n\n- Infectious crystalline keratopathy: Seen in corneal grafts and chronically inflamed corneas. Streptococcus viridans is the most common organism; other organisms include Staphylococcus epidermidis, Corynebacterium species, Pseudomonas aeruginosa, and fungi. Atypical mycobacteria and Alternaria have been reported after LASIK.\n- Schnyder corneal dystrophy: Slowly progressive, autosomal dominant. Subepithelial corneal crystals in 50% of patients (cholesterol and phospholipids), central and midperipheral corneal haze, dense arcus, decreased corneal sensation. Local disorder of corneal lipid metabolism but can be associated with hyperlipidemia and hypercholesterolemia. Higher prevalence in patients with Swede–Finn descent. See [4.26](c04.xhtml#s4-26), Corneal Dystrophies.\n- Bietti crystalline dystrophy: Rare, autosomal recessive. Retinal crystals (decrease with time) and sparkling, yellow-white spots at the corneal limbus in the superficial stroma and subepithelial layers of the cornea.\n- Cystinosis: Rare, autosomal recessive, systemic metabolic defect. Infantile form (nephropathic): dwarfism, progressive renal dysfunction, and polychromatic cystine crystals in conjunctiva, corneal stroma (densest in peripheral cornea but present throughout anterior stroma), trabecular meshwork. Intermediate/adolescent form: less severe renal involvement. Adult form: normal life expectancy.\n- Lymphoproliferative disorders (e.g., monoclonal gammopathy of undetermined significance, essential cryoglobulinemia, or multiple myeloma): Fine or larger crystalline opacities are diffusely distributed throughout the cornea more commonly in the anterior stroma and peripheral cornea than the posterior stroma and central cornea.\nWorkup\n\n- Infectious crystalline keratopathy: Culture as outlined in [Appendix 8](app1.xhtml#app8), Corneal Culture Procedure. Obtain mycobacterial cultures/acid-fast bacillus stain (especially in patients with history of refractive surgery).\n- Fasting lipid profile in patients with Schnyder corneal dystrophy.\n- Electroretinogram may be decreased in later stages of Bietti crystalline dystrophy.\n- Cystinosis: Very high level of suspicion required, especially for infantile form, which can be fatal in the first decade of life without a renal transplant. Conjunctival biopsy, blood or bone marrow smear.\n- If a lymphoproliferative disorder is suspected, consult hematology and consider complete blood count with differential, serum chemistries (including calcium), creatinine, albumin, lactate dehydrogenase, beta-2 microglobulin, C-reactive protein (CRP), serum protein electrophoresis (SPEP), urine protein electrophoresis (UPEP), and peripheral/bone marrow smear.\nTreatment\n\n- Infectious crystalline keratopathy: Treat as outlined in see [4.12](c04.xhtml#s4-12), Bacterial Keratitis, and [4.31](c04.xhtml#s4-31), Corneal Refractive Surgery Complications. If patient is on topical steroid therapy, decrease frequency or steroid strength rather than stop"}, {"id": "4.16", "chapter_num": "4", "chapter": "Cornea", "name": "Herpes Simplex Virus", "raw": "4.16 Herpes Simplex Virus\n\nSymptoms\n\nRed eye, pain, foreign body sensation, photophobia, tearing, decreased vision, skin (e.g., eyelid) vesicular rash, history of previous episodes; usually unilateral.\n\nSigns\n\nPrimary HSV infection is usually not apparent clinically. However, neonatal primary herpes infection is a rare, potentially devastating disease associated with localized skin, eye, or oral infection and severe central nervous system and multiorgan system infection (see [8.9](c08.xhtml#s8-9), Ophthalmia Neonatorum [Newborn Conjunctivitis]). Compared to adults, children tend to exhibit more severe disease that may be bilateral, recurrent, and associated with extensive eyelid involvement, multiple corneal/conjunctival dendrites, as well as a greater degree of secondary corneal scarring/astigmatism. Possible triggers for recurrence include ocular surgery, certain topical medications, fever, stress, menstruation, and upper respiratory tract infection. Infection may be characterized by any or all of the following:\n\nEyelid/Skin Involvement\n\nClear vesicles on an erythematous base that progress to crusting, heal without scarring, and cross dermatomes, but are typically unilateral (only 10% of primary HSV dermatitis is bilateral).\n\nConjunctivitis\n\nConjunctival injection with acute unilateral follicular conjunctivitis, with or without conjunctival dendrites or geographic ulceration.\n\nEpithelial Keratitis\n\n(See Figure 4.16.1.)\n\nFigure 4.16.1 Herpes simplex dendritic keratitis. \n\nMay be seen as macropunctate keratitis, dendritic keratitis (a thin, linear, branching epithelial ulceration with club-shaped terminal bulbs at the end of each branch), or a geographic ulcer (a large, amoeba-shaped corneal ulcer with a dendritic edge). The edges of herpetic lesions are heaped up with swollen epithelial cells that stain well with rose bengal or lissamine green; the central ulceration stains well with fluorescein. Corneal sensitivity may be decreased. Subepithelial scars and haze (ghost dendrites) may develop as epithelial dendrites resolve. Epithelial keratitis is considered to be live, replicating viral disease, and treatment is directed accordingly.\n\nDifferential Diagnosis of Corneal Dendrites A “true” dendrite (branching epithelial ulceration with terminal end-bulbs) is pathognomonic for HSV however there are many similar appearing lesions that should be distinguished:\n\n- VZV: Pseudodendrites in VZV are slightly elevated and are without central ulceration. They do not have true terminal bulbs and typically stain poorly with fluorescein. See [4.17](c04.xhtml#s4-17), Herpes Zoster Ophthalmicus/Varicella Zoster Virus.\n- Recurrent corneal erosion or any recent corneal abrasion: A healing epithelial defect often has a dendritiform appearance. Recurrent erosions in patients with lattice dystrophy can have a geographic shape. See [4.2](c04.xhtml#s4-2), Recurrent Corneal Erosion.\n- Acanthamoeba keratitis pseudodendrites: History of soft contact lens wear, pain often out of proportion to inflammation, chronic course, not responding to antiviral therapy. These are raised epithelial lesions, not epithelial ulcerations. See [4.14](c04.xhtml#s4-14), Acanthamoeba Keratitis.\n- Others: Cornea verticillata from medications or Fabry disease, and rarely tyrosinemia.\nStromal Keratitis\n\n- Stromal keratitis without ulceration (alternate terms: non-necrotizing keratitis, immune stromal keratitis, IK): Unifocal or multifocal stromal haze or whitening, often with stromal ed"}, {"id": "4.17", "chapter_num": "4", "chapter": "Cornea", "name": "Herpes Zoster Ophthalmicus/Varicella Zoster Virus", "raw": "4.17 Herpes Zoster Ophthalmicus/Varicella Zoster Virus\n\nSymptoms\n\nDermatomal pain, paresthesias, and skin rash or discomfort. May be preceded by headache, fever, or malaise, and accompanied or followed by blurred vision, eye pain, and red eye.\n\nSigns\n\nCritical. Acute vesicular dermatomal skin rash along the first division of the fifth cranial nerve. Characteristically, the rash is unilateral and typically spares the lower eyelid. Hutchinson sign (tip of the nose involved in the distribution of the nasociliary branch of V1) predicts higher risk of ocular involvement. While the associated edema of the vesicular rash may extend bilaterally, the lesions always respect the midline.\n\nOther. Less commonly, the lower eyelid and cheek on one side (V2), and, rarely, one side of the jaw (V3) are involved. Conjunctivitis, corneal involvement (e.g., multiple small epithelial dendritiform lesions early, followed by larger pseudodendrites [raised mucous plaques which may be present on cornea or conjunctiva, see Figure 4.17.1], SPK, immune stromal keratitis, neurotrophic keratitis), uveitis, sectoral iris atrophy, scleritis, retinitis, choroiditis, optic neuritis, cranial nerve palsies, and elevated IOP can occur. Late postherpetic neuralgia also may occur.\n\nFigure 4.17.1 Herpes zoster keratitis pseudodendrites. \n\nNOTE: Corneal disease may follow the acute skin rash by several days, weeks, or months and can last for years. Occasionally, the diagnosis can be more difficult to determine in cases where a clinical rash never develops or cases where corneal disease precedes the skin rash. There is a rise in VZV titers after zoster.\n\nDifferential Diagnosis\n\n- HSV: Patients are often younger; rash is not dermatomal. See [4.16](c04.xhtml#s4-16), Herpes Simplex Virus.\nWorkup\n\n- History: Duration of rash and pain? Immunocompromised or risk factors for HIV/AIDS? Hearing changes, facial pain or weakness, vertigo (cranial nerve VII involvement [Ramsay Hunt syndrome])? Rashes elsewhere?\n- Complete ocular examination, including a slit-lamp evaluation with fluorescein or rose bengal staining, IOP check, and dilated fundus examination with careful evaluation for acute retinal necrosis (ARN) in immunocompetent patients and progressive outer retinal necrosis (PORN) in patients with immunodeficiency. See [12.13](c12.xhtml#s12-13), Acute Retinal Necrosis (ARN).\n- Consider medical evaluation for immunocompromised status if immunodeficiency is suspected from the history.\n- If patient is >60 years old (especially if systemic steroid therapy is to be initiated), or if any other organ systems or nonophthalmic sites are involved, evaluation by the patient’s primary medical doctor or other subspecialist(s) is warranted.\nTreatment\n\n(See Table 4.17.1.)\n\nTABLE 4.17.1 Antiviral Therapy Guidelines for Varicella Zoster Virus\n\n| Drug | Dosing Information | Toxicities | Contraindications |\n| --- | --- | --- | --- |\n| Acyclovir | If immunocompetent, 800 mg p.o. five times per day; if immunocompromised, start 10/mg/kg i.v. q8h (q12h if creatinine >2.0) for 7 to 10 d, followed by 800 mg p.o. five times per day to prevent reactivation. | Intravenous: reversible renal and neurologic toxicity | Use with caution in patients with a history of renal impairment. |\n| Famciclovir | 500 mg p.o. q8h. Adjust dosage for creatinine clearance <60 mL/min. | Headache, nausea, diarrhea, dizziness, fatigue | Use with caution in patients with a history of renal impairment. |\n| Valacyclovir | 1 g p.o. q8h. Adju"}, {"id": "4.18", "chapter_num": "4", "chapter": "Cornea", "name": "Interstitial Keratitis", "raw": "4.18 Interstitial Keratitis\n\nIK is broadly defined as any nonulcerating inflammation of the corneal stroma without epithelial or endothelial involvement, but often with neovascularization. IK is the common end-point of many corneal diseases.\n\nSigns\n\nAcute Phase\n\nCritical. Marked corneal stromal blood vessels and edema.\n\nOther. Anterior chamber cells and flare, fine keratic precipitates on the corneal endothelium, conjunctival injection.\n\nChronic Phase\n\n(See Figure 4.18.1.)\n\nFigure 4.18.1 Interstitial keratitis. \n\nDeep corneal haze or scarring, corneal stromal blood vessels containing minimal or no blood (ghost vessels), stromal thinning.\n\nEtiology\n\nMost Common. HSV is the most common cause of IK (see [4.16](c04.xhtml#s4-16), Herpes Simplex Virus). Other common causes include VZV, congenital syphilis (bilateral in 80% of cases, often occurs in the first or second decade of life, rare in first years of life; affects both eyes within 1 year of each other, more commonly occurs as late inactive/immune-mediated disease and less often as acute/infectious disease), acquired syphilis, and tuberculosis (TB, unilateral and often sectoral).\n\nLess Common. Epstein–Barr virus (EBV), Lyme disease, leprosy, and Cogan syndrome (autoimmune disorder characterized by bilateral IK, vertigo, tinnitus, hearing loss, and negative syphilis serologies; also associated with systemic vasculitis [e.g., polyarteritis nodosa] and typically occurs in young adults).\n\nWorkup\n\nFor active IK or old, previously untreated IK:\n\n- History: Venereal disease in the mother during pregnancy or in the patient? Hearing loss or tinnitus? Prior HSV or shingles infections?\n- External examination: Look for saddle-nose deformity, Hutchinson teeth, frontal bossing, or other signs of congenital syphilis. Look for hypopigmented or anesthetic skin lesions and thickened skin folds, loss of the temporal eyebrow, and loss of eyelashes, as in leprosy.\n- Slit-lamp examination: Examine corneal nerves for segmental thickening, like beads on a string (leprosy). Examine the iris for nodules (leprosy) and hyperemia with fleshy, pink nodules (syphilis). Check IOP.\n- Dilated fundus examination: Look for classic salt-and-pepper chorioretinitis or optic atrophy of syphilis.\n- Laboratory evaluation: Fluorescent treponemal antibody absorption (FTA-ABS) or treponemal-specific assay (e.g., microhemagglutination-Treponema pallidum [MHA-TP]) for prior exposure to syphilis; venereal disease research laboratory test (VDRL) or rapid plasma reagin (RPR) for syphilis disease activity (see [12.10](c12.xhtml#s12-10), Syphilis); purified protein derivative (PPD) or interferon-gamma release assay (IGRA) (e.g., QuantiFERON® Gold); Lyme serology if in endemic region; chest x-ray or chest CT if negative FTA-ABS (or MHA-TP) or positive PPD or IGRA; consider erythrocyte sedimentation rate, rheumatoid factor, complete blood count, and EBV antibody.\nTreatment\n\n- Acute disease:\n- Topical cycloplegic drop (e.g., cyclopentolate 1% t.i.d. or atropine 1% b.i.d.).\n- Topical steroid (e.g., prednisolone acetate 1% q2–6h depending on the degree of inflammation).\n- Treat any underlying disease.\n- Old inactive disease with central scarring:\n- RGP or scleral contact lens if vision decreased from irregular astigmatism.\n- Corneal transplantation may improve vision if minimal amblyopia is present.\n- Recently inactive or old inactive disease:\n- If the treponemal-specific assay or FTA-ABS is positive and the patient has active or untreated syp"}, {"id": "4.19", "chapter_num": "4", "chapter": "Cornea", "name": "Staphylococcal Hypersensitivity", "raw": "4.19 Staphylococcal Hypersensitivity\n\nSymptoms\n\nMild photophobia, mild pain, localized red eye, chronic eyelid crusting, foreign body sensation, or dryness. History of recurrent acute episodes, chalazia, or styes.\n\nSigns\n\n(See Figure 4.19.1.)\n\nFigure 4.19.1 Staphylococcal hypersensitivity. \n\nCritical. Singular or multiple, unilateral or bilateral, peripheral corneal stromal infiltrates often with a clear space between the infiltrates and the limbus. Variable staining with fluorescein. Minimal anterior chamber inflammation. Sectoral conjunctival injection typically occurs.\n\nOther. Blepharitis, inferior SPK, phlyctenule (a wedge-shaped, raised, vascularized sterile infiltrate near the limbus, usually in children). Peripheral scarring and corneal neovascularization. Findings often present in the contralateral eye or elsewhere in the affected eye.\n\nDifferential Diagnosis\n\n- Infectious corneal infiltrates: Often round, painful, and associated with an anterior chamber reaction. Not usually multiple and recurrent. See [4.12](c04.xhtml#s4-12), Bacterial Keratitis.\n- Other causes of marginal thinning/infiltrates: See [4.23](c04.xhtml#s4-23), Peripheral Corneal Thinning/Ulceration.\nEtiology\n\nInfiltrates are believed to be a cell-mediated, or delayed, type IV hypersensitivity reaction to bacterial antigens in the setting of staphylococcal blepharitis.\n\nNOTE: Patients with ocular rosacea (e.g., meibomian gland inflammation and telangiectasias of the eyelids) are especially susceptible to this condition.\n\nWorkup\n\n- History: Recurrent episodes? Contact lens wearer (a risk factor for infection)?\n- Slit-lamp examination with fluorescein staining and IOP measurement.\n- If an infectious infiltrate is suspected, then corneal scrapings for cultures and smears should be obtained. See [Appendix 8](app1.xhtml#app8), Corneal Culture Procedure.\nTreatment\n\nMild\n\nWarm compresses, eyelid hygiene, an antibiotic drop q.i.d. (e.g., fluoroquinolone or trimethoprim/polymyxin B), and an antibiotic ophthalmic ointment q.h.s. (e.g., bacitracin, erythromycin, bacitracin/polymyxin B). See [5.8](c05.xhtml#s5-8), Blepharitis/Meibomitis.\n\nModerate to Severe\n\n- Treat as described for mild but add a low-dose topical steroid (e.g., loteprednol 0.5%, fluorometholone 0.1%, or prednisolone acetate 0.125% q.i.d.) with an antibiotic (e.g., fluoroquinolone or trimethoprim/polymyxin B q.i.d.). A combination antibiotic/steroid can also be used q.i.d. (e.g., loteprednol 0.5%/tobramycin 0.3%, dexamethasone 0.1%/tobramycin 0.3%, or dexamethasone 0.05%/tobramycin 0.3%). Steroid use without antibiotic coverage is not recommended. Maintain until the symptoms improve and then slowly taper.\n- If episodes recur despite eyelid hygiene, add systemic doxycycline (50 to 100 mg daily for 1 to 3 months) until the ocular disease is controlled. This medication has an anti-inflammatory effect on the sebaceous glands in addition to its antimicrobial action. Topical azithromycin q.h.s., erythromycin q.h.s., or cyclosporine b.i.d. may be helpful in controlling eyelid inflammation.\n- Low-dose antibiotics (e.g., bacitracin or erythromycin ointment q.h.s.) may have to be maintained indefinitely.\nNOTE: Tetracyclines such as doxycycline are contraindicated in children <8 years old, pregnant women, and breastfeeding mothers. Erythromycin 200 mg p.o. one to two times per day can be used in children to decrease recurrent disease.\n\nFollow-Up\n\nIn 2 to 7 days, depending on the clinical picture. IOP is monitored while p"}, {"id": "4.20", "chapter_num": "4", "chapter": "Cornea", "name": "Phlyctenulosis", "raw": "4.20 Phlyctenulosis\n\nSymptoms\n\nTearing, irritation, pain, mild-to-severe photophobia. History of similar episodes or chalazia. Corneal phlyctenules are more symptomatic than conjunctival phlyctenules.\n\nSigns\n\nCritical\n\n- Conjunctival phlyctenule: A small, rounded, white inflammatory nodule on the bulbar conjunctiva, often at or near the limbus, in the center of a hyperemic area.\n- Corneal phlyctenule: A small, white nodule, initially near the limbus, with dilated conjunctival blood vessels approaching it. Often associated with epithelial ulceration and central corneal migration, producing wedge-shaped corneal neovascularization and scarring behind the leading edge of the lesion. Can be bilateral and recurrent (see Figure 4.20.1).\nFigure 4.20.1 Corneal phlyctenule. \n\nOther. Conjunctival injection, blepharitis, corneal scarring.\n\nDifferential Diagnosis\n\n- Inflamed pinguecula: Uncommon in children. Located in the palpebral fissure. Connective tissue often seen from lesion to the limbus. Often bilateral. See [4.9](c04.xhtml#s4-9), Pterygium/Pinguecula.\n- Infectious corneal ulcer: With migration, corneal phlyctenules produce a sterile ulcer surrounded by a white infiltrate. When an infectious ulcer is suspected (e.g., increased pain, anterior chamber reaction), appropriate antibiotic treatment and diagnostic smears and cultures are necessary. See [Appendix 8](app1.xhtml#app8), Corneal Culture Procedure.\n- Staphylococcal hypersensitivity: Peripheral corneal infiltrates, sometimes with an overlying epithelial defect; usually multiple, often bilateral, with a clear space between the infiltrate and the limbus and located where eyelid margin lies along the cornea surface. Minimal anterior chamber reaction. See [4.19](c04.xhtml#s4-19), Staphylococcal Hypersensitivity.\n- Ocular rosacea: Corneal neovascularization with thinning and subepithelial infiltration may develop in an eye with rosacea. See [5.9](c05.xhtml#s5-9), Ocular Rosacea.\n- Herpes simplex keratitis: May produce corneal neovascularization associated with a stromal infiltrate. Usually unilateral. See [4.16](c04.xhtml#s4-16), Herpes Simplex Virus.\nEtiology\n\nDelayed hypersensitivity reaction usually as a result of one of the following:\n\n- Staphylococcus: Usually related to blepharitis. See [4.19](c04.xhtml#s4-19), Staphylococcal Hypersensitivity.\n- Rarely TB or another infectious agent (e.g., Coccidiomycosis, Candidiasis, lymphogranuloma venereum).\nWorkup\n\n- History: TB or recent infection? Blepharitis? Chalazia?\n- Slit-lamp examination: Inspect the eyelid margin for signs of Staphylococcal anterior blepharitis and rosacea.\n- PPD and/or IGRA in patients without blepharitis and those at high risk for TB.\n- Chest radiograph or chest CT if high suspicion for TB or positive PPD or IGRA.\nTreatment\n\nIndicated for symptomatic patients.\n\n- Topical steroid (e.g., loteprednol 0.5% or prednisolone acetate 1% q.i.d., depending on the severity of symptoms). A combination antibiotic/steroid can also be used q.i.d. (e.g., loteprednol 0.5%/tobramycin 0.3% or dexamethasone 0.1%/tobramycin 0.3%).\n- Topical ophthalmic antibiotic regimen in the presence of corneal ulcer. See [4.12](c04.xhtml#s4-12), Bacterial Keratitis. Otherwise, antibiotic ointment (e.g., erythromycin, bacitracin) q.h.s.\n- Eyelid hygiene b.i.d. to t.i.d. for blepharitis. See [5.8](c05.xhtml#s5-8), Blepharitis/Meibomitis.\n- Preservative-free artificial tears four to six times per day.\n- In severe cases of blepharitis or acne rosacea, conside"}, {"id": "4.21", "chapter_num": "4", "chapter": "Cornea", "name": "Contact Lens", "raw": "4.21 Contact Lens–Related Problems\n\nSymptoms\n\nPain, photophobia, foreign body sensation, decreased vision, red eye, itching, discharge, burning, and contact lens intolerance.\n\nNOTE: Any contact lens wearer with pain or redness should remove the lens immediately and have a thorough ophthalmic examination as soon as possible if symptoms persist or worsen.\n\nSigns\n\nSee the distinguishing characteristics of each etiology.\n\nEtiology\n\n- Infectious corneal infiltrate/ulcer (bacterial, fungal, Acanthamoeba): White corneal lesion that may stain with fluorescein. Must always be ruled out in contact lens patients with eye pain. See [4.12](c04.xhtml#s4-12), Bacterial Keratitis, [4.13](c04.xhtml#s4-13), Fungal Keratitis, and [4.14](c04.xhtml#s4-14), Acanthamoeba Keratitis.\n- Giant papillary conjunctivitis: Itching, mucous discharge, and lens intolerance in a patient with large superior tarsal conjunctival papillae. See [4.22](c04.xhtml#s4-22), Contact Lens–Induced Giant Papillary Conjunctivitis.\n- Hypersensitivity/toxicity reactions to preservatives in solutions: Conjunctival injection and ocular irritation typically develop shortly after lens cleaning and insertion, but can be present chronically. A recent change from one type or brand of solution is common. It not only occurs more often in patients using older preserved solutions (e.g., thimerosal or chlorhexidine as a component) but also is seen with newer “all-purpose” solutions. May be due to inadequate rinsing of lenses after enzyme use. Signs include SPK, conjunctival injection, bulbar conjunctival follicles, subepithelial or stromal corneal infiltrates, superior epithelial irregularities, and superficial scarring.\n- Contact lens deposits: Multiple small deposits on the contact lens, leading to corneal and conjunctival irritation. The contact lens is often old and may not have been cleaned or enzyme treated properly in the past.\n- Tight lens syndrome: Symptoms may be severe and often develop within 1 or 2 days of contact lens fitting (usually a soft lens), especially if patient sleeps overnight with daily-wear lenses. No lens movement with blinking and lens appears “sucked-on” to the cornea (this can occur after rewearing a soft lens that has dried out and then been rehydrated). An imprint in the conjunctiva is often observed after the lens is removed. Central corneal edema, SPK, anterior chamber reaction, and sometimes a sterile hypopyon may develop.\n- Contact lens–associated red eye (CLARE): Red eye, corneal edema, iritis with or without hypopyon, hypoxic subepithelial, or stromal infiltrates (often multiple) may be present.\n- Corneal warpage: Seen predominantly in long-term polymethylmethacrylate hard contact lens wearers. Initially, the vision becomes blurred with glasses (“spectacle blur”) but remains good with contact lenses. Keratometry reveals distorted mires and corneal topography shows irregular astigmatism that usually eventually resolves after lens discontinuation.\n- Corneal neovascularization: Patients are often asymptomatic until the visual axis is involved. Superficial corneal neovascularization for 1 mm is common and usually not a concern in aphakic contact lens wearers. With any sign of chronic hypoxia, the goal is to increase oxygen permeability, increase movement, and discontinue extended-wear lenses.\n- Limbal stem cell deficiency: Early signs include punctate staining in a whorl-like pattern of the epithelium near the limbus, often superiorly. If untreated, the epitheliopat"}, {"id": "4.22", "chapter_num": "4", "chapter": "Cornea", "name": "Contact Lens", "raw": "4.22 Contact Lens–Induced Giant Papillary Conjunctivitis\n\nSymptoms\n\nItching, mucous discharge, contact lens intolerance, increased contact lens awareness, and excessive lens movement.\n\nSigns\n\nCritical. Giant papillae on the superior tarsal conjunctiva (see Figure 4.22.1).\n\nFigure 4.22.1 Giant papillary conjunctivitis. \n\nNOTE: The upper eyelid must be everted to make the diagnosis. Upper eyelid eversion should be part of the routine eye examination in any patient who wears contact lenses.\n\nOther. Contact lens coatings, high-riding lens, mild conjunctival injection, ptosis (usually a late sign).\n\nDifferential Diagnosis\n\n- Vernal keratoconjunctivitis: Bilateral allergic conjunctivitis is more commonly seen in younger patients. Seasonal variation (spring and summer tend to be the worst). Gelatinous limbal papillae (Horner–Trantas Dots) and shield ulcer may be present.\n- Atopic keratoconjunctivitis: History of atopy, dermatitis, and/or asthma. Giant papillae occasionally seen in both superior and inferior conjunctiva.\nNOTE: Consider alternative etiology if no improvement of papillae with discontinuation of contact lens wear or if systemic symptoms present.\n\nWorkup\n\n- History: Details of contact lens use, including the age of lenses, daily or extended
