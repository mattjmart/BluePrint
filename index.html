 been used to break the spasm but are rarely needed except in resistant cases.\nFollow-Up\n\nReevaluate in several weeks. More severe cases may require frequent follow-up.\n\n"}, {"id": "13.7", "chapter_num": "13", "chapter": "Miscellaneous & Systemic", "name": "Vitamin A Deficiency/Xerophthalmia", "raw": "13.7 Vitamin A Deficiency/Xerophthalmia\n\nXerophthalmia refers to a spectrum of ocular pathology resulting from severe vitamin A deficiency. Xerophthalmia remains a major cause of preventable blindness in developing countries. The World Health Organization’s Classification of Vitamin A Deficiency is based on clinical features seen during comprehensive ophthalmic exam. (See Table 13.7.1.)\n\nTABLE 13.7.1 World Health Organization Classification of Vitamin A Deficiency\n\n| XN | Night Blindness |\n| --- | --- |\n| X1A | Conjunctival xerosis |\n| X1B | Bitôt spot |\n| X2 | Corneal xerosis |\n| X3A | Corneal ulceration or keratomalacia with less than one-third corneal involvement |\n| X3B | Corneal ulceration or keratomalacia with one-third or more corneal involvement |\n| XS | Corneal scar |\n| XF | Xerophthalmia fundus |\n\nSymptoms\n\nNight blindness (earliest and most common manifestation), dry eyes, ocular pain, and severe vision loss.\n\nSigns\n\nOcular. Bitôt spots (triangular, perilimbal, gray, foamy plaques of keratinized conjunctival debris); decreased tear break-up time; conjunctival and corneal xerosis (bilateral conjunctival and corneal dryness); corneal epithelial defects, sterile or infectious ulceration (often peripheral with a punched-out appearance), perforation, or scarring; keratomalacia (often preceded by a gastrointestinal, respiratory, or measles infection); fundus abnormalities (yellow or white peripheral retinal dots representing focal retinal pigment epithelium [RPE] defects).\n\nSystemic. Growth retardation in children; dry, hyperkeratotic skin; increased susceptibility to infections.\n\nDifferential Diagnosis\n\nOther vitamin deficiency (Bitôt spots can be seen in niacin deficiency). See [4.3](c04.xhtml#s4-3), Dry Eye Syndrome and [11.28](c11.xhtml#s11-28), Retinitis Pigmentosa and Inherited Chorioretinal Dystrophies.\n\nEtiology\n\n- Primary: Dietary deficiency or chronic alcoholism (relatively uncommon in developed countries). Beyond 6 months postpartum, breast milk in vitamin A–deficient mothers is unlikely to sufficiently maintain vitamin A stores in nursing infants.\n- Secondary: Lipid malabsorption (e.g., cystic fibrosis, chronic pancreatitis, inflammatory bowel disease, celiac sprue, postgastrectomy or postintestinal bypass surgery, chronic liver disease, abetalipoproteinemia [Bassen–Kornzweig syndrome]).\nWorkup\n\n- History: Malnutrition? Poor diet? Restrictive diet in an autistic patient? Alcohol use? Gastrointestinal or liver disease? Previous gastrointestinal surgery? Measles?\n- Complete ophthalmic examination, including careful inspection of eyelid margins and inferior fornices.\n- A positive response to treatment is a simple, cost-effective way to confirm the diagnosis.\n- Consider serum vitamin A level before treatment is initiated. These levels may appear normal due to the maintenance of circulating retinol by hepatic stores. Keep in mind that other vitamin deficiencies may coexist and may warrant testing.\n- Consider serum retinol-binding protein.\n- Consider impression cytology of the conjunctiva, looking for decreased goblet cell density.\n- Consider dark adaptation studies and electroretinogram (may be more sensitive than the serum vitamin A level).\n- Corneal cultures if infection suspected. See [Appendix 8](app1.xhtml#app8), Corneal Culture Procedure.\nTreatment\n\n- Immediate vitamin A replacement therapy orally (preferred) or intramuscularly in the following WHO-recommended dosages for clinical xerophthalmia: - Children <12 months: "}, {"id": "13.8", "chapter_num": "13", "chapter": "Miscellaneous & Systemic", "name": "Albinism", "raw": "13.8 Albinism\n\nSymptoms\n\nDecreased vision. Photosensitivity in some patients.\n\nSigns\n\nBest-corrected visual acuity ranging from 20/40 to 20/400. May have refractive error, strabismus, reduced stereopsis, pendular nystagmus, amblyopia secondary to strabismus or anisometropia, iris transillumination defects, fundus hypopigmentation with highly visible choroidal vasculature, and foveal hypoplasia with or without failure of the retinal vessels to properly surround the fovea.\n\nNOTE: Patients with albinism show a wide range of visual acuities, refractive errors, nystagmus, and amblyopia.\n\nEtiology\n\nOculocutaneous albinism is a group of autosomal recessive conditions caused by mutations in enzymes or membrane proteins crucial for melanin synthesis. The phenotype varies based on residual enzyme activity, influencing skin, hair, and iris pigmentation, with the severity of visual impairment often correlating with the degree of nystagmus and lack of pigmentation.\n\nAssociated Disorders\n\n- Hermansky–Pudlak syndrome: An autosomal recessive disorder characterized by platelet dysfunction leading to easy bruising and bleeding; some individuals also have pulmonary fibrosis or colitis. More common in patients of Puerto Rican and Swiss descent. Multiple genes.\n- Chédiak–Higashi syndrome: An autosomal recessive disorder affecting white blood cell function, resulting in an increased susceptibility to infections and a predisposition for lymphoma-like malignancy. LYST gene on chromosome 1q42.1–q42.2.\n- Multiple other syndromes, some involving deafness or immunodeficiency.\nTypes\n\n- Oculocutaneous albinism: Usually autosomal recessive with hypopigmentation of the hair, skin, and eye.\n- Ocular albinism: Only ocular hypopigmentation is readily apparent. Usually X-linked recessive. Female carriers may have partial iris transillumination, patches of skin hypopigmentation, and mottling of the midperipheral and peripheral retinal pigmentation (mud-splattered fundus).\nWorkup\n\n- History: Easy bruising? Frequent nosebleeds? Prolonged bleeding after dental work? Symptoms of pulmonary fibrosis and/or colitis? Frequent infections? Difficulty hearing? Family history? Puerto Rican or Swiss descent?\n- External examination (including hair and skin color).\n- Complete ocular examination of patient and family members.\n- Check platelet aggregation studies and ultrastructure (especially preoperatively) and polymorphonuclear leukocyte function as indicated based on associated symptoms. Consult primary care or hematology as needed.\n- Ocular genetics consultation.\nTreatment\n\nThere is currently no effective treatment for albinism, but the following may be helpful:\n\n- Treating amblyopia, strabismus, and refractive error may reduce nystagmus, if present. See [8.5](c08.xhtml#s8-5), Amblyopia.\n- Low vision referral when indicated.\n- Eye muscle surgery may be considered for patients with significant strabismus or an abnormal head position due to nystagmus. However, patients with albinism and strabismus rarely achieve binocularity after surgical correction. Surgery to reduce nystagmus may also have benefits.\n- Genetic counseling.\n- Advise ultraviolet sun protection.\n- Hematology consultation as indicated. Patients with Hermansky–Pudlak syndrome may require platelet transfusions before surgery.\n"}, {"id": "13.9", "chapter_num": "13", "chapter": "Miscellaneous & Systemic", "name": "Wilson Disease", "raw": "13.9 Wilson Disease\n\nSymptoms\n\nOcular complaints are rare. Patients experience symptoms of cirrhosis, neurologic disorders, psychiatric problems, or renal disease. Onset typically between 5 and 40 years of age.\n\nSigns\n\nCritical. Kayser–Fleischer ring: 1- to 3-mm, brown, yellow, green, or reddish band that represents copper deposition in the peripheral Descemet membrane (see Figure 13.9.1). Present in 50% to 60% of patients with isolated hepatic involvement and more than 90% of patients with neurologic manifestations. First appears superiorly (may only be visible on gonioscopy) and eventually forms a ring involving the entire corneal periphery extending to the limbus. Anterior-segment optical coherence tomography (OCT) may be useful in detecting early Kayser–Fleischer rings that are not readily detected on slit-lamp examination; appears as linear hyperreflective material on Descemet membrane.\n\nFigure 13.9.1 Kayser–Fleischer ring in Wilson disease. \n\nOther. “Sunflower” cataract: Ring or stellate yellow, brown, or reddish anterior capsule opacity due to copper deposition under the lens capsule.\n\nDifferential Diagnosis\n\n- Kayser–Fleischer-like ring: Rarely can be seen in primary biliary cirrhosis, chronic active hepatitis, progressive intrahepatic cholestasis, and multiple myeloma. These patients usually have a normal serum ceruloplasmin level.\n- Arcus senilis: White, gray, or blue ring-shaped opacification in peripheral corneal due to lipid deposition in stroma, initially appears inferiorly and superiorly before extending. A 1-mm zone of clear cornea separates the edge of the arcus from the limbus. Check a fasting lipid profile if observed in patients age <40 years.\n- Chalcosis: Copper deposition in basement membranes, including Descemet membrane, secondary to copper-containing intraocular foreign body. Alloys containing more than 85% copper may induce severe inflammation, while those with lower amounts may cause retinal toxicity. Corneal deposition is more diffuse.\nEtiology\n\nAutosomal recessive inborn error of copper metabolism that results in impaired copper excretion and toxic accumulation of copper in multiple organ systems (e.g., liver, brain, cornea, kidney). ATP7B gene on chromosome 13.\n\nWorkup\n\n- Slit-lamp examination: Deposition at Descemet membrane is apparent with a narrow slit beam.\n- Gonioscopy if the Kayser–Fleischer ring is not evident on routine slit-lamp examination.\n- Check serum copper and ceruloplasmin levels, urine copper level (low serum copper and ceruloplasmin and elevated urine copper levels with ocular findings are diagnostic).\n- Referral to appropriate systemic specialists.\nTreatment\n\n- Lifelong systemic therapy (e.g., zinc salts, d-penicillamine, trientine) is instituted by the appropriate systemic specialist. Liver transplantation may be required for fulminant hepatic failure or disease progression after medical therapy.\n- While a patient is on a chelating agent (e.g., d-penicillamine), routine lab monitoring of serum copper, ceruloplasmin, liver enzymes, international normalized ratio (INR), complete blood count with differential, and urinalysis is recommended.\n- Patients are recommended to start a low-copper diet.\n- Ocular manifestations usually require no specific treatment.\nFollow-Up\n\n- Systemic therapy and monitoring.\n- Successful treatment should lead to resorption of the corneal copper deposition and clearing of the Kayser–Fleischer ring, although residual peripheral corneal changes may remain. This chan"}, {"id": "13.10", "chapter_num": "13", "chapter": "Miscellaneous & Systemic", "name": "Blind, Painful Eye", "raw": "13.10 Blind, Painful Eye\n\nPatients with a nonseeing eye and unsalvageable vision can experience mild-to-severe ocular pain for a variety of reasons.\n\nCauses of Pain\n\n- Corneal decompensation: Fluorescein-staining defect(s) on slit-lamp examination. Pain improves with topical anesthetic.\n- Uveitis: Anterior chamber or vitreous white blood cells. Corneal opacification may obscure the view of an inflammatory reaction.\n- Glaucoma with elevated IOP.\n- Hypotony: Ciliary body shutdown, retinal detachment, choroidal detachment, and ciliary body detachment. See [9.19](c09.xhtml#s9-19), Hypotony Syndrome.\nWorkup\n\n- History: Determine the etiology and duration of blindness.\n- Ocular examination: Stain the cornea with fluorescein to detect epithelial defects and measure IOP. Tonopen or rebound tonometry measurements may be required if the corneal surface is irregular. If the cornea is clear, look for neovascularization of the iris and angle by gonioscopy, and inspect the anterior chamber for cell and flare. Attempt a dilated fundus examination to rule out an intraocular tumor or retinal detachment.\n- When the fundus cannot be adequately visualized, B-scan US of the posterior segment is required to rule out an intraocular tumor, retinal, choroidal, or ciliary body detachment.\nTreatment\n\n- Sterile corneal decompensation (if it appears infected, see [4.12](c04.xhtml#s4-12), Bacterial Keratitis). - Antibiotic or lubricating ointment (e.g., erythromycin or bacitracin–polymyxin B) daily to q.i.d. to the eye for weeks to months (or even permanently). Can also add cycloplegic agent (e.g., atropine 1% q.d.) for additional comfort. Consider nightly taping of eyelids.\n- Consider a tarsorrhaphy, amniotic membrane graft, or Gundersen conjunctival flap in refractory cases.\n\n- Uveitis. - Cycloplegia (e.g., atropine 1% b.i.d.).\n- Topical steroid (e.g., prednisolone acetate 1% q1–6h). See [12.1](c12.xhtml#s12-1), Anterior Uveitis (Iritis/Iridocyclitis).\n- Endophthalmitis should be ruled out if severe uveitis or a hypopyon is present.\n\n- Markedly increased IOP. - Topical beta-blocker (e.g., timolol 0.5% daily or b.i.d.) with or without an adrenergic agonist (e.g., brimonidine 0.1%, 0.15%, or 0.2% b.i.d. to t.i.d.). Topical carbonic anhydrase inhibitors (e.g., dorzolamide 2% t.i.d.) are effective, but potential systemic side effects may not warrant their use for pain relief; miotics and prostaglandin analogs may increase ocular irritation.\n- If the IOP remains markedly increased and is thought to be responsible for the pain, a cyclodestructive procedure (e.g., diode laser cyclophotocoagulation) may be attempted. The potential for sympathetic ophthalmia must be considered.\n- If pain persists despite the previously described treatment, a retrobulbar alcohol block may be given although this practice has declined in recent years.\n\nNOTE: Technique: 2 to 3 mL of lidocaine is administered in the retrobulbar region. The needle is then held in place while the syringe of lidocaine is replaced with a 1-mL syringe containing 95% to 100% alcohol (some physicians use 50% alcohol). The contents of the alcohol syringe are then injected into the retrobulbar space through the needle. The syringes are again switched, so a small amount of lidocaine can rinse out the remaining alcohol. The retrobulbar needle is then withdrawn. Patients are warned that transient eyelid droop or swelling, limitation of eye movement, or anesthesia may result. Retrobulbar chlorpromazine (25 to 50 mg, using 2"}, {"id": "13.11", "chapter_num": "13", "chapter": "Miscellaneous & Systemic", "name": "Phakomatoses", "raw": "13.11 Phakomatoses\n\nNEUROFIBROMATOSIS TYPE 1 (VON RECKLINGHAUSEN SYNDROME)\n\nCriteria for Diagnosis\n\n(See Table 13.11.1.)\n\nTABLE 13.11.1 Diagnostic Criteria for Neurofibromatosis 1 and 2\n\n| Neurofibromatosis 1 | Neurofibromatosis 2 |\n| --- | --- |\n| At least two of the following: 1. At least six café au lait spots 1. 5-mm greatest diameter prepubertal or 2. 15-mm postpubertal 2. Neurofibromas 1. One plexiform neurofibroma or 2. At least two of any other type 3. Axillary/groin freckling 4. Visual pathway glioma 5. At least two Lisch nodules 6. Distinctive osseous dysplasia (sphenoid wing or tibial) 7. Affected first-degree relative | Either A or B: A. Bilateral acoustic neuromas (by computed tomography or magnetic resonance imaging) or B. Affected first-degree relative and 1. Unilateral acoustic neuroma or 2. At least two of the following: Neurofibroma Meningioma Glioma Schwannoma Juvenile posterior subcapsular cataract |\n\nNOTE: Lisch nodules (light brown elevated lesions on darker iris or brown lesions on blue/hazel iris) occur at a rate of approximately age in years × 10% (e.g., 50% at 5 years old). Approximately 98% of affected individuals have Lisch nodules after puberty.\n\nSigns\n\n(See Figures 13.11.1 and 13.11.2.)\n\nFigure 13.11.1 Lisch nodules. \n\nFigure 13.11.2 Right optic nerve glioma. \n\nOcular. Lisch nodules, visual pathway glioma (12% to 15%), prominent corneal nerves, multifocal choroidal nevi, choroidal hamartoma (detectable by near-infrared high-frequency OCT), cranial nerve lesions (e.g., superior oblique palsy), glaucoma (usually associated with plexiform neuromas of the ipsilateral upper eyelid), pulsating proptosis secondary to absence of the greater wing of the sphenoid bone, ectropion uveae, and iris melanosis.\n\nSystemic. (See Table 13.11.1.)\n\nDevelopmental delay, seizures, scoliosis, leukemia, juvenile xanthogranuloma, aortic and arteriovascular anomalies, and other cancers.\n\nInheritance\n\nAutosomal dominant with variable expression: chromosome 17q11.2.\n\nWorkup\n\n- Family history. Examination of parents for Lisch nodules. If child is affected, consider further systemic and ocular evaluation.\n- MRI of the brain and orbits only if indicated by a sign or symptom, including ophthalmic findings of optic nerve dysfunction, optic nerve pallor/swelling/shunt vessels, or proptosis.\n- Others: As recommended by nonophthalmic providers.\nTreatment/Follow-Up\n\nDependent upon the findings. Every year up to 6 years old when risk of visual pathway glioma diminishes. Every 2 years thereafter. More frequent follow-up as needed for patients with gliomas or other signs of ophthalmic or orbital involvement, especially if risk factors for amblyopia (e.g., ptosis from plexiform neurofibroma).\n\nNEUROFIBROMATOSIS TYPE 2\n\nCriteria for Diagnosis\n\n(See Table 13.11.1.)\n\nSigns\n\nOcular. Juvenile-onset posterior subcapsular cataracts, combined hamartoma of the RPE, epiretinal membrane, optic nerve sheath meningioma, and cranial nerve palsies.\n\nInheritance\n\nAutosomal dominant with variable expression: chromosome 22q12.2.\n\nWorkup\n\n- Family history. If child is affected, consider further systemic and ocular evaluation.\n- Audiology and gadolinium-enhanced MRI of the brain and auditory canals should be performed.\n- OCT of epiretinal membrane.\n- Others: As indicated by symptoms and signs.\nTreatment/Follow-Up\n\nDependent upon the findings.\n\nSTURGE–WEBER SYNDROME (LEPTOMENINGEAL ANGIOMATOSIS)\n\nSigns\n\n(See Figure 13.11.3.)\n\nFigure 13.11.3 Nevus flammeus. \n\nOcular. Di"}, {"id": "14.1", "chapter_num": "14", "chapter": "Diagnostics", "name": "Plain Films Radiography", "raw": "14.1 Plain Films Radiography\n\nDescription\n\nImages of radiopaque tissues obtained by exposure of special photographic plates to ionizing radiation.\n\nUses in Ophthalmology\n\nPlain films are of limited use in ophthalmology. They may be used to identify or exclude radiopaque intraorbital or intraocular foreign bodies. Plain films remain a valid screening modality before magnetic resonance imaging (MRI) if an occult metallic foreign body is suspected. Plain films should never be used in the setting of trauma or for the diagnosis of orbital fractures, as this needlessly exposes the patient to radiation without providing enough detail of orbital bone and soft tissue. Computed tomography (CT) is the study of choice to evaluate for foreign bodies, as CT has greater contrast sensitivity over conventional radiography.\n\n"}, {"id": "14.2", "chapter_num": "14", "chapter": "Diagnostics", "name": "Computed Tomography", "raw": "14.2 Computed Tomography\n\nDescription\n\nCT uses ionizing radiation and computer-assisted formatting to produce multiple cross-sectional planar images. With the use of multidetector technology, CT now provides direct axial, coronal, and parasagittal images without the need for patient repositioning or data reformatting. Bone and soft tissue windows should always be reviewed in axial, coronal, and parasagittal orientations (see Figures 14.2.1 to 14.2.3). Orbital studies should be obtained using the lowest radiation dose necessary for diagnosis (as low as reasonably acceptable [ALARA]—see below). This is especially important in children; for accreditation by the American College of Radiology, health care facilities must maintain specific pediatric protocols for CT. Radiopaque iodinated contrast allows for more extensive evaluation of vascular structures and areas where there is a breakdown of the normal capillary endothelial barrier (i.e., inflammation).\n\nFigure 14.2.1 Axial soft tissue window of inferior orbit shows abnormality, which is difficult to assess using this window. \n\nFigure 14.2.2 Coronal soft tissue window shows a large blowout fracture of the right orbital floor. This finding was missed on the axial study in Figure 14.2.1, demonstrating the importance of reviewing both axial and coronal images. \n\nFigure 14.2.3 Coronal bone window of the patient seen in Figure 14.2.2 shows the fracture again. In bone windows, the soft tissue detail fades, but bone detail is enhanced, allowing for better examination of bony anatomy. \n\nUses in Ophthalmology\n\n- Excellent for defining bone abnormalities such as fractures (orbital wall or optic canal), calcification, or bony involvement of a soft tissue mass.\n- Locating suspected intraorbital or intraocular metallic foreign bodies. Glass, wood, and plastic are less radiopaque and therefore more difficult to isolate on CT.\n- Soft tissue windows are good for determining some pathologic features, including orbital cellulitis/abscess, inflammation, and tumors. May be useful in determining posterior scleral rupture when clinical examination is inconclusive, but B-scan ultrasound (US) is likely more sensitive. CT should never be used to definitively rule out globe rupture; clinical examination and/or surgical exploration are more sensitive modalities.\n- Excellent for imaging paranasal sinus anatomy and disease.\n- Head CT is very sensitive for locating parenchymal, subarachnoid, subdural, and epidural hemorrhage in either acute or subacute settings. However, CT may show orbital hemorrhage as a nonspecific opacification within radiolucent orbital fat; it is significantly less sensitive for orbital hemorrhage than central nervous system (CNS) hemorrhage.\n- Imaging modality of choice for most cases of thyroid eye disease. See [7.2.1](c07.xhtml#s7-2-1), Thyroid Eye Disease.\n- Loss of consciousness or unwitnessed head trauma with poor history requires CT of the brain unless otherwise recommended by a neurosurgical consultant.\n- Note: CT of the brain does not provide adequate detail of the orbital anatomy, and orbital CT does not image the entire brain. Each hospital has its own specific, separate CT protocols.\nGuidelines for Ordering an Orbital Study\n\n- Always order a dedicated orbital study if ocular or orbital pathology is suspected. Always include views of paranasal sinuses and cavernous sinuses.\n- Multidetector CT scanners provide excellent views in coronal and parasagittal planes with very short scan times"}, {"id": "14.3", "chapter_num": "14", "chapter": "Diagnostics", "name": "Magnetic Resonance Imaging", "raw": "14.3 Magnetic Resonance Imaging\n\nDescription\n\n- MRI uses a large magnetic field to excite protons in water. The energy given off as the protons re-equilibrate to their normal state is detected by specialized receivers (coils), which is then reconstructed into a two-dimensional or three-dimensional image.\n- Hospitals typically have machines with field strengths of 1.5 to 3 Tesla. In general, a stronger magnet allows better resolution or a faster scan at a lower resolution.\n- The basic principles of MRI are listed in Table 14.3.1. Figures 14.3.1 to 14.3.3 provide specific examples.\nTABLE 14.3.1 Summary of Magnetic Resonance Imaging (MRI) Sequencesa\n\nFigure 14.3.1 Axial T1-weighted image without fat suppression or gadolinium. The vitreous is dark (hypointense) relative to the bright signal from fat. A well-circumscribed mass is clearly visible in the right orbit, also hypointense. Most orbital lesions are dark in T1 prior to gadolinium injection. The notable exceptions are listed in Table 14.3.2. \n\nFigure 14.3.2 Axial T1 image with fat suppression and gadolinium of the patient seen in Figure 14.3.1. Note how both the vitreous and fat are dark, but the extraocular muscles become bright. The orbital mass is now clearly visible. This technique should be performed in all orbital magnetic resonance imagings. \n\nFigure 14.3.3 Axial T2-weighted image. The vitreous is hyperintense (bright) relative to the orbital fat. The lesion seen in the prior two figures is also bright but in some cases may be isointense with the surrounding fat. \n\nNOTE: In general, conventional “closed” MRI scanners provide better resolution and fat suppression than open scanners, unless the open scanner contains a stronger magnet. As a rule, always try to use conventional “closed” scanners for orbital studies.\n\n- Contrast studies can be ordered using gadolinium, a well-tolerated, non–iodine-based paramagnetic agent.\n- Diffusion-weighted imaging (DWI) is a technique that measures the Brownian motion of water within tissue. Lesions that are tightly packed by cells with a high nuclear to cytoplasmic ratio will minimize Brownian motion and “restrict diffusion.” DWI may help to distinguish highly cellular tumors (e.g., lymphoma) from inflammation. DWI is often coupled with an apparent diffusion coefficient (ADC) image, but the use of DWI/ADC in the orbit is limited. DWI can help differentiate the various phases of cerebral infarction (e.g., hyperacute, acute, subacute, and chronic).\nUses in Ophthalmology\n\n- Excellent for defining masses in the orbit and CNS. Signal-specific properties of certain pathology may be helpful in diagnosis (see Table 14.3.2).\nTABLE 14.3.2 Tissues/Lesions That Appear Bright (Hyperintense) Relative to Vitreous on T1 Before Gadolinium Injectiona\n\n| Tissues/Lesions | Examples |\n| --- | --- |\n| Fat | Lipoma, liposarcoma |\n| Mucus/proteinaceous material | Dermoid cyst, mucocele, dacryocystocele, craniopharyngioma |\n| Melanin | Melanoma |\n| Subacute blood (3 to 14 days old) | Lymphangioma with blood cyst, hemorrhagic choroidal detachment, subperiosteal orbital hematoma |\n| Certain fungal infections (iron scavengers) | Aspergillus |\n\naMost orbital lesions will become hyperintense after gadolinium infusion.\n\n- Poor for bone definition (e.g., fractures).\n- Excellent for diagnosing intracranial, cavernous sinus, and orbital apex lesions, many of which affect neuro-ophthalmic pathways.\n- Gadolinium is essential in defining lesion extent in suspected neurogenic tumor"}, {"id": "14.4", "chapter_num": "14", "chapter": "Diagnostics", "name": "Magnetic Resonance Angiography", "raw": "14.4 Magnetic Resonance Angiography\n\nDescription\n\nSpecial application of MRI technology in which signal from flowing blood is augmented while signal from stationary tissues is suppressed. MRA allows for three-dimensional rotational reconstruction. Importantly, MRA is not performed with gadolinium and is therefore useful in patients with a history of renal disease and other contraindications to gadolinium or CT contrast.\n\nUses in Ophthalmology\n\n- Suspected carotid stenosis, occlusion, aneurysm, or dissection.\n- Suspected intracranial and orbital arterial aneurysms (e.g., pupil-involving third cranial nerve palsy), arteriovenous malformations, and acquired arteriovenous communications.\n- Suspected orbital or intracranial vascular mass. Note that MRA is best for imaging high-flow and large-caliber lesions. Lower-flow lesions (e.g., varix) are not well seen. Both CTA and MRA have limited potential in visualizing cavernous sinus fistulas; color Doppler studies may be more sensitive in making this diagnosis, but catheter-based angiography remains the most sensitive and specific modality.\nGuidelines for Ordering the Study\n\nConventional cerebral angiography remains the gold standard for diagnosis of vascular lesions, but carries potential morbidity and mortality in certain populations. Currently, the sensitivity is low for an MRA to detect an aneurysm smaller than 2 mm. However, the sensitivity is highly dependent on several factors: machine, software, availability of clinical history, and the neuroradiologist. In one large study, the two most critical factors in missing a posterior communicating artery (PCOM) aneurysm on MRI/MRA were lack of clinical history by the referring physician and a reading by a radiologist without fellowship training in neuroradiology. Most PCOM aneurysms that manifest as an oculomotor nerve paresis or palsy are at least 4 mm in diameter. Despite these potential limitations, MRA remains a safe and sensitive screening test, especially when coupled with MRI for concomitant soft tissue imaging.\n\n"}, {"id": "14.5", "chapter_num": "14", "chapter": "Diagnostics", "name": "Magnetic Resonance Venography", "raw": "14.5 Magnetic Resonance Venography\n\nMagnetic resonance venography (MRV) is helpful in diagnosing central venous sinus thrombosis. MRI and MRV may be useful in a patient presenting with bilateral optic disc swelling. See [10.15](c10.xhtml#s10-15), Papilledema.\n\n"}, {"id": "14.6", "chapter_num": "14", "chapter": "Diagnostics", "name": "Conventional Angiography", "raw": "14.6 Conventional Angiography\n\nDescription\n\nThis interventional examination entails intra-arterial injection of radiopaque contrast followed by rapid-sequence x-ray imaging of the region of interest to evaluate the transit of blood through the regional vasculature. Unlike MRA or CTA, catheter angiography allows the option of simultaneous treatment of lesions by intravascular techniques. Cerebral angiography is the gold standard for diagnosing intracranial aneurysms, but it is being replaced as the initial imaging modality in many centers by CTA; note that, unlike catheter angiography, CTA is solely a diagnostic modality. Cerebral angiography carries a stroke risk of 0.3% to 1.8% in patients without transient ischemic attack or previous stroke.\n\nUses in Ophthalmology\n\n- Suspected arteriovenous malformations, carotid cavernous fistulas, cavernous sinus fistula, aneurysm, and vascular masses (e.g., varix).\n- Evaluation of ocular ischemic syndrome or amaurosis fugax due to suspected atherosclerotic carotid, aortic arch, or ophthalmic artery occlusive disease. Usually carotid Doppler US, MRA, or CTA is adequate for diagnosis.\nNOTE: Conventional angiography is generally contraindicated in patients with suspected carotid artery dissection (catheter placement may propagate the dissection). That said, in some centers, angiography is used to stent areas of carotid dissection.\n\n"}, {"id": "14.7", "chapter_num": "14", "chapter": "Diagnostics", "name": "Nuclear Medicine", "raw": "14.7 Nuclear Medicine\n\nDescription\n\nNuclear medicine imaging uses radioactive contrast (radionuclide) that emits gamma radiation, which is then gathered by a gamma-ray detector. The classic types of radionuclide scanning known to ophthalmologists include bone scanning, liver–spleen scanning, and gallium scanning. Positron emission tomography (PET) is useful in determining metabolic activity within a lesion and is usually coupled with CT for anatomic detail.\n\nUses in Ophthalmology\n\n- Scintigraphy (e.g., with technetium-99): Useful for assessing lacrimal drainage physiology in patients with inconsistent irrigation testing.\n- Systemic gallium scan: Useful for detecting extraocular sarcoidosis and Sjögren syndrome. The use of gallium scanning for the diagnosis of sarcoidosis has been largely replaced by other testing, including serum angiotensin-converting enzyme and chest CT.\n- Technetium-99m–tagged red blood cell study: Occasionally used to distinguish cavernous hemangioma from other solid masses in the orbit. This modality has been largely supplanted by specific MRI techniques.\n- PET/CT: The use of PET/CT for the diagnosis and management of orbital disease is still an evolving technique. Limitations in this area include the high background metabolic activity of the adjacent CNS (which may mask orbital abnormalities), the size of the orbital pathology (current PET scanners have a resolution limit of about 4 to 5 mm), and the relatively indolent nature of most orbital lymphomas (decreasing the intensity of the signal on PET). PET is extremely useful in the diagnosis and surveillance of systemic pathologies, including metastases and aggressive subtypes of lymphoma. At present, the primary role of PET in the management of orbital disease is for diagnosis, surveillance, and response to therapy of any systemic component of the pathologic process. PET is rarely obtained alone; it is typically coupled with a low-resolution CT to provide anatomic information (PET/CT).\n"}, {"id": "14.8", "chapter_num": "14", "chapter": "Diagnostics", "name": "Ophthalmic Ultrasound", "raw": "14.8 Ophthalmic Ultrasound\n\nA-SCAN ULTRASOUND\n\nDescription\n\nA-scan, or amplitude-modulated US, uses ultrasonic waves (8 to 12 MHz) which travel through different tissues at different velocities in order to generate linear distance versus amplitude of reflectivity curves of the evaluated ocular and orbital tissues. A-scans are one-dimensional and used for measuring and characterizing the composition of tissues on the basis of the reflectivity curves. Not all A-scan instruments are standardized (see Figure 14.8.1).\n\nFigure 14.8.1 Normal A-scan ultrasound. \n\nUses in Ophthalmology\n\n- Primary use in ophthalmology is measurement of axial length of the globe. This information is critical for intraocular lens (IOL) power calculations for cataract surgery. Axial length information can also be used to identify certain congenital disorders such as microphthalmia, nanophthalmos, intraocular tumor size, intrinsic tumor vascularity, and congenital glaucoma. A-scan is used to follow patients with congenital glaucoma.\n- A standardized A-scan probe calibrated on an S curve can be used for diagnostic identification of the echogenicity characteristics of masses in the globe or orbit.\n- Specialized A-mode US can be used for corneal pachymetry (measurement of corneal thickness).\nGuidelines for Ordering the Study\n\n- When used for IOL power calculations, make sure to check both eyes. The two eyes are usually within 0.3 mm of each other.\n- Spikes along the baseline should rise sharply at a 90-degree angle.\n- If needed, keratometry readings should be obtained prior to scan or 30 minutes after the scan for accurate results.\nB-SCAN ULTRASOUND \n\nDescription\n\n(See Figure 14.8.2.)\n\nFigure 14.8.2 Normal B-scan ultrasound. \n\nB-scan, or brightness-modulated US, gives real-time, two-dimensional (cross-sectional) images of the eye that span from the posterior aspect of the cornea to the posterior aspect of the globe. The B-scan probe may be placed directly on the globe (after anesthetic is applied) or on the closed eyelid, which is preferred in cases of trauma or poorly cooperative patients. See Video: B-Scan Ultrasound Tutorial.\n\nUses in Ophthalmology\n\n- Define ocular anatomy in the presence of media opacities (e.g., mature cataract, hyphema, corneal opacity, vitreous hemorrhage, trauma) in order to evaluate retinal and/or choroidal pathology.\n- Diagnosis of scleral rupture posterior to the muscle insertions or when media opacities prevent direct visualization.\n- Identify intraocular foreign bodies especially if made of metal or glass (spherical objects have a specific echo shadow); wood or vegetable matter has variable echogenicity; can also give a more precise location if the foreign body is next to the scleral wall.\n- Evaluation of intraocular tumor/mass consistency and vascularity, retinal detachment, choroidal detachment (serous versus hemorrhagic), and optic disc abnormalities (e.g., optic disc drusen, coloboma). Also used to monitor intraocular tumor/mass over time for response to treatment.\n- Screening of intraocular pathology (especially choroidal melanoma) in blind eyes prior to evisceration.\n- Evaluation of the posterior sclera and anterior orbit for signs of inflammation in cases of suspected posterior scleritis.\nGuidelines for Ordering the Study\n\n- If used in the setting of trauma to determine unknown scleral rupture, the probe is used over closed eyelids with immersion in copious amounts of sterile methylcellulose, such that no pressure is placed on the gl"}, {"id": "14.9", "chapter_num": "14", "chapter": "Diagnostics", "name": "Photographic Studies", "raw": "14.9 Photographic Studies\n\nDescription\n\nVarious methods of imaging the eye(s) or selected regions of the eye(s), using white light or various spectral wavelengths of light.\n\nTypes of Ophthalmic Photographic Imaging Studies\n\n- Documentary photography: Color pictures of the face, external eye, cornea, anterior segment, and fundus (white light or red-free lighting). (See Figure 14.9.1.)\nFigure 14.9.1 Normal fundus photograph. \n\n- Fundus autofluorescence (FAF): Imaging modality that takes advantage of the naturally and pathologically occurring fluorophores in the fundus. Provides sensitive information regarding the health of the retinal pigment epithelium (RPE) and allows early detection and monitoring of a variety of conditions such as age-related macular degeneration (AMD), macular dystrophies, and medication toxicity. Additionally, FAF is useful in the evaluation of certain ocular tumors, specifically, choroidal nevi and melanomas. (See Figure 14.9.2.)\nFigure 14.9.2 Normal fundus autofluorescence. \n\n- Specular microscopy: Contact and noncontact photographic techniques used to image the corneal endothelium. The images can then be used to evaluate the quality and quantity of the corneal endothelial cells.\n- Adaptive optics: A super high-resolution means of imaging the retina, allowing identification of rod and cone morphology, useful in delineating retinal dystrophies.\n"}, {"id": "14.10", "chapter_num": "14", "chapter": "Diagnostics", "name": "Intravenous Fluorescein Angiography", "raw": "14.10 Intravenous Fluorescein Angiography\n\nDescription\n\n(See Figure 14.10.1.)\n\nFigure 14.10.1 Normal intravenous fluorescein angiography. \n\nIntravenous fluorescein angiography is a type of angiographic photography that does not rely on ionizing radiation or iodine-based contrast. After intravenous injection of fluorescein solution (usually in a hand or arm vein), rapid-sequence photography is performed by using a camera with spectral excitation and barrier filters. Less commonly, fluorescein can be taken orally to look for late leakage. Fluorescein sodium absorbs blue light, with peak absorption and excitation occurring at wavelengths of 465 to 490 nm. Fluorescence then occurs at the yellow-green wavelengths of 520 to 530 nm. The fluorescein molecule is 80% protein bound and does not pass through the tight junctions of a healthy blood–retinal barrier (RPE and retinal capillaries are impermeable, whereas Bruch membrane and choriocapillaris lack tight junctions and are freely permeable).\n\nPhases of the Intravenous Fluorescein Angiography\n\n- Choroidal filling (background fluorescence): Begins 8 to 15 seconds after injection. Choroid is normally completely filled within 5 seconds after dye appearance within the tissue.\n- Arterial phase: Starts 1 to 2 seconds after choroidal filling.\n- Arteriovenous phase (laminar flow).\n- Venous phase: Arteriovenous transit time is the time from the first appearance of dye within the retinal arteries of the temporal arcade until the corresponding veins are completely filled, normally <11 seconds.\n- Recirculation phase: Occurs 45 to 60 seconds after arterial phase.\n- Late phase: Occurs 10 to 30 minutes post injection.\nFoveal dark spot can result from xanthophyll pigment in the outer plexiform layer or tall RPE cells with increased melanin or lipofuscin. The foveal avascular zone is the central area which has no retinal capillaries (300 to 500 microns in diameter).\n\nDescribing an Abnormal Study\n\nHyperfluorescence\n\n- Leakage: Fluorescein penetrates the blood–retinal barrier and accumulates subretinally, intraretinally, or preretinally. Hyperfluorescence increases in size and brightness as study progresses (e.g., choroidal or retinal neovascularization, central serous chorioretinopathy [CSCR], cystoid macular edema [CME]).\n- Staining: Mild fluorescence appears in the late phase while its borders remain fixed (e.g., scar).\n- Pooling: Accumulation of fluorescein in fluid-filled space in retina or choroid. The margins of the space trapping fluorescein are distinct (e.g., pigment epithelial detachment [PED], CSCR).\n- Window or transmission defect: Focal area of hyperfluorescence without leakage usually due to RPE atrophy that appears early and stays stable in brightness (e.g., geographic atrophy, RPE rip, laser scar).\n- Autofluorescence: Structures that naturally fluoresce can be captured on film prior to intravenous fluorescein injection (e.g., optic nerve drusen and lipofuscin).\nHypofluorescence\n\n- Blockage: Due to optical density such as blood, pigment, or fibrous tissue interposed between the camera and the choriocapillaris.\n- Nonperfusion: Nonfilling vessel(s) causing relative or absolute hypofluorescence (e.g., central retinal artery occlusion). Applies to both capillaries and larger vessels.\nUses in Ophthalmology\n\n- Used to image retinal, choroidal, optic disc, iris vasculature, or a combination of these. It is used for diagnosis and therapeutic planning (e.g., retinal lasers).\n- Transit times between inject"}, {"id": "14.11", "chapter_num": "14", "chapter": "Diagnostics", "name": "Indocyanine Green Angiography", "raw": "14.11 Indocyanine Green Angiography\n\nDescription\n\nPhotographic method of ocular angiography similar to intravenous fluorescein angiography utilizing tricarbocyanine dye, an iodine-based dye. Indocyanine green (ICG) angiography differs in that fluorescence occurs in the infrared spectrum (835 nm), allowing for penetration through pigment, fluid, and blood. ICG provides better evaluation of the choroidal vasculature. ICG excitation occurs at 805 nm, with fluorescence at 835 nm. The ICG molecule is approximately 95% protein bound.\n\nPhases of Indocyanine Green Angiography\n\n- Early phase: Filling of choroidal vessels from large to small, starting with Haller layer, then Sattler layer, then choriocapillaris.\n- Middle phase: Retinal and choroidal arteries and veins are all filled.\n- Late phase (recirculation): More than 10 minutes after injection.\nUses in Ophthalmology\n\n- Suspected occult CNV.\n- Suspected recurrent CNV after prior treatment.\n- Suspected CNV with retinal PED.\n- Suspected polypoidal choroidal vasculopathy. See [11.18](c11.xhtml#s11-18), Idiopathic Polypoidal Choroidal Vasculopathy.\n- Other accepted uses: Identifying feeder vessels in retinal angiomatous proliferation lesions in AMD, chronic CSCR, certain inflammatory conditions (e.g., birdshot choroidopathy), and occasionally helpful in diagnosing certain posterior segment tumors.\nGuidelines for Ordering the Study\n\n- Contraindicated in patients with iodine or shellfish allergies.\n- Most common side effect of ICG dye administration is a vasovagal response.\n- Excreted by hepatic parenchymal cells via bile.\n"}, {"id": "14.12", "chapter_num": "14", "chapter": "Diagnostics", "name": "Optical Coherence Tomography", "raw": "14.12 Optical Coherence Tomography\n\nDescription\n\n(See Figure 14.12.1.)\n\nFigure 14.12.1 Normal optical coherence tomography of the retina. \n\nOptical coherence tomography (OCT) provides noninvasive, noncontact two- or three-dimensional images by measuring optical reflections of light. In this manner, OCT is similar to US except that OCT is based on the reflection of light, not sound. The OCT scanner sends low-coherence light (∼820-nm wavelength for posterior segment imaging and ∼1310-nm wavelength for anterior segment imaging) emitted by a superluminescent diode to the tissue to be examined and to a reference beam. The time delays of the light reflections from retinal structures are recorded by an interferometer. Using a reference mirror, these light reflections are then translated into an imaged object with a high resolution of up to 3 microns. The most highly reflective structures are the nerve fiber layer and the RPE. Highly reflective lesions include dense pigmentation, scar tissue, subhyaloid hemorrhage, and hard exudates. Low reflectivity in pathologic conditions include intraretinal or subretinal fluid.\n\nSpectral domain OCT has largely replaced time domain OCT due to increased image resolution, shorter acquisition time, and fewer artifacts. Enhanced depth imaging OCT is a technique used to improve choroidal detail. Swept-source OCT provides better resolution of retinal and choroidal structures within the same scan. Multicolor imaging complements OCT and uses red, green, and blue lasers to provide a topographic map of the outer, mid, and inner retina, respectively. OCT angiography (OCT-A) allows for rapid and noninvasive imaging of the retinal microvasculature and may also be applied to the anterior segment. Limitations of OCT-A include a small field of view and need for good patient cooperation.\n\nUses in Ophthalmology\n\n- Retinal diseases, including macular edema, macular atrophy, CSCR, AMD, CNV, CME, retinal detachment, PED, retinal tumors, drusen, and hard exudates.\n- Vitreoretinal interface abnormalities, including macular holes, cysts, epiretinal membranes, subhyaloid hemorrhage, and vitreoretinal strands or traction.\n- Suspected glaucoma, including quantification of the nerve fiber layer thickness, macular thickness, and optic nerve cup characteristics.\n- Suspected optic neuritis, other optic neuropathies, optic nerve drusen, disc edema, and multiple sclerosis.\n- Anterior segment pathology, such as Descemet detachment in an edematous cornea.\nGuidelines for Ordering the Study\n\nRequires patient’s ability to fixate and relatively clear media.\n\n"}, {"id": "14.13", "chapter_num": "14", "chapter": "Diagnostics", "name": "Confocal Scanning Laser Ophthalmoscopy", "raw": "14.13 Confocal Scanning Laser Ophthalmoscopy\n\nDescription\n\nConfocal scanning laser ophthalmoscopy is a noninvasive imaging technique used to obtain high-resolution optical images and evaluate the topography of ocular structures. This confocal optical system provides a contour map of the desired structure in a process known as “optical sectioning.” The system aims to detect reflected light from a very thin optical plane, the focal plane. A series of “focal planes” or images may be recorded and combined to create a three-dimensional image (e.g., Heidelberg retinal tomography).\n\nUses in Ophthalmology\n\n- Suspected optic nerve disease, including glaucoma and papilledema.\n- Suspected fundus elevations, including macular edema and choroidal nevi.\nGuidelines for Ordering the Study\n\n- Requires patient’s ability to fixate and relatively clear media.\n- Because the hallmark of the test is to provide comparative data, subsequent tests in the same patient need accurate alignment in the same focal plane to provide useful information.\n"}, {"id": "14.14", "chapter_num": "14", "chapter": "Diagnostics", "name": "Confocal Microscopy", "raw": "14.14 Confocal Microscopy\n\nDescription\n\nThe confocal microscope optically sections the cornea to noninvasively obtain structural information of the different corneal layers.\n\nUses in Ophthalmology\n\nThe high level of detail available may be helpful in the detection of corneal microorganisms such as Acanthamoeba and fungi. It may also permit visualization of noninfectious changes such as those seen in corneal dystrophies, iridocorneal endothelial syndrome, corneal neuropathies, and epithelial downgrowth. It is excellent for imaging the corneal endothelium and obtaining endothelial cell density measurements.\n\n"}, {"id": "14.15", "chapter_num": "14", "chapter": "Diagnostics", "name": "Corneal Topography and Tomography", "raw": "14.15 Corneal Topography and Tomography\n\nDescription\n\nStandard keratometry measures the radius of corneal curvature and then converts the radius into dioptric corneal power. Computerized corneal topography is performed using various methods, including Placido disc analysis and rasterstereography. These techniques project an image onto the cornea, most commonly a series of concentric rings, and analyze the reflection to determine corneal curvature. They can provide information on anterior corneal power and regularity. Simulated keratometry readings can be generated and the results can be represented in graphical formats, such as a variety of color maps.\n\nCorneal tomography, the computerized reconstruction of multiple images of cornea, can give detailed information about the anterior and posterior corneal curvatures as well as corneal thickness. These techniques include scanning slit, rotating Scheimpflug photography, and anterior segment OCT-based systems. Scanning slit and rotating Scheimpflug imaging are particularly helpful in imaging posterior corneal elevation. Rotating Scheimpflug photography and anterior segment OCT can image corneal and anterior segment anatomy.\n\nUses in Ophthalmology\n\nDetecting irregular astigmatism secondary to keratoconus, pellucid marginal degeneration, corneal surgery, corneal trauma, and contact lens warpage; evaluating depth of opacities in inherited corneal dystrophies and corneal scars from inflammatory or infectious etiologies. Has the ability to image normal and abnormal corneal and anterior segment structures. It may be helpful in identifying the cause of decreased vision in patients with no known cause. It is useful for refractive surgical screening and imaging the postkeratorefractive cornea. Serial imaging is critical in the evaluation of progression of corneal ectasias.\n\nAppendices\n\nA.1 Dilating Drops\n\nMYDRIATIC AND CYCLOPLEGIC AGENTS\n\nThe usual regimen for a dilated examination is:\n\n- Adults: Phenylephrine, 2.5% and tropicamide, 1%. Repeat these drops in 15 to 30 minutes if the eye is not dilated.\n- Children (>1-year-old) and full-term infants (consider any two-agent combination from the following): Phenylephrine, 2.5%; tropicamide, 1%; and cyclopentolate, 1% to 2%. Consider repeating the drops in 30 minutes if the eye is not dilated.\n- Preterm infants and neonates (consider any two-agent combination from the following): Phenylephrine, 1%; tropicamide, 1%; and cyclopentolate, 0.2% to 0.5%. Consider repeating the drops in 30 to 45 minutes if the eye is not dilated.\nNOTE:\n\n- Dilating drops are contraindicated in most types of angle-closure glaucoma and in eyes with severely narrow anterior chamber angles.\n- Dilating drops tend to be less effective at the same concentration in darkly pigmented eyes.\n- Involve the patient in the decision-making process and discuss potential side effects with the patient and consider making notes about the discussion.\n\nA.2 Tetanus Prophylaxis\n\nA.3 Cover/Uncover and Alternate Cover Tests\n\nCOVER/UNCOVER TEST\n\nThe primary purpose is to detect a tropia (a deviation when both eyes are open) and/or a phoria (a latent deviation that manifests when binocular fusion is disrupted). Ideally performed with best correction, as the patient must have adequate vision to fixate on a target.\n\nRequirements\n\nFull range of ocular motility, vision adequate to see the target of fixation, foveal fixation in each eye, and patient cooperation. This test should be performed before the alternate"}];
const PHARM      = {"classes": [{"id": "antibiotics", "name": "Antibiotics", "icon": "⚔", "color": "#06d6a0", "clinical": "First-line agents for bacterial conjunctivitis, keratitis, and perioperative prophylaxis. Match coverage to organism and presentation; avoid unnecessary broad coverage.", "key_warnings": ["Ciprofloxacin can precipitate white corneal deposits — may mimic infiltrate progression", "Tobramycin/gentamicin: epithelial toxicity with prolonged or frequent dosing", "Fluoroquinolones: increasing staph resistance with older generations (cipro, ofloxacin)", "Doxycycline: contraindicated in pregnancy (Category D) and children <8 years"], "drugs": [{"brand": "Vigamox", "generic": "moxifloxacin 0.5%", "dosing": "TID", "form": "drops", "ages": ">1yr", "pregnancy": "C", "mechanism": "Fluoroquinolone", "notes": "Preservative-free; best gram-positive coverage; 1st choice for CL-related and periop"}, {"brand": "Zymaxid", "generic": "gatifloxacin 0.5%", "dosing": "q2h–QID", "form": "drops", "ages": ">1yr", "pregnancy": "C", "mechanism": "Fluoroquinolone", "notes": "4th-gen; broad spectrum; used perioperatively"}, {"brand": "Besivance", "generic": "besifloxacin 0.6%", "dosing": "TID", "form": "drops", "ages": ">1yr", "pregnancy": "C", "mechanism": "Fluoroquinolone", "notes": "DuraSite vehicle; extended contact time; ophthalmic-only FQ"}, {"brand": "Ciloxan", "generic": "ciprofloxacin 0.3%", "dosing": "QID–q15min", "form": "drops/ung", "ages": ">1yr", "pregnancy": "C", "mechanism": "Fluoroquinolone", "notes": "Strong Pseudomonas coverage; may leave corneal precipitates; generic widely available"}, {"brand": "Ocuflox", "generic": "ofloxacin 0.3%", "dosing": "q2h–QID", "form": "drops", "ages": ">1yr", "pregnancy": "C", "mechanism": "Fluoroquinolone", "notes": "Cost-effective; reduced gram+ coverage vs newer FQs"}, {"brand": "Polytrim", "generic": "trimethoprim 0.1% / polymyxin B", "dosing": "q3h", "form": "drops", "ages": ">2mo", "pregnancy": "C", "mechanism": "Sulfonam ithin weeks; highest risk with difluprednate and prednisolone acetate", "Posterior subcapsular cataract (PSC): dose-dependent with chronic use", "DO NOT use in HSV epithelial keratitis — can convert dendrite to geographic ulcer", "Prednisolone acetate MUST be vigorously shaken — it is a suspension", "Steroid response risk: POAG, family hx of glaucoma, high myopia, DM, connective tissue disease"], "drugs": [{"brand": "Durezol", "generic": "difluprednate 0.05%", "dosing": "QID, taper", "form": "emulsion", "ages": "Not established", "pregnancy": "C", "mechanism": "Difluorinated corticosteroid", "notes": "Highest potency; no shaking needed (emulsion); HIGH IOP risk; uveitis and severe post-op inflammation"}, {"brand": "Pred Forte", "generic": "prednisolone acetate 1%", "dosing": "BID–QID, taper", "form": "susp (SHAKE!)", "ages": ">1mo", "pregnancy": "C", "mechanism": "Ketone-based corticosteroid", "notes": "Workhorse for anterior uveitis; must shake vigorously; penetrates intact cornea well (acetate base)"}, {"brand": "Maxidex", "generic": "dexamethasone 0.1%", "dosing": "QID", "form": "drops", "ages": "NA", "pregnancy": "C", "mechanism": "Ketone-based corticosteroid", "notes": "Very potent; high IOP risk; good AC penetration; less commonly first-line"}, {"brand": "Lotemax", "generic": "loteprednol 0.5%", "dosing": "QID", "form": "drops/gel/ung", "ages": "Not established", "pregnancy": "C", "mechanism": "Ester-based 'soft steroid'", "notes": "Retrometabolic design → low IOP risk; for steroid responders, longer courses, step-down tapers"}, {"brand": "Alrex", "generic": "loteprednol 0.2%", "dosing": "QID", "form": "drops", "ages": "Not established", "pregnancy": "C", "mechanism": "Ester-based corticosteroid", "notes": "Lower concentration — use for allergic conjunctivitis and surface inflammation only"}, {"brand": "FML", "generic": "fluorometholone 0.1%", "dosing": "BID–QID", "form": "drops/ung", "ages": ">2yr", "pregnancy": "C", "mechanism": "Ketone-based corticosteroid", "notes": "Poor corneal penetration — suitable for surface disease ONLY (allergy, episcleritis); low IOP risk"}, {"brand": "Inveltys", "generic": "loteprednol 1%", "dosing": "BID×14d", "form": "drops", "ages": "Not established", "pregnancy": "C", "mechanism": "Ester-based corticosteroid", "notes": "High-concentration loteprednol for post-cataract inflammation; twice-daily convenience"}]}, {"id": "antivirals", "name": "Antivirals", "icon": "🦠", "color": "#ff6b6b", "clinical": "HSV vs VZV determines route and approach. HSV epithelial = topical or oral antiviral; stromal/endothelial/uveitic = oral antiviral + topical steroid (with coverage). HZO = systemic antiviral ONLY; start within 72h of rash onset.", "key_warnings": ["NEVER use topical steroids in active HSV epithelial keratitis (dendritic/geographic ulcers)", "Trifluridine: max 10–14 days — epithelial toxicity mimics metaherpetic disease", "Oral antivirals need renal dose adjustment (acyclovir, valacyclovir, famciclovir are renally cleared)", "HEDS II: oral acyclovir 400mg BID ×12mo reduces HSV ocular recurrence ~45%", "Pre-surgical prophylaxis essential if any hx of herpetic eye disease"], "drugs": [{"brand": "Zirgan", "generic": "ganciclovir 0.15% gel", "dosing": "5×/d → TID×7d", "form": "gel", "ages": ">2yr", "pregnancy": "C", "mechanism": "DNA synthesis inhibition (guanosine analogue)", "notes": "Preferred topical for HSV epithelial keratitis; better tolerated than trifluridine; less frequent dosing"}, {"brand": "Viroptic", "generic": "trifluridine 1%", "dosing": "q2h×48h, then QID", "form": "drops", "ages": ">6yr", "pregnancy": "C", "mechanism": "DNA synthesis inhibition", "notes": "Alternative when Zirgan unavailable; max 14 days; HIGH epithelial toxicity with prolonged use"}, {"brand": "Zovirax", "generic": "acyclovir 400–800mg", "dosing": "5×/d PO (HSV); 5×/d PO (HZO)", "form": "oral", "ages": ">2yr", "pregnancy": "B", "mechanism": "Inhibits viral DNA polymerase", "notes": "HEDS backbone agent; prophylaxis 400mg BID ×12mo; renal adjustment required"}, {"brand": "Valtrex", "generic": "valacyclovir 500mg–1g", "dosing": "TID PO (HSV); TID PO (HZO)", "form": "oral", "ages": ">12yr", "pregnancy": "B", "mechanism": "Guanine analogue (prodrug of acyclovir)", "notes": "More convenient dosing than acyclovir; prophylaxis 500mg QD; renal adjustment required"}, {"brand": "Famvir", "generic": "famciclovir 250–500mg", "dosing": "TID PO", "form": "oral", "ages": "NA", "pregnancy": "B", "mechanism": "Guanine analogue (prodrug of penciclovir)", "notes": "Simple TID dosing; good for HZO; renal adjustment required"}]}, {"id": "glaucoma", "name": "Glaucoma", "icon": "👁", "color": "#00b4d8", "clinical": "Start with a target IOP (typically 20–30% reduction from baseline). Prostaglandin analogs are first-line for most POAG. Add second mechanism stepwise. Monitor for BAK ocular surface toxicity with multi-drop regimens. Consider SLT as first-line alternative.", "key_warnings": ["Beta blockers (timolol): AVOID in asthma, COPD, bradycardia, heart block", "Brimonidine (alpha-2 agonist): AVOID in young children — CNS depression risk", "CAIs (dorzolamide, brinzolamide): check sulfonamide allergy; metallic taste", "Prostaglandin-associated periorbitopathy (PAP): iris darkening, lash growth, orbital fat atrophy — counsel early especially if unilateral", "BAK toxicity: chronic multi-drop regimens damage corneal/conjunctival epithelium; can impair bleb survival", "Netarsudil (Rhopressa): conjunctival hyperemia common; cornea verticillata — reversible on D/C", "Omidenepag (Omlonti): macular edema risk in pseudophakic with disrupted posterior capsule"], "drugs": [{"brand": "Xalatan", "generic": "latanoprost 0.005%", "dosing": "QHS", "form": "drops", "ages": "NA", "pregnancy": "C", "mechanism": "Prostaglandin analogue → ↑ uveoscleral outflow", "notes": "Most commonly used PGA; 25–33% IOP reduction; once-nightly; generic widely available"}, {"brand": "Travatan Z", "generic": "travoprost 0.004%", "dosing": "QHS", "form": "drops", "ages": ">16yr", "pregnancy": "C", "mechanism": "Prostaglandin analogue → ↑ uveoscleral outflow", "notes": "Uses sofZia preservative instead of BAK; good for surface-sensitive patients"}, {"brand": "Lumigan", "generic": "bimatoprost 0.01/0.03%", "dosing": "QHS", "form": "drops", "ages": ">16yr", "pregnancy": "C", "mechanism": "Prostaglandin analogue → ↑ outflow", "notes": "Hypotrichosis side effect (eyelash growth); the 0.03% was original formulation"}, {"brand": "Zioptan", "generic": "tafluprost 0.0015%", "dosing": "QHS", "form": "unit-dose", "ages": "Not recommended", "pregnancy": "C", "mechanism": "Prostaglandin analogue → ↑ outflow", "notes": "Only preservative-free PGA; ideal for severe surface disease or BAK intolerance"}, {"brand": "Vyzulta", "generic": "latanoprostene bunod 0.024%", "dosing": "QHS", "form": "drops", "ages": ">16yr", "pregnancy": "NA", "mechanism": "PGA + nitric oxide donor → ↑ trabecular + uveoscleral outflow", "notes": "Dual mechanism; may lower IOP more than standard PGAs"}, {"brand": "Timoptic", "generic": "timolol 0.25/0.5%", "dosing": "BID", "form": "drops", "ages": ">2yr", "pregnancy": "C", "mechanism": "β-blocker → ↓ aqueous production", "notes": "AVOID: asthma, COPD, bradycardia, heart block; gel-forming solution for once-daily dosing"}, {"brand": "Alphagan P", "generic": "brimonidine 0.1/0.15%", "dosing": "TID", "form": "drops", "ages": ">2yr", "pregnancy": "B", "mechanism": "α-2 agonist → ↓ aqueous production + ↑ outflow", "notes": "AVOID in young children (CNS depression); ~15–25% allergic conjunctivitis with chronic use"}, {"brand": "Azopt", "generic": "brinzolamide 1%", "dosing": "TID", "form": "drops", "ages": "NA", "pregnancy": "C", "mechanism": "Carbonic anhydrase inhibitor → ↓ aqueous production", "notes": "Check sulfonamide allergy; metallic taste; suspension — shake"}, {"brand": "Trusopt", "generic": "dorzolamide 2%", "dosing": "BID–TID", "form": "drops", "ages": ">2yr", "pregnancy": "C", "mechanism": "Carbonic anhydrase inhibitor → ↓ aqueous production", "notes": "Check sulfonamide allergy; metallic taste"}, {"brand": "Rhopressa", "generic": "netarsudil 0.02%", "dosing": "QHS", "form": "drops", "ages": "NA", "pregnancy": "NA", "mechanism": "ROCK inhibitor → ↑ trabecular outflow + ↓ episcleral venous pressure", "notes": "Unique dual mechanism; conjunctival hyperemia common; cornea verticillata (reversible)"}, {"brand": "Diamox", "generic": "acetazolamide 500mg SR", "dosing": "BID PO", "form": "oral", "ages": ">12yr", "pregnancy": "C", "mechanism": "Carbonic anhydrase inhibitor → ↓ aqueous production", "notes": "Oral CAI for acute IOP control; electrolyte monitoring; sulfonamide allergy check; K+ supplements"}, {"brand": "Cosopt", "generic": "dorzolamide 2% / timolol 0.5%", "dosing": "BID", "form": "drops", "ages": ">2yr", "pregnancy": "C", "mechanism": "CAI + β-blocker → ↓ aqueous production", "notes": "Fixed combination; reduces bottle count and preservative exposure"}, {"brand": "Combigan", "generic": "brimonidine 0.2% / timolol 0.5%", "dosing": "BID", "form": "drops", "ages": ">2yr", "pregnancy": "C", "mechanism": "α-2 agonist + β-blocker → ↓ aqueous production", "notes": "Fixed combination; all β-blocker and brimonidine contraindications apply"}, {"brand": "Simbrinza", "generic": "brinzolamide 1% / brimonidine 0.2%", "dosing": "TID", "form": "drops", "ages": ">2yr", "pregnancy": "C", "mechanism": "CAI + α-2 agonist → ↓ aqueous production", "notes": "Beta-blocker free fixed combo; useful when timolol contraindicated"}, {"brand": "Rocklatan", "generic": "netarsudil 0.02% / latanoprost 0.005%", "dosing": "QHS", "form": "drops", "ages": "NA", "pregnancy": "NA", "mechanism": "ROCK inhibitor + PGA → ↑ trabecular + uveoscleral outflow", "notes": "Most comprehensive mechanism coverage in one drop; once-nightly"}]}, {"id": "dry_eye", "name": "Dry Eye", "icon": "💧", "color": "#74b9ff", "clinical": "Identify dominant mechanism first (aqueous deficiency vs evaporative/MGD vs mixed). Immunomodulators are backbone for moderate–severe DED. Counsel 3–6 months for cyclosporine efficacy. Xiidra may work faster (2–4 weeks). Consider steroid induction bridge when starting long-term therapy.", "key_warnings": ["Cyclosporine (Restasis/Cequa): burning on instillation common early — improves as surface heals; 3–6 months for full effect", "Xiidra (lifitegrast): dysgeusia (altered taste) — common side effect", "Tyrvaya (varenicline nasal spray): sneezing is most common side effect", "Miebo: do not instill over contact lenses", "Punctal plugs: control inflammation BEFORE plugging — retaining inflammatory tears worsens disease", "Sjögren workup: severe aqueous deficiency + dry mouth/joint pain/fatigue → anti-SSA/Ro, anti-SSB/La, ANA, RF"], "drugs": [{"brand": "Restasis", "generic": "cyclosporine 0.05%", "dosing": "BID", "form": "unit-dose vials", "ages": ">16yr", "pregnancy": "C", "mechanism": "Calcineurin inhibitor → ↓ T-cell activation and cytokine release", "notes": "Original immunomodulator; 3–6 months for effect; burning common initially"}, {"brand": "Cequa", "generic": "cyclosporine 0.09%", "dosing": "BID", "form": "unit-dose vials", "ages": ">18yr", "pregnancy": "C", "mechanism": "Calcineurin inhibitor (nanomicellar delivery)", "notes": "Higher concentration; nanomicellar technology for better corneal penetration"}, {"brand": "Vevye", "generic": "cyclosporine 0.1%", "dosing": "BID", "form": "unit-dose vials", "ages": ">18yr", "pregnancy": "NA", "mechanism": "Calcineurin inhibitor (water-free vehicle)", "notes": "Water-free, preservative-free; may improve comfort and bioavailability"}, {"brand": "Xiidra", "generic": "lifitegrast 5%", "dosing": "BID", "form": "unit-dose vials", "ages": ">17yr", "pregnancy": "NA", "mechanism": "LFA-1 antagonist → blocks T-cell adhesion and activation", "notes": "Different mechanism than cyclosporine; effect may appear in 2–4 weeks; dysgeusia common"}, {"brand": "Tyrvaya", "generic": "varenicline 0.03mg // ─── TAB SWITCHING ─────────────────────────────────────────────────────────
function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('search-input').value = '';
  searchQ = '';
  activeId = null;

  const fb = document.getElementById('filter-bar');
  const es = document.getElementById('empty-state');
  const pv = document.getElementById('pharm-view');
  const cv = document.getElementById('cl-view');

  es.style.display = 'none';
  pv.style.display = 'none';
  cv.style.display = 'none';

  if (tab === 'conditions') {
    fb.style.display = 'flex';
    buildConditionFilters();
    activeFilter = 'ALL';
    renderList();
    es.style.display = 'flex';
  } else if (tab === 'pharm') {
    fb.style.display = 'flex';
    buildPharmFilters();
    activeFilter = 'ALL';
    renderList();
    renderPharm('ALL');
    pv.style.display = 'block';
  } else if (tab === 'contacts') {
    fb.style.display = 'none';
    document.getElementById('list-panel').innerHTML = '';
    renderCL();
    cv.style.display = 'block';
  }
}

// ─── CONDITION FILTERS ─────────────────────────────────────────────────────
function buildConditionFilters() {
  const chapters = ['ALL', ...new Set(CONDITIONS.map(c => c.chapter))].sort((a,b)=>a==='ALL'?-1:b==='ALL'?1:a.localeCompare(b));
  const fb = document.getElementById('filter-bar');
  fb.innerHTML = '';
  chapters.forEach(ch => {
    const btn = document.createElement('button');
    btn.className = 'chip' + (ch === 'ALL' ? ' active' : '');
    btn.dataset.f = ch;
    btn.textContent = ch;
    btn.addEventListener('click', () => {
      document.querySelectorAll('#filter-bar .chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = ch;
      activeId = null;
      renderList();
      document.getElementById('empty-state').style.display = 'flex';
    });
    fb.appendChild(btn);
  });
}

function buildPharmFilters() {
  const fb = document.getElementById('filter-bar');
  fb.innerHTML = '';
  const cats = ['ALL', ...PHARM.classes.map(c => c.name)];
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'chip' + (cat === 'ALL' ? ' active' : '');
    btn.dataset.f = cat;
    btn.textContent = cat;
    btn.addEventListener('click', () => {
      document.querySelectorAll('#filter-bar .chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = cat;
      renderList();
      renderPharm(cat);
    });
    fb.appendChild(btn);
  });
}

// ─── SEARCH ───────────────────────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input', e => {
  searchQ = e.target.value.toLowerCase();
  renderList();
  if (currentTab === 'pharm') renderPharm(activeFilter);
});

// ─── RENDER LIST ──────────────────────────────────────────────────────────
function renderList() {
  const panel = document.getElementById('list-panel');
  panel.innerHTML = '';

  if (currentTab === 'conditions') {
    const filtered = CONDITIONS.filter(c => {
      const chOk = activeFilter === 'ALL' || c.chapter === activeFilter;
      const srOk = !searchQ || c.name.toLowerCase().includes(searchQ) || c.id.includes(searchQ) || c.chapter.toLowerCase().includes(searchQ);
      return chOk && srOk;
    });
    if (!filtered.length) { panel.innerHTML = '<div class="no-results">No matches</div>'; return; }
    filtered.forEach(c => {
      const div = document.createElement('div');
      div.className = 'list-item' + (c.id === activeId ? ' active' : '');
      const done = !!(cache[c.id]?.clinical);
      div.innerHTML = `<div class="li-top"><div class="li-id">${c.id}</div><div class="li-dot ${done?'done':''}"></div></div><div class="li-name">${c.name}</div><div class="li-sub">${c.chapter}</div>`;
      div.addEventListener('click', () => selectCondition(c.id));
      panel.appendChild(div);
    });
  } else if (currentTab === 'pharm') {
    PHARM.classes.forEach(cls => {
      if (activeFilter !== 'ALL' && cls.name !== activeFilter) return;
      if (searchQ && !cls.name.toLowerCase().includes(searchQ) && !cls.drugs.some(d => d.brand.toLowerCase().includes(searchQ) || d.generic.toLowerCase().includes(searchQ))) return;
      const div = document.createElement('div');
      div.className = 'list-item' + (cls.id === activeId ? ' active' : '');
      div.innerHTML = `<div class="li-top"><div class="li-id" style="font-size:14px">${cls.icon}</div></div><div class="li-name">${cls.name}</div><div class="li-sub">${cls.drugs.length} medications</div>`;
      div.addEventListener('click', () => {
        activeId = cls.id;
        renderList();
        renderPharm(cls.name);
        document.querySelectorAll('#filter-bar .chip').forEach(b => { if(b.dataset.f === cls.name){b.classList.add('active');} else b.classList.remove('active'); });
        activeFilter = cls.name;
      });
      panel.appendChild(div);
    });
  }
}

    </div>
    <div class="photo-strip" id="ps-${id}">${[0,1,2].map(()=>'<div class="photo-skeleton"><div class="spinner" style="width:18px;height:18px;border-width:2px"></div></div>').join('')}</div>
    <div class="cards-grid"><div class="loading-wrap"><div class="spinner"></div><div class="loading-txt">Distilling clinical content...</div></div></div>
  </div>`;

  const [clinRes, imgRes] = await Promise.allSettled([fetchClinical(cond), fetchImages(cond)]);
  const clinical = clinRes.status === 'fulfilled' ? clinRes.value : null;
  const images   = imgRes.status  === 'fulfilled' ? imgRes.value  : [];

  if (!cache[id]) cache[id] = {};
  if (clinical) cache[id].clinical = clinical;
  cache[id].images = images;

  if (activeId === id) {
    renderConditionFull(cond, cache[id]);
    renderList();
  }
}

async function fetchClinical(cond) {
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-6', max_tokens:1000,
      system:DISTILL_SYS,
      messages:[{role:'user',content:cond.raw}]
    })
  });
  const d = await r.json();
  let t = d.content[0].text.trim();
  if (t.startsWith('```')) t = t.replace(/^```[a-z]*\n?/,'').replace(/```$/,'').trim();
  return JSON.parse(t);
}

async function fetchImages(cond) {
  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6', max_tokens:1000,
        system:IMG_SYS,
        messages:[{role:'user',content:`Find clinical photographs for: ${cond.name} (${cond.chapter} ophthalmology)`}],
        tools:[{type:'web_search_20250305',name:'web_search'}]
      })
    });
    const d = await r.json();
    const txt = d.content.filter(b=>b.type==='text').pop()?.text || '';
    let t = txt.trim();
    if (t.startsWith('```')) t = t.replace(/^```[a-z]*\n?/,'').replace(/```$/,'').trim();
    return JSON.parse(t).images || [];
  } catch { return []; }
}

function renderConditionFull(cond, cached) {
  const clinical = cached.clinical || {};
  const images   = cached.images   || [];

  const photos = images.length
    ? images.map(img=>`<div class="photo-frame"><img src="${img.url}" alt="${cond.name}" onerror="this.parentElement.style.display='none'" loading="lazy"><div class="photo-cap">${img.caption||''}</div></div>`).join('')
    : '<span style="font-family:var(--mono);font-size:10px;color:var(--text3)">No images available</span>';

  const rels = (clinical.relationships||[]).map(r=>`<li>${r}</li>`).join('');
  const rests = (clinical.results||[]).map(r=>`<li>${r}</li>`).join('');

  document.getElementById('detail-panel').innerHTML = `<div class="dp-inner">
    <div class="cond-header">
      <div class="cond-id">${cond.id}</div>
      <div class="cond-name">${cond.name}</div>
      <span class="chapter-tag">${cond.chapter}</span>
    </div>
    <div class="photo-strip">${photos}</div>
    <div class="cards-grid">
      <div class="card def fw"><div class="card-label">Definition</div><div class="card-text">${clinical.definition||'—'}</div></div>
      <div class="card mech fw"><div class="card-label">Mechanism</div><div class="card-text">${clinical.mechanism||'—'}</div></div>
      <div class="card rel"><div class="card-label">Relationships</div><ul class="card-list">${rels||'<li style="color:var(--text3)">None extracted</li>'}</ul></div>
      <div class="card res"><div class="card-label">Results</div><ul class="card-list">${rests||'<li style="color:var(--text3)">None extracted</li>'}</ul></div>
    </div>
  </div>`;
}

// ─── RENDER PHARM ─────────────────────────────────────────────────────────
function renderPharm(filter) {
  const pv = document.getElementById('pharm-view');
  let classes = PHARM.classes;
  if (filter !== 'ALL') classes = classes.filter(c => c.name === filter);
  if (searchQ) classes = classes.filter(c =>
    c.name.toLowerCase().includes(searchQ) ||
    c.drugs.some(d => d.brand.toLowerCase().includes(searchQ) || d.generic.toLowerCase().includes(searchQ) || d.mechanism.toLowerCase().includes(searchQ))
  );

  pv.innerHTML = `<div class="pharm-wrap"><div class="section-title">Ophthalmic Pharmacology · Source: ODReference.com</div>` +
    classes.map(cls => {
      let drugs = cls.drugs;
      if (searchQ) drugs = drugs.filter(d => d.brand.toLowerCase().includes(searchQ) || d.generic.toLowerCase().includes(searchQ) || d.mechanism.toLowerCase().includes(searchQ));
      return `<div class="drug-class-card">
        <div class="dc-header" onclick="toggleClass('dc-${cls.id}')">
          <span class="dc-icon">${cls.icon}</span>
          <span class="dc-name" style="color:${cls.color}">${cls.name}</span>
          <span class="dc-count">${drugs.length} drugs</span>
          <span class="dc-chevron ${filter!=='ALL'?'open':''}" id="chev-${cls.id}">▼</span>
        </div>
        <div class="dc-body ${filter!=='ALL'?'open':''}" id="dc-${cls.id}">
          <div class="dc-clinical">${cls.clinical}</div>
          <div class="dc-warnings">
            <div class="dc-warnings-title">⚠ Key Warnings & Contraindications</div>
            <ul>${cls.key_warnings.map(w=>`<li>${w}</li>`).join('')}</ul>
          </div>
          <table class="drug-table">
            <thead><tr>
              <th>Brand</th><th>Generic / Concentration</th><th>Dosing</th>
              <th>Ages</th><th>Preg</th><th>Mechanism</th><th>Clinical Notes</th>
            </tr></thead>
            <tbody>
            ${drugs.map(d=>`<tr>
              <td><div class="drug-brand">${d.brand}</div><div class="drug-generic">${d.form}</div></td>
              <td><div class="drug-generic">${d.generic}</div></td>
              <td style="white-space:nowrap;font-size:11px">${d.dosing}</td>
              <td style="font-size:11px;white-space:nowrap">${d.ages}</td>
              <td><span class="preg-${d.pregnancy.toLowerCase()}" style="font-family:var(--mono);font-size:10px;font-weight:700">${d.pregnancy}</span></td>
              <td><div class="drug-mech">${d.mechanism}</div></td>
              <td><div class="drug-notes">${d.notes}</div></td>
            </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
    }).join('') + '</div>';
}

function toggleClass(id) {
  const body = document.getElementById(id);
  const chev = document.getElementById('chev-' + id.replace('dc-',''));
  body?.classList.toggle('open');
  chev?.classList.toggle('open');
}

function renderModalitySection(mod) {
  const dkClass = dk => dk >= 120 ? 'dk-hi' : dk >= 70 ? 'dk-mid' : 'dk-lo';
  let html = `<div class="info-block"><h3>${mod.name}</h3><p>${mod.summary}</p></div>`;
  html += `<div class="subsec-label">Sphere Lenses</div>
    <table class="lens-table">
      <thead><tr><th>Brand</th><th>Material</th><th>Dk</th><th>BC</th><th>Dia</th><th>Sphere Range</th><th>Notes</th></tr></thead>
      <tbody>
        ${mod.sphere_lenses.map(l=>`<tr>
          <td style="font-weight:600;white-space:nowrap">${l.brand}</td>
          <td style="font-size:10px;color:var(--text2)">${l.material}</td>
          <td><span class="dk-badge ${dkClass(l.dk)}">${l.dk}</span></td>
          <td style="font-family:var(--mono);font-size:10px">${l.bc}</td>
          <td style="font-family:var(--mono);font-size:10px">${l.dia}</td>
          <td style="font-size:11px;white-space:nowrap">${l.sph}</td>
          <td style="font-size:11px;color:var(--text2)">${l.notes}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
  if (mod.toric_key?.length) {
    html += `<div class="subsec-label">Toric Options</div><div class="tag-list">${mod.toric_key.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`;
  }
  if (mod.multifocal_key?.length) {
    html += `<div class="subsec-label">Multifocal Options</div><div class="tag-list">${mod.multifocal_key.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`;
  }
  if (mod.mf_toric_key?.length) {
    html += `<div class="subsec-label">Multifocal Toric Options</div><div class="tag-list">${mod.mf_toric_key.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`;
  }
  return html;
}

function switchCLTab(id, btn) {
  document.querySelectorAll('.cl-tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.cl-section').forEach(s=>s.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('cl-'+id)?.classList.add('active');
}

buildConditionFilters();
