ris nodules (e.g., sarcoidosis, syphilis, TB), iris atrophy (e.g., herpetic, fourth-generation fluoroquinolones), iris heterochromia (e.g., FHIC), iris synechiae (especially HLA-B27, sarcoidosis), band keratopathy (especially JIA in younger patients, any chronic uveitis in older patients), uveitis in a “quiet eye” (consider JIA, FHIC, and masquerade syndromes), and CME (see Figure 12.1.1).\n\nFigure 12.1.1 Anterior uveitis with posterior synechiae. \n\nDiagnostic Categories\n\n- Nongranulomatous anterior uveitis (NGAU)\n- CMV-associated\n- FHIC\n- HLA-B27\n- HSV/VZV-associated\n- Posner–Schlossman syndrome\n- Prolonged undifferentiated postoperative pseudophakic iridocyclitis (PUPPI)\n- Sarcoidosis\n- Syphilis\n- Traumatic iritis\n- Uveitis–glaucoma–hyphema (UGH) syndrome\n- Granulomatous anterior uveitis (GAU)\n- Brimonidine-associated\n- Epstein–Barr virus (EBV)-associated\n- HSV/VZV-associated\n- Phacogenic anaphylaxis\n- Sarcoidosis\n- Syphilis\n- TB\n- Bilateral anterior uveitis\n- Behçet disease\n- HLA-B27 (typically alter"}, {"id": "12.2", "chapter_num": "12", "chapter": "Uveitis", "name": "Intermediate Uveitis", "raw": "12.2 Intermediate Uveitis\n\nSymptoms\n\nPainless floaters and blurred vision. Minimal photophobia or complaints of external inflammation (e.g., red eye). Most often is bilateral (but can be unilateral or very asymmetric) and most frequently affects patients aged 15 to 40 years.\n\nSigns\n\nCritical. Vitreous cells and cellular aggregates float predominantly in the inferior vitreous (“snowballs”). Younger patients may present with vitreous hemorrhage. White exudative material over the inferior ora serrata and pars plana (“snowbank”) is suggestive of pars planitis.\n\nNOTE: Snowbanking is typically located in the inferior vitreous and can often be seen only with indirect ophthalmoscopy and scleral depression.\n\nOther. Peripheral retinal vascular sheathing, peripheral neovascularization, mild AC inflammation, CME, posterior subcapsular cataract, band keratopathy, secondary glaucoma, ERM, peripheral retinal cysts, and tractional retinal detachments. Posterior synechiae in pars planitis are uncommon and, if present, usually occur early in the course of the disease. Choroidal neovascularization (CNV) is rare.\n\n(See Figure 12.2.1.)\n\nFigure 12.2.1 Clumps of snowballs in the anterior vitreous of a young boy with pars planitis. \n\nDiagnostic Categories\n\n- Bartonella\n- IBD-associated intermediate uveitis\n- JIA-associated intermediate uveitis (in children)\n- Multiple sclerosis (MS)–associated intermediate uveitis\n- Pars planitis\n- Sarcoidosis\n- Syphilis\n- TINU\n- Vitreoretinal lymphoma\nEtiology\n\n- Bartonella: Although, classically thought to cause neuroretinitis, Bartonella henselae may present as an isolated vitritis.\n- IBD-associated intermediate uveitis: More commonly associated with Crohn disease. Causes a mild moderate–intermediate uveitis with peripheral vasculitis.\n- JIA-associated intermediate uveitis: Classically causes anterior uveitis. See [12.1](c12.xhtml#s12-1), Anterior Uveitis (Iritis/Iridocyclitis).\n- MS-associated intermediate uveitis: May have a characteristic segmental venous sheathing. Demyelinating central nervous system (CNS) and optic nerve disease can precede or follow uveitis diagnosis. See [10.14](c10.xhtml#s10-14), Optic Neuritis.\n- Pars planitis: Not associated with any other systemic conditions, accounts for 20% to 40% of cases. Characteristic findings include the presence of snowballs ± snowbanks. Occurs in young men and women in early teens to young adulthood. CME is the most common cause of vision loss. Peripheral nonperfusion and subsequent neovascularization and vitreous hemorrhage may cause acute vision loss.\n- Sarcoidosis: May have associated phlebitis which classically appears as “candle wax drippings.” May also have snowballs.\n- Syphilis: See [12.10](c12.xhtml#s12-10), Syphilis.\n- TINU: More commonly presents with chronic smoldering bilateral anterior uveitis, but can present as a primary intermediate uveitis.\n- Others: For example, Whipple disease.\n- Masquerades:\n- Asteroid hyalosis: Small, white, refractile particles (calcium soaps) adherent to collagen fibers and floating in the vitreous. Typically unilateral. Usually asymptomatic and clinically insignificant. Not uncommon.\n- Amyloidosis: Retrolenticular footplate-like deposits, vitreous globules, or vitreous membranes without any signs of anterior segment inflammation. Serum protein electrophoresis and diagnostic vitrectomy can confirm the diagnosis. Rare.\n- Ocular ischemic syndrome (OIS). See [11.11](c11.xhtml#s11-11), Ocular Ischemic Syndrome/Carotid Occlusive Diseas"}, {"id": "12.3", "chapter_num": "12", "chapter": "Uveitis", "name": "Posterior Uveitis", "raw": "12.3 Posterior Uveitis\n\nSymptoms\n\nBlurred vision, floaters, scotomas, metamorphopsia, and photopsias. Pain, redness, and photophobia are often absent due to lack of AC reaction.\n\nSigns\n\nCritical. Retinal or choroidal inflammatory lesions.\n\nOther. CME, ERM, choroidal neovascular membranes, peripheral neovascularization, retinal detachment, associated retinal vasculitis (sheathing and exudates).\n\nDiagnostic Categories\n\n- Infectious\n- Viral\n- CMV retinitis\n- HSV-associated acute retinal necrosis\n- VZV-associated acute retinal necrosis\n- Progressive outer retinal necrosis (PORN)\n- Bacterial\n- Bacterial endogenous endophthalmitis\n- TB\n- Syphilis\n- Fungal\n- Candida endogenous endophthalmitis\n- Aspergillus endogenous endophthalmitis\n- Parasitic\n- Diffuse unilateral subacute neuroretinitis\n- Toxoplasmosis\n- Inflammatory\n- Sarcoidosis\n- White dot syndromes\n- Multiple evanescent white dot syndrome (MEWDS)\n- Acute zonal occult outer retinopathy (AZOOR)\n- Acute macular neuroretinopathy (AMN)\n- Acute posterior multifocal placoid pigmented epitheliopathy\n- Multifocal choroiditis (MFC)/punctate inner choroiditis\n- Serpiginous choroiditis\n- Birdshot chorioretinopathy\n- Autoimmune retinopathy\n- Neoplastic\n- Vitreoretinal lymphoma\n- Other tumors masquerading as uveitis, including choroidal melanoma, hemangioma, metastasis, choroidal lymphoma\n- Other:\n- Neuroretinitis\nEtiology\n\n- CMV retinitis: Presents as a fulminant hemorrhagic necrosis, granular retinitis, or frosted-branch angiitis with minimal intraocular inflammation. See [12.12](c12.xhtml#s12-12), Cytomegalovirus Retinitis.\n- Acute retinal necrosis (ARN). Most commonly secondary to VZV or HSV infection. Presents as large swaths of confluent retinitis that rapidly progresses and is typically associated with significant vitritis and anterior uveitis. See [12.13](c12.xhtml#s12-13), Acute Retinal Necrosis.\n- PORN: Rapidly progressive herpetic outer retinal necrosis that occurs in immunocompromised patients, especially in advanced HIV/acquired immune deficiency syndrome (AIDS), with rapid involvement of the posterior pole and/or optic nerve over several days. Due to their immunocompromised status, it lacks significant signs of intraocular inflammation.\n- Bacterial endogenous endophthalmitis: Typically presents as a panuveitis, but more indolent bacteria can present with isolated posterior choroidal, subretinal, or retinal lesions alone. Lesions tend to be clustered in the posterior pole. See [12.17](c12.xhtml#s12-17), Endogenous Bacterial Endophthalmitis.\n- TB: Most commonly bilateral multifocal, discrete, yellow lesions in the posterior pole. May be associated with optic nerve edema, vasculitis (classically a phlebitis, which may be occlusive). May present masquerading as tuberculosis serpiginous-like choroiditis.\n- Syphilis: Pleomorphic uveitis. Posterior placoid syphilis and punctate inner retinitis of syphilis are the more recognizable morphologies. See [12.10](c12.xhtml#s12-10), Syphilis.\n- Candida endogenous endophthalmitis: Early discrete drusen-like choroidal lesions progressing to yellow-white, fluffy retinal, or preretinal lesions with a propensity for invading the vitreous cavity. See [12.18](c12.xhtml#s12-18), Endogenous Fungal Endophthalmitis.\n- Aspergillus endogenous endophthalmitis: Early lesions resemble the feathered lesions of cotton-wool spots. Aspergillus has a propensity to invade the subretinal space.\n- Diffuse unilateral subacute neuroretinitis: Unilateral visual loss in children "}, {"id": "12.4", "chapter_num": "12", "chapter": "Uveitis", "name": "Panuveitis", "raw": "12.4 Panuveitis\n\nSymptoms\n\nRed, painful eye. Moderate to severe vision loss. Floaters.\n\nNOTE: Panuveitis describes a pattern of severe, diffuse inflammation of all uveal components of the eye, with no particular site of predominant inflammation. May be unilateral or bilateral.\n\nSigns\n\nCritical. AC cell and flare, vitreous cell and haze, vascular sheathing, choroidal, chorioretinal, and choroidal lesions.\n\nOther. Reactive eyelid edema, ciliary injection, KP, iris nodules, peripheral anterior synechiae, cataract, exudative retinal detachment, and papillitis.\n\nDiagnostic Categories\n\n- Infectious\n- Viral\n- HSV-associated ARN\n- VZV-associated ARN\n- Bacterial\n- Bacterial endogenous endophthalmitis\n- Tuberculosis\n- Syphilis\n- Fungal endogenous endophthalmitis\n- Parasitic\n- Toxoplasmosis\n- Toxocariasis\n- Inflammatory\n- Sarcoidosis\n- Vogt–Koyanagi–Harada (VKH) syndrome\n- Sympathetic ophthalmia\n- Phacogenic anaphylaxis\n- Behçet disease\n- Tattoo-associated uveitis\nEtiology\n\n- ARN: Most commonly secondary to VZV or HSV infection. Presents as large swaths of confluent retinitis that rapidly progresses and is typically associated with significant vitritis and anterior uveitis. Significant AC reaction may or may not be present. Vitritis is typically not severe. See [12.13](c12.xhtml#s12-13), Acute Retinal Necrosis.\n- Bacterial endogenous endophthalmitis: May have associated severe AC reaction, hypopyon, and/or fibrin. Severe vitritis. May have limited view of posterior segment. See [12.17](c12.xhtml#s12-17), Endogenous Bacterial Endophthalmitis.\n- TB: Produces varied clinical manifestations. The diagnosis is usually made by ancillary laboratory tests and response to antituberculosis therapy. Miliary TB may produce multifocal, small, yellow-white choroidal lesions. Most patients have concomitant anterior granulomatous or nongranulomatous uveitis.\n- Syphilis: Pleomorphic uveitis. May present as a nonspecific panuveitis with or without more recognizable morphologies such as posterior placoid syphilis and punctate inner retinitis. See [12.10](c12.xhtml#s12-10), Syphilis.\n- Fungal endogenous endophthalmitis: Most commonly caused by Candida or Aspergillus species. Vitritis and AC reactions are typically not as severe as bacterial etiologies. See [12.18](c12.xhtml#s12-18), Endogenous Fungal Endophthalmitis.\n- Toxoplasmosis: Typically a unilateral retinal lesion that may or may not be associated with an adjacent pigmented chorioretinal scar. Associated with a dense vitritis over an area of white retinitis creating the classic “headlight in a fog” appearance. AC reaction is variable. See [12.9](c12.xhtml#s12-9), Toxoplasmosis.\n- Toxocariasis: Almost exclusively unilateral. Three forms: (1) Panuveitis—occurs in children aged 2 to 9 years, often times asymptomatic with dense vitritis, (2) Posterior pole granuloma, occurs in children from age 6 to 14 years, (3) Peripheral retinal granuloma with secondary vitritis and tractional retinal bands, occurs in those aged 6 to 40 years. All three forms can progress to retinal detachment.\n- Sarcoidosis: Most frequent systemic disease associated with panuveitis. Key signs include granulomatous KP, iris nodules, trabecular meshwork nodules, peripheral anterior synechiae, vitritis, focal or multifocal initially creamy-appearing choroidal granulomas that progress to atrophic punched-out appearing lesions. May also be associated with optic nerve granulomas, retinal vasculitis (classically a phlebitis with “candle-wax drippings”"}, {"id": "12.5", "chapter_num": "12", "chapter": "Uveitis", "name": "Retinal Vasculitis", "raw": "12.5 Retinal Vasculitis\n\nSymptoms\n\nBlurred vision, floaters, flashes, visual field loss.\n\nSigns\n\nCritical. Disruption of the blood–retinal barrier. Manifests as retinal sheathing around vessels and/or retinal vascular leakage on IVFA. May have associated retina, choroidal, AC, or vitreous inflammation. Cotton-wool spots due to microinfarcts of the retinal nerve fiber layer. May be occlusive with signs of peripheral ischemia or neovascularization. Complications include CME, retinal neovascularization, branch retinal vein and branch retinal artery occlusions.\n\nDiagnostic Categories\n\n- Determining whether the inflammation primarily affects the retinal venules (phlebitis), arterioles (arteritis), or both (mixed vasculitis) can help create an effective differential diagnosis list.\n- See Table 12.5.1.\nTABLE 12.5.1 Differential Diagnosis for Retinal Vasculitis\n\n| Primary Arteritis | Primary Phlebitis | Mixed Vasculitis | Occlusive Vasculitis |\n| --- | --- | --- | --- |\n| HSV/VZV | CMV | Behçet disease | ANCA-associated |\n| ANCA-associated | HIV | IBD-associated | Behçet disease |\n| IRVAN | MS | Syphilis | GCA |\n| PAN | Sarcoidosis |  | HSV/VZV/CMV |\n| SLE | TB |  | Sarcoidosis SLE Susac syndrome Syphilis Tuberculosis |\n\nHSV, herpes simplex virus; VZV, varicella-zoster virus; ANCA, antineutrophil cytoplasmic antibody; IRVAN, idiopathic retinal vasculitis, aneurysms, neuroretinitis; PAN, polyarteritis nodosa; SLE, systemic lupus erythematosus; CMV, cytomegalovirus; HIV, human immunodeficiency virus; MS, multiple sclerosis; IBD, inflammatory bowel disease; GCA, giant cell arteritis; TB, tuberculosis.\n\nEtiology\n\n- HSV/VZV: Associated retinal vasculitis is most commonly seen in association with ARN syndrome (retinitis, vasculitis, and vitritis), but can occur in isolation. Most frequently is an occlusive vasculitis. See [12.13](c12.xhtml#s12-13), Acute Retinal Necrosis.\n- Antineutrophil cytoplasmic antibody (ANCA) associated:\n- Eosinophilic granulomatosis with polyangiitis (EGPA, formerly Churg–Strauss disease): ANCA-associated vasculitis featuring obstructive airway disease (asthma), nasal polyps, elevated eosinophils, and mononeuritis multiplex (e.g., foot or wrist drops).\n- Granulomatosis with polyangiitis (GPA, formerly Wegener granulomatosis): ANCA-associated vasculitis featuring nephritis, orbital inflammation, sinusitis, and pulmonary inflammation.\n- Idiopathic retinal vasculitis, aneurysms, and neuroretinitis (IRVAN): Three major criteria (retinal vasculitis, aneurysmal dilations at arterial bifurcations, and neuroretinitis) and three minor criteria (peripheral capillary nonperfusion, retinal neovascularization, and macular exudation). The etiology is unknown. Typically seen in young or middle-aged patients.\n- Polyarteritis nodosa (PAN): Multisystem medium vessel vasculitis that often presents with hypertension, renal failure, neuropathy, and rash. More common in males ages 40 to 60 years. Can be associated with hepatitis B.\n- Systemic lupus erythematosus (SLE): Typically presents with cotton-wools spots, retinal hemorrhage, and vascular occlusions. May be caused by either immune complex deposition in retinal vessels or by antiphospholipid syndrome. Multisystem disease with the most frequent manifestations including arthritis, myalgia, butterfly rash, and renal dysfunction.\n- CMV: Associated retinal vasculitis is most commonly seen in the setting of severe immunosuppression and CMV retinitis. See [12.12](c12.xhtml#s12-12), Cytomegalovirus R"}, {"id": "12.6", "chapter_num": "12", "chapter": "Uveitis", "name": "Human Leukocyte Antigen-B27", "raw": "12.6 Human Leukocyte Antigen-B27–Associated Uveitis\n\nSymptoms\n\nAcute pain, blurred vision, and photophobia. Associated systemic complaints may include lower back, or heel pain (typically worse on awakening), arthritis, oral ulcers, pain with urination, gastrointestinal complaints, and rashes.\n\nSigns\n\nCritical. Recurrent, unilateral (or alternating bilateral) NGAU.\n\nOther. Severe AC reaction with cell, flare, and fibrin. Common cause of unilateral hypopyon. Tendency to form posterior synechiae early. Ciliary flush. More common in men than women.\n\nDifferential Diagnosis\n\n- See [12.1](c12.xhtml#s12-1), Anterior Uveitis (Iritis/Iridocyclitis).\nTypes of HLA-B27 Disease\n\n- HLA-B27–associated uveitis without systemic disease.\n- Ankylosing spondylitis: Young adult men, often with lower back pain or stiffness, abnormalities on sacroiliac spine radiographs, increased erythrocyte sedimentation rate (ESR), positive HLA-B27, and negative RF (seronegative spondyloarthropathy).\n- IBD: Crohn disease and ulcerative colitis. Chronic diarrhea, bloody stool, and crampy abdominal pain. Patients who have IBD and are HLA-B27–negative may be more likely to develop sclerokeratitis or peripheral ulcerative keratitis than uveitis.\n- Reactive arthritis (Reiter syndrome): Young adult men, conjunctivitis, urethritis, polyarthritis, occasionally keratitis, increased ESR, and positive HLA-B27. May have recurrent episodes. Arthritis tends to involve the lower extremities.\n- Psoriatic arthritis: Characteristic skin findings with arthritis typically involving the extensor surfaces of upper extremities.\nNOTE: Over half of patients presenting with HLA-B27–positive acute anterior uveitis have an underlying seronegative spondyloarthropathy, and of those, over half are diagnosed only after the onset of uveitis.\n\nWorkup\n\n- HLA-B27 serologic antigen or molecular PCR testing to confirm the diagnosis.\n- Rule out other associated systemic autoimmune diseases or infectious diseases. See [12.1](c12.xhtml#s12-1), Anterior Uveitis (Iritis/Iridocyclitis).\n- Ankylosing spondylitis: Sacroiliac spine radiographs or CT scan show sclerosis and narrowing of the joint spaces; ESR often elevated but nonspecific.\n- IBD: Consult internal medicine or gastroenterology.\n- Reactive arthritis: Conjunctival and urethral swabs for chlamydia if indicated. Consult medicine or rheumatology.\n- Psoriatic arthritis: Consult rheumatology or dermatology.\nTreatment\n\nSee [12.1](c12.xhtml#s12-1), Anterior Uveitis (Iritis/Iridocyclitis). Patients with HLA-B27 uveitis often suffer multiple recurrences. For particularly severe or frequently relapsing cases, consider longer-term steroid-sparing immunomodulatory therapy, often in conjunction with rheumatology.\n\n"}, {"id": "12.7", "chapter_num": "12", "chapter": "Uveitis", "name": "Vogt", "raw": "12.7 Vogt–Koyanagi–Harada Syndrome\n\nAutoimmune disease targeted against melanocyte-containing tissues resulting in bilateral granulomatous panuveitis with skin, meningeal, and auditory-vestibular involvement.\n\nSymptoms\n\nDecreased vision, photophobia, pain, and red eyes; accompanied or preceded by a headache, stiff neck, nausea, vomiting, fever, and malaise. Hearing loss, noise causing ear pain, and tinnitus frequently occur. Typically bilateral.\n\nNOTE: Harada disease refers to isolated ocular findings without associated systemic signs of VKH syndrome.\n\nSigns\n\nDiagnostic criteria include the following:\n\n- (1) No history of ocular trauma, (2) no evidence of other disease processes, (3) bilateral anterior or panuveitis, (4) neurologic/auditory findings (usually occur before ocular disease), and (5) dermatologic findings (usually occur after ocular disease).\n- Complete VKH includes criteria 1 to 5, incomplete VKH includes criteria 1 to 3 and either 4 or 5, and probable VKH (isolated ocular disease) includes criteria 1 to 3.\nCritical\n\n- Anterior: AC flare and cells, granulomatous (mutton fat) KP, perilimbal vitiligo (e.g., depigmentation around the limbus).\n- Posterior: Bilateral serous retinal detachments with underlying choroidal thickening, vitreous cells, opacities, and optic disc edema (see Figure 12.7.1).\n- Systemic (four phases):\nFigure 12.7.1 Vogt–Koyanagi–Harada disease with multilobulated areas of subretinal fluid. \n\n- Prodromal: Loss of high-frequency hearing, tinnitus, meningismus, encephalopathy, and hypersensitivity of the skin to touch.\n- Uveitic: Acute ocular findings (see preceding bullets).\n- Convalescent: Alopecia, vitiligo, poliosis, “sunset glow” fundus (yellow-orange appearance of the fundus due to depigmentation of the RPE and choroid).\n- Chronic recurrent: Recurrence of anterior uveitis, subretinal fibrosis, neovascularization, glaucoma, and cataract.\n- IVFA: Multiple pinpoint leaking areas of hyperfluorescence at the level of the RPE (see Figure 12.7.2).\nFigure 12.7.2 Fluorescein angiogram of Vogt–Koyanagi–Harada disease with classic “starry sky” appearance. \n\nOther\n\n- Anterior: Iris nodules, peripheral anterior or posterior synechiae, hypotony, or increased IOP from the forward rotation of ciliary processes.\n- Posterior: Sunset glow fundus (mottling and atrophy of the RPE after the serous retinal detachment resolves), associated retinal vasculitis, CNV, and chorioretinal scars.\n- Systemic: Neurologic signs, including loss of consciousness, paralysis, and seizures.\nEpidemiology\n\nTypically, patients are aged 20 to 50 years, female (77%), and have pigmented skin (especially Asian, Middle Eastern, Hispanic, or Native American).\n\nDifferential Diagnosis\n\nSee Table 12.7.1 for the differential diagnosis of serous retinal detachments and [12.3](c12.xhtml#s12-3), Posterior Uveitis. In particular, consider the following:\n\nTABLE 12.7.1 Differential Diagnosis of Serous Retinal Detachments\n\n| Central serous chorioretinopathy |\n| --- |\n| Choroidal neovascularization |\n| Choroidal tumors (including metastases) |\n| Congenital optic disc pit |\n| Disseminated intravascular coagulopathy |\n| Eclampsia |\n| Hyperviscosity syndrome |\n| Hypotony |\n| Uveal effusion syndrome |\n| Malignant hypertension |\n| Nanophthalmos |\n| Posterior scleritis |\n| Posterior uveitis |\n| Retinal macroaneurysm |\n| Retinal vein occlusion |\n| Sympathetic ophthalmia |\n| Toxemia of pregnancy |\n| Vogt–Koyanagi–Harada syndrome |\n\n- Sympathetic ophthalmia: History of tr"}, {"id": "12.8", "chapter_num": "12", "chapter": "Uveitis", "name": "White Dot Syndromes", "raw": "12.8 White Dot Syndromes\n\nSymptoms\n\nBlurred vision, floaters, flashing lights, dark spot in vision.\n\nSigns\n\nCritical. Lesions can range from focal to multifocal, unilateral or bilateral, and can be retinal, chorioretinal, or choroidal in location.\n\nOther. Associated vitreous cell, macular edema, retinal vasculitis.\n\nDiagnostic Categories\n\n- White dot syndromes\n- APMPPE\n- Multiple evanescent white dot syndrome (MEWDS)\n- Birdshot chorioretinopathy\n- Multifocal choroiditis (MFC)\n- Punctate inner choroidopathy (PIC)\n- Serpiginous choroiditis\n- Inflammatory\n- Sarcoidosis\n- Infectious\n- Toxoplasmosis\n- TB\n- Syphilis\n- Neoplastic\n- Primary choroidal lymphoma\n- Metastasis\n- Amelanotic choroidal melanoma\nTypes of White Dot Syndromes\n\n- APMPPE: Acute visual loss in young adults, often after a viral illness. Multiple, creamy yellow-white or gray, plaque-like subretinal lesions in both eyes (see Figure 12.8.1). Lesions block early and stain late on IVFA. Usually spontaneously improves over weeks to months without treatment. May be associated with a cerebral vasculitis (consider MRA if the patient has a headache or other neurologic symptoms), in which case, systemic steroids are indicated.\nFigure 12.8.1 Creamy placoid lesions in a patient with acute posterior multifocal placoid pigment epitheliopathy. \n\n- MEWDS: Typically unilateral photopsias and visual loss, often after a viral illness and usually in young women. May have a shimmering scotoma. Uncommonly bilateral, sequential, or recurrent. Characterized by multiple, faint, small white lesions deep in the retina or at the level of the RPE with foveal granularity and occasionally vitreous cells. Fluorescein angiography may show a classic perifoveal “wreath-like” pattern. There is often an enlarged blind spot on formal visual field testing. Vision typically returns to normal within 6 to 8 weeks without treatment.\n- Birdshot chorioretinopathy: Usually middle-aged patients with multiple bilateral, oval, creamy-yellow spots deep to the retina, approximately 1 mm in diameter, scattered throughout the fundus but most prominent in the nasal quadrants (see Figure 12.8.2). A mild-to-moderate vitritis is typically present. Retinal vasculitis, CME, and optic nerve edema may be present. ICGA shows characteristic hypofluorescent spots. IVFA often shows retinal phlebitis and CME. Positive HLA-A29 in 95% to 100% of patients. Early systemic immunosuppression is often recommended.\nFigure 12.8.2 Deep, creamy, ovoid choroidal lesions typical of a patient with birdshot chorioretinopathy. \n\n- MFC: Visual loss in young myopic women more often than men, typically bilateral. Multiple, small, round, and pale inflammatory lesions are located at the level of the pigment epithelium and choriocapillaris. Vitritis is a characteristic feature (unlike presumed ocular histoplasmosis syndrome). The lesions can occur in the macula and midperiphery and frequently respond to oral or periocular steroids, but typically recur with tapering. Immunosuppressive therapy is often necessary. CNV occurs in about one-third of patients, so patients should return for urgent evaluation if they have decreased vision or metamorphopsia (see Figure 12.8.3).\nFigure 12.8.3 Inactive multifocal choroiditis. \n\n- PIC: Blurred vision, paracentral scotoma, and/or photopsias, usually in young myopic women. Multiple, small round yellow-white spots predominantly in posterior pole with minimal intraocular inflammation. Typically bilateral. Lesions become well-dema"}, {"id": "12.9", "chapter_num": "12", "chapter": "Uveitis", "name": "Toxoplasmosis", "raw": "12.9 Toxoplasmosis\n\nSymptoms\n\nBlurred vision and floaters. May have redness and photophobia. Pain depends on the severity of associated iridocyclitis.\n\nSigns\n\n(See Figure 12.9.1.)\n\nFigure 12.9.1 Area of active toxoplasmosis retinochoroiditis adjacent to a pigmented scar. \n\nCritical. New, unilateral “fluffy” white retinal lesion often associated with an old pigmented chorioretinal scar. There is a moderate to severe focal vitreous inflammatory reaction directly over the lesion, which may obscure the active lesion on dilated fundus examination, resulting in the “headlight-in-fog” sign. Scar may be absent in cases of newly acquired toxoplasmosis or in immunocompromised patients.\n\nOther\n\n- Anterior: Mild AC spillover may be present, with increased IOP in 10% to 20%.\n- Posterior: Vitreous debris, optic disc swelling due to peripapillary lesions often with edema extending into the retina, neuroretinitis with/without macular star, optic neuritis with significant vitritis, retinal vasculitis, rarely retinal artery or vein occlusion in the area of the inflammation. Kyrieleis plaques are periarterial exudates, which may occur near the retinitis or elsewhere in the retina; IVFA typically does not show vascular occlusion. Chorioretinal scars are occasionally found in the uninvolved eye. CME, retinal neovascularization and retinal detachment may also be present.\nNOTE: Toxoplasmosis can also develop in the deep retina (punctate outer retinal toxoplasmosis) with few to no vitreous cells present. More common in HIV-infected patients. See SPECIAL CONSIDERATION IN IMMUNOCOMPROMISED PATIENTS at the end of this section.\n\nDifferential Diagnosis\n\nSee [12.3](c12.xhtml#s12-3), Posterior Uveitis, for a complete list. The following rarely may closely simulate toxoplasmosis.\n\n- Syphilis (see [12.10](c12.xhtml#s12-10), Syphilis) and TB.\n- Toxocariasis: Usually affects children. Chorioretinal scars are not typically seen. See [12.4](c12.xhtml#s12-4), Panuveitis and [8.1](c08.xhtml#s8-1), Leukocoria.\n- ARN. See [12.13](c12.xhtml#s12-13), Acute Retinal Necrosis (see Table 12.12.1).\n- PORN. See [12.13](c12.xhtml#s12-13), Acute Retinal Necrosis (see Table 12.12.1).\nNOTE: Toxoplasmosis is the most common cause of posterior uveitis and accounts for approximately 90% of focal necrotizing retinitis. Infection can be congenital or acquired.\n\nWorkup\n\nSee [12.4](c12.xhtml#s12-4), Panuveitis, for workup recommendations when the diagnosis is in doubt.\n\n- History: risk factors include handling or eating raw meat (e.g., venison), exposure to cats or especially kittens (sources of acquired infection), and hunters who dress their own game. Inquire about risk factors for HIV in atypical cases (e.g., multifocal retinitis). Water- and air-borne outbreaks of toxoplasmosis have been reported.\n- Complete ocular examination, including an IOP check and a dilated fundus examination.\n- Focused serologic testing based on history and examination:\n- Serum anti-Toxoplasma antibody titer to indicate remote (IgG) or recent (IgM) infection (usually not necessary). IgM is found approximately 2 weeks to 6 months after initial infection, after which only IgG remains positive.\nNOTE: A negative toxoplasmosis serum antibody titer (IgG and IgM) makes the diagnosis of toxoplasmosis highly unlikely.\n\n- Treponemal test (syphilis EIA, FTA-ABS, TP-PA), followed by confirmatory nontreponemal test (RPR, VDRL). See [12.10](c12.xhtml#s12-10), Syphilis.\n- Interferon gamma releasing assay (IGRA, QuantiFERON Gold) an"}, {"id": "12.10", "chapter_num": "12", "chapter": "Uveitis", "name": "Syphilis", "raw": "12.10 Syphilis\n\nACQUIRED SYPHILIS\n\nSigns\n\nSystemic. Most patients with syphilis will never develop ocular involvement. A history of sexually transmitted disease, HIV, or high-risk sexual activity should be elucidated. Men who have sex with men are at an increased risk, but heterosexual transmission is on the rise.\n\n- Primary: Chancre (ulcerated, painless lesion), regional lymphadenopathy.\n- Secondary: Skin or mucous membrane lesions, generalized lymphadenopathy, constitutional symptoms (e.g., sore throat, fever), and symptomatic or asymptomatic meningitis.\n- Latent: No clinical manifestations.\n- Tertiary: Cardiovascular disease (e.g., aortitis), CNS disease (e.g., meningovascular disease, general paresis, and tabes dorsalis).\nOcular\n\n- Primary: A chancre may occur on the eyelid or conjunctiva, madarosis (loss of lashes or eyebrows).\n- Secondary: Uveitis (posterior and panuveitis more common than anterior), optic neuritis, chorioretinitis, serous retinal detachments, retinitis, retinal vasculitis, conjunctivitis, dacryoadenitis, dacryocystitis, episcleritis, scleritis, interstitial keratitis, and others. See Figure 12.10.1.\n- Tertiary: Optic atrophy, old chorioretinitis, interstitial keratitis, chronic uveitis, Argyll Robertson pupil (see [10.3](c10.xhtml#s10-3), Argyll Robertson Pupils), in addition to signs seen in secondary disease.\nFigure 12.10.1 Fundus photographs of the right (A) and left (B) eye showing placoid retinopathy in secondary syphilis. \n\nNOTE: Presentations strongly suggestive of syphilis include: patchy hyperemia of the iris with fleshy, pink nodules near the iris sphincter; acute posterior placoid chorioretinitis (multifocal white placoid lesions in the posterior pole); and punctate inner retinitis (superficial punctate creamy white lesions).\n\nDifferential Diagnosis\n\nSee [12.1](c12.xhtml#s12-1), Anterior Uveitis (Iritis/Iridocyclitis), [12.2](c12.xhtml#s12-2), Intermediate Uveitis, [12.3](c12.xhtml#s12-3), Posterior Uveitis, and [12.4](c12.xhtml#s12-4), Panuveitis, for anatomic location-specific differential diagnoses.\n\nWorkup\n\nSee [12.1](c12.xhtml#s12-1), Anterior Uveitis (Iritis/Iridocyclitis), [12.2](c12.xhtml#s12-2), Intermediate Uveitis, [12.3](c12.xhtml#s12-3), Posterior Uveitis, and [12.4](c12.xhtml#s12-4), Panuveitis, for anatomic location-specific uveitis workup recommendations.\n\n- Complete ophthalmic examination, including pupillary and dilated fundus examination. Palmar skin lesions are common and easily assessed in the clinic.\n- The “reverse algorithm” should be used, with treponemal testing done first to confirm the disease, and (if reactive) then nontreponemal testing is performed to monitor for treatment response. Treponemal testing with EIA, chemiluminescent immunoassays (CIA), FTA-ABS, or T. pallidum microhemagglutination assay (MHA-TP) tests are highly sensitive and specific in all but the primary stage of syphilis, during which ocular involvement is very rare. Once reactive, treponemal tests do not normalize and cannot be used to assess the patient’s response to treatment. Quantitative nontreponemal tests such as RPR or VDRL are then done to assess the activity of the infection and are then repeated periodically after treatment to confirm resolution of infection.\n- VDRL and RPR should not be used for screening as false-negative results can occur in early primary, latent, or late syphilis due to low sensitivity. False-negative results are also possible due to interference from excessively high titers "}, {"id": "12.11", "chapter_num": "12", "chapter": "Uveitis", "name": "HIV Retinopathy", "raw": "12.11 HIV Retinopathy\n\nHIV retinopathy is a noninfectious retinopathy and is the most common ocular manifestation of HIV/AIDS. About 50% to 70% of patients with AIDS have this condition.\n\nSymptoms\n\nRarely symptomatic (focal scotomata and decreased contrast).\n\nSigns\n\nCotton-wool spots (the most common manifestation), intraretinal dot-blot and flame-shaped hemorrhages, and microaneurysms. An ischemic maculopathy may occur with significant visual loss in 3% of affected patients.\n\nWorkup\n\nHIV retinopathy is a marker of low CD4+ counts. Look for concomitant opportunistic infections (see [12.12](c12.xhtml#s12-12), Cytomegalovirus Retinitis). Rule out the other causes for unexplained cotton-wool spots (see [11.5](c11.xhtml#s11-5), Cotton–Wool Spot).\n\nTreatment\n\nNo specific ocular treatment is necessary, but the retinopathy resolves with antiretroviral therapy (ART) and increased CD4+ counts.\n\nFollow-Up\n\nPatients with CD4+ counts <50 cells/mm3 should be examined every 3 to 4 months.\n\n"}, {"id": "12.12", "chapter_num": "12", "chapter": "Uveitis", "name": "Cytomegalovirus Retinitis", "raw": "12.12 Cytomegalovirus Retinitis\n\nCMV is the most frequent ocular opportunistic infection in patients with AIDS, but is 80% to 90% less common in the era of ART. CMV is almost never seen unless the CD4+ count is <100 cells/mm3. Because active retinitis is often asymptomatic, patients with CD4+ counts <100 cells/mm3 should be seen at least every 3 to 6 months. May also be seen in other immunocompromised states (e.g., leukemia and post-transplant patients). Local ocular immunosuppression (intraocular and periocular steroid injections) may precipitate CMV retinitis in otherwise healthy patients.\n\nSymptoms\n\nScotoma or decreased vision in one or both eyes, floaters, or photopsias. Pain and photophobia are uncommon. Often asymptomatic.\n\nSigns\n\nCritical\n\n- Indolent form: Peripheral granular opacities with or without hemorrhage. The absence of hemorrhage does not rule out CMV retinitis.\n- Fulminant form: Confluent areas of necrosis with prominent intraretinal hemorrhage, with perivascular infiltration along the major retinal vascular arcades. Progressive retinal atrophy may also indicate active CMV (see Figure 12.12.1).\n- Frosted branch angiitis form: Profound retinal vasculitis with severe vascular exudating affecting both the arterioles and venules.\nFigure 12.12.1 CMV retinitis. \n\nOther. Anterior uveitis with nongranulomatous, stellate KP almost always present but mild. Vitritis is usually mild. RPE atrophy and pigment clumping result once the active process resolves. Rhegmatogenous retinal detachment (RRD) occurs in approximately one-third of patients with CMV retinitis with increased risk when >25% of the retina is involved.\n\nDifferential Diagnosis\n\nThe following conditions may closely simulate CMV retinitis.\n\n- ARN. See [12.13](c12.xhtml#s12-13), Acute Retinal Necrosis (see Table 12.12.1).\n- Syphilis. See [12.10](c12.xhtml#s12-10), Syphilis.\n- HIV retinopathy. See [12.11](c12.xhtml#s12-11), HIV Retinopathy.\n- Toxoplasmosis. See [12.9](c12.xhtml#s12-9), Toxoplasmosis.\nTABLE 12.12.1 Cytomegalovirus (CMV) Retinitis Versus Acute Retinal Necrosis (ARN) Versus Progressive Outer Retinal Necrosis (PORN) Versus Toxoplasmosis\n\nWorkup\n\n- History and complete ocular examination.\n- Consider AC paracentesis or vitreous tap with viral PCR in equivocal cases. See [Appendix 13](app1.xhtml#app13), Anterior Chamber Paracentesis.\n- Consider ruling out other possible etiologies in atypical or progressive cases, See [12.3](c12.xhtml#s12-3), Posterior Uveitis.\n- Refer the patient to an internist or an infectious disease specialist for systemic evaluation and treatment.\nTreatment\n\nSee Table 12.12.2 for treatment details.\n\nTABLE 12.12.2 Therapy for CMV Retinitis\n\n- Oral therapy with valganciclovir 900 mg p.o. b.i.d. for induction (21 days), followed by 900 mg p.o. daily for maintenance. Alternatively, intravenous ganciclovir 5 mg/kg b.i.d. or foscarnet 90 mg/kg b.i.d. (adjusting for renal function) may be used, followed by oral therapy valganciclovir (900 mg p.o. b.i.d. to complete 3-week induction, then 900 mg p.o. daily). The goal of treatment is quiescent retinitis (nonprogressive areas of RPE atrophy with a stable opacified border). Patients with progression of retinitis despite induction or who have disease that threatens the macula or optic nerve head may benefit from intravitreal antiviral injections (foscarnet 2.4 mg/0.1 mL or ganciclovir 4 mg/0.1 mL), but systemic therapy is still necessary to prevent the involvement of the fellow eye.\n- Under the directio"}, {"id": "12.13", "chapter_num": "12", "chapter": "Uveitis", "name": "Acute Retinal Necrosis", "raw": "12.13 Acute Retinal Necrosis\n\nSymptoms\n\nAcute unilateral vision loss, redness, blurred vision, floaters, ocular pain, and photophobia. Affected patients are usually immunocompetent.\n\nSigns\n\n(See Figures 12.13.1 and 12.13.2.)\n\nFigure 12.13.1 The triad of retinitis, vasculitis, and vitritis in a patient with acute retinal necrosis. \n\nFigure 12.13.2 Retinal detachment in a patient with acute retinal necrosis. \n\nCritical. The American Uveitis Society criteria include one or more foci of retinal necrosis with discrete borders in the peripheral retina, rapid progression of disease in the absence of antiviral therapy, circumferential spread, evidence of occlusive vasculopathy with involvement of arterioles, and prominent inflammatory reaction in the AC and/or vitreous. If untreated, the circumferential progression of necrosis may become confluent and spread posteriorly. The macula is typically spared early in the disease course.\n\nOther. AC reaction; KP; conjunctival injection; episcleritis or scleritis; increased IOP; sheathed retinal arterioles and sometimes venules, especially in the periphery; retinal hemorrhages (minor finding); optic disc edema; delayed RRD occurs in approximately 70% of patients secondary to large irregular posterior breaks. Usually begins unilaterally but may involve the second eye in one-third of cases within weeks to months. An optic neuropathy with disc edema or pallor sometimes develops.\n\nEtiology\n\nARN is a clinical syndrome caused by the herpes virus family: most commonly VZV (older patients), less commonly HSV (younger patients), or rarely, CMV or Epstein–Barr virus (EBV).\n\nDifferential Diagnosis\n\nSee [12.3](c12.xhtml#s12-3), Posterior Uveitis.\n\n- CMV retinitis: See [12.12](c12.xhtml#s12-12), Cytomegalovirus Retinitis.\n- PORN: Rapidly progressive retinitis characterized by clear vitreous and sheet-like opacification deep to normal-looking retinal vessels, and occasional spontaneous vitreous hemorrhage. PORN is usually found in immunocompromised individuals and frequently leads to rapid bilateral blindness due either to the infection itself or to secondary retinal detachment, making prompt diagnosis and treatment essential. Unlike ARN, pain and vitritis are minimal and macular involvement occurs early.\n- Syphilis: Pleomorphic uveitis. Can present as a focal necrotizing retinitis. See [12.10](c12.xhtml#s12-10), Syphilis.\n- Toxoplasma retinochoroiditis: Primary toxoplasmosis can appear as a focal or fulminant retinitis (in an immunocompromised patient) without the classic adjacent pigmented chorioretinal scar. See [12.9](c12.xhtml#s12-9), Toxoplasmosis.\n- Behçet disease: Most common posterior manifestation is a vasculitis which may be occlusive and can have an associated focal necrotizing retinitis. See [12.5](c12.xhtml#s12-5), Retinal Vasculitis.\n- Sarcoidosis: Pleomorphic uveitis. Can present as a focal infiltrative retinitis.\n- Fungal or bacterial endophthalmitis: See [12.17](c12.xhtml#s12-17), Endogenous Bacterial Endophthalmitis and [12.18](c12.xhtml#s12-18), Endogenous Fungal Endophthalmitis.\n- Vitreoretinal lymphoma: Consider in patients >50 years of age with refractory unilateral vitritis, yellow-white subretinal infiltrates, absence of pain, or other signs of intraocular inflammation (quiet IVFA).\nWorkup\n\nSee [12.3](c12.xhtml#s12-3), Posterior Uveitis, for a nonspecific uveitis workup.\n\n- History: Risk factors for AIDS or other immunocompromised states (iatrogenic, autoimmune, malignancy, or genetic)? If yes"}, {"id": "12.14", "chapter_num": "12", "chapter": "Uveitis", "name": "Acute Postoperative Endophthalmitis", "raw": "12.14 Acute Postoperative Endophthalmitis\n\nSymptoms\n\nSudden onset of decreased vision and increasing eye pain after surgical procedure. Usually within 1 to 2 weeks of ocular surgery.\n\nSigns\n\n(See Figure 12.14.1.)\n\nFigure 12.14.1 Postoperative endophthalmitis with hypopyon. \n\nCritical. Hypopyon, fibrin, severe AC reaction, vitreous cells and haze, and decreased red reflex.\n\nOther. Eyelid edema, corneal edema, intense conjunctival injection, chemosis (all are highly variable).\n\nOrganisms\n\n- Postcataract extraction:\n- Most common: Staphylococcus epidermidis.\n- Common: Staphylococcus aureus, Streptococcal species (except Pneumococcus).\n- Less common: Gram-negative bacteria species (including Pseudomonas, Aerobacter, Proteus, Klebsiella, Bacillus, Enterobacter, Haemophilus influenzae, Escherichia coli) and anaerobes.\n- Bleb associated: Streptococcus or Gram-negative infections.\n- Postvitrectomy: S. epidermidis.\n- Postintravitreal injection: S. epidermidis and oral flora (notably streptococcal species).\nDifferential Diagnosis\n\n- Toxic anterior segment syndrome (TASS): Occurs 6 to 24 hours after cataract surgery. Diffuse corneal edema with KP. Due to endotoxin from surgical instruments or fluids. Usually responds to intensive topical steroid and cycloplegic therapy but may require endothelial keratoplasty or penetrating keratoplasty for persistent corneal edema.\n- Acute noninfectious uveitis flare: Ask about history of previous uveitis; HLA-B27–associated anterior uveitis may be precipitated by trauma, including surgery.\n- Sterile (noninfectious) endophthalmitis (e.g., following intravitreal triamcinolone acetonide or anti-vascular endothelial growth factor [VEGF] injection).\n- Lens-particle uveitis (retained lens fragment in the angle or vitreous or retained lens cortex in the capsular bag).\n- See also [12.15](c12.xhtml#s12-15), Subacute and Chronic Postoperative Uveitis.\nWorkup\n\n- Complete ocular history and examination. Look for wound/bleb leak, exposed suture, vitreous to wound, blepharitis, or other predisposing factors for endophthalmitis.\n- Consider B-scan US if there is limited view of the posterior segment, which may confirm marked vitritis and/or membrane formation and establishes a baseline against which the success of therapy can be measured.\n- If vision is light perception postcataract extraction, a diagnostic and therapeutic vitrectomy is often indicated. Cultures (blood, chocolate, Sabouraud, and thioglycolate) and smears (Gram and Giemsa stains) should be obtained and intravitreal antibiotics are given. If vision is hand motion or better, vitreous aspiration, or an AC paracentesis if the vitreous specimen cannot be obtained, of 0.2 mL is performed and variably sent for culture. See [Appendix 13](app1.xhtml#app13), Anterior Chamber Paracentesis.\nTreatment\n\n- Prevention: Preparation of the conjunctiva with 5% povidone-iodine in all cases and the eyelids for incisional eye surgery prior to surgery has been proven to reduce the risk of endophthalmitis. Intraoperative (e.g., intracameral) antibiotics have also been shown to reduce endophthalmitis risk. While perioperative use of topical broad-spectrum antibiotics may decrease bacterial load, it has not been proven to lower the rates of endophthalmitis and may promote antibiotic resistance.\n- AC or vitreous tap for Gram stain, culture, and sensitivities along with timely intravitreal injections using broad-spectrum antibiotics (often vancomycin and ceftazidime, or amikacin if penicil"}, {"id": "12.15", "chapter_num": "12", "chapter": "Uveitis", "name": "Subacute and Chronic Postoperative Uveitis", "raw": "12.15 Subacute and Chronic Postoperative Uveitis\n\nSUBACUTE (WEEKS TO MONTHS AFTER SURGERY)\n\nSymptoms\n\nVariable. Insidious decreased vision, increasing redness, and pain.\n\nSigns\n\nCritical. AC and vitreous inflammation, lens capsular plaque, hypopyon; clumps of fibrinous exudate in the AC, on the iris surface, or along the pupillary border; vitreous abscesses; and vitritis.\n\nOther. Variable conjunctival injection, KP, corneal edema, and blebitis.\n\nOrganisms\n\n- S. epidermidis or other common bacteria (e.g., streptococci with a filtering bleb). Cutibacterium acnes (formerly Propionibacterium acnes), or other rare, indolent bacteria: Recurrent, anterior uveitis, may have a hypopyon and granulomatous KP, but with minimal conjunctival injection and pain. A white plaque or opacities on the lens capsule may be evident (see Figure 12.15.1). Only a transient response to steroids.\n- Fungi (Aspergillus, Candida, Cephalosporium, Penicillium species, and others).\nFigure 12.15.1 White plaque on an intraocular lens in a patient with chronic postoperative endophthalmitis. \n\nDifferential Diagnosis\n\n- Lens-particle uveitis: Perform gonioscopy and dilated examination to look for retained lens fragment(s) in angle or vitreous.\n- UGH syndrome (iris chafing): Look for iris transillumination and IOL decentration. Most common with one-piece acrylic IOL (thick, square-edge haptics) in the sulcus and with any lens that impinges on the iris or ciliary body. See [9.15](c09.xhtml#s9-15), Postoperative Glaucoma.\nWorkup\n\n- Complete ocular history and examination.\n- Aspiration of vitreous for smears (Gram, Giemsa, and methenamine–silver) and cultures (blood, chocolate, Sabouraud, thioglycolate, and a solid medium for anaerobic culture).\nSee [Appendix 11](app1.xhtml#app11), Intravitreal Tap and Inject. Intravitreal antibiotics are given as described previously. See [Appendix 12](app1.xhtml#app12), Intravitreal Antibiotics.\n\nNOTE: C. acnes will be missed unless proper anaerobic cultures are obtained and held for extended culture (14 days).\n\nTreatment\n\n- Initially treat as acute postoperative endophthalmitis, as described previously, but do not start steroids.\n- Immediate pars plana vitrectomy is beneficial if visual acuity on presentation is light perception within 6 weeks after cataract surgery. Prompt vitrectomy for endophthalmitis due to other procedures has not been studied in a large, randomized trial.\n- If a fungal infection is suspected, administer intravitreal amphotericin B (5 to 10 µg/0.1 mL) or intravitreal voriconazole (100 µg/0.1 mL).\n- Removal of the intraocular lens and capsular remnants may be required for diagnosis and treatment of C. acnes endophthalmitis, which may be sensitive to intravitreal penicillin, cefoxitin, clindamycin, or vancomycin.\n- If S. epidermidis is isolated, intraocular vancomycin (including irrigation of the capsular bag) alone may be sufficient.\n- Antimicrobial therapy should be modified in accordance with culture results, sensitivity testing, clinical course, and tolerance of therapeutic agents.\n- A vitrectomy with limited capsulectomy of the capsular plaque may be considered if vitreous aspiration cultures are negative or if the clinical response is incomplete. In cases with an incomplete response, removal of the entire capsule and IOL, along with intravitreal antibiotics, should be considered.\nFollow-Up\n\n- Dependent on the organism.\n- In general, follow-up is as described previously for acute postoperative endophthalmitis.\nCHRONIC"}, {"id": "12.16", "chapter_num": "12", "chapter": "Uveitis", "name": "Traumatic Endophthalmitis", "raw": "12.16 Traumatic Endophthalmitis\n\nThis condition constitutes an emergency requiring prompt attention.\n\nSymptoms\n\nSudden onset of decreased vision and increasing eye pain after a traumatic ocular injury.\n\nSigns\n\nCritical. Hypopyon, fibrin, severe AC reaction, vitreous cells and haze, and decreased red reflex, ruptured globe. An occult or missed IOFB must be ruled out. See [3.11](c03.xhtml#s3-11), Intraocular Foreign Body.\n\nOther. Eyelid edema, corneal edema, intense conjunctival injection, and chemosis (all are highly variable).\n\nNOTE: Patients with Bacillus endophthalmitis may have a high fever, leukocytosis, proptosis, a corneal ring ulcer, and rapid visual deterioration.\n\nOrganisms\n\nStaphylococcus species, Streptococcus species, Gram-negative species, fungi, Bacillus species, and others. Mixed flora may be present. Understanding the mechanism of injury is helpful in predicting the type of infecting organism (e.g., penetrating trauma from organic matter increases the risk of fungal infection).\n\nDifferential Diagnosis\n\n- Phacoantigenic uveitis: A sterile hypersensitivity reaction as a result of exposed lens protein associated with AC reaction, KP, and sometimes elevated IOP. See [9.11.3](c09.xhtml#s9-11-3), Phacoantigenic Glaucoma (Formerly Phacoanaphylaxis).\n- Lens particle uveitis: Fluffed up and hydrated cortical lens material, especially in younger patients with soft nuclei after violation of the lens capsule, associated with large AC lens particles, but no KP. See [9.11.2](c09.xhtml#s9-11-2), Lens Particle Glaucoma.\n- Sterile inflammatory response from a retained IOFB, blood in the vitreous, retinal detachment, or as a result of surgical manipulation.\nWorkup\n\n- Complete ocular history and examination. Look for penetrating injury and foreign body. Diffuse subconjunctival chemosis or hemorrhage can hide small penetrating wounds, consider an exploration in the operating room.\n- Consider B-scan US if there is limited view to the posterior segment, which may confirm marked vitritis, membrane formation, and/or foreign body presence.\n- Orbital CT scan (axial, coronal, and parasagittal views) with thin 1-mm cuts to evaluate for IOFB.\n- Vitreous aspiration, or an AC paracentesis if the vitreous specimen cannot be obtained, of 0.2 mL is performed sent for Gram stain, culture, and sensitivities. See [Appendix 13](app1.xhtml#app13), Anterior Chamber Paracentesis.\n- Consider a diagnostic and therapeutic vitrectomy for Gram stain, culture, and sensitivities if the infection and vision loss are severe.\nTreatment\n\n- Consider hospitalization.\n- Management for a ruptured globe or penetrating ocular injury if present. See [3.10](c03.xhtml#s3-10), Ruptured Globe and Penetrating Ocular Injury.\n- Removal of an IOFB in traumatic endophthalmitis is paramount in controlling the infection. See [3.11](c03.xhtml#s3-11), Intraocular Foreign Body.\n- Intravitreal antibiotics (e.g., ceftazidime 2.2 mg in 0.1 mL and vancomycin 1 mg in 0.1 mL; clindamycin 1 mg in 0.1 mL or amikacin 0.4 mg in 0.1 mL may also be considered for anaerobic coverage, especially if high concern for Bacillus, IOFB, or when there is a penicillin allergy). Intravitreal aminoglycosides should be used with caution, given their potential risk of macular infarction. These medications may be repeated every 48 to 72 hours as needed. See [Appendix 12](app1.xhtml#app12), Intravitreal Antibiotics.\n- Systemic antibiotics (e.g., ciprofloxacin 400 mg i.v. q12h or moxifloxacin 400 mg p.o. or i.v. daily; a"}, {"id": "12.17", "chapter_num": "12", "chapter": "Uveitis", "name": "Endogenous Bacterial Endophthalmitis", "raw": "12.17 Endogenous Bacterial Endophthalmitis\n\nSymptoms\n\nDecreased vision or ocular pain in a patient that is acutely ill (e.g., septic), recently hospitalized, immunocompromised, has an indwelling catheter, history of intravenous drug use, or with a history of a recent systemic procedure (e.g., heart valve replacement or repair, dental procedure). No history of recent intraocular surgery.\n\nSigns\n\nCritical. Chorioretinitis, vitreous cells and debris, AC cell and flare, and/or a hypopyon (see Figure 12.17.1).\n\nFigure 12.17.1 Dense vitritis and a chorioretinal lesion in a patient with endogenous endophthalmitis from a skin infection. \n\nOther. Iris microabscesses, absent red reflex, retinal inflammatory infiltrates, flame-shaped retinal hemorrhages with or without white centers, retinal/subretinal/choroidal abscesses, corneal edema, eyelid edema, chemosis, conjunctival injection, and panophthalmitis with orbital involvement (proptosis, restricted ocular motility). May be bilateral.\n\nOrganisms\n\nBacillus cereus (especially in i.v. drug users), streptococci, Neisseria meningitidis, S. aureus, H. influenzae, Klebsiella in East Asia, and others.\n\nDifferential Diagnosis\n\n- Endogenous fungal endophthalmitis: May see fluffy, white vitreous opacities. Organisms include Aspergillus and Candida. See [12.18](c12.xhtml#s12-18), Endogenous Fungal Endophthalmitis.\n- Viral retinitis: One or more foci of retinal whitening with variable levels of vitreous inflammation. See [12.13](c12.xhtml#s12-13), Acute Retinal Necrosis and [12.12](c12.xhtml#s12-12), Cytomegalovirus Retinitis.\n- Toxoplasmosis: Typically a unilateral retinitis which may or may not be associated with an adjacent pigmented chorioretinal scar. A dense vitritis may be appreciated over the area of retinitis creating the classic “headlight in a fog” appearance. AC reaction is variable. See [12.9](c12.xhtml#s12-9), Toxoplasmosis.\n- Noninfectious panuveitis: See [12.4](c12.xhtml#s12-4), Panuveitis.\n- Neoplastic conditions (e.g., vitreoretinal lymphoma and retinoblastoma).\nWorkup\n\n- History: Duration of symptoms? Systemic symptoms of underlying disease or infection? Indwelling catheter? Intravenous drug use? Immunocompromised? Recent medical procedures?\n- Complete ocular examination, including a dilated fundus evaluation.\n- B-scan US if there is no view to the fundus to assess for vitritis and chorioretinal abscesses.\n- Obtain an aqueous or vitreous tap with Gram stain and culture, fungal stain and culture, and PCR (if indicated) for HSV, VZV, CMV, and toxoplasmosis.\n- Admit patients to the hospital for comanagement with medicine or infectious disease team for source identification and control.\n- CXR; cultures of blood, urine, all indwelling catheters, and i.v. lines; Gram stain and cultures of any wound or discharge. Consider a transesophogeal or transthoracic echocardiogram to rule out endocarditis. A lumbar puncture is indicated when meningeal signs are present.\nTreatment\n\nAll treatment should be coordinated with an internal medicine physician.\n\n- Hospitalize the patient.\n- Broad-spectrum (i.v. and/or oral) antibiotics are started after appropriate smears and cultures are obtained. Antibiotic choices vary according to the suspected source of septic infection (e.g., gastrointestinal tract, genitourinary tract, and cardiac) and are determined in consultation with an infectious disease specialist. Dosages recommended for meningitis and severe infections are used. If oral antibiotics are used, confirm "}, {"id": "12.18", "chapter_num": "12", "chapter": "Uveitis", "name": "Endogenous Fungal Endophthalmitis", "raw": "12.18 Endogenous Fungal Endophthalmitis\n\nSymptoms\n\nDecreased vision, floaters, and pain that is often bilateral. Patients typically have a history of recent hospitalization, recent abdominal surgery, being immunocompromised, possessing a long-term indwelling line or catheter (e.g., for hyperalimentation, hemodialysis, or antibiotics), or using intravenous drugs.\n\nSigns\n\n(See Figure 12.18.1.)\n\nFigure 12.18.1 Candida chorioretinitis with vitreous involvement. \n\nCritical. Discrete, multifocal, yellow-white, choroidal to chorioretinal fluffy lesions from one to several disc diameters in size. With time, the lesions increase in size, break into the vitreous, and appear as a “string of pearls,” especially in the case of Candida. Aspergillus has a predisposition for the subretinal space.\n\nOther. Vitreous cell and haze, vitreous abscesses, retinal hemorrhages with or without pale centers, AC cells, and hypopyon. A retinal detachment may develop.\n\nDifferential Diagnosis\n\nThe following should be considered in immunocompromised patients.\n\n- CMV retinitis: Multifocal areas of granular retinal whitening with a minimal to mild vitreous reaction, more likely to be associated with retinal hemorrhage. See [12.12](c12.xhtml#s12-12), Cytomegalovirus Retinitis.\n- Toxoplasmosis: Yellow-white retinal lesions often with an adjacent chorioretinal scar. See [12.9](c12.xhtml#s12-9), Toxoplasmosis.\n- Pneumocystis choroidopathy: Rare manifestation of widely disseminated Pneumocystis carinii infection. Usually in AIDS patients. Often asymptomatic. History of P. carinii and treatment with aerosolized pentamidine. Multifocal, yellow, round, deep choroidal lesions approximately one-half to two-disc diameters in size, located in the posterior pole. No vitritis. Patients are often cachectic. Treatment is with i.v. trimethoprim/sulfamethoxazole or i.v. pentamidine in conjunction with an infectious disease specialist.\n- Others: Herpes viral retinitis; Nocardia, and Cryptococcus species; atypical Mycobacterium, coccidioidomycosis, and others.\nWorkup\n\n- History: History of bacteremia or fungemia? Underlying medical conditions? Medications? Indwelling catheter? Intravenous drug use? Other risk factors for immunocompromised state?\n- Skin examination for signs of intravenous drug injection.\n- Most clinicians recommend that all patients with fungemia have a complete dilated fundus examination (ideally within 72 hours), as ocular involvement may be asymptomatic. A repeat dilated fundus examination is recommended 2 weeks after the initial negative examination.\n- Blood, urine, and catheter tip fungal cultures; these often need to be repeated several times and may be negative despite ocular candidiasis. Blood cultures may need to be held for a full 7 days to assess for fungal species.\n- Consider vitrectomy to obtain a specimen and remove opacified vitreous. Cultures and smears can confirm the diagnosis. Amphotericin B 5 to 10 µg in 0.1 mL or voriconazole 50 to 100 µg in 0.1 mL is injected into the vitreous cavity after the procedure.\nTreatment\n\n- Suspected fungal endophthalmitis without a clear source should be considered evidence of a disseminated infection and requires further systemic evaluation and workup.\n- Hospitalize all unreliable patients, systemically ill patients, or those with moderate to severe vitreous involvement.\n- An infectious disease specialist should be consulted for systemic workup to evaluate for a source and other sites of involvement.\n- Typically, chorioreti"}, {"id": "13.1", "chapter_num": "13", "chapter": "Miscellaneous & Systemic", "name": "Acquired Cataract", "raw": "13.1 Acquired Cataract\n\nSymptoms\n\nSlowly progressive visual loss or blurring, usually over months to years, affecting one or both eyes. Glare, especially in bright sun or from oncoming headlights while driving at night, and altered color perception may occur, but not to the same degree as in optic neuropathies. Characteristics of the cataract determine specific symptoms.\n\nSigns\n\n(See Figure 13.1.1.)\n\nFigure 13.1.1 Cataract with early cortical changes and nuclear sclerosis. \n\nCritical. Opacification or discoloration of the normally clear crystalline lens.\n\nOther. Blurred view of the retina with dimming or disruption of the red reflex on retinoscopy. Myopic shift from nuclear sclerosis may cause increased near vision—so-called “second sight.” Cataract alone does not cause a relative afferent pupillary defect (RAPD).\n\nEtiology\n\n- Age-related: Most common. Advanced forms include mature, hypermature, and Morgagnian.\n- Trauma: Penetrating, concussion (Vossius ring), and electric shock.\n- Toxic: Steroids in any form (including intravitreal injections), miotics, antipsychotics (e.g., phenothiazines), and others.\n- Secondary. - Chronic anterior uveitis. See [12.1](c12.xhtml#s12-1), Anterior Uveitis (Iritis/Iridocyclitis).\n- History of vitrectomy.\n- Repeated intravitreal injections (if trauma to lens occurs during a procedure).\n- Ionizing radiation.\n- Tumor.\n- Acute angle-closure glaucoma: May have glaukomflecken. See [9.4](c09.xhtml#s9-4), Acute Angle Closure Attack.\n- Degenerative ocular disease: Retinitis pigmentosa, Leber congenital amaurosis, gyrate atrophy, Wagner and Stickler syndromes associated with posterior subcapsular cataracts, and others.\n\n- Endocrine/metabolic/chromosomal. - Diabetes: Juvenile form characterized by rapidly progressing white “snowflake” opacities in the anterior and posterior subcapsular locations. Age-related cataracts form earlier than in nondiabetics.\n- Hypocalcemia: Small, white, iridescent cortical changes, usually seen in the presence of tetany.\n- Wilson disease: Red-brown pigment deposition in the cortex beneath the anterior capsule (a “sunflower” cataract). See [13.9](c13.xhtml#s13-9), Wilson Disease.\n- Myotonic dystrophy: Multicolored birefringent opacities, “Christmas-tree” cataract behind the anterior capsule.\n- Others: Down syndrome, neurofibromatosis type 2 (posterior subcapsular cataract), atopic dermatitis (anterior subcapsular), etc.\n\nTypes\n\n- Nuclear: Yellow or brown discoloration of the central lens. Typically blurs distance vision more than near (myopic shift).\n- Posterior subcapsular: Plaque-like opacity near the posterior aspect of the lens. Best seen with retroillumination as a dark shadow against the red reflex. Glare and difficulty reading are common complaints. Symptoms may improve postdilation. Associated with ocular inflammation, steroid use, diabetes, trauma, radiation, or excessive alcohol use. Classically occurs in patients <50 years of age. Typically, more rapid onset.\n- Cortical: Vacuoles and radial or spoke-like opacities in the periphery that expand to involve the anterior and posterior lens. Glare is the most common complaint. Often asymptomatic until central changes develop.\nNOTE: Traditionally, a mature cataract is defined as lenticular changes sufficiently dense to totally obscure the view of the posterior lens and posterior segment of the eye. No iris shadow is seen on oblique illumination at the pupillary margin. Rarely, the cortex may liquefy, and the nucleus becomes free flo"}, {"id": "13.2", "chapter_num": "13", "chapter": "Miscellaneous & Systemic", "name": "Subluxed or Dislocated Crystalline Lens", "raw": "13.2 Subluxed or Dislocated Crystalline Lens\n\nDefinition\n\n- Subluxation: Partial disruption of the zonular fibers. Lens is decentered but remains partially visible through the pupil.\n- Dislocation: Complete disruption of the zonular fibers. Lens is fully displaced out of the pupillary aperture.\nSymptoms\n\nDecreased vision, double vision that persists when covering one eye (monocular diplopia).\n\nSigns\n\n(See Figure 13.2.1.)\n\nFigure 13.2.1 Ectopia lentis. \n\nCritical. Decentered or displaced lens, iridodonesis (quivering of the iris), and phacodonesis (quivering of the lens).\n\nOther. Change in refractive error, marked astigmatism, cataract, angle-closure glaucoma as a result of pupillary block, vitreous in the anterior chamber, and asymmetry of the anterior chamber depth.\n\nEtiology\n\n- Trauma: Most common. Results in subluxation if >∼25% of the zonular fibers are ruptured. Need to rule out a predisposing condition (see other etiologies).\n- Pseudoexfoliation: Flaky material seen as scrolls in a “target pattern” on anterior lens capsule; associated with glaucoma and poor pupillary dilation; higher risk of complications during cataract surgery due to weak zonular fibers (see [9.10](c09.xhtml#s9-10), Pseudoexfoliation Syndrome/Exfoliative Glaucoma).\n- Marfan syndrome: Bilateral lens subluxation, classically superotemporally. Increased risk of retinal detachment. Autosomal dominant with cardiomyopathy, aortic aneurysm, aortic dissection, tall stature with long extremities, and kyphoscoliosis.\n- Homocystinuria: Bilateral lens subluxation, classically inferonasally. Increased risk of retinal detachment. Autosomal recessive often with intellectual disability, skeletal deformities, high incidence of thromboembolic events (particularly with general anesthesia). Lens subluxation may be the first manifestation in patients with mild disease.\n- Weill–Marchesani syndrome: Small lens can dislocate into the anterior chamber, causing reverse pupillary block. Usually autosomal recessive with short fingers and stature, seizures, microspherophakia (small, round lens), myopia, and no intellectual disability.\n- Others: Acquired syphilis, congenital ectopia lentis, simple ectopia lentis, aniridia, Ehlers–Danlos syndrome, Crouzon syndrome, hyperlysinemia, sulfite oxidase deficiency, high myopia, chronic inflammation, hypermature cataract, etc.\nWorkup\n\n- History: Trauma? Family history of disorders listed above? Systemic illness (e.g., syphilis)? Neurologic symptoms (e.g., seizures)?\n- Determine whether the condition is unilateral or bilateral. Determine direction of lens displacement and evaluate for subtle phacodonesis by observing the lens during back-and-forth saccadic eye movements. Check for pseudoexfoliation. Evaluate for acute or remote signs of ocular trauma including hyphema, angle recession, iridodialysis, cyclodialysis, retinal tears, and detachments.\n- Systemic examination: Evaluate stature, extremities, hands, and fingers; often in conjunction with an internist, including blood and urine tests to rule out homocystinuria and echocardiography to rule out aortic aneurysms in patients with possible Marfan syndrome. Consider genetic testing when appropriate and available.\n- Syphilis screening tests (rapid plasma reagin [RPR] or venereal disease research laboratory [VDRL] and fluorescent treponemal antibody absorption [FTA-ABS] or treponemal-specific assay if indicated).\nTreatment\n\n- Lens dislocated into the anterior chamber. - Dilate the pupil, place the pati"}, {"id": "13.3", "chapter_num": "13", "chapter": "Miscellaneous & Systemic", "name": "Pregnancy", "raw": "13.3 Pregnancy\n\nANTERIOR SEGMENT CHANGES\n\nTransient loss of accommodation and increased corneal thickness, edema, and curvature. Refractive change results from hormonal status or a shift in fluid and tends to normalize after delivery. Defer prescribing new glasses until several weeks postpartum or after stopping nursing. Rigid contact lens wearers may experience contact lens intolerance due to corneal changes. Corneal refractive surgery is usually delayed at least 3 months after pregnancy or stopping nursing.\n\nPREECLAMPSIA/ECLAMPSIA\n\nA worldwide leading cause of maternal/fetal/neonatal morbidity and mortality. Occurs in 2% to 5% of pregnancies but may approach 15% in developing countries. Occurs after 20 weeks of gestation; most commonly in primigravida.\n\nSymptoms\n\nHeadaches, blurred vision, photopsias, diplopia, and scotomas.\n\nSigns\n\nSystemic\n\n- Preeclampsia or pregnancy-induced hypertension: Hypertension and proteinuria in previously normotensive women. Other signs include peripheral edema, liver failure, renal failure, and HELLP syndrome (hemolysis, elevated liver enzymes, and low platelet counts).\n- Eclampsia: Preeclampsia with seizures.\nOcular. Focal retinal arteriolar spasm and narrowing, peripapillary or focal areas of retinal edema, retinal hemorrhages, exudates, nerve fiber layer infarcts, vitreous hemorrhage secondary to neovascularization, serous retinal detachments in 1% of preeclamptic and 10% of eclamptic patients, acute nonarteritic ischemic optic neuropathy, bilateral occipital lobe infarcts, and posterior cerebral edema (posterior reversible encephalopathy syndrome [PRES]). Differential diagnosis of PRES includes posterior circulation stroke, infectious cerebritis, coagulation disorder causing intracranial venous thrombosis, intracranial hemorrhage, occult tumor with secondary bleed, migraines, atypical seizure, or demyelination.\n\nWorkup\n\n- Complete neuro-ophthalmologic assessment and fundus examination. Poor vision with brisk pupils without a RAPD suggests occipital lesions.\n- MRI findings in PRES include vasogenic edema in the parieto-occipital regions of both cerebral hemispheres involving subcortical white matter with possible extension into the gray-white junction, cortical surface, external capsule, and basal ganglia.\n- With typical presentation, further invasive studies are discouraged.\n- Systemic workup, including blood pressure monitoring and urinalysis, in conjunction with an obstetrics/gynecology specialist.\nNatural History\n\n- Magnetic resonance imaging (MRI) abnormalities resolve 1 to 2 weeks after blood pressure control, at which time complete neurologic recovery can be expected.\n- Serous retinal detachments; often bilateral and bullous; resolve postpartum with residual pigment epithelial changes (see Figure 13.3.1).\nFigure 13.3.1 Serous macular detachment in a patient with preeclampsia. \n\n- Retinal vascular changes also normalize postpartum.\nTreatment\n\n- Control blood pressure and electrolyte imbalances.\n- Prompt delivery ideal.\nOCCLUSIVE VASCULAR DISORDERS\n\nPregnancy represents a hypercoagulable state possibly resulting in the development of retinal artery and vein occlusions, disseminated intravascular coagulopathy (DIC), and thrombotic thrombocytopenic purpura. Ocular DIC is characterized by widespread small-vessel thrombosis, particularly in the choroid, associated with hemorrhage, tissue necrosis, and serous retinal detachments.\n\nMENINGIOMA OF PREGNANCY\n\nMeningiomas may have a very aggressive growth p"}, {"id": "13.4", "chapter_num": "13", "chapter": "Miscellaneous & Systemic", "name": "Lyme Disease", "raw": "13.4 Lyme Disease\n\nSymptoms\n\nOphthalmic manifestations include redness, decreased vision, double vision, pain, photophobia, and facial weakness. Systemic complaints may include headache, malaise, fatigue, fever, chills, palpitations, or muscle/joint pains. A history of a tick bite within the previous few months may be elicited.\n\nSigns\n\nOcular. Conjunctivitis (most common, typical in early localized disease), episcleritis, exposure keratopathy (due to cranial nerve VII palsy), stromal keratitis, iritis, vitritis, choroiditis, optic neuritis or perineuritis, bilateral optic nerve edema (frequently in children with disseminated disease), cranial nerve palsies, and idiopathic orbital inflammatory syndrome. See specific sections.\n\nCritical Systemic. One or more flat, erythematous, or “bull’s eye” skin lesions, which enlarge in all directions (erythema migrans); unilateral or bilateral facial nerve palsies; polyarticular migratory arthritis. May not be present at the time ocular signs develop.\n\nOther Systemic. Meningitis, peripheral radiculoneuropathy, synovitis, joint effusions, and cardiac abnormalities.\n\nDifferential Diagnosis\n\n- Syphilis: High-positive FTA-ABS titer may produce a low false-positive antibody titer against Borrelia burgdorferi. See [12.10](c12.xhtml#s12-10), Syphilis.\n- Others: Rickettsial infections, acute rheumatic fever, juvenile idiopathic arthritis, sarcoidosis, tuberculosis, herpes virus infections, etc.\nWorkup\n\n- History: Does patient live in endemic area (mainly in the Northeast and upper Midwest of the United States)? Prior tick bite, skin rash, facial nerve palsy, joint or muscle pains, flu-like illness? Meningeal symptoms? Prior positive Lyme antibody test?\n- Complete systemic, neurologic, and ocular examinations.\n- Two-step diagnosis with a screening assay and confirmatory Western blot for B. burgdorferi.\nNOTE: A positive interpretation is generally considered if 5 out of 10 IgG bands are positive or 2 out of 3 IgM bands are positive. IgM is helpful for acute presentation (<4 weeks). IgG antibodies may take 4 to 6 weeks to develop.\n\n- Serum RPR or VDRL and FTA-ABS or treponemal-specific assay. Consider serum angiotensin-converting enzyme, chest x-ray, and purified protein derivative and/or interferon-gamma release assay (e.g., QuantiFERON-TB Gold).\n- Consider lumbar puncture when meningitis is suspected or neurologic signs or symptoms are present.\nTreatment\n\nEarly Lyme Disease (Including Lyme-Related Uveitis, Keratitis, or Facial Nerve Palsy)\n\n- Doxycycline 100 mg p.o. b.i.d. for 10 to 21 days.\n- In children, pregnant women, and others who cannot take doxycycline, substitute amoxicillin 500 mg p.o. t.i.d., cefuroxime axetil 500 mg p.o. b.i.d., clarithromycin 500 mg p.o. b.i.d., or azithromycin 500 mg p.o. daily.\nPatients with Neuro-Ophthalmic Signs or Recurrent or Resistant Infection\n\n- Ceftriaxone 2 g i.v. daily for 2 to 3 weeks.\n- Alternatively, penicillin G, 20 million units i.v. daily for 2 to 3 weeks.\nFollow-Up\n\nEvery 1 to 3 days until improvement is demonstrated and then weekly until resolved.\n\n"}, {"id": "13.5", "chapter_num": "13", "chapter": "Miscellaneous & Systemic", "name": "Convergence Insufficiency", "raw": "13.5 Convergence Insufficiency\n\nSymptoms\n\nEye discomfort, eye fatigue, blurred vision at near, headaches, or diplopia. Most common in young adults but may be seen in older people. Symptoms are usually associated with periods of prolonged near work.\n\nSigns\n\nCritical. An exophoria at near in the presence of poor near-fusional convergence amplitudes, a low accommodative convergence/accommodation (AC/A) ratio, and a remote near point of convergence.\n\nDifferential Diagnosis\n\n- Uncorrected refractive error: Hyperopia or over-minused myopia.\n- Accommodative insufficiency (AI): Often in prepresbyopia age range from uncorrected low hyperopia or over-minused myopia. While reading, a 4-diopter base-in prism placed in front of the eye blurs the print in AI but improves clarity in convergence insufficiency (CI). Rarely, adolescents may develop transient paresis of accommodation, requiring reading glasses or bifocals. This idiopathic condition resolves in several years.\n- Convergence paralysis: Acute onset of exotropia and diplopia on near fixation only; normal adduction and accommodation. Usually results from a lesion in the corpora quadrigemina or the third cranial nerve nucleus and may be associated with Parinaud syndrome.\nNOTE: A diagnosis of convergence paralysis should prompt neuroimaging to rule out an intracranial lesion.\n\nEtiology\n\n- Primary or idiopathic CI.\n- Fatigue or illness.\n- Drugs (parasympatholytics).\n- Uveitis.\n- Glasses inducing a base-out prism effect.\n- Postviral encephalitis.\n- Traumatic brain injury.\n- Parkinson disease.\nWorkup\n\n- Manifest (without cycloplegia) refraction.\n- Determine the near point of convergence: Ask patient to focus on an accommodative target (e.g., a pencil eraser) and to state when double vision develops as you bring the target toward them. In general, a normal near point of convergence is <8 cm. A near point of convergence exceeding 6 cm from the bridge of the nose in prepresbyopic patients or 10 cm in presbyopic patients is regarded as increased and abnormal.\n- Check for exodeviations or esodeviations at distance and near using the cover tests (see [Appendix 3](app1.xhtml#app3), Cover/Uncover and Alternate Cover Tests) or the Maddox rod test.\n- Measure the patient’s fusional ability at near. Have patient focus on an accommodative target at their reading distance. With a prism bar, slowly increase the amount of base-out prism in front of one eye until patient notes double vision (the breakpoint), and then slowly reduce the amount of base-out prism until a single image is again noted (the recovery point). A low breakpoint (10 to 15 prism diopters) or a low recovery point or both are consistent with CI.\n- Place a 4-diopter base-in prism in front of one eye while patient is reading. Determine whether the print becomes clearer or more blurred to rule out AI.\n- Perform cycloplegic refraction after the previous tests.\nNOTE: These tests are performed with the patient’s spectacle correction in place (if glasses are worn for near work).\n\nTreatment\n\n- Correct any refractive error. Slightly undercorrect hyperopia and fully correct myopia.\n- Encourage good lighting and relaxation time between periods of close work.\n- Near-point exercises (e.g., pencil push-ups): The patient focuses on a pencil eraser while slowly moving it from arm’s length toward the face. Concentrate on maintaining one image of the eraser, repeating the maneuver when diplopia manifests. Try to bring the pencil in closer each time while maintaining"}, {"id": "13.6", "chapter_num": "13", "chapter": "Miscellaneous & Systemic", "name": "Accommodative Spasm", "raw": "13.6 Accommodative Spasm\n\nSymptoms\n\nBilateral blurred distance vision, fluctuating vision, blurred vision when shifting gaze from near to far, headache, and eye strain while reading. Diplopia may occur in severe cases. Often seen in teenagers under stress. Symptoms may occur after prolonged and intense periods of near work (e.g., reading, cell phone or tablet use, writing, etc.).\n\nSigns\n\nCritical. Cycloplegic refraction reveals substantially less myopia (or more hyperopia) than was originally found when the refraction was performed without cycloplegia (manifest refraction). Manifest myopia may be as high as 10 diopters. Spasm of the near reflex is associated with excess accommodation, excess convergence, and miosis and is in the differential diagnosis of sixth cranial nerve palsy (see [10.8](c10.xhtml#s10-8), Isolated Sixth Cranial Nerve Palsy).\n\nOther. Abnormally close near point of focus, miosis, and a normal amplitude of accommodation that may appear low.\n\nEtiology\n\n- Inability to relax the ciliary muscles. Involuntary and associated with stressful situations or functional neuroses.\n- Fatigue.\n- Prolonged reading or cell phone use may precipitate episodes.\nDifferential Diagnosis\n\n- Uncorrected hyperopia: Increased plus power accepted during manifest refraction.\n- Other causes of pseudomyopia: Hyperglycemia, medication induced (e.g., sulfa drugs and anticholinesterase medications), anterior displacement of the lens–iris diaphragm.\n- Manifestation of iridocyclitis.\nWorkup\n\n- Complete ophthalmic examination. The manifest refraction may be highly variable, but it is important to determine the least amount of minus power or the most amount of plus power that provides clear distance vision.\n- Cycloplegic refraction.\nTreatment\n\n- True refractive errors should be corrected. If a significant amount of esophoria at near is present, additional plus power (e.g., +2.50 diopters) in reading glasses or bifocal form may be helpful.\n- Counseling patient and parents to provide a more relaxed atmosphere and avoid stressful situations.\n- Counseling patients and parents about appropriate ergonomics when doing near work. Ensure proper lighting, seating, and book/screen distance to reduce eye strain.\n- Cycloplegics have
